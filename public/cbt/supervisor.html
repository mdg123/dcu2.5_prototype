<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감독관 대시보드 - 다채움 CBT</title>
  <link rel="stylesheet" href="/css/common-nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-800: #1F2937;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif; background: #F5F7FA; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

    /* 페이지 헤더 */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
      background: #fff; border-radius: 14px; padding: 20px 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .page-header-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      width: 36px; height: 36px; border-radius: 8px; background: var(--gray-100);
      border: none; cursor: pointer; color: var(--gray-600); font-size: 14px;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .back-btn:hover { background: var(--gray-200); }
    .exam-info .exam-name { font-size: 20px; font-weight: 700; color: var(--gray-800); }
    .exam-info .exam-meta-line { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
    }
    .badge-waiting { background: #f3f4f6; color: var(--gray-600); }
    .badge-active { background: #dcfce7; color: #16a34a; }
    .badge-ended { background: #dbeafe; color: #2563eb; }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .badge-active .badge-dot { animation: pulse-badge 1.5s ease-in-out infinite; }
    @keyframes pulse-badge { 0%,100%{opacity:1;} 50%{opacity:.4;} }

    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; font-family: inherit;
      display: inline-flex; align-items: center; gap: 6px; transition: all .2s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #059669; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline { background: #fff; color: var(--gray-600); border: 1.5px solid var(--gray-300); }
    .btn-outline:hover { background: var(--gray-50); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* 통계 카드 */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px;
    }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 20px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .stat-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      flex-shrink: 0;
    }
    .stat-icon.blue { background: #eff6ff; color: var(--primary); }
    .stat-icon.green { background: #ecfdf5; color: var(--success); }
    .stat-icon.orange { background: #fffbeb; color: var(--warning); }
    .stat-icon.red { background: #fef2f2; color: var(--danger); }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--gray-800); line-height: 1; }
    .stat-label { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
    .stat-change { font-size: 13px; color: var(--gray-400); margin-top: 2px; }

    /* 학생 테이블 */
    .table-section {
      background: #fff; border-radius: 14px; padding: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden;
    }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--gray-100);
    }
    .table-title { font-size: 15px; font-weight: 700; color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: 700;
      background: #fef2f2; color: var(--danger);
    }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); animation: pulse-badge 1s ease-in-out infinite; }
    .table-controls { display: flex; gap: 8px; align-items: center; }
    .search-input {
      padding: 7px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-size: 13px; font-family: inherit; width: 200px;
    }
    .search-input:focus { border-color: var(--primary); outline: none; }

    .student-table { width: 100%; border-collapse: collapse; }
    .student-table th {
      padding: 11px 16px; text-align: left; font-size: 13px; font-weight: 600;
      color: var(--gray-500); background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
    }
    .student-table td {
      padding: 12px 16px; font-size: 14px; color: var(--gray-700);
      border-bottom: 1px solid var(--gray-100); vertical-align: middle;
    }
    .student-table tr:last-child td { border-bottom: none; }
    .student-table tbody tr { transition: background .15s; }
    .student-table tbody tr:hover { background: var(--gray-50); }
    .student-table tbody tr.row-alert { background: #fff5f5; }

    /* 상태 배지 */
    .student-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 600;
    }
    .s-waiting { background: #f3f4f6; color: var(--gray-500); }
    .s-active { background: #dcfce7; color: #16a34a; }
    .s-submitted { background: #dbeafe; color: #2563eb; }
    .s-disconnected { background: #fef2f2; color: var(--danger); }

    /* 포커스 표시등 */
    .focus-indicator {
      display: flex; align-items: center; gap: 6px; font-size: 13px;
    }
    .focus-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .focus-dot.focused {
      background: var(--success);
      box-shadow: 0 0 0 0 rgba(16, 185, 129, .6);
      animation: pulse-focus 2s ease-in-out infinite;
    }
    .focus-dot.away {
      background: var(--danger);
      box-shadow: 0 0 0 0 rgba(239, 68, 68, .6);
      animation: pulse-away 1.2s ease-in-out infinite;
    }
    .focus-dot.idle { background: var(--gray-300); }
    @keyframes pulse-focus {
      0% { box-shadow: 0 0 0 0 rgba(16,185,129,.5); }
      70% { box-shadow: 0 0 0 7px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }
    @keyframes pulse-away {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
      70% { box-shadow: 0 0 0 7px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }
    .focus-label-focused { color: var(--success); font-weight: 600; }
    .focus-label-away { color: var(--danger); font-weight: 600; }
    .focus-label-idle { color: var(--gray-400); }

    /* 이탈 횟수 */
    .leave-count {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 13px; font-weight: 700;
    }
    .leave-count.none { color: var(--gray-400); }
    .leave-count.low { color: var(--warning); }
    .leave-count.high { color: var(--danger); }

    /* 점수 배지 */
    .score-badge {
      display: inline-block; padding: 4px 10px; border-radius: 12px;
      font-size: 13px; font-weight: 700;
    }
    .score-none { background: #f3f4f6; color: var(--gray-500); }
    .score-high { background: #dcfce7; color: #16a34a; }
    .score-mid-high { background: #dbeafe; color: #2563eb; }
    .score-mid { background: #fef3c7; color: #d97706; }
    .score-low { background: #fef2f2; color: #ef4444; }

    /* 진행바 (타이머용) */
    .exam-timer-bar {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border-radius: 12px; padding: 14px 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 20px;
    }
    .timer-display {
      display: flex; align-items: center; gap: 6px;
      font-size: 20px; font-weight: 800; color: var(--gray-800); min-width: 80px;
    }
    .timer-icon { color: var(--primary); }
    .progress-track { flex: 1; height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; background: var(--primary); transition: width .5s ease; }
    .progress-fill.warn { background: var(--warning); }
    .progress-fill.danger-fill { background: var(--danger); }
    .timer-label { font-size: 13px; color: var(--gray-500); min-width: 90px; text-align: right; }

    /* 알림 패널 */
    .alert-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 320px;
      background: #fff; border-left: 1px solid var(--gray-200);
      display: flex; flex-direction: column; z-index: 200;
      transform: translateX(100%); transition: transform .3s;
    }
    .alert-panel.open { transform: translateX(0); }
    .alert-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; border-bottom: 1px solid var(--gray-100);
      font-size: 14px; font-weight: 700; color: var(--gray-800);
    }
    .alert-close { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 18px; }
    .alert-list { flex: 1; overflow-y: auto; padding: 8px; }
    .alert-item {
      padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
      background: #fff5f5; border-left: 3px solid var(--danger); font-size: 13px;
    }
    .alert-item .alert-time { font-size: 13px; color: var(--gray-400); margin-top: 3px; }
    .alert-item .alert-name { font-weight: 700; color: var(--gray-800); }

    /* 알림 토스트 */
    .live-alert {
      position: fixed; top: 80px; right: 20px;
      background: var(--danger); color: #fff;
      padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
      z-index: 9999; display: none; align-items: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(239,68,68,.3);
      animation: slideInRight .3s ease;
    }
    .live-alert.show { display: flex; }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* 빈 상태 */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
    .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 14px; }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--gray-800); color: #fff; padding: 12px 24px;
      border-radius: 10px; font-size: 13px; z-index: 9999; display: none;
    }

    /* 성취수준 분포 */
    .section { background: #fff; border-radius: 14px; padding: 0; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 20px; overflow: hidden; margin-top: 20px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--gray-100); }
    .section-title { font-size: 16px; font-weight: 700; color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
    .section-subtitle { font-size: 13px; color: var(--gray-500); margin-top: 1px; }
    .section-body { padding: 20px; }
    .dist-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 13px; }
    .dist-card { border-radius: 12px; padding: 16px; text-align: center; }
    .dist-card.s { background: #dcfce7; }
    .dist-card.a { background: #dbeafe; }
    .dist-card.b { background: #fef9c3; }
    .dist-card.c { background: #fee2e2; }
    .dist-grade { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
    .dist-card.s .dist-grade { color: #15803d; }
    .dist-card.a .dist-grade { color: #1d4ed8; }
    .dist-card.b .dist-grade { color: #ca8a04; }
    .dist-card.c .dist-grade { color: #dc2626; }
    .dist-range { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .dist-card.s .dist-range { color: #15803d; }
    .dist-card.a .dist-range { color: #1d4ed8; }
    .dist-card.b .dist-range { color: #ca8a04; }
    .dist-card.c .dist-range { color: #dc2626; }
    .dist-count { font-size: 28px; font-weight: 800; color: var(--gray-800); line-height: 1; }
    .dist-label { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
    .dist-bar-track { height: 6px; background: rgba(0,0,0,.1); border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .dist-bar-fill { height: 100%; border-radius: 3px; }
    .dist-card.s .dist-bar-fill { background: #15803d; }
    .dist-card.a .dist-bar-fill { background: #1d4ed8; }
    .dist-card.b .dist-bar-fill { background: #ca8a04; }
    .dist-card.c .dist-bar-fill { background: #dc2626; }

    /* 문항별 정답률 */
    .chart-grid { display: flex; flex-direction: column; gap: 10px; }
    .chart-row { display: flex; align-items: center; gap: 13px; }
    .chart-q-num { font-size: 13px; font-weight: 700; color: var(--gray-500); min-width: 40px; text-align: right; }
    .chart-bar-track { flex: 1; height: 28px; background: var(--gray-100); border-radius: 6px; overflow: hidden; position: relative; }
    .chart-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding: 0 10px; font-size: 13px; font-weight: 700; color: #fff; min-width: 2px; transition: width .8s cubic-bezier(.4,0,.2,1); white-space: nowrap; }
    .chart-bar-fill.correct-high { background: var(--success); }
    .chart-bar-fill.correct-mid { background: var(--primary); }
    .chart-bar-fill.correct-low { background: var(--warning); }
    .chart-bar-fill.correct-very-low { background: var(--danger); }
    .chart-pct { font-size: 13px; font-weight: 700; min-width: 40px; text-align: right; color: var(--gray-600); }
    .chart-legend { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray-500); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* 반응형 */
    @media (max-width: 1024px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .dist-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .student-table th:nth-child(4), .student-table td:nth-child(4),
      .student-table th:nth-child(6), .student-table td:nth-child(6),
      .student-table th:nth-child(8), .student-table td:nth-child(8) { display: none; }
    }
  </style>
</head>
<body>
<script src="/js/common-nav.js"></script>

<div class="container" id="mainContent" style="display:none;">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div class="page-header-left">
      <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
      <div class="exam-info">
        <div class="exam-name" id="examName">평가 불러오는 중...</div>
        <div class="exam-meta-line" id="examMetaLine">클래스명 · 문항 수 · 제한시간</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <span class="status-badge badge-waiting" id="examStatusBadge">
        <span class="badge-dot"></span>
        <span id="examStatusText">대기 중</span>
      </span>
      <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="toggleAlertPanel()">
          <i class="fas fa-bell"></i> 알림 <span id="alertBadge" style="display:none;background:var(--danger);color:#fff;border-radius:10px;padding:0 5px;font-size:10px;"></span>
        </button>
        <button class="btn btn-success" id="startBtn" onclick="startExam()">
          <i class="fas fa-play"></i> 시험 시작
        </button>
        <span id="endBtnSep" style="display:none;width:1px;height:28px;background:var(--gray-200);margin:0 4px;"></span>
        <button class="btn btn-danger" id="endBtn" onclick="endExam()" style="display:none;">
          <i class="fas fa-stop"></i> 시험 종료
        </button>
      </div>
    </div>
  </div>

  <!-- 타이머 진행바 -->
  <div class="exam-timer-bar" id="timerBar" style="display:none;">
    <div class="timer-display">
      <i class="fas fa-clock timer-icon"></i>
      <span id="timerText">00:00</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="timerProgress" style="width:100%;"></div>
    </div>
    <div class="timer-label" id="timerLabel">남은 시간</div>
  </div>

  <!-- 통계 카드 -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fas fa-users"></i></div>
      <div>
        <div class="stat-value" id="statConnected">0</div>
        <div class="stat-label">접속 인원</div>
        <div class="stat-change" id="statConnectedSub">전체 0명</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green"><i class="fas fa-edit"></i></div>
      <div>
        <div class="stat-value" id="statTaking">0</div>
        <div class="stat-label">응시 중</div>
        <div class="stat-change" id="statTakingSub">–</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange"><i class="fas fa-check-circle"></i></div>
      <div>
        <div class="stat-value" id="statSubmitted">0</div>
        <div class="stat-label">제출 완료</div>
        <div class="stat-change" id="statSubmittedSub">–</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red"><i class="fas fa-exclamation-triangle"></i></div>
      <div>
        <div class="stat-value" id="statAlerts">0</div>
        <div class="stat-label">이탈 감지</div>
        <div class="stat-change" id="statAlertsSub">이탈 1회 이상</div>
      </div>
    </div>
  </div>

  <!-- 학생 테이블 -->
  <div class="table-section">
    <div class="table-header">
      <div class="table-title">
        <i class="fas fa-list" style="color:var(--primary);"></i>
        응시자 현황
        <span class="live-badge"><span class="live-dot"></span> LIVE</span>
      </div>
      <div class="table-controls">
        <input type="text" class="search-input" placeholder="이름 검색..." id="searchInput" oninput="filterTable()">
        <button class="btn btn-outline btn-sm" onclick="exportResults()">
          <i class="fas fa-download"></i> 내보내기
        </button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table class="student-table" id="studentTable">
        <thead>
          <tr>
            <th style="width:48px;">No</th>
            <th>이름</th>
            <th>상태</th>
            <th>상태</th>
            <th style="width:90px;">이탈 횟수</th>
            <th style="width:90px;">답안 진행</th>
            <th style="width:80px;">점수</th>
            <th style="width:100px;">제출 시간</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
          <tr>
            <td colspan="8" style="text-align:center;padding:40px;color:var(--gray-400);">
              <i class="fas fa-spinner fa-spin" style="font-size:24px;margin-bottom:10px;display:block;"></i>
              학생 데이터를 불러오는 중...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 성취수준 분포 -->
  <div class="section" id="distSection">
    <div class="section-header">
      <div>
        <div class="section-title"><i class="fas fa-chart-pie" style="color:var(--primary);"></i>성취수준 분포</div>
        <div class="section-subtitle">점수대별 학생 분포 현황</div>
      </div>
    </div>
    <div class="section-body">
      <div class="dist-row" id="distRow"></div>
    </div>
  </div>

  <!-- 문항별 정답률 -->
  <div class="section" id="accuracySection">
    <div class="section-header">
      <div>
        <div class="section-title"><i class="fas fa-tasks" style="color:var(--primary);"></i>문항별 정답률</div>
        <div class="section-subtitle">각 문항의 정답률을 확인하세요</div>
      </div>
      <div style="font-size:13px;color:var(--gray-500);" id="avgAccuracy">평균 정답률 –%</div>
    </div>
    <div class="section-body">
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--success);"></div>80% 이상</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--primary);"></div>60–80%</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--warning);"></div>40–60%</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--danger);"></div>40% 미만</div>
      </div>
      <div class="chart-grid" id="chartGrid">
        <div style="text-align:center;padding:30px;color:var(--gray-400);font-size:14px;">시험 종료 후 정답률이 표시됩니다.</div>
      </div>
    </div>
  </div>

</div>

<!-- 알림 패널 -->
<div class="alert-panel" id="alertPanel">
  <div class="alert-panel-header">
    <span><i class="fas fa-exclamation-circle" style="color:var(--danger);margin-right:6px;"></i>이탈 알림</span>
    <button class="alert-close" onclick="toggleAlertPanel()">&times;</button>
  </div>
  <div class="alert-list" id="alertList">
    <div style="text-align:center;padding:30px;color:var(--gray-400);font-size:13px;">
      아직 이탈 이벤트가 없습니다.
    </div>
  </div>
</div>

<!-- 실시간 이탈 토스트 -->
<div class="live-alert" id="liveAlert">
  <i class="fas fa-exclamation-triangle"></i>
  <span id="liveAlertText">학생 이탈 감지</span>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/auth.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const classId = params.get('classId');
  const examId = params.get('examId');

  let currentUser = null;
  let socket = null;
  let examData = null;
  let students = {};     // { userId: { name, status, focused, leaveCount, answered, total, score, submittedAt } }
  let alertEvents = [];
  let timerInterval = null;
  let totalSeconds = 0;
  let remainingSeconds = 0;
  let examStatus = 'waiting'; // waiting | active | ended
  let alertCount = 0;

  document.addEventListener('dacheim:user-loaded', (e) => { currentUser = e.detail; init(); });
  document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { if (!currentUser) init(); }, 500); });

  async function init() {
    if (!currentUser) { currentUser = await checkAuth(); if (!currentUser) return; }
    if (!classId || !examId) { showToast('잘못된 접근입니다.'); return; }
    document.getElementById('mainContent').style.display = '';
    await loadExamInfo();
    connectSocket();
    setInterval(refreshStats, 3000);
  }

  async function loadExamInfo() {
    try {
      const res = await fetch(`/api/exam/${classId}/${examId}`);
      const data = await res.json();
      if (data.success && data.exam) {
        examData = data.exam;
        const qs = typeof examData.questions === 'string' ? JSON.parse(examData.questions) : (examData.questions || []);
        document.getElementById('examName').textContent = examData.title;
        const tabDetLabel = examData.tab_detection === 0 ? ' · 이탈감지 OFF' : '';
        const retryLabel = examData.allow_retry === 1 ? ' · 재응시 허용' : '';
        const modeLabel = examData.start_mode === 'waiting' ? ' · 대기모드' : ' · 바로시작';
        document.getElementById('examMetaLine').textContent =
          `클래스 #${classId} · ${qs.length}문항 · 제한시간 ${examData.time_limit || '-'}분${modeLabel}${tabDetLabel}${retryLabel}`;
        totalSeconds = (examData.time_limit || 30) * 60;
        // 이미 진행 중인 경우 상태 반영
        if (examData.status === 'active') setExamStatus('active');
        else if (examData.status === 'completed') setExamStatus('ended');

        // 기존 응시 학생 불러오기
        const studRes = await fetch(`/api/exam/${classId}/${examId}`);
        const studData = await studRes.json();
        if (studData.success && studData.students) {
          studData.students.forEach(s => {
            students[s.user_id] = {
              name: s.display_name || s.username || '학생',
              status: s.status === 'submitted' ? 'submitted' : 'active',
              focused: true,
              leaveCount: s.tab_switch_count || 0,
              answered: 0,
              total: qs.length,
              score: s.score,
              submittedAt: s.submitted_at
            };
          });
          renderTable();
          updateStats();
          renderAccuracyChart();
        }
      }
    } catch (e) { console.error('loadExamInfo error:', e); }
  }

  // ─── Socket.IO 연결 ──────────────────────────────────────────────────────────
  function connectSocket() {
    try {
      socket = io();
      socket.emit('supervisor:join', { examId, classId: parseInt(classId) });

      // 초기 학생 목록 수신
      socket.on('students:list', (data) => {
        if (data.students && Array.isArray(data.students)) {
          const qs = examData ? (typeof examData.questions === 'string' ? JSON.parse(examData.questions) : (examData.questions || [])) : [];
          data.students.forEach(s => {
            students[s.userId] = {
              name: s.displayName || '학생',
              status: s.status === 'submitted' ? 'submitted' : (s.status === 'disconnected' ? 'disconnected' : 'active'),
              focused: s.focused !== false,
              leaveCount: s.tabSwitchCount || 0,
              answered: 0,
              total: qs.length,
              score: s.score,
              submittedAt: s.submittedAt
            };
          });
          renderTable(); updateStats();
        }
      });

      // 학생 접속
      socket.on('student:joined', (data) => {
        onStudentJoined(data);
      });

      // 학생 이탈 감지 (탭 전환)
      socket.on('student:tab-leave', (data) => {
        onStudentLeave(data);
      });

      // 학생 포커스 복귀
      socket.on('student:tab-return', (data) => {
        onStudentReturn(data);
      });

      // 학생 제출 완료
      socket.on('student:submitted', (data) => {
        onStudentSubmitted(data);
      });

      // 답안 진행 업데이트
      socket.on('student:progress', (data) => {
        if (students[data.userId]) {
          students[data.userId].answered = data.answered;
          students[data.userId].total = data.total;
          renderTable();
        }
      });

      // 연결 해제
      socket.on('student:disconnected', (data) => {
        const uid = data.userId || data.studentId;
        if (students[uid]) {
          students[uid].status = 'disconnected';
          students[uid].focused = false;
          renderTable(); updateStats();
        }
      });

      // 시험 종료 확인
      socket.on('exam:ended', () => {
        setExamStatus('ended');
        showToast('시험이 종료되었습니다.');
      });

      socket.on('disconnect', () => { console.warn('Socket disconnected'); });
      socket.on('connect_error', () => { console.warn('Socket connect error'); });
    } catch (e) {
      // socket.io 미연결 환경에서도 UI는 동작
      console.warn('Socket.IO not available:', e);
      loadMockStudents();
    }
  }

  // ─── 소켓 이벤트 핸들러 ────────────────────────────────────────────────────
  function onStudentJoined(data) {
    if (!students[data.userId]) {
      const qs = examData ? (typeof examData.questions === 'string' ? JSON.parse(examData.questions) : (examData.questions || [])) : [];
      students[data.userId] = {
        name: data.displayName || data.username || '학생',
        status: 'active', focused: true, leaveCount: 0, answered: 0, total: qs.length, score: null, submittedAt: null
      };
    } else {
      students[data.userId].status = 'active';
    }
    renderTable(); updateStats();
  }

  function onStudentLeave(data) {
    const uid = data.userId || data.studentId;
    if (!students[uid]) return;
    students[uid].focused = false;
    students[uid].leaveCount = data.tabSwitchCount || (students[uid].leaveCount + 1);
    if (data.displayName) students[uid].name = data.displayName;
    renderTable(); updateStats();
    showLiveAlert(`${students[uid].name} 화면 이탈 감지 (${students[uid].leaveCount}회)`);
    addAlertEvent(students[uid].name, students[uid].leaveCount);
  }

  function onStudentReturn(data) {
    const uid = data.userId || data.studentId;
    if (!students[uid]) return;
    students[uid].focused = true;
    students[uid].leaveCount = data.tabSwitchCount || students[uid].leaveCount;
    if (data.displayName) students[uid].name = data.displayName;
    renderTable(); updateStats();
  }

  function onStudentSubmitted(data) {
    if (!students[data.userId]) return;
    students[data.userId].status = 'submitted';
    students[data.userId].score = data.score;
    students[data.userId].submittedAt = data.submittedAt || new Date().toISOString();
    renderTable(); updateStats();
    renderAccuracyChart();
  }

  // ─── 시험 제어 ──────────────────────────────────────────────────────────────
  async function startExam() {
    if (!confirm('시험을 시작하시겠습니까? 시작 후에는 학생들이 응시할 수 있습니다.')) return;
    try {
      const res = await fetch(`/api/exam/${classId}/${examId}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'active' })
      });
      const data = await res.json();
      if (data.success) {
        setExamStatus('active');
        showToast('시험이 시작되었습니다.');
        // REST 성공 후에만 Socket.IO로 시험 시작 알림
        if (socket) socket.emit('exam:start', { examId });
      } else {
        showToast(data.message || '시작 실패');
      }
    } catch (e) {
      showToast('서버 오류로 시험을 시작할 수 없습니다.');
    }
  }

  async function endExam() {
    if (!confirm('시험을 종료하시겠습니까? 미제출 학생은 자동 제출 처리됩니다.')) return;
    try {
      // REST로 상태 변경 확인 후 Socket.IO 이벤트 발송
      const res = await fetch(`/api/exam/${classId}/${examId}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'completed' })
      });
      const data = await res.json();
      if (data.success || res.ok) {
        if (socket) socket.emit('exam:end', { examId });
        setExamStatus('ended');
        showToast('시험 종료 처리 중... 미제출 학생 자동 제출됩니다.');
      } else {
        showToast(data.message || '시험 종료 실패');
      }
    } catch (e) {
      showToast('서버 오류로 시험을 종료할 수 없습니다.');
    }
  }

  function setExamStatus(status) {
    examStatus = status;
    const badge = document.getElementById('examStatusBadge');
    const text = document.getElementById('examStatusText');
    const startBtn = document.getElementById('startBtn');
    const endBtn = document.getElementById('endBtn');
    const timerBar = document.getElementById('timerBar');

    badge.className = 'status-badge';
    if (status === 'waiting') {
      badge.classList.add('badge-waiting');
      text.textContent = '대기 중';
      startBtn.style.display = '';
      endBtn.style.display = 'none';
      document.getElementById('endBtnSep').style.display = 'none';
      timerBar.style.display = 'none';
    } else if (status === 'active') {
      badge.classList.add('badge-active');
      text.textContent = '진행 중';
      startBtn.style.display = 'none';
      endBtn.style.display = '';
      document.getElementById('endBtnSep').style.display = '';
      timerBar.style.display = '';
      // started_at 기준 경과 시간 계산
      const startedAt = examData && (examData.started_at || examData._startedAt);
      if (startedAt) {
        const elapsed = Math.floor((Date.now() - new Date(startedAt).getTime()) / 1000);
        remainingSeconds = Math.max(0, totalSeconds - elapsed);
      } else {
        remainingSeconds = totalSeconds;
      }
      startTimer();
    } else if (status === 'ended') {
      badge.classList.add('badge-ended');
      text.textContent = '종료';
      startBtn.style.display = 'none';
      endBtn.style.display = 'none';
      document.getElementById('endBtnSep').style.display = 'none';
      clearInterval(timerInterval);
    }
  }

  // ─── 타이머 ─────────────────────────────────────────────────────────────────
  function startTimer() {
    clearInterval(timerInterval);
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      remainingSeconds--;
      if (remainingSeconds <= 0) { clearInterval(timerInterval); remainingSeconds = 0; }
      updateTimerDisplay();
    }, 1000);
  }

  function updateTimerDisplay() {
    const m = Math.floor(remainingSeconds / 60);
    const s = remainingSeconds % 60;
    document.getElementById('timerText').textContent =
      `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const pct = totalSeconds > 0 ? (remainingSeconds / totalSeconds) * 100 : 0;
    const fill = document.getElementById('timerProgress');
    fill.style.width = pct + '%';
    fill.className = 'progress-fill' + (pct < 20 ? ' danger-fill' : pct < 40 ? ' warn' : '');
    const remaining = remainingSeconds > 0 ? `남은 ${m}분 ${s}초` : '시간 종료';
    document.getElementById('timerLabel').textContent = remaining;
  }

  // ─── 테이블 렌더링 ──────────────────────────────────────────────────────────
  function renderTable(filter) {
    const tbody = document.getElementById('studentTableBody');
    const search = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
    const entries = Object.entries(students).filter(([, s]) =>
      !search || s.name.toLowerCase().includes(search)
    );

    if (entries.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-400);">
        <i class="fas fa-users" style="font-size:32px;margin-bottom:10px;display:block;"></i>
        아직 접속한 학생이 없습니다.
      </td></tr>`;
      return;
    }

    tbody.innerHTML = entries.map(([uid, s], idx) => {
      const statusHtml = getStatusBadgeHtml(s.status);
      const focusHtml = getFocusHtml(s);
      const leaveHtml = getLeaveCountHtml(s.leaveCount);
      const progressHtml = s.status === 'submitted'
        ? `<span style="color:var(--success);font-weight:600;">${s.total}/${s.total}</span>`
        : `<span style="color:var(--gray-600);">${s.answered}/${s.total}</span>`;
      const scoreHtml = getScoreBadgeHtml(s.score);
      const submitTime = s.submittedAt ? formatTime(s.submittedAt) : '–';
      const rowCls = s.leaveCount >= 3 ? ' row-alert' : '';

      return `<tr class="${rowCls}" data-uid="${uid}">
        <td style="color:var(--gray-400);font-size:13px;">${idx + 1}</td>
        <td style="font-weight:600;color:var(--gray-800);">${escHtml(s.name)}</td>
        <td>${statusHtml}</td>
        <td>${focusHtml}</td>
        <td>${leaveHtml}</td>
        <td>${progressHtml}</td>
        <td>${scoreHtml}</td>
        <td style="font-size:13px;color:var(--gray-500);">${submitTime}</td>
      </tr>`;
    }).join('');
  }

  function getStatusBadgeHtml(status) {
    const map = {
      waiting: ['s-waiting', '대기 중'],
      active: ['s-active', '응시 중'],
      submitted: ['s-submitted', '제출 완료'],
      disconnected: ['s-disconnected', '연결 끊김']
    };
    const [cls, label] = map[status] || ['s-waiting', '대기'];
    return `<span class="student-status ${cls}">${label}</span>`;
  }

  function getFocusHtml(s) {
    if (s.status === 'submitted' || s.status === 'waiting') {
      return `<div class="focus-indicator"><span class="focus-dot idle"></span><span class="focus-label-idle">–</span></div>`;
    }
    if (s.focused) {
      return `<div class="focus-indicator"><span class="focus-dot focused"></span><span class="focus-label-focused">시험 화면 집중</span></div>`;
    }
    return `<div class="focus-indicator"><span class="focus-dot away"></span><span class="focus-label-away">다른 화면으로 이탈</span></div>`;
  }

  function getLeaveCountHtml(count) {
    if (!count) return `<span class="leave-count none"><i class="fas fa-minus"></i> 0회</span>`;
    const cls = count >= 3 ? 'high' : 'low';
    return `<span class="leave-count ${cls}"><i class="fas fa-sign-out-alt"></i> ${count}회</span>`;
  }

  function getScoreBadgeHtml(score) {
    if (score == null) return `<span class="score-badge score-none">미채점</span>`;
    const cls = score >= 90 ? 'score-high' : score >= 70 ? 'score-mid-high' : score >= 50 ? 'score-mid' : 'score-low';
    return `<span class="score-badge ${cls}">${score}점</span>`;
  }

  // ─── 통계 업데이트 ──────────────────────────────────────────────────────────
  function updateStats() {
    const all = Object.values(students);
    const connected = all.filter(s => s.status !== 'disconnected').length;
    const taking = all.filter(s => s.status === 'active').length;
    const submitted = all.filter(s => s.status === 'submitted').length;
    const alerted = all.filter(s => s.leaveCount > 0).length;

    document.getElementById('statConnected').textContent = connected;
    document.getElementById('statConnectedSub').textContent = `전체 ${all.length}명`;
    document.getElementById('statTaking').textContent = taking;
    document.getElementById('statTakingSub').textContent = `응시율 ${all.length ? Math.round(taking/all.length*100) : 0}%`;
    document.getElementById('statSubmitted').textContent = submitted;
    document.getElementById('statSubmittedSub').textContent = submitted > 0 ? `완료율 ${Math.round(submitted/all.length*100)}%` : '–';
    document.getElementById('statAlerts').textContent = alerted;
    renderDistribution();
  }

  async function refreshStats() {
    // 폴링 폴백: 소켓 미연결 시 서버에서 최신 상태 가져오기
    if (!socket || !socket.connected) {
      try {
        const res = await fetch(`/api/exam/${classId}/${examId}`);
        const data = await res.json();
        if (data.success && data.students) {
          const qs = examData ? (typeof examData.questions === 'string' ? JSON.parse(examData.questions) : (examData.questions || [])) : [];
          data.students.forEach(s => {
            if (!students[s.user_id]) {
              students[s.user_id] = { name: s.display_name || s.username || '학생', status: 'active', focused: true, leaveCount: 0, answered: 0, total: qs.length, score: null, submittedAt: null };
            }
            students[s.user_id].leaveCount = s.tab_switch_count || 0;
            students[s.user_id].score = s.score;
            students[s.user_id].submittedAt = s.submitted_at;
            if (s.status === 'submitted') students[s.user_id].status = 'submitted';
          });
          renderTable();
        }
      } catch (e) {}
    }
    updateStats();
  }

  // ─── 알림 ────────────────────────────────────────────────────────────────────
  function addAlertEvent(name, count) {
    alertCount++;
    const badge = document.getElementById('alertBadge');
    badge.textContent = alertCount;
    badge.style.display = '';
    alertEvents.unshift({ name, count, time: new Date() });
    renderAlertList();
    document.getElementById('statAlerts').textContent =
      Object.values(students).filter(s => s.leaveCount > 0).length;
  }

  function renderAlertList() {
    const list = document.getElementById('alertList');
    if (alertEvents.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--gray-400);font-size:13px;">아직 이탈 이벤트가 없습니다.</div>';
      return;
    }
    list.innerHTML = alertEvents.map(ev => `
      <div class="alert-item">
        <div><span class="alert-name">${escHtml(ev.name)}</span>이(가) 화면을 이탈했습니다 (누적 ${ev.count}회)</div>
        <div class="alert-time">${formatTime(ev.time.toISOString())}</div>
      </div>
    `).join('');
  }

  let alertPanelOpen = false;
  function toggleAlertPanel() {
    alertPanelOpen = !alertPanelOpen;
    document.getElementById('alertPanel').classList.toggle('open', alertPanelOpen);
    if (alertPanelOpen) {
      alertCount = 0;
      document.getElementById('alertBadge').style.display = 'none';
    }
  }

  let liveAlertTimer = null;
  function showLiveAlert(msg) {
    const el = document.getElementById('liveAlert');
    document.getElementById('liveAlertText').textContent = msg;
    el.classList.add('show');
    clearTimeout(liveAlertTimer);
    liveAlertTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }

  // ─── 내보내기 ─────────────────────────────────────────────────────────────────
  function exportResults() {
    // TODO: 개발자가 CSV/Excel 내보내기 구현
    const rows = [['No', '이름', '상태', '이탈횟수', '진행', '점수', '제출시간']];
    Object.values(students).forEach((s, i) => {
      rows.push([i+1, s.name, s.status, s.leaveCount, `${s.answered}/${s.total}`, s.score ?? '-', s.submittedAt ? formatTime(s.submittedAt) : '-']);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `감독_결과_${new Date().toLocaleDateString('ko-KR')}.csv`; a.click();
  }

  // ─── 검색 필터 ───────────────────────────────────────────────────────────────
  function filterTable() { renderTable(); }

  // ─── 목업 데이터 (Socket.IO 미연결 환경) ────────────────────────────────────
  function loadMockStudents() {
    const mockData = [
      { uid: 1, name: '김민준', status: 'active', focused: true, leaveCount: 0, answered: 7, total: 10, score: null },
      { uid: 2, name: '이서연', status: 'active', focused: false, leaveCount: 2, answered: 5, total: 10, score: null },
      { uid: 3, name: '박지호', status: 'submitted', focused: true, leaveCount: 0, answered: 10, total: 10, score: 90 },
      { uid: 4, name: '최수아', status: 'active', focused: true, leaveCount: 1, answered: 3, total: 10, score: null },
      { uid: 5, name: '정태양', status: 'active', focused: false, leaveCount: 4, answered: 8, total: 10, score: null },
      { uid: 6, name: '한예린', status: 'submitted', focused: true, leaveCount: 0, answered: 10, total: 10, score: 75 },
      { uid: 7, name: '오준서', status: 'waiting', focused: true, leaveCount: 0, answered: 0, total: 10, score: null },
    ];
    mockData.forEach(d => {
      students[d.uid] = { name: d.name, status: d.status, focused: d.focused, leaveCount: d.leaveCount, answered: d.answered, total: d.total, score: d.score, submittedAt: d.status === 'submitted' ? new Date().toISOString() : null };
    });
    renderTable(); updateStats();
  }

  // ─── 성취수준 분포 렌더링 ─────────────────────────────────────────────
  function renderDistribution() {
    const submitted = Object.values(students).filter(s => s.status === 'submitted' && s.score != null);
    const total = submitted.length || 1;
    const counts = { s: 0, a: 0, b: 0, c: 0 };
    submitted.forEach(s => {
      if (s.score >= 90) counts.s++;
      else if (s.score >= 70) counts.a++;
      else if (s.score >= 50) counts.b++;
      else counts.c++;
    });
    const distData = [
      { key: 's', grade: 'S', range: '90점 이상', count: counts.s },
      { key: 'a', grade: 'A', range: '70–89점',  count: counts.a },
      { key: 'b', grade: 'B', range: '50–69점',  count: counts.b },
      { key: 'c', grade: 'C', range: '50점 미만', count: counts.c },
    ];
    document.getElementById('distRow').innerHTML = distData.map(d => `
      <div class="dist-card ${d.key}">
        <div class="dist-grade">${d.grade}</div>
        <div class="dist-range">${d.range}</div>
        <div class="dist-count">${d.count}<span style="font-size:14px;font-weight:500;">명</span></div>
        <div class="dist-label">${Math.round(d.count/total*100)}%</div>
        <div class="dist-bar-track"><div class="dist-bar-fill" style="width:${Math.round(d.count/total*100)}%;"></div></div>
      </div>
    `).join('');
  }

  // ─── 문항별 정답률 렌더링 ─────────────────────────────────────────────
  async function renderAccuracyChart() {
    try {
      const res = await fetch(`/api/exam/${classId}/${examId}/results-detail`);
      const data = await res.json();
      if (data.success && data.questionAccuracy && data.questionAccuracy.length) {
        const accuracy = data.questionAccuracy.map(qa => ({
          q: qa.question, pct: qa.correctRate, text: qa.text || `문항 ${qa.question}`
        }));
        const avgAcc = accuracy.length ? Math.round(accuracy.reduce((a,b) => a + b.pct, 0) / accuracy.length) : 0;
        document.getElementById('avgAccuracy').textContent = `평균 정답률 ${avgAcc}%`;
        document.getElementById('chartGrid').innerHTML = accuracy.map(item => {
          const barCls = item.pct >= 80 ? 'correct-high' : item.pct >= 60 ? 'correct-mid' : item.pct >= 40 ? 'correct-low' : 'correct-very-low';
          const label = item.pct >= 15 ? item.pct + '%' : '';
          return `<div class="chart-row">
            <div class="chart-q-num">${item.q}번</div>
            <div class="chart-bar-track" title="${escHtml(item.text || '')}">
              <div class="chart-bar-fill ${barCls}" style="width:${item.pct}%;">${label}</div>
            </div>
            <div class="chart-pct">${item.pct}%</div>
          </div>`;
        }).join('');
      }
    } catch(e) { console.log('Accuracy chart not available yet'); }
  }

  // ─── 유틸 ────────────────────────────────────────────────────────────────────
  function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function formatTime(d) { if (!d) return '–'; try { return new Date(d).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); } catch(e) { return d; } }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
</script>
</body>
