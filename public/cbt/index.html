<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채움CBT - 다채움</title>
  <link rel="stylesheet" href="/css/common-nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary:#2563eb; --primary-dark:#1d4ed8; --primary-light:#eff6ff; --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB; --gray-300:#D1D5DB; --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-600:#4B5563; --gray-700:#374151; --gray-800:#1F2937; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;background:#F5F7FA;min-height:100vh;}
    .container{max-width:1800px;margin:0 auto;padding:24px 20px;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:22px;font-weight:700;color:var(--gray-800);}
    .page-title i{color:var(--primary);margin-right:8px;}
    .header-actions{display:flex;gap:8px;align-items:center;}
    .btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-primary{background:var(--primary);color:#fff;}.btn-primary:hover{background:var(--primary-dark);}
    .btn-outline{background:#fff;color:var(--gray-600);border:1.5px solid var(--gray-300);}.btn-outline:hover{background:var(--gray-50);}
    .btn-sm{padding:6px 12px;font-size:13px;}
    .btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#dc2626;}

    .class-select{padding:8px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;min-width:200px;}

    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
    .stat-card{background:#fff;border-radius:12px;padding:20px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
    .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .stat-icon.blue{background:#eff6ff;color:var(--primary);}
    .stat-icon.green{background:#ecfdf5;color:var(--success);}
    .stat-icon.orange{background:#fffbeb;color:var(--warning);}
    .stat-icon.red{background:#fef2f2;color:var(--danger);}
    .stat-value{font-size:24px;font-weight:700;color:var(--gray-800);}
    .stat-label{font-size:13px;color:var(--gray-500);}

    .filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
    .filter-btn{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);font-family:inherit;transition:all .2s;}
    .filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

    .exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
    .exam-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--gray-100);transition:all .2s;cursor:pointer;display:flex;flex-direction:column;}
    .exam-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px);}
    .exam-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
    .exam-title{font-size:16px;font-weight:700;color:var(--gray-800);}
    .exam-desc{font-size:14px;color:var(--gray-500);margin-bottom:12px;line-height:1.5;}
    .exam-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
    .meta-tag{font-size:13px;padding:5px 10px;border-radius:6px;font-weight:600;}
    .tag-draft{background:#f3f4f6;color:var(--gray-500);}
    .tag-active{background:#dcfce7;color:#16a34a;}
    .tag-completed{background:#dbeafe;color:#2563eb;}
    .exam-desc{flex:1;}
    .exam-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--gray-100);font-size:13px;color:var(--gray-400);margin-top:auto;white-space:nowrap;gap:8px;}
    .exam-actions{display:flex;gap:6px;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--gray-400);}
    .empty-state i{font-size:48px;margin-bottom:16px;display:block;}
    .empty-state p{font-size:14px;}

    /* 모달 */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;}
    .modal-overlay.active{display:flex;}
    .modal-card{background:#fff;border-radius:16px;width:90%;max-width:680px;max-height:90vh;overflow-y:auto;padding:0;}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--gray-100);}
    .modal-header h3{font-size:17px;font-weight:700;color:var(--gray-800);}
    .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400);padding:4px 8px;border-radius:6px;}
    .modal-close:hover{background:var(--gray-100);color:var(--gray-700);}
    .modal-body{padding:24px;}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid var(--gray-100);}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px;}
    .form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;font-family:inherit;transition:border-color .2s;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);outline:none;}
    .form-textarea{resize:vertical;min-height:80px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

    .question-list{margin-top:12px;}
    .question-item{background:var(--gray-50);border-radius:8px;padding:14px;margin-bottom:10px;position:relative;}
    .question-item .q-num{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px;}
    .question-item .q-text{font-size:13px;color:var(--gray-700);margin-bottom:8px;}
    .question-item .q-options{font-size:13px;color:var(--gray-500);}
    .question-item .q-remove{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:14px;}
    .question-item .q-remove:hover{color:var(--danger);}
    .add-question-btn{width:100%;padding:12px;border:2px dashed var(--gray-300);border-radius:8px;background:none;color:var(--gray-500);cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;}
    .add-question-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}

    /* 결과 뷰 */
    .result-table{width:100%;border-collapse:collapse;font-size:13px;}
    .result-table th,.result-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--gray-100);}
    .result-table th{background:var(--gray-50);font-weight:600;color:var(--gray-600);}
    .result-table td{color:var(--gray-700);}
    .score-badge{padding:4px 10px;border-radius:12px;font-size:13px;font-weight:700;}
    .score-high{background:#dcfce7;color:#16a34a;}
    .score-mid{background:#fef3c7;color:#d97706;}
    .score-low{background:#fef2f2;color:#ef4444;}

    /* 응시 완료 카드 스타일 */
    .exam-card.submitted-card{background:linear-gradient(135deg,#ecfdf5 0%,#d1fae5 100%);border:1.5px solid #6ee7b7;}
    .exam-card.submitted-card:hover{box-shadow:0 4px 12px rgba(16,185,129,.2);}
    .exam-card.submitted-noretry{background:linear-gradient(135deg,#f0fdf4 0%,#e8f5e9 100%);border:1.5px solid #a7f3d0;opacity:0.8;}
    .exam-card.submitted-noretry .exam-title{color:var(--gray-500);}

    /* 뷰 토글 */
    .view-toggle{display:flex;gap:2px;background:var(--gray-100);border-radius:8px;padding:2px;}
    .view-toggle-btn{padding:6px 12px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:13px;color:var(--gray-500);font-family:inherit;transition:all .2s;}
    .view-toggle-btn.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:600;}

    /* 리스트 뷰 */
    .exam-grid.list-view{grid-template-columns:1fr;gap:8px;}
    .exam-grid.list-view .exam-card{flex-direction:row;align-items:center;gap:16px;padding:14px 20px;}
    .exam-grid.list-view .exam-card-header{margin-bottom:0;min-width:200px;flex-shrink:0;}
    .exam-grid.list-view .exam-desc{display:none;flex:0;}
    .exam-grid.list-view .exam-meta{margin-bottom:0;flex:1;}
    .exam-grid.list-view .exam-footer{border-top:none;padding-top:0;flex-shrink:0;min-width:auto;margin-top:0;}

    /* 내 결과 모달 */
    .my-result-header{text-align:center;padding:20px 0;border-bottom:1px solid var(--gray-100);margin-bottom:20px;}
    .my-result-score{font-size:48px;font-weight:800;margin:8px 0;}
    .my-result-score.high{color:#16a34a;}.my-result-score.mid{color:#d97706;}.my-result-score.low{color:#ef4444;}
    .my-result-meta{font-size:13px;color:var(--gray-500);}
    .q-result-item{padding:14px;border-radius:10px;margin-bottom:10px;border:1.5px solid var(--gray-100);}
    .q-result-item.correct{background:#f0fdf4;border-color:#bbf7d0;}
    .q-result-item.wrong{background:#fef2f2;border-color:#fecaca;}
    .q-result-item.unanswered{background:#fffbeb;border-color:#fde68a;}
    .q-result-num{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
    .q-result-num .badge{padding:2px 8px;border-radius:10px;font-size:13px;font-weight:700;}
    .q-result-num .badge.correct{background:#dcfce7;color:#16a34a;}
    .q-result-num .badge.wrong{background:#fef2f2;color:#ef4444;}
    .q-result-num .badge.unanswered{background:#fef3c7;color:#d97706;}
    .q-result-text{font-size:13px;color:var(--gray-700);margin-bottom:8px;}
    .q-result-options{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;}
    .q-result-opt{padding:6px 10px;border-radius:6px;background:var(--gray-50);color:var(--gray-600);}
    .q-result-opt.my-answer{background:#fee2e2;color:#dc2626;font-weight:700;border:1px solid #fca5a5;}
    .q-result-opt.correct-answer{background:#dcfce7;color:#16a34a;font-weight:700;border:1px solid #86efac;}
    .q-result-opt.my-correct{background:#dcfce7;color:#16a34a;font-weight:700;border:2px solid #22c55e;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gray-800);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;z-index:9999;display:none;animation:fadeInUp .3s;}
    @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-card { padding: 12px; gap: 10px; }
      .stat-icon { width: 36px; height: 36px; font-size: 16px; }
      .stat-value { font-size: 18px; }
      .exam-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<script src="/js/common-nav.js"></script>

<div class="container" id="mainContent" style="display:none;">
  <div class="page-header">
    <div class="page-title"><i class="fas fa-clipboard-check"></i> 채움CBT</div>
    <div class="header-actions">
      <button class="btn btn-outline" id="createPdfExamBtn" style="display:none;" onclick="showCreatePdfModal()"><i class="fas fa-file-pdf"></i> PDF 평가 만들기</button>
      <button class="btn btn-primary" id="createExamBtn" style="display:none;" onclick="showCreateModal()"><i class="fas fa-plus"></i> 평가 만들기</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-file-alt"></i></div><div><div class="stat-value" id="statTotal">0</div><div class="stat-label">전체 평가</div></div></div>
    <div class="stat-card"><div class="stat-icon green"><i class="fas fa-play-circle"></i></div><div><div class="stat-value" id="statActive">0</div><div class="stat-label">진행 중</div></div></div>
    <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-edit"></i></div><div><div class="stat-value" id="statDraft">0</div><div class="stat-label">임시저장</div></div></div>
    <div class="stat-card"><div class="stat-icon red"><i class="fas fa-check-double"></i></div><div><div class="stat-value" id="statCompleted">0</div><div class="stat-label">완료</div></div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="draft">임시저장</button>
    <button class="filter-btn" data-filter="active">진행 중</button>
    <button class="filter-btn" data-filter="completed">완료</button>
  </div>

  <div class="search-bar" style="margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <div style="position:relative;flex:1;max-width:400px;">
      <i class="fas fa-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray-400);"></i>
      <input type="text" id="examSearch" placeholder="시험명으로 검색..." style="width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;outline:none;font-family:inherit;" oninput="filterExams()">
    </div>
    <div class="view-toggle">
      <button class="view-toggle-btn active" data-view="card" onclick="setViewMode('card')"><i class="fas fa-th-large"></i> 카드</button>
      <button class="view-toggle-btn" data-view="list" onclick="setViewMode('list')"><i class="fas fa-list"></i> 목록</button>
    </div>
  </div>

  <div class="exam-grid" id="examGrid">
    <div class="empty-state"><i class="fas fa-clipboard-list"></i><p>클래스를 선택하여 평가 목록을 확인하세요.</p></div>
  </div>
</div>

<!-- 평가 생성 모달 -->
<div class="modal-overlay" id="createModal">
  <div class="modal-card">
    <div class="modal-header"><h3><i class="fas fa-plus-circle" style="color:var(--primary);margin-right:8px;"></i>평가 만들기</h3><button class="modal-close" onclick="closeModal('createModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">평가 제목 *</label><input class="form-input" id="examTitle" placeholder="예: 3월 수학 단원평가"></div>
      <div class="form-group"><label class="form-label">설명</label><textarea class="form-textarea" id="examDesc" placeholder="평가에 대한 설명을 입력하세요"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">평가 유형</label><select class="form-select" id="examType"><option value="quiz">퀴즈</option><option value="midterm">중간평가</option><option value="final">기말평가</option><option value="practice">연습</option><option value="pdf">PDF 평가</option></select></div>
        <div class="form-group"><label class="form-label">제한 시간(분)</label><input class="form-input" id="examTimeLimit" type="number" value="30" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">시작 시간</label><input class="form-input" id="examStart" type="datetime-local"></div>
        <div class="form-group"><label class="form-label">종료 시간</label><input class="form-input" id="examEnd" type="datetime-local"></div>
      </div>
      <div class="form-group"><label class="form-label">상태</label><select class="form-select" id="examStatus"><option value="draft">임시저장</option><option value="active">즉시 공개</option></select></div>

      <div style="background:var(--gray-50);border-radius:10px;padding:16px;margin-bottom:16px;">
        <div style="font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:12px;"><i class="fas fa-cog" style="color:var(--primary);margin-right:6px;"></i>시험 설정</div>
        <div class="form-group">
          <label class="form-label">시작 모드</label>
          <div style="display:flex;gap:12px;">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
              <input type="radio" name="examStartMode" value="direct" checked> 바로 시작
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
              <input type="radio" name="examStartMode" value="waiting"> 대기모드 (감독관 시작)
            </label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">이탈 감지</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
              <input type="checkbox" id="examTabDetection" checked style="width:18px;height:18px;accent-color:var(--primary);"> 사용
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">재응시 허용</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
              <input type="checkbox" id="examAllowRetry" style="width:18px;height:18px;accent-color:var(--primary);"> 허용
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">문항 목록</label>
        <div class="question-list" id="questionList"></div>
        <button class="add-question-btn" onclick="addQuestion()"><i class="fas fa-plus"></i> 문항 추가</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('createModal')">취소</button>
      <button class="btn btn-primary" onclick="submitExam()">저장</button>
    </div>
  </div>
</div>

<!-- PDF 평가 생성 모달 -->
<div class="modal-overlay" id="createPdfModal">
  <div class="modal-card">
    <div class="modal-header"><h3><i class="fas fa-file-pdf" style="color:#ef4444;margin-right:8px;"></i>PDF 평가 만들기</h3><button class="modal-close" onclick="closeModal('createPdfModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">평가 제목 *</label><input class="form-input" id="pdfExamTitle" placeholder="예: 3월 수학 단원평가"></div>
      <div class="form-group"><label class="form-label">설명</label><textarea class="form-textarea" id="pdfExamDesc" placeholder="평가에 대한 설명을 입력하세요"></textarea></div>
      <div class="form-group">
        <label class="form-label">PDF 문제지 파일 *</label>
        <input type="file" class="form-input" id="pdfFileInput" accept="application/pdf" style="padding:8px;">
        <div id="pdfUploadInfo" style="font-size:13px;color:var(--gray-500);margin-top:4px;">PDF 파일 (최대 10MB)</div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">문항 수</label>
          <select class="form-select" id="pdfQuestionCount" onchange="renderPdfOmrGrid()">
            <option value="5">5문항</option>
            <option value="10" selected>10문항</option>
            <option value="15">15문항</option>
            <option value="20">20문항</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">제한 시간(분)</label><input class="form-input" id="pdfExamTimeLimit" type="number" value="40" min="1"></div>
      </div>
      <div style="background:var(--gray-50);border-radius:10px;padding:16px;margin-bottom:16px;">
        <div style="font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:12px;"><i class="fas fa-cog" style="color:var(--primary);margin-right:6px;"></i>시험 설정</div>
        <div class="form-group">
          <label class="form-label">시작 모드</label>
          <div style="display:flex;gap:12px;">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
              <input type="radio" name="pdfStartMode" value="direct"> 바로 시작
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
              <input type="radio" name="pdfStartMode" value="waiting" checked> 대기모드 (감독관 시작)
            </label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">이탈 감지</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
              <input type="checkbox" id="pdfTabDetection" checked style="width:18px;height:18px;accent-color:var(--primary);"> 사용
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">재응시 허용</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
              <input type="checkbox" id="pdfAllowRetry" style="width:18px;height:18px;accent-color:var(--primary);"> 허용
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">정답 입력 (OMR)</label>
        <div id="pdfOmrGrid" style="max-height:320px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px;padding:12px;"></div>
      </div>
      <div id="pdfUploadProgress" style="display:none;margin-top:12px;">
        <div style="height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;">
          <div id="pdfProgressBar" style="height:100%;background:var(--primary);border-radius:3px;width:0%;transition:width .3s;"></div>
        </div>
        <div id="pdfProgressText" style="font-size:13px;color:var(--gray-500);margin-top:4px;text-align:center;">업로드 중...</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('createPdfModal')">취소</button>
      <button class="btn btn-primary" id="pdfSubmitBtn" onclick="submitPdfExam()"><i class="fas fa-upload"></i> 업로드 및 저장</button>
    </div>
  </div>
</div>

<!-- 결과 모달 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-card">
    <div class="modal-header"><h3><i class="fas fa-chart-bar" style="color:var(--primary);margin-right:8px;"></i>평가 결과</h3><button class="modal-close" onclick="closeModal('resultModal')">&times;</button></div>
    <div class="modal-body" id="resultBody"></div>
  </div>
</div>

<!-- 내 결과 모달 -->
<div class="modal-overlay" id="myResultModal">
  <div class="modal-card" style="max-width:720px;">
    <div class="modal-header"><h3><i class="fas fa-user-check" style="color:var(--success);margin-right:8px;"></i>내 응시 결과</h3><button class="modal-close" onclick="closeModal('myResultModal')">&times;</button></div>
    <div class="modal-body" id="myResultBody" style="max-height:70vh;overflow-y:auto;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/auth.js"></script>
<script>
  let currentUser = null;
  let selectedClassId = null;
  let currentFilter = 'all';
  let currentViewHash = ''; // '', 'my-results', 'my-exams'
  let myClasses = [];
  let questions = [];
  let editingExamId = null;

  document.addEventListener('dacheim:user-loaded', (e) => {
    currentUser = e.detail;
    init();
  });

  // fallback: 이벤트 미발생 시 DOMContentLoaded에서 init
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => { if (!currentUser) init(); }, 500);
  });

  async function init() {
    if (!currentUser) {
      currentUser = await checkAuth();
      if (!currentUser) return;
    }
    document.getElementById('mainContent').style.display = '';
    // 교사/관리자면 바로 생성 버튼 표시
    const isTeacher = currentUser.role === 'teacher' || currentUser.role === 'admin';
    document.getElementById('createExamBtn').style.display = isTeacher ? '' : 'none';
    document.getElementById('createPdfExamBtn').style.display = isTeacher ? '' : 'none';

    // 내 클래스 목록 로드 (시험 생성용)
    try {
      const clsRes = await fetch('/api/class/my');
      const clsData = await clsRes.json();
      if (clsData.success) myClasses = clsData.classes || [];
    } catch(e) {}

    // 해시 기반 뷰 전환
    applyHashView();
    window.addEventListener('hashchange', () => { applyHashView(); loadExams(); });

    await loadExams();

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        loadExams();
      });
    });
  }

  function applyHashView() {
    const hash = (location.hash || '').replace('#', '');
    currentViewHash = hash;
    const isTeacher = currentUser && (currentUser.role === 'teacher' || currentUser.role === 'admin');
    // 페이지 타이틀 변경
    const titleEl = document.querySelector('.page-title');
    if (hash === 'my-results') {
      titleEl.innerHTML = '<i class="fas fa-poll"></i> 내 평가 결과';
      document.getElementById('createExamBtn').style.display = 'none';
      document.getElementById('createPdfExamBtn').style.display = 'none';
      document.getElementById('statsRow').style.display = 'none';
      document.querySelector('.filter-bar').style.display = 'none';
    } else if (hash === 'my-exams') {
      titleEl.innerHTML = '<i class="fas fa-clipboard-list"></i> 내 평가 관리';
      document.getElementById('createExamBtn').style.display = isTeacher ? '' : 'none';
      document.getElementById('createPdfExamBtn').style.display = isTeacher ? '' : 'none';
      document.getElementById('statsRow').style.display = '';
      document.querySelector('.filter-bar').style.display = '';
    } else {
      titleEl.innerHTML = '<i class="fas fa-clipboard-check"></i> 채움CBT';
      document.getElementById('createExamBtn').style.display = isTeacher ? '' : 'none';
      document.getElementById('createPdfExamBtn').style.display = isTeacher ? '' : 'none';
      document.getElementById('statsRow').style.display = '';
      document.querySelector('.filter-bar').style.display = '';
    }
  }

  async function loadExams() {
    const grid = document.getElementById('examGrid');
    grid.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>불러오는 중...</p></div>';
    try {
      const url = currentFilter === 'all' ? '/api/exam/my' : `/api/exam/my?status=${currentFilter}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.success) { grid.innerHTML = '<div class="empty-state"><p>데이터를 불러올 수 없습니다.</p></div>'; return; }

      let exams = data.exams || [];

      // 해시 뷰에 따른 필터링
      if (currentViewHash === 'my-results') {
        exams = exams.filter(e => e.my_submitted);
      } else if (currentViewHash === 'my-exams') {
        exams = exams.filter(e => e.owner_id === currentUser.id);
      }
      document.getElementById('statTotal').textContent = data.total || exams.length;
      document.getElementById('statActive').textContent = exams.filter(e => e.status === 'active' || e.status === 'waiting').length;
      document.getElementById('statDraft').textContent = exams.filter(e => e.status === 'draft').length;
      document.getElementById('statCompleted').textContent = exams.filter(e => e.status === 'completed').length;

      if (exams.length === 0) {
        const emptyMsg = currentViewHash === 'my-results' ? '응시 완료한 평가가 없습니다.'
          : currentViewHash === 'my-exams' ? '등록한 평가가 없습니다.'
          : '등록된 평가가 없습니다.';
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-clipboard-list"></i><p>${emptyMsg}</p></div>`;
        return;
      }

      grid.innerHTML = exams.map(exam => {
        const statusTag = exam.status === 'active' ? '<span class="meta-tag tag-active">진행 중</span>' :
                          exam.status === 'completed' ? '<span class="meta-tag tag-completed">완료</span>' :
                          exam.status === 'waiting' ? '<span class="meta-tag" style="background:#fffbeb;color:#d97706;">대기 중</span>' :
                          '<span class="meta-tag tag-draft">임시저장</span>';
        const typeLabel = {quiz:'퀴즈',midterm:'중간평가',final:'기말평가',practice:'연습',pdf:'PDF평가'}[exam.exam_type] || exam.exam_type || '평가';
        const qCount = exam.questions ? (typeof exam.questions === 'string' ? JSON.parse(exam.questions) : exam.questions).length : (exam.question_count || 0);
        const isOwner = exam.owner_id === currentUser.id || currentUser.role === 'admin';
        const canTake = (exam.status === 'active' || exam.status === 'waiting') && !isOwner;
        const isPdfExam = exam.exam_type === 'pdf' || exam.exam_mode === 'pdf';
        const classLabel = ''; // CBT는 클래스와 독립적인 서비스

        // 응시 완료 여부 및 재응시 가능 여부
        const isSubmitted = exam.my_submitted;
        const allowRetry = exam.allow_retry === 1;
        const submittedTag = isSubmitted ? '<span class="meta-tag" style="background:#dcfce7;color:#16a34a;"><i class="fas fa-check-circle"></i> 응시완료</span>' : '';

        // 카드 CSS 클래스: 응시 완료 시 배경색 변경
        const cardClass = isSubmitted
          ? (allowRetry ? 'exam-card submitted-card' : 'exam-card submitted-card submitted-noretry')
          : 'exam-card';

        // 응시 버튼 불필요 (카드 클릭으로 응시/리뷰 진입)
        let actionBtn = '';

        return `<div class="${cardClass}" data-title="${escHtml(exam.title)}" onclick="viewExam('${exam.id}', ${exam.class_id}, ${isOwner}, ${isPdfExam}, ${isSubmitted})">
          <div class="exam-card-header">
            <div class="exam-title">${escHtml(exam.title)}</div>
            ${statusTag}
          </div>
          <div class="exam-desc">${escHtml(exam.description || '')}</div>
          <div class="exam-meta">
            ${isPdfExam ? `<span class="meta-tag" style="background:#fef2f2;color:#ef4444;"><i class="fas fa-file-pdf"></i> PDF</span>` : ''}
            ${classLabel}
            ${exam.time_limit ? `<span class="meta-tag" style="background:#f3f4f6;color:#6b7280;"><i class="fas fa-clock"></i> ${exam.time_limit}분</span>` : ''}
            ${submittedTag}
          </div>
          <div class="exam-footer">
            <span>${isOwner ? '내가 출제' : escHtml(exam.author_name || '')} · ${formatDate(exam.created_at)} · ${exam.participant_count || 0}명 응시</span>
            <div class="exam-actions" onclick="event.stopPropagation()">
              ${actionBtn}
              ${isOwner ? `
              <button class="btn btn-sm btn-outline" title="감독 대시보드" onclick="openSupervisor('${exam.id}',${exam.class_id})" style="color:var(--primary);border-color:var(--primary);">
                <i class="fas fa-eye"></i> 감독
              </button>
              <button class="btn btn-sm btn-outline" onclick="editExam('${exam.id}',${exam.class_id})"><i class="fas fa-edit"></i></button>
              <button class="btn btn-sm btn-outline" onclick="deleteExam('${exam.id}',${exam.class_id})"><i class="fas fa-trash"></i></button>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
    } catch (e) { console.error(e); grid.innerHTML = '<div class="empty-state"><p>오류가 발생했습니다.</p></div>'; }
  }

  function startExam(examId, classId) {
    location.href = `/cbt/player.html?classId=${classId}&examId=${examId}`;
  }

  function startPdfExam(examId, classId) {
    location.href = `/cbt/pdf-player.html?classId=${classId}&examId=${examId}`;
  }

  function openSupervisor(examId, classId) {
    location.href = `/cbt/supervisor.html?classId=${classId}&examId=${examId}`;
  }

  function viewExam(examId, classId, isOwner, isPdf, isSubmitted) {
    if (isSubmitted) {
      // 응시 완료 → 리뷰 모드로 플레이어 열기
      if (isPdf) {
        location.href = `/cbt/pdf-player.html?classId=${classId}&examId=${examId}&review=true`;
      } else {
        location.href = `/cbt/player.html?classId=${classId}&examId=${examId}&review=true`;
      }
    } else {
      // 미응시 → 플레이어로 이동 (출제자도 미리보기 가능)
      if (isPdf) {
        startPdfExam(examId, classId);
      } else {
        startExam(examId, classId);
      }
    }
  }

  let currentViewMode = 'card';
  function setViewMode(mode) {
    currentViewMode = mode;
    const grid = document.getElementById('examGrid');
    document.querySelectorAll('.view-toggle-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === mode);
    });
    if (mode === 'list') {
      grid.classList.add('list-view');
    } else {
      grid.classList.remove('list-view');
    }
  }

  async function showMyResult(examId, classId) {
    const body = document.getElementById('myResultBody');
    body.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin" style="font-size:24px;color:var(--primary);"></i><p style="margin-top:12px;color:var(--gray-500);">결과를 불러오는 중...</p></div>';
    document.getElementById('myResultModal').classList.add('active');
    try {
      const res = await fetch(`/api/exam/${classId}/${examId}`);
      const data = await res.json();
      if (!data.success) { body.innerHTML = '<p style="text-align:center;color:var(--gray-400);">데이터를 불러올 수 없습니다.</p>'; return; }
      const exam = data.exam;
      const studentExam = data.studentExam;
      if (!studentExam) { body.innerHTML = '<p style="text-align:center;color:var(--gray-400);">응시 기록이 없습니다.</p>'; return; }

      const questions = typeof exam.questions === 'string' ? JSON.parse(exam.questions) : (exam.questions || []);
      const myAnswers = studentExam.answers || [];
      const score = studentExam.score;
      const scoreCls = score >= 80 ? 'high' : score >= 60 ? 'mid' : 'low';
      const totalQ = questions.length;
      let correctCount = 0;
      questions.forEach((q, i) => {
        if (q.answer !== undefined && (String(myAnswers[i]) === String(q.answer) || Number(myAnswers[i]) === Number(q.answer))) correctCount++;
      });

      let html = `<div class="my-result-header">
        <div style="font-size:15px;font-weight:700;color:var(--gray-700);">${escHtml(exam.title)}</div>
        <div class="my-result-score ${scoreCls}">${score != null ? score + '점' : '-'}</div>
        <div class="my-result-meta">${totalQ}문항 중 <strong style="color:var(--success);">${correctCount}개 정답</strong> · ${formatDate(studentExam.submitted_at)} 응시</div>
      </div>`;

      html += '<div style="margin-top:16px;">';
      questions.forEach((q, i) => {
        const myAns = myAnswers[i];
        const correctAns = q.answer;
        const isCorrect = correctAns !== undefined && (String(myAns) === String(correctAns) || Number(myAns) === Number(correctAns));
        const isUnanswered = myAns === undefined || myAns === null;
        const itemClass = isUnanswered ? 'unanswered' : (isCorrect ? 'correct' : 'wrong');
        const badgeLabel = isUnanswered ? '무응답' : (isCorrect ? '정답' : '오답');
        const badgeClass = isUnanswered ? 'unanswered' : (isCorrect ? 'correct' : 'wrong');

        html += `<div class="q-result-item ${itemClass}">
          <div class="q-result-num">
            <span style="color:var(--primary);">문항 ${i + 1}</span>
            <span class="badge ${badgeClass}">${badgeLabel}</span>
            ${q.points ? `<span style="font-size:13px;color:var(--gray-400);">(${q.points}점)</span>` : ''}
          </div>
          <div class="q-result-text">${escHtml(q.text || '')}</div>`;

        if (q.options && q.options.length > 0) {
          html += '<div class="q-result-options">';
          q.options.forEach((opt, j) => {
            let optClass = 'q-result-opt';
            if (j === Number(correctAns) && j === Number(myAns)) {
              optClass += ' my-correct';
            } else if (j === Number(correctAns)) {
              optClass += ' correct-answer';
            } else if (j === Number(myAns)) {
              optClass += ' my-answer';
            }
            const labels = ['①','②','③','④','⑤'];
            html += `<div class="${optClass}">${labels[j] || (j+1)} ${escHtml(opt)}</div>`;
          });
          html += '</div>';
        } else {
          // PDF OMR 등 옵션 없는 경우
          const labels = ['①','②','③','④','⑤'];
          html += `<div style="font-size:13px;color:var(--gray-500);margin-top:4px;">`;
          if (!isUnanswered) html += `내 답: <strong>${labels[Number(myAns)] || (Number(myAns)+1)}</strong>`;
          if (!isCorrect && correctAns !== undefined) html += ` · 정답: <strong style="color:#16a34a;">${labels[Number(correctAns)] || (Number(correctAns)+1)}</strong>`;
          html += '</div>';
        }

        if (q.explanation) {
          html += `<div style="margin-top:8px;padding:8px 12px;background:var(--primary-light);border-radius:6px;font-size:13px;color:var(--primary);">
            <i class="fas fa-lightbulb" style="margin-right:4px;"></i> ${escHtml(q.explanation)}</div>`;
        }
        html += '</div>';
      });
      html += '</div>';
      body.innerHTML = html;
    } catch (e) { console.error(e); body.innerHTML = '<p style="text-align:center;color:var(--gray-400);">오류가 발생했습니다.</p>'; }
  }

  async function viewResults(examId) {
    const body = document.getElementById('resultBody');
    body.innerHTML = '<div style="text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin"></i> 불러오는 중...</div>';
    document.getElementById('resultModal').classList.add('active');
    try {
      const res = await fetch(`/api/exam/${selectedClassId}/${examId}`);
      const data = await res.json();
      if (!data.success) { body.innerHTML = '<p>데이터를 불러올 수 없습니다.</p>'; return; }
      const exam = data.exam;
      const students = data.students || [];
      const qArr = typeof exam.questions === 'string' ? JSON.parse(exam.questions) : (exam.questions || []);

      let html = `<h4 style="margin-bottom:12px;">${escHtml(exam.title)}</h4>
        <p style="font-size:13px;color:var(--gray-500);margin-bottom:16px;">${escHtml(exam.description || '')} · ${qArr.length}문항 · 제한시간 ${exam.time_limit || '-'}분</p>`;

      if (students.length === 0) {
        html += '<p style="color:var(--gray-400);text-align:center;padding:20px;">아직 응시한 학생이 없습니다.</p>';
      } else {
        html += `<table class="result-table"><thead><tr><th>학생</th><th>점수</th><th>상태</th><th>이탈 횟수</th><th>제출 시간</th></tr></thead><tbody>`;
        students.forEach(s => {
          const scoreCls = s.score >= 80 ? 'score-high' : s.score >= 60 ? 'score-mid' : 'score-low';
          html += `<tr><td>${escHtml(s.display_name || s.username || '-')}</td><td><span class="score-badge ${scoreCls}">${s.score != null ? s.score + '점' : '-'}</span></td><td>${s.status === 'submitted' ? '제출' : s.status || '-'}</td><td>${s.tab_switch_count || 0}회</td><td>${s.submitted_at ? formatDate(s.submitted_at) : '-'}</td></tr>`;
        });
        html += '</tbody></table>';
      }
      body.innerHTML = html;
    } catch (e) { body.innerHTML = '<p>오류가 발생했습니다.</p>'; }
  }

  // 문항 관리
  function addQuestion() {
    const idx = questions.length;
    questions.push({ text: '', type: 'objective', options: ['', '', '', ''], answer: 0, points: 10 });
    renderQuestions();
  }

  function removeQuestion(i) {
    questions.splice(i, 1);
    renderQuestions();
  }

  function renderQuestions() {
    const list = document.getElementById('questionList');
    list.innerHTML = questions.map((q, i) => `
      <div class="question-item">
        <button class="q-remove" onclick="removeQuestion(${i})">&times;</button>
        <div class="q-num">문항 ${i + 1} (${q.points}점)</div>
        <input class="form-input" style="margin-bottom:8px;" placeholder="문제를 입력하세요" value="${escHtml(q.text)}" onchange="questions[${i}].text=this.value">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          ${q.options.map((o, j) => `<div style="display:flex;align-items:center;gap:4px;">
            <input type="radio" name="q${i}ans" ${q.answer === j ? 'checked' : ''} onchange="questions[${i}].answer=${j}">
            <input class="form-input" style="padding:6px 8px;font-size:13px;" placeholder="보기 ${j + 1}" value="${escHtml(o)}" onchange="questions[${i}].options[${j}]=this.value">
          </div>`).join('')}
        </div>
      </div>
    `).join('');
  }

  function showCreateModal() {
    editingExamId = null;
    questions = [];
    document.getElementById('examTitle').value = '';
    document.getElementById('examDesc').value = '';
    document.getElementById('examType').value = 'quiz';
    document.getElementById('examTimeLimit').value = '30';
    document.getElementById('examStart').value = '';
    document.getElementById('examEnd').value = '';
    document.getElementById('examStatus').value = 'draft';
    renderQuestions();
    document.getElementById('createModal').classList.add('active');
  }

  let pdfOmrAnswers = [];

  function showCreatePdfModal() {
    document.getElementById('pdfExamTitle').value = '';
    document.getElementById('pdfExamDesc').value = '';
    document.getElementById('pdfFileInput').value = '';
    document.getElementById('pdfQuestionCount').value = '10';
    document.getElementById('pdfExamTimeLimit').value = '40';
    document.getElementById('pdfUploadProgress').style.display = 'none';
    document.getElementById('pdfSubmitBtn').disabled = false;
    renderPdfOmrGrid();
    document.getElementById('createPdfModal').classList.add('active');
  }

  function renderPdfOmrGrid() {
    const count = parseInt(document.getElementById('pdfQuestionCount').value) || 10;
    pdfOmrAnswers = new Array(count).fill(null);
    const labels = ['①', '②', '③', '④', '⑤'];
    const grid = document.getElementById('pdfOmrGrid');
    grid.innerHTML = Array.from({ length: count }, (_, i) => `
      <div style="display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--gray-100);" id="pdf-omr-row-${i}">
        <span style="font-size:13px;font-weight:700;color:var(--gray-500);min-width:28px;text-align:right;">${i + 1}</span>
        ${labels.map((l, j) => `
          <button type="button" style="width:34px;height:34px;border-radius:50%;border:2px solid var(--gray-200);background:#fff;font-size:13px;font-weight:700;color:var(--gray-500);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;"
            class="pdf-omr-btn" data-q="${i}" data-a="${j}"
            onclick="selectPdfOmrAnswer(${i},${j})">${l}</button>
        `).join('')}
      </div>
    `).join('');
  }

  function selectPdfOmrAnswer(qIdx, ansIdx) {
    pdfOmrAnswers[qIdx] = pdfOmrAnswers[qIdx] === ansIdx ? null : ansIdx;
    const row = document.getElementById(`pdf-omr-row-${qIdx}`);
    if (row) {
      row.querySelectorAll('.pdf-omr-btn').forEach((btn, j) => {
        if (pdfOmrAnswers[qIdx] === j) {
          btn.style.background = 'var(--primary)';
          btn.style.borderColor = 'var(--primary)';
          btn.style.color = '#fff';
        } else {
          btn.style.background = '#fff';
          btn.style.borderColor = 'var(--gray-200)';
          btn.style.color = 'var(--gray-500)';
        }
      });
    }
  }

  async function submitPdfExam() {
    const title = document.getElementById('pdfExamTitle').value.trim();
    if (!title) { showToast('제목을 입력하세요.'); return; }
    const fileInput = document.getElementById('pdfFileInput');
    if (!fileInput.files || !fileInput.files[0]) { showToast('PDF 파일을 선택하세요.'); return; }

    const questionCount = parseInt(document.getElementById('pdfQuestionCount').value) || 10;
    const timeLimit = parseInt(document.getElementById('pdfExamTimeLimit').value) || 40;
    const description = document.getElementById('pdfExamDesc').value.trim();

    const pdfStartModeVal = document.querySelector('input[name="pdfStartMode"]:checked')?.value || 'waiting';
    const pdfTabDetectionVal = document.getElementById('pdfTabDetection').checked ? 1 : 0;
    const pdfAllowRetryVal = document.getElementById('pdfAllowRetry').checked ? 1 : 0;

    const formData = new FormData();
    formData.append('pdf', fileInput.files[0]);
    formData.append('title', title);
    formData.append('description', description);
    formData.append('question_count', questionCount);
    formData.append('time_limit', timeLimit);
    formData.append('answers', JSON.stringify(pdfOmrAnswers));
    formData.append('start_mode', pdfStartModeVal);
    formData.append('tab_detection', pdfTabDetectionVal);
    formData.append('allow_retry', pdfAllowRetryVal);

    // 업로드 진행 표시
    const progressDiv = document.getElementById('pdfUploadProgress');
    const progressBar = document.getElementById('pdfProgressBar');
    const progressText = document.getElementById('pdfProgressText');
    const submitBtn = document.getElementById('pdfSubmitBtn');
    progressDiv.style.display = '';
    submitBtn.disabled = true;

    try {
      const xhr = new XMLHttpRequest();
      const cId = document.getElementById('pdfClassSelect') ? document.getElementById('pdfClassSelect').value : (myClasses[0]?.id || 1);
      xhr.open('POST', `/api/exam/${cId}/create-pdf`);

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressBar.style.width = pct + '%';
          progressText.textContent = `업로드 중... ${pct}%`;
        }
      });

      xhr.onload = function() {
        try {
          const data = JSON.parse(xhr.responseText);
          if (data.success) {
            showToast('PDF 평가가 생성되었습니다.');
            closeModal('createPdfModal');
            loadExams();
          } else {
            showToast(data.message || 'PDF 평가 생성 실패');
          }
        } catch (e) {
          showToast('서버 응답 오류');
        }
        submitBtn.disabled = false;
        progressDiv.style.display = 'none';
      };

      xhr.onerror = function() {
        showToast('업로드 오류가 발생했습니다.');
        submitBtn.disabled = false;
        progressDiv.style.display = 'none';
      };

      xhr.send(formData);
    } catch (e) {
      showToast('서버 오류가 발생했습니다.');
      submitBtn.disabled = false;
      progressDiv.style.display = 'none';
    }
  }

  let editingClassId = null;

  async function editExam(examId, classId) {
    try {
      const res = await fetch(`/api/exam/${classId}/${examId}`);
      const data = await res.json();
      if (!data.success) { showToast('데이터를 불러올 수 없습니다.'); return; }
      const exam = data.exam;
      editingExamId = examId;
      editingClassId = classId;
      document.getElementById('examTitle').value = exam.title || '';
      document.getElementById('examDesc').value = exam.description || '';
      document.getElementById('examType').value = exam.exam_type || 'quiz';
      document.getElementById('examTimeLimit').value = exam.time_limit || 30;
      document.getElementById('examStart').value = exam.start_time ? exam.start_time.slice(0, 16) : '';
      document.getElementById('examEnd').value = exam.end_time ? exam.end_time.slice(0, 16) : '';
      document.getElementById('examStatus').value = exam.status || 'draft';
      questions = typeof exam.questions === 'string' ? JSON.parse(exam.questions) : (exam.questions || []);
      renderQuestions();
      document.getElementById('createModal').classList.add('active');
    } catch (e) { showToast('오류가 발생했습니다.'); }
  }

  async function submitExam() {
    const title = document.getElementById('examTitle').value.trim();
    if (!title) { showToast('제목을 입력하세요.'); return; }
    const startMode = document.querySelector('input[name="examStartMode"]:checked')?.value || 'direct';
    const tabDetection = document.getElementById('examTabDetection').checked ? 1 : 0;
    const allowRetry = document.getElementById('examAllowRetry').checked ? 1 : 0;
    const body = {
      title,
      description: document.getElementById('examDesc').value.trim(),
      exam_type: document.getElementById('examType').value,
      time_limit: parseInt(document.getElementById('examTimeLimit').value) || 30,
      start_time: document.getElementById('examStart').value || null,
      end_time: document.getElementById('examEnd').value || null,
      status: document.getElementById('examStatus').value,
      questions,
      start_mode: startMode,
      tab_detection: tabDetection,
      allow_retry: allowRetry
    };
    try {
      const cId = editingExamId ? editingClassId : (document.getElementById('examClassSelect') ? document.getElementById('examClassSelect').value : (myClasses[0]?.id || 1));
      const url = editingExamId ? `/api/exam/${cId}/${editingExamId}` : `/api/exam/${cId}`;
      const method = editingExamId ? 'PUT' : 'POST';
      const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (data.success) {
        showToast(editingExamId ? '평가가 수정되었습니다.' : '평가가 생성되었습니다.');
        closeModal('createModal');
        loadExams();
      } else {
        showToast(data.message || '저장 실패');
      }
    } catch (e) { showToast('서버 오류가 발생했습니다.'); }
  }

  async function deleteExam(examId, classId) {
    if (!confirm('이 평가를 삭제하시겠습니까?')) return;
    try {
      const res = await fetch(`/api/exam/${classId}/${examId}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) { showToast('삭제되었습니다.'); loadExams(); }
      else { showToast(data.message || '삭제 실패'); }
    } catch (e) { showToast('오류가 발생했습니다.'); }
  }

  function filterExams() {
    const searchText = (document.getElementById('examSearch').value || '').trim().toLowerCase();
    const cards = document.querySelectorAll('.exam-card');
    cards.forEach(card => {
      const title = (card.getAttribute('data-title') || '').toLowerCase();
      card.style.display = (!searchText || title.includes(searchText)) ? '' : 'none';
    });
  }

  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function formatDate(d) { if (!d) return '-'; try { return new Date(d).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }); } catch(e) { return d; } }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
</script>
</body>
</html>
