<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>교육과정 표준체계 컴포넌트 테스트</title>
  <style>
    body { font-family: system-ui, -apple-system, 'Malgun Gothic', sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color:#111827; background:#f9fafb; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color:#6B7280; font-size:13px; margin-bottom:24px; }
    section { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:20px 24px; margin-bottom:20px; }
    section h2 { font-size:16px; margin:0 0 12px 0; color:#374151; display:flex; align-items:center; gap:8px; }
    section h2::before { content:''; display:inline-block; width:4px; height:18px; background:#3b82f6; border-radius:2px; }
    .output {
      margin-top:12px; padding:12px 14px;
      background:#f3f4f6; border-radius:8px;
      font-family: ui-monospace, monospace; font-size:12px;
      color:#374151; white-space:pre-wrap; word-break:break-all;
      max-height:200px; overflow-y:auto;
    }
    button {
      padding:6px 14px; font-size:13px; border-radius:8px;
      border:1.5px solid #3b82f6; background:#eff6ff; color:#2563eb;
      cursor:pointer; font-family:inherit; font-weight:600;
      margin-right:6px;
    }
    button:hover { background:#dbeafe; }
  </style>
</head>
<body>
  <h1>교육과정 표준체계 컴포넌트 테스트</h1>
  <div class="sub">Phase C — Web Components (std-picker / std-smart-search)</div>

  <section>
    <h2>1. &lt;std-smart-search&gt; — 성취기준 스마트검색</h2>
    <std-smart-search id="sss1"></std-smart-search>
    <div style="margin-top:10px;">
      <button onclick="document.getElementById('sss1').clear()">clear()</button>
      <button onclick="logValue('sss1', 'out1')">value 출력</button>
    </div>
    <div class="output" id="out1">change 이벤트 대기 중...</div>
  </section>

  <section>
    <h2>2. &lt;std-smart-search&gt; — 초기값 + 단일선택</h2>
    <std-smart-search id="sss2" data-value="[4국01-01]" data-multiple="false" data-placeholder="하나만 선택"></std-smart-search>
    <div class="output" id="out2">change 이벤트 대기 중...</div>
  </section>

  <section>
    <h2>3. &lt;std-picker&gt; — 내용 노드 계층 탐색 (기본)</h2>
    <std-picker id="sp1"></std-picker>
    <div style="margin-top:10px;">
      <button onclick="document.getElementById('sp1').clear()">clear()</button>
      <button onclick="logValue('sp1', 'out3')">value 출력</button>
    </div>
    <div class="output" id="out3">change 이벤트 대기 중...</div>
  </section>

  <section>
    <h2>4. &lt;std-picker&gt; — 성취기준 모드</h2>
    <std-picker id="sp2" data-mode="standard"></std-picker>
    <div class="output" id="out4">change 이벤트 대기 중...</div>
  </section>

  <script src="/js/components/std-smart-search.js"></script>
  <script src="/js/components/std-picker.js"></script>
  <script>
    function bind(id, outId) {
      const el = document.getElementById(id);
      const out = document.getElementById(outId);
      el.addEventListener('change', (e) => {
        out.textContent = '[change] ' + JSON.stringify(e.detail, null, 2);
      });
    }
    function logValue(id, outId) {
      const el = document.getElementById(id);
      document.getElementById(outId).textContent = '[value] ' + JSON.stringify(el.value, null, 2);
    }
    bind('sss1', 'out1');
    bind('sss2', 'out2');
    bind('sp1', 'out3');
    bind('sp2', 'out4');
  </script>
</body>
</html>
