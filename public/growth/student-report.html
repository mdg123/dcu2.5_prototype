<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다채움 - 학생 성장 리포트</title>
  <link rel="stylesheet" href="/css/common-nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb; --primary-light: #dbeafe; --primary-dark: #1d4ed8;
      --secondary: #10b981; --secondary-light: #d1fae5;
      --warning: #f59e0b; --warning-light: #fef3c7;
      --danger: #ef4444; --danger-light: #fee2e2;
      --purple: #8b5cf6; --purple-light: #ede9fe;
      --pink: #ec4899; --pink-light: #fce7f3;
      --cyan: #06b6d4; --cyan-light: #cffafe;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
      --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937; --gray-900: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08); --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1);
      --radius-md: 10px; --radius-lg: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR','Pretendard',system-ui,sans-serif; background: var(--gray-100); color: var(--gray-800); line-height: 1.6; }

    .app-layout { display: flex; min-height: calc(100vh - 60px); }
    .sidebar { width: 220px; background: #fff; border-right: 1px solid var(--gray-200); padding: 20px 0; flex-shrink: 0; }
    .sidebar-title { padding: 0 20px 16px; font-size: 15px; font-weight: 700; color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
    .sidebar-menu { list-style: none; }
    .sidebar-menu li { padding: 10px 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--gray-600); transition: all .15s; }
    .sidebar-menu li:hover { background: var(--gray-50); }
    .sidebar-menu li.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-right: 3px solid var(--primary); }
    .sidebar-menu li i { width: 18px; text-align: center; }
    .sidebar-menu li a { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px; width: 100%; }
    .main-content { flex: 1; padding: 24px; overflow-x: hidden; }
    .report-container { max-width: 1100px; margin: 0 auto; }

    /* Student Profile Header - prototype style */
    .student-header {
      background: white; border-radius: 16px; padding: 24px; margin-bottom: 24px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: var(--shadow-sm);
    }
    .student-info { display: flex; align-items: center; gap: 20px; }
    .student-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--purple-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: var(--primary);
    }
    .student-details h1 { font-size: 24px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
    .student-meta-text { color: var(--gray-500); font-size: 14px; }
    .header-right { display: flex; align-items: center; gap: 16px; }

    /* Visibility toggle */
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { display: none; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--gray-300); border-radius: 12px; transition: .3s; }
    .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
    .toggle-switch input:checked + .toggle-slider { background: var(--primary); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
    .toggle-label { font-size: 13px; color: var(--gray-600); }

    /* AI Growth Summary Banner */
    .growth-summary {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      border-radius: 16px; padding: 28px; margin-bottom: 24px;
      color: white; position: relative; overflow: hidden;
    }
    .growth-summary::before {
      content: ''; position: absolute; top: -50%; right: -20%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .growth-summary-title {
      font-size: 14px; font-weight: 500; opacity: 0.9;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .growth-summary-content {
      font-size: 20px; font-weight: 600; line-height: 1.5;
      position: relative; z-index: 1;
    }
    .highlight-tag {
      display: inline-block; background: rgba(255,255,255,0.2);
      padding: 2px 10px; border-radius: 20px; font-size: 14px;
      margin: 4px 4px 4px 0;
    }

    /* 2-column Report Grid */
    .report-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 20px; margin-bottom: 24px;
    }

    /* Section Cards */
    .section-card {
      background: white; border-radius: 16px; padding: 24px;
      box-shadow: var(--shadow-sm);
    }
    .section-card.full-width { grid-column: span 2; }
    .section-card.mb { margin-bottom: 24px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 600; color: var(--gray-800);
    }
    .section-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .section-icon.emotion { background: var(--warning-light); }
    .section-icon.basic { background: #e0f2fe; }
    .section-icon.learning { background: var(--primary-light); }
    .section-icon.daily { background: var(--pink-light); }
    .section-icon.reading { background: var(--secondary-light); }
    .section-icon.career { background: var(--purple-light); }
    .section-icon.content { background: #f0fdf4; }
    .sample-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
      background: #fef3c7; color: #b45309; margin-left: 8px;
      vertical-align: middle;
    }

    /* Period Filter */
    .period-filter-card {
      background: white; border-radius: 16px; padding: 16px 20px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
    }
    .period-filter-label {
      font-size: 14px; font-weight: 600; color: var(--gray-700);
      display: flex; align-items: center; gap: 6px;
    }
    .period-filter-label i.fa-calendar-alt { color: var(--primary); }
    .period-helper { color: var(--gray-400); cursor: help; }
    .period-helper:hover { color: var(--primary); }
    .period-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .period-chip {
      padding: 6px 14px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--gray-200); border-radius: 20px;
      background: white; color: var(--gray-600); cursor: pointer;
      transition: all 0.15s;
    }
    .period-chip:hover { border-color: var(--primary); color: var(--primary); }
    .period-chip.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }
    .period-range {
      margin-left: auto; font-size: 12px; color: var(--gray-500);
      font-family: 'Courier New', monospace;
    }
    @media (max-width: 768px) {
      .period-range { margin-left: 0; width: 100%; }
    }
    .section-link {
      font-size: 13px; color: var(--primary); text-decoration: none;
      display: flex; align-items: center; gap: 4px;
    }
    .section-link:hover { text-decoration: underline; }

    /* Emotion donut - CSS conic-gradient */
    .emotion-summary { display: flex; gap: 24px; align-items: center; }
    .emotion-chart { flex: 0 0 120px; }
    .emotion-donut {
      width: 120px; height: 120px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .emotion-donut-inner {
      width: 80px; height: 80px; background: white; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .emotion-donut-value { font-size: 24px; font-weight: 700; color: var(--secondary); }
    .emotion-donut-label { font-size: 11px; color: var(--gray-500); }
    .emotion-details { flex: 1; }
    .emotion-insight {
      background: var(--gray-50); border-radius: 12px; padding: 16px;
      margin-bottom: 16px; font-size: 14px; color: var(--gray-700);
      border-left: 3px solid var(--secondary);
    }
    .emotion-legend { display: flex; gap: 20px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-600); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.positive { background: var(--secondary); }
    .legend-dot.negative { background: var(--warning); }
    .legend-dot.none { background: var(--gray-200); }

    /* Basic academics */
    .basic-content { display: flex; gap: 24px; align-items: flex-start; }
    .basic-status { flex: 0 0 140px; text-align: center; }
    .status-badge {
      display: inline-block; padding: 8px 20px; border-radius: 20px;
      font-size: 16px; font-weight: 700; margin-bottom: 12px;
    }
    .status-badge.reached { background: var(--secondary-light); color: var(--secondary); }
    .status-badge.not-reached { background: var(--danger-light); color: var(--danger); }
    .status-description { font-size: 12px; color: var(--gray-500); line-height: 1.5; }
    .basic-subjects { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .basic-subject-item { display: flex; align-items: center; gap: 12px; }
    .basic-subject-name { flex: 0 0 40px; font-size: 13px; font-weight: 500; color: var(--gray-600); }
    .basic-subject-bar { flex: 1; height: 12px; background: var(--gray-100); border-radius: 6px; overflow: hidden; }
    .basic-subject-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary) 0%, #60a5fa 100%);
      border-radius: 6px; transition: width 0.5s ease;
    }
    .basic-subject-value { flex: 0 0 40px; font-size: 13px; font-weight: 600; color: var(--gray-700); text-align: right; }
    .basic-subject-status { flex: 0 0 36px; font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-align: center; }
    .basic-subject-status.reached { background: var(--secondary-light); color: var(--secondary); }
    .basic-subject-status.warning { background: var(--warning-light); color: var(--warning); }
    .basic-subject-status.not-reached { background: var(--danger-light); color: var(--danger); }

    /* Learning capacity - CSS radar */
    .learning-content { display: flex; gap: 24px; }
    .radar-chart { flex: 0 0 180px; height: 180px; position: relative; }
    .radar-placeholder {
      width: 180px; height: 180px; border-radius: 50%;
      background: var(--gray-50); border: 2px dashed var(--gray-200);
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .radar-polygon {
      position: absolute; width: 100%; height: 100%; top: 0; left: 0;
      background: rgba(37,99,235,0.25); border: none;
    }
    .radar-labels { position: absolute; width: 100%; height: 100%; font-size: 10px; color: var(--gray-500); }
    .radar-label { position: absolute; white-space: nowrap; }
    .radar-label.top { top: -5px; left: 50%; transform: translateX(-50%); }
    .radar-label.right { top: 35%; right: -15px; }
    .radar-label.bottom-right { bottom: -5px; right: 10px; }
    .radar-label.bottom-left { bottom: -5px; left: 10px; }
    .radar-label.left { top: 35%; left: -15px; }
    .learning-details { flex: 1; }
    .learning-insight {
      background: var(--gray-50); border-radius: 12px; padding: 16px;
      margin-bottom: 16px; font-size: 14px; color: var(--gray-700);
      border-left: 3px solid var(--primary);
    }
    .subject-growth { display: flex; flex-direction: column; gap: 12px; }
    .subject-item { display: flex; align-items: center; gap: 12px; }
    .subject-name { flex: 0 0 50px; font-size: 13px; font-weight: 500; color: var(--gray-600); }
    .subject-bar { flex: 1; height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
    .subject-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .subject-value { flex: 0 0 45px; font-size: 13px; font-weight: 600; text-align: right; }

    /* Daily learning */
    .daily-content { display: flex; gap: 24px; }
    .daily-stats { flex: 0 0 180px; display: flex; flex-direction: column; gap: 12px; }
    .daily-stat-item { background: var(--gray-50); border-radius: 12px; padding: 12px 16px; text-align: center; }
    .daily-stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
    .daily-stat-unit { font-size: 14px; font-weight: 500; }
    .daily-stat-label { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .daily-details { flex: 1; }
    .daily-insight {
      background: var(--gray-50); border-radius: 12px; padding: 16px;
      margin-bottom: 16px; font-size: 14px; color: var(--gray-700);
      border-left: 3px solid var(--pink);
    }
    .daily-calendar { background: var(--gray-50); border-radius: 12px; padding: 16px; }
    .calendar-label { font-size: 12px; color: var(--gray-500); margin-bottom: 12px; }
    .calendar-days { display: flex; gap: 8px; }
    .calendar-day {
      flex: 1; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500;
    }
    .calendar-day.completed { background: var(--secondary); color: white; }
    .calendar-day.missed { background: var(--danger-light); color: var(--danger); }
    .calendar-day.none { background: var(--gray-100); color: var(--gray-400); }

    /* Reading activity */
    .reading-content { display: flex; gap: 24px; }
    .reading-stats { flex: 0 0 140px; text-align: center; }
    .reading-count { font-size: 48px; font-weight: 700; color: var(--secondary); line-height: 1; }
    .reading-count-label { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
    .reading-comparison { margin-top: 12px; padding: 8px 12px; background: var(--secondary-light); border-radius: 8px; font-size: 12px; color: var(--secondary); }
    .reading-details { flex: 1; }
    .reading-insight {
      background: var(--gray-50); border-radius: 12px; padding: 16px;
      margin-bottom: 16px; font-size: 14px; color: var(--gray-700);
      border-left: 3px solid var(--secondary);
    }
    .recent-books { display: flex; flex-direction: column; gap: 10px; }
    .book-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; background: var(--gray-50); border-radius: 8px;
    }
    .book-cover {
      width: 36px; height: 48px;
      background: linear-gradient(135deg, var(--secondary-light), var(--primary-light));
      border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .book-info { flex: 1; }
    .book-title-text { font-size: 13px; font-weight: 500; color: var(--gray-800); }
    .book-meta { font-size: 11px; color: var(--gray-500); }

    /* Career exploration */
    .career-content { display: flex; gap: 24px; }
    .career-interests { flex: 1; }
    .career-insight {
      background: var(--gray-50); border-radius: 12px; padding: 16px;
      margin-bottom: 16px; font-size: 14px; color: var(--gray-700);
      border-left: 3px solid var(--purple);
    }
    .interest-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .interest-tag {
      padding: 6px 14px; background: var(--purple-light); color: var(--purple);
      border-radius: 20px; font-size: 13px; font-weight: 500;
    }
    .career-history { flex: 0 0 200px; }
    .history-title { font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 12px; }
    .history-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-size: 11px; color: var(--gray-400); flex: 0 0 50px; }
    .history-content-text { font-size: 13px; color: var(--gray-600); }

    /* "Service not provided" placeholder */
    .no-service {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 32px 16px; text-align: center; color: var(--gray-400);
    }
    .no-service i { font-size: 36px; color: var(--gray-300); }
    .no-service .no-service-title { font-size: 15px; font-weight: 600; color: var(--gray-500); }
    .no-service p { font-size: 13px; line-height: 1.6; max-width: 320px; }

    /* Content Usage Section */
    .content-usage-card {
      background: white; border-radius: 16px; padding: 24px;
      margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .content-usage-body {
      display: flex; flex-direction: column; gap: 20px;
    }
    .cu-stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .cu-stat-item {
      padding: 16px 12px; border-radius: 12px; text-align: center;
      transition: transform 0.15s;
    }
    .cu-stat-item:hover { transform: translateY(-2px); }
    .cu-stat-value { font-size: 24px; font-weight: 700; }
    .cu-stat-label { font-size: 11px; color: var(--gray-500); margin-top: 4px; }
    .cu-tags-section { margin-top: 4px; }
    .cu-tags-title {
      font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 10px;
    }
    .cu-tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .cu-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 16px; font-size: 12px;
      background: var(--gray-100); color: var(--gray-600);
    }
    .cu-tag-cnt { font-weight: 600; color: var(--primary); }
    .usage-bar-fill { height: 100%; border-radius: 8px; transition: width 0.5s ease; }
    .usage-bar-value { flex: 0 0 40px; font-size: 13px; font-weight: 600; color: var(--gray-700); text-align: right; }
    .usage-summary-items { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .usage-summary-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--gray-50); border-radius: 12px; }
    .usage-summary-icon { font-size: 20px; }
    .usage-summary-info { flex: 1; }
    .usage-summary-value { font-size: 16px; font-weight: 700; color: var(--gray-800); }
    .usage-summary-label { font-size: 11px; color: var(--gray-500); }
    .usage-insight-area { grid-column: span 2; }
    .usage-insight {
      background: var(--gray-50); border-radius: 12px; padding: 16px;
      font-size: 14px; color: var(--gray-700); border-left: 3px solid var(--secondary);
    }
    .preparing-placeholder {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 40px 20px; text-align: center; color: var(--gray-400);
    }
    .preparing-placeholder i { font-size: 32px; }

    /* Teacher Observations */
    .obs-timeline { max-height: 400px; overflow-y: auto; }
    .obs-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
    .obs-item:last-child { border-bottom: none; }
    .obs-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .obs-content { flex: 1; }
    .obs-content .obs-text { font-size: 13px; color: var(--gray-700); margin-bottom: 4px; line-height: 1.5; }
    .obs-content .obs-meta { font-size: 11px; color: var(--gray-400); }
    .note-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .note-tag {
      padding: 4px 10px; background: var(--gray-100); color: var(--gray-500);
      border-radius: 12px; font-size: 12px; cursor: pointer; transition: all 0.2s; border: none;
    }
    .note-tag:hover { background: var(--primary-light); color: var(--primary); }
    .note-tag.active { background: var(--primary); color: white; }

    /* Reading log cards & form */
    .reading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .reading-card { background: var(--gray-50); border-radius: var(--radius-md); padding: 14px; border: 1px solid var(--gray-200); }
    .reading-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .reading-card .meta { font-size: 12px; color: var(--gray-500); }
    .reading-card .review { font-size: 13px; color: var(--gray-600); margin-top: 6px; line-height: 1.5; }
    .star-rating { color: var(--warning); font-size: 12px; }
    .reading-form { display: none; padding: 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); background: var(--gray-50); margin-bottom: 16px; }
    .reading-form.open { display: block; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 13px; font-weight: 600; color: var(--gray-700); display: block; margin-bottom: 4px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border: 1.5px solid var(--gray-300); border-radius: 8px; font-size: 13px; font-family: inherit; }
    .form-group textarea { min-height: 60px; resize: vertical; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Buttons */
    .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-outline { background: #fff; color: var(--gray-700); border: 1.5px solid var(--gray-300); }
    .btn-outline:hover { background: var(--gray-50); }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-400); }
    .empty-state i { font-size: 40px; margin-bottom: 10px; display: block; }

    /* Footer actions */
    .report-footer {
      display: flex; justify-content: center; gap: 16px;
      margin-top: 32px; padding-bottom: 40px;
    }
    .footer-btn {
      padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
      font-family: inherit;
    }
    .footer-btn.secondary { background: white; border: 1px solid var(--gray-300); color: var(--gray-700); }
    .footer-btn.secondary:hover { background: var(--gray-50); }
    .footer-btn.primary { background: var(--primary); border: 1px solid var(--primary); color: white; }
    .footer-btn.primary:hover { background: #1d4ed8; }

    /* Teacher class/student selector */
    .class-selector { background: #fff; border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 20px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 16px; }
    .class-selector label { font-size: 14px; font-weight: 600; color: var(--gray-700); white-space: nowrap; }
    .class-selector select { padding: 8px 14px; border: 1.5px solid var(--gray-300); border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; min-width: 240px; cursor: pointer; }
    .student-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .student-table th { text-align: left; padding: 12px 10px; border-bottom: 2px solid var(--gray-200); font-weight: 600; color: var(--gray-600); background: var(--gray-50); user-select: none; white-space: nowrap; }
    .student-table th.sortable { cursor: pointer; transition: background .15s; }
    .student-table th.sortable:hover { background: var(--gray-100); }
    .student-table th .sort-icon { margin-left: 4px; font-size: 11px; opacity: 0.3; transition: opacity .15s; }
    .student-table th.sort-active .sort-icon { opacity: 1; color: var(--primary); }
    .student-table td { padding: 12px 10px; border-bottom: 1px solid var(--gray-100); }
    .score-cell { text-align: center; border-radius: 4px; }
    .score-high { background: rgba(16,185,129,0.1); color: #059669; font-weight: 600; }
    .score-mid { background: rgba(59,130,246,0.08); }
    .score-low { background: rgba(245,158,11,0.1); color: #d97706; }
    .score-danger { background: rgba(239,68,68,0.08); color: #dc2626; }
    .student-table tr:hover { background: var(--gray-50); }

    /* Responsive */
    @media (max-width: 768px) {
      .app-layout { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--gray-200); padding: 10px 0; }
      .sidebar-menu { display: flex; overflow-x: auto; }
      .sidebar-menu li { white-space: nowrap; }
      .main-content { padding: 16px; }
      .report-grid { grid-template-columns: 1fr; }
      .section-card.full-width { grid-column: span 1; }
      .emotion-summary, .learning-content, .reading-content, .career-content, .daily-content, .basic-content { flex-direction: column; }
      .emotion-chart, .radar-chart, .reading-stats, .career-history, .daily-stats, .basic-status { flex: none; margin: 0 auto; }
      .form-row { grid-template-columns: 1fr; }
      .reading-grid { grid-template-columns: 1fr; }
      .student-header { flex-direction: column; gap: 12px; text-align: center; }
      .cu-stats-grid { grid-template-columns: repeat(2, 1fr); }
      .report-footer { flex-direction: column; align-items: center; }
    }

    /* Print */
    @media print {
      body { background: white; }
      .sidebar, .header-right, .section-link, .report-footer, .note-tags, #backToListBtn { display: none !important; }
      .main-content { padding: 0; }
      .report-container { max-width: 100%; }
      .section-card, .student-header, .growth-summary, .content-usage-card {
        box-shadow: none; border: 1px solid var(--gray-200); break-inside: avoid;
      }
      .report-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <main class="main-content" style="padding:24px;max-width:1400px;margin:0 auto;">
    <!-- Teacher: Class select + Student list -->
    <div id="teacherClassView" style="display:none;">
      <div class="report-container">
        <div class="class-selector">
          <label><i class="fas fa-school"></i> 클래스 선택</label>
          <select id="reportClassSelect">
            <option value="">클래스를 선택하세요</option>
          </select>
        </div>
        <div id="studentListArea" style="display:none;">
          <div class="section-card">
            <div class="section-header">
              <div class="section-title"><div class="section-icon" style="background:var(--primary);color:#fff"><i class="fas fa-users"></i></div> 학생 성장 리포트 목록</div>
            </div>
            <table class="student-table" id="reportStudentTable">
              <thead>
                <tr>
                  <th></th>
                  <th class="sortable" onclick="sortReportStudents('이름')">이름 <i class="fas fa-sort sort-icon" id="rsort-이름"></i></th>
                  <th class="sortable" onclick="sortReportStudents('종합점수')">종합 점수 <i class="fas fa-sort sort-icon" id="rsort-종합점수"></i></th>
                  <th class="sortable" onclick="sortReportStudents('정서발달')">정서발달 <i class="fas fa-sort sort-icon" id="rsort-정서발달"></i></th>
                  <th class="sortable" onclick="sortReportStudents('기초학력')">기초학력 <i class="fas fa-sort sort-icon" id="rsort-기초학력"></i></th>
                  <th class="sortable" onclick="sortReportStudents('학습역량')">학습역량 <i class="fas fa-sort sort-icon" id="rsort-학습역량"></i></th>
                  <th class="sortable" onclick="sortReportStudents('오늘의학습')">오늘의학습 <i class="fas fa-sort sort-icon" id="rsort-오늘의학습"></i></th>
                  <th class="sortable" onclick="sortReportStudents('독서활동')">독서활동 <i class="fas fa-sort sort-icon" id="rsort-독서활동"></i></th>
                  <th class="sortable" onclick="sortReportStudents('진로탐색')">진로탐색 <i class="fas fa-sort sort-icon" id="rsort-진로탐색"></i></th>
                </tr>
              </thead>
              <tbody id="studentListBody"></tbody>
            </table>
          </div>
        </div>
        <div id="emptyClassState">
          <div class="empty-state"><i class="fas fa-hand-pointer"></i><p>클래스를 선택하면 학생별 성장 리포트를 확인할 수 있습니다.</p></div>
        </div>
      </div>
    </div>

    <!-- Back button for teacher -->
    <div id="backToListBtn" style="display:none;margin-bottom:12px;">
      <div class="report-container">
        <button class="btn btn-outline" onclick="backToStudentList()"><i class="fas fa-arrow-left"></i> 학생 목록으로</button>
      </div>
    </div>

    <div id="individualReportArea">
      <div class="report-container">

        <!-- Student Profile Header -->
        <div class="student-header" id="profileArea">
          <div class="student-info">
            <div class="student-avatar" id="profileAvatar">?</div>
            <div class="student-details">
              <h1 id="profileName">로딩 중...</h1>
              <div class="student-meta-text" id="profileMeta"></div>
            </div>
          </div>
          <div class="header-right" id="headerRight"></div>
        </div>

        <!-- Period Filter -->
        <div class="period-filter-card" id="periodFilterCard">
          <div class="period-filter-label">
            <i class="fas fa-calendar-alt"></i> 조회 기간
            <span class="period-helper" title="활동 데이터(감정 체크인, 기초학력 진단, 학습 활동, 오늘의 학습, 독서, 진로탐색)를 선택한 기간으로 필터링합니다."><i class="fas fa-question-circle"></i></span>
          </div>
          <div class="period-chips" id="periodChips">
            <button class="period-chip" data-days="7">최근 7일</button>
            <button class="period-chip active" data-days="30">최근 30일</button>
            <button class="period-chip" data-days="90">최근 90일</button>
            <button class="period-chip" data-days="180">최근 6개월</button>
            <button class="period-chip" data-days="all">전체 기간</button>
          </div>
          <div class="period-range" id="periodRangeText"></div>
        </div>

        <!-- AI Growth Summary Banner -->
        <div class="growth-summary" id="growthSummary" style="display:none;">
          <div class="growth-summary-title"><span>&#10024;</span> <span id="summaryTitle">이번 달 성장 이야기</span></div>
          <div class="growth-summary-content" id="summaryContent"></div>
        </div>

        <!-- 6 Domain Cards in 2-column grid -->
        <div class="report-grid" id="reportGrid">
          <!-- Cards will be rendered by JS -->
        </div>

        <!-- Content Usage Section -->
        <div class="content-usage-card" id="contentUsageCard">
          <div class="section-header">
            <div class="section-title"><div class="section-icon content">&#128202;</div> 콘텐츠 활용 현황</div>
          </div>
          <div class="preparing-placeholder">
            <i class="fas fa-tools"></i>
            <div style="font-weight:600;color:var(--gray-500);">준비 중</div>
            <p style="font-size:13px;">콘텐츠 활용 현황 기능이 준비 중입니다.</p>
          </div>
        </div>

        <!-- Teacher Observations -->
        <div class="section-card mb" id="observationSection">
          <div class="section-header">
            <div class="section-title"><div class="section-icon" style="background:var(--gray-100)">&#9999;&#65039;</div> 교사 관찰 기록</div>
          </div>
          <div class="note-tags" id="obsTagFilter">
            <button class="note-tag active" data-tag="all">#전체</button>
            <button class="note-tag" data-tag="학습습관">#학습습관</button>
            <button class="note-tag" data-tag="교우관계">#교우관계</button>
            <button class="note-tag" data-tag="가정연계">#가정연계</button>
            <button class="note-tag" data-tag="특기적성">#특기적성</button>
            <button class="note-tag" data-tag="생활태도">#생활태도</button>
          </div>
          <div class="obs-timeline" id="obsTimeline">
            <div class="empty-state" style="padding:20px;"><p>관찰 기록이 없습니다.</p></div>
          </div>
        </div>

        <!-- Reading Log (CRUD) -->
        <div class="section-card mb" id="readingLogSection">
          <div class="section-header">
            <div class="section-title"><div class="section-icon" style="background:var(--warning-light)">&#128214;</div> 독서 기록</div>
            <button class="btn btn-primary btn-sm" id="toggleReadingForm"><i class="fas fa-plus"></i> 독서 기록 추가</button>
          </div>
          <div class="reading-form" id="readingForm">
            <div class="form-row">
              <div class="form-group"><label>책 제목</label><input type="text" id="bookTitle" placeholder="책 제목을 입력하세요"></div>
              <div class="form-group"><label>저자</label><input type="text" id="bookAuthor" placeholder="저자명"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>읽은 날짜</label><input type="date" id="readDate"></div>
              <div class="form-group"><label>평점</label>
                <select id="bookRating">
                  <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733; (5점)</option>
                  <option value="4">&#9733;&#9733;&#9733;&#9733;&#9734; (4점)</option>
                  <option value="3">&#9733;&#9733;&#9733;&#9734;&#9734; (3점)</option>
                  <option value="2">&#9733;&#9733;&#9734;&#9734;&#9734; (2점)</option>
                  <option value="1">&#9733;&#9734;&#9734;&#9734;&#9734; (1점)</option>
                </select>
              </div>
            </div>
            <div class="form-group"><label>독서 감상</label><textarea id="bookReview" placeholder="책을 읽고 느낀 점을 적어보세요..."></textarea></div>
            <div class="form-actions">
              <button class="btn btn-outline btn-sm" id="cancelReadingBtn">취소</button>
              <button class="btn btn-primary btn-sm" id="submitReadingBtn"><i class="fas fa-save"></i> 저장</button>
            </div>
          </div>
          <div class="reading-grid" id="readingGrid"></div>
        </div>

        <!-- Footer Actions -->
        <div class="report-footer" id="reportFooter">
          <button class="footer-btn secondary" onclick="alert('준비 중입니다')"><span>&#128196;</span> PDF 저장</button>
          <button class="footer-btn secondary" onclick="window.print()"><span>&#128424;</span> 인쇄하기</button>
          <button class="footer-btn primary" onclick="alert('준비 중입니다')"><span>&#128106;</span> 학부모에게 공유</button>
        </div>

      </div><!-- /report-container -->
    </div><!-- /individualReportArea -->
  </main>
</div>

<script src="/js/common-nav.js"></script>
<script>
(function() {
  'use strict';

  // 영어 코드값 → 한글 매핑
  const ACTIVITY_TYPE_KO = {
    content_view: '콘텐츠 조회', lesson_view: '수업 조회', homework_submit: '과제 제출',
    homework_graded: '과제 채점', exam_complete: '평가 완료', daily_complete: '오늘의 학습',
    diagnosis_complete: '진단 완료', attendance_checkin: '출석 체크인', post_create: '게시물 작성',
    survey_respond: '설문 응답', portfolio_add: '포트폴리오 추가',
    lesson_progress: '수업 진행', problem_set_complete: '문제풀이 완료',
    lesson_complete: '수업 완료', board_view: '게시판 조회',
    homework: '과제', exam: '평가', lesson: '수업활동', quiz: '퀴즈',
    assignment: '과제물', activity: '활동', external: '외부연동'
  };
  const SOURCE_SERVICE_KO = {
    'class': '채움클래스', content: '채움콘텐츠', 'self-learn': '스스로채움',
    cbt: '채움CBT', growth: '성장기록', portal: '포털'
  };
  const VERB_KO = {
    completed: '완료', submitted: '제출', accessed: '접근', answered: '응답',
    attempted: '시도', attended: '참석', created: '생성', responded: '응답'
  };
  const RESULT_TYPE_KO = { completed: '완료' };
  function toKoActivityType(v) { return (v && ACTIVITY_TYPE_KO[v]) || v; }
  function toKoSource(v) { return (v && SOURCE_SERVICE_KO[v]) || v; }
  function toKoVerb(v) { return (v && VERB_KO[v]) || v; }
  function toKoResultType(v) { return (v && RESULT_TYPE_KO[v]) || v; }

  let currentUser = null;
  let targetStudentId = null;
  let isTeacher = false;
  let currentReportData = null;
  let allObservations = [];
  let activeObsTag = 'all';

  const AREAS = [
    { key: '정서발달', icon: 'fas fa-heart', color: '#ec4899', bg: '#fce7f3', emoji: '\uD83D\uDC9B', iconClass: 'emotion' },
    { key: '기초학력', icon: 'fas fa-book', color: '#2563eb', bg: '#dbeafe', emoji: '\uD83D\uDCCB', iconClass: 'basic' },
    { key: '학습역량', icon: 'fas fa-brain', color: '#8b5cf6', bg: '#ede9fe', emoji: '\uD83D\uDCDA', iconClass: 'learning' },
    { key: '오늘의학습', icon: 'fas fa-calendar-check', color: '#10b981', bg: '#d1fae5', emoji: '\uD83D\uDCDD', iconClass: 'daily' },
    { key: '독서활동', icon: 'fas fa-book-reader', color: '#f59e0b', bg: '#fef3c7', emoji: '\uD83D\uDCD6', iconClass: 'reading' },
    { key: '진로탐색', icon: 'fas fa-compass', color: '#06b6d4', bg: '#cffafe', emoji: '\uD83C\uDFAF', iconClass: 'career' }
  ];

  async function fetchWithAuth(url, opts) {
    const res = await fetch(url, opts);
    if (res.status === 401) window.location.href = '/login.html';
    return res;
  }

  function initWithUser(user) {
    if (currentUser) return;
    currentUser = user;
    isTeacher = currentUser.role === 'teacher' || currentUser.role === 'admin';
    const params = new URLSearchParams(window.location.search);
    const studentIdParam = params.get('studentId');

    if (isTeacher && !studentIdParam) {
      document.getElementById('teacherClassView').style.display = '';
      document.getElementById('individualReportArea').style.display = 'none';
      loadTeacherClasses();
    } else {
      targetStudentId = studentIdParam ? parseInt(studentIdParam) : currentUser.id;
      document.getElementById('teacherClassView').style.display = 'none';
      document.getElementById('individualReportArea').style.display = '';
      if (isTeacher && studentIdParam) {
        document.getElementById('backToListBtn').style.display = '';
      }
      if (!isTeacher) {
        document.getElementById('toggleReadingForm').style.display = currentUser.id === targetStudentId ? '' : 'none';
      }
      initPeriodFilter();
      loadStudentReport();
      loadReadingLogs();
      loadObservations();
    }
  }

  window.addEventListener('dacheim:user-loaded', (e) => initWithUser(e.detail));
  if (window.dacheumUser) initWithUser(window.dacheumUser);

  // ---- Teacher: Class & Student list ----
  async function loadTeacherClasses() {
    try {
      const res = await fetchWithAuth('/api/class');
      const data = await res.json();
      if (!data.success) return;
      const select = document.getElementById('reportClassSelect');
      const classes = (data.classes || []).filter(c => c.my_role === 'owner' || c.owner_id === currentUser.id || currentUser.role === 'admin');
      classes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });
      if (classes.length > 0) {
        select.value = classes[0].id;
        select.dispatchEvent(new Event('change'));
      }
    } catch (err) { console.error('클래스 목록 로드 실패:', err); }
  }

  document.getElementById('reportClassSelect').addEventListener('change', async (e) => {
    const classId = parseInt(e.target.value);
    if (!classId) {
      document.getElementById('studentListArea').style.display = 'none';
      document.getElementById('emptyClassState').style.display = '';
      return;
    }
    document.getElementById('emptyClassState').style.display = 'none';
    document.getElementById('studentListArea').style.display = '';
    try {
      const res = await fetchWithAuth('/api/growth/report/class/' + classId);
      const data = await res.json();
      if (!data.success) return;
      reportStudents = data.students || [];
      rSortField = null; rSortOrder = 'asc';
      updateReportSortIcons();
      renderStudentList(reportStudents);
    } catch (err) { console.error('학생 목록 로드 실패:', err); }
  });

  // Sort
  let reportStudents = [];
  let rSortField = null;
  let rSortOrder = 'asc';

  window.sortReportStudents = function(field) {
    if (rSortField === field) { rSortOrder = rSortOrder === 'asc' ? 'desc' : 'asc'; }
    else { rSortField = field; rSortOrder = field === '이름' ? 'asc' : 'desc'; }
    const sorted = [...reportStudents].sort((a, b) => {
      let aVal, bVal;
      if (field === '이름') {
        aVal = (a.display_name || a.studentName || '').toLowerCase();
        bVal = (b.display_name || b.studentName || '').toLowerCase();
        return rSortOrder === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
      } else if (field === '종합점수') {
        aVal = a.averageScore ?? -1; bVal = b.averageScore ?? -1;
      } else {
        aVal = a.areas?.[field]?.score ?? -1; bVal = b.areas?.[field]?.score ?? -1;
      }
      return rSortOrder === 'asc' ? aVal - bVal : bVal - aVal;
    });
    updateReportSortIcons();
    renderStudentList(sorted);
  };

  function updateReportSortIcons() {
    document.querySelectorAll('#reportStudentTable th').forEach(th => th.classList.remove('sort-active'));
    document.querySelectorAll('#reportStudentTable .sort-icon').forEach(icon => { icon.className = 'fas fa-sort sort-icon'; });
    if (rSortField) {
      const icon = document.getElementById('rsort-' + rSortField);
      if (icon) {
        icon.className = 'fas fa-sort-' + (rSortOrder === 'asc' ? 'up' : 'down') + ' sort-icon';
        icon.closest('th').classList.add('sort-active');
      }
    }
  }

  function scoreClass(v) {
    if (v === '-' || v == null) return '';
    if (v >= 80) return 'score-high';
    if (v >= 60) return 'score-mid';
    if (v >= 40) return 'score-low';
    return 'score-danger';
  }

  function renderStudentList(students) {
    const tbody = document.getElementById('studentListBody');
    const colors = ['#2563eb','#10b981','#8b5cf6','#ec4899','#f59e0b','#06b6d4','#ef4444'];
    if (!students.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty-state">등록된 학생이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = students.map((s, i) => {
      const c = colors[i % colors.length];
      const name = s.display_name || s.studentName || '학생';
      const avg = s.averageScore != null ? Math.round(s.averageScore) : '-';
      const areaScores = AREAS.map(a => {
        const ad = s.areas ? s.areas[a.key] : null;
        if (!ad || ad.hasData === false) return '<td class="score-cell" style="color:var(--gray-300);">-</td>';
        const score = ad.score != null ? Math.round(ad.score) : '-';
        return '<td class="score-cell ' + scoreClass(score) + '">' + score + '</td>';
      }).join('');
      return '<tr style="cursor:pointer;" onclick="showStudentReport(' + (s.studentId || s.id) + ')">' +

  // ---- Period Filter State ----
  let currentPeriod = { days: 30, startDate: null, endDate: null };

  function computePeriodRange(days) {
    if (days === 'all') return { startDate: null, endDate: null };
    const end = new Date();
    const start = new Date();
    start.setDate(start.getDate() - (parseInt(days) - 1));
    const fmt = (d) => d.toISOString().slice(0, 10);
    return { startDate: fmt(start), endDate: fmt(end) };
  }

  function updatePeriodRangeText() {
    const el = document.getElementById('periodRangeText');
    if (!el) return;
    if (!currentPeriod.startDate) {
      el.textContent = '※ 등록된 모든 활동 데이터';
    } else {
      el.textContent = currentPeriod.startDate + ' ~ ' + currentPeriod.endDate;
    }
  }

  function buildReportQuery() {
    if (!currentPeriod.startDate) return '';
    return '?startDate=' + currentPeriod.startDate + '&endDate=' + currentPeriod.endDate;
  }

  function initPeriodFilter() {
    const chips = document.querySelectorAll('#periodChips .period-chip');
    if (!chips.length) return;
    // 기본값 적용
    const defaultDays = 30;
    Object.assign(currentPeriod, { days: defaultDays }, computePeriodRange(defaultDays));
    updatePeriodRangeText();
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        const days = chip.dataset.days;
        currentPeriod.days = days;
        Object.assign(currentPeriod, computePeriodRange(days));
        updatePeriodRangeText();
        loadStudentReport();
      });
    });
  }

  // ---- Load & Render Student Report ----
  async function loadStudentReport() {
    try {
      const res = await fetchWithAuth('/api/growth/report/student/' + targetStudentId + buildReportQuery());
      const data = await res.json();
      if (!data.success) { showError('리포트를 불러올 수 없습니다.'); return; }
      currentReportData = data.report;
      renderProfile(data.report);
      renderGrowthSummary(data.report);
      renderDomainCards(data.report);
      renderContentUsage(data.report);
    } catch (err) {
      console.error('리포트 로드 실패:', err);
      showError('서버 오류가 발생했습니다.');
    }
  }

    // Find best area
    let bestArea = null, bestScore = -1;
    Object.entries(areas).forEach(([key, val]) => {
      if (val.hasData && val.score > bestScore) { bestScore = val.score; bestArea = key; }
    });

    if (!bestArea) { el.style.display = 'none'; return; }
    el.style.display = '';

    document.getElementById('summaryTitle').textContent = name + ' 학생의 성장 이야기';

    let narrative = name + '은(는) <span class="highlight-tag">' + bestArea + '</span> 영역에서 뛰어난 성장을 보이고 있습니다. ';
    narrative += '<span class="highlight-tag">' + bestScore + '점</span>을 기록했으며, ';

    const emotionData = report.emotionDevelopment || [];
    const totalEmotions = emotionData.reduce((s, e) => s + e.cnt, 0);
    const positiveEmotions = emotionData.filter(e => ['happy','excited','good','great','calm'].includes(e.emotion));

      else narrative += '감정적 지원이 필요한 부분이 있습니다. ';

  function renderEmotionCard(report, areaData) {
    const emotions = report.emotionDevelopment || [];
    const total = emotions.reduce((s, e) => s + e.cnt, 0);
    const positiveEmotions = emotions.filter(e => ['happy','excited','good','great','calm'].includes(e.emotion));
    const negativeEmotions = emotions.filter(e => ['sad','angry','anxious','tired','bored'].includes(e.emotion));
    const positiveCount = positiveEmotions.reduce((s, e) => s + e.cnt, 0);
    const negativeCount = negativeEmotions.reduce((s, e) => s + e.cnt, 0);
    const noneCount = total - positiveCount - negativeCount;

    if (total === 0) {
      return '<div class="section-card">' +
        '<div class="section-header"><div class="section-title"><div class="section-icon emotion">\uD83D\uDC9B</div> 정서 발달</div></div>' +
        '<div class="no-service"><i class="fas fa-heart"></i><p>아직 감정 체크인 데이터가 없습니다. 출석 체크 시 감정을 표현해보세요!</p></div></div>';
    }

    const posRatio = Math.round(positiveCount / total * 100);
    const negRatio = Math.round(negativeCount / total * 100);
    const noneRatio = 100 - posRatio - negRatio;

    const posDeg = Math.round(posRatio / 100 * 360);
    const negDeg = Math.round(negRatio / 100 * 360);

    // Find most common emotion
    let topEmotion = '';
    if (emotions.length > 0) {
      const sorted = [...emotions].sort((a, b) => b.cnt - a.cnt);
      topEmotion = sorted[0].emotion;
    }
    const emotionKo = { happy: '행복해요', excited: '설레요', good: '좋아요', great: '최고예요', calm: '편안해요', sad: '슬퍼요', angry: '화나요', anxious: '불안해요', tired: '피곤해요', bored: '지루해요' };

    return '<div class="section-card">' +
      '<div class="section-header"><div class="section-title"><div class="section-icon emotion">\uD83D\uDC9B</div> 정서 발달</div></div>' +
      '<div class="emotion-summary">' +
        '<div class="emotion-chart">' +
          '<div class="emotion-donut" style="background: conic-gradient(var(--secondary) 0deg ' + posDeg + 'deg, var(--warning) ' + posDeg + 'deg ' + (posDeg + negDeg) + 'deg, var(--gray-200) ' + (posDeg + negDeg) + 'deg 360deg);">' +
            '<div class="emotion-donut-inner">' +
              '<div class="emotion-donut-value">' + posRatio + '%</div>' +
              '<div class="emotion-donut-label">긍정 비율</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="emotion-details">' +
          '<div class="emotion-insight">' +

            '전반적으로 ' + (posRatio >= 60 ? '안정적인 정서 상태' : '감정적 지원이 필요한 상태') + '를 보이고 있습니다.' +
          '</div>' +
          '<div class="emotion-legend">' +
            '<div class="legend-item"><div class="legend-dot positive"></div> 긍정 ' + positiveCount + '회</div>' +
            '<div class="legend-item"><div class="legend-dot negative"></div> 부정 ' + negativeCount + '회</div>' +

          '</div>' +
        '</div>' +

  function renderBasicAcademicsCard(report, areaData) {
    let diagnoses = report.academicFoundation || [];
    const hasData = diagnoses.length > 0;

    // 예시 데이터 (실제 기록이 없을 때 시연용으로 표시)
    if (!hasData) {
      diagnoses = [
        { target_node_id: '국어', correct_count: 16, total_questions: 20 },
        { target_node_id: '수학', correct_count: 13, total_questions: 20 },
        { target_node_id: '영어', correct_count: 14, total_questions: 20 },
        { target_node_id: '사회', correct_count: 17, total_questions: 20 },
        { target_node_id: '과학', correct_count: 12, total_questions: 20 }
      ];
    }

    let content = '';
    {
      // Group by target_node_id as subject proxy
      const subjectMap = {};
      diagnoses.forEach(d => {
        const key = d.target_node_id || '기타';
        if (!subjectMap[key]) subjectMap[key] = [];
        subjectMap[key].push(d);
      });

      const overallCorrect = diagnoses.reduce((s, d) => s + (d.correct_count || 0), 0);
      const overallTotal = diagnoses.reduce((s, d) => s + (d.total_questions || 0), 0);
      const overallPct = overallTotal > 0 ? Math.round(overallCorrect / overallTotal * 100) : 0;
      const reached = overallPct >= 60;

      let subjectsHtml = '';
      Object.entries(subjectMap).forEach(([subj, items]) => {
        const c = items.reduce((s, d) => s + (d.correct_count || 0), 0);
        const t = items.reduce((s, d) => s + (d.total_questions || 0), 0);
        const pct = t > 0 ? Math.round(c / t * 100) : 0;
        const statusClass = pct >= 80 ? 'reached' : pct >= 60 ? 'warning' : 'not-reached';
        const statusText = pct >= 80 ? '도달' : pct >= 60 ? '주의' : '미달';
        subjectsHtml += '<div class="basic-subject-item">' +
          '<span class="basic-subject-name">' + escapeHtml(subj.length > 4 ? subj.substring(0, 4) : subj) + '</span>' +
          '<div class="basic-subject-bar"><div class="basic-subject-fill" style="width:' + pct + '%;"></div></div>' +
          '<span class="basic-subject-value">' + pct + '%</span>' +
          '<span class="basic-subject-status ' + statusClass + '">' + statusText + '</span></div>';
      });

      content = '<div class="basic-content">' +
        '<div class="basic-status">' +
          '<div class="status-badge ' + (reached ? 'reached' : 'not-reached') + '">' + (reached ? '도달' : '미달') + '</div>' +
          '<div class="status-description">기초학력 진단 결과,<br><strong>기초학력 ' + (reached ? '도달' : '미달') + '</strong> 수준입니다.</div>' +
        '</div>' +
        '<div class="basic-subjects">' + subjectsHtml + '</div>' +
      '</div>';
    }

    const sampleBadge = !hasData ? '<span class="sample-badge" title="현재 표시되는 데이터는 시연용 예시입니다.">예시 데이터</span>' : '';
    return '<div class="section-card">' +
      '<div class="section-header"><div class="section-title"><div class="section-icon basic">\uD83D\uDCCB</div> 기초학력 진단' +
      sampleBadge +
      '</div></div>' +
      content + '</div>';
  }

  function renderLearningCapacityCard(report, areaData) {
    const learningStats = report.learningCapacity || [];
    const hasData = learningStats.length > 0;
    const score = areaData ? areaData.score : 0;

    // 학습 활동 데이터 기반 5축 계산
    const totalCntAll = learningStats.reduce((s, l) => s + l.cnt, 0);
    const avgScoreAll = learningStats.length > 0
      ? learningStats.filter(l => l.avg_score != null).reduce((s, l) => s + (l.avg_score || 0), 0) / Math.max(1, learningStats.filter(l => l.avg_score != null).length) * 100
      : 0;
    const typeVariety = Math.min(100, learningStats.length * 15); // 활동 유형 다양성
    const axes = {
      '학습충실도': Math.min(100, Math.round(totalCntAll > 0 ? Math.min(totalCntAll * 2, 100) : 0)),
      '학습전략': Math.min(100, Math.round(typeVariety)),
      '학습성취': Math.min(100, Math.round(avgScoreAll)),
      '학습집중': Math.min(100, Math.round(score * 0.9)),
      '학업자존감': Math.min(100, Math.round(score > 0 ? score * 0.85 + typeVariety * 0.15 : 0))
    };

    // Build subject usage bars from learningStats
    let subjectHtml = '';
    if (learningStats.length > 0) {
      const totalCnt = learningStats.reduce((s, l) => s + l.cnt, 0);
      const subjectColors = ['var(--primary)', 'var(--warning)', 'var(--danger)', 'var(--secondary)', 'var(--purple)'];
      learningStats.slice(0, 5).forEach((l, i) => {
        const pct = totalCnt > 0 ? Math.round(l.cnt / totalCnt * 100) : 0;
        const avgPct = l.avg_score != null ? Math.round(l.avg_score * 100) : 0;
        subjectHtml += '<div class="subject-item">' +
          '<span class="subject-name">' + escapeHtml(toKoActivityType(l.activity_type) || '기타') + '</span>' +
          '<div class="subject-bar"><div class="subject-bar-fill" style="width:' + pct + '%;background:' + subjectColors[i % subjectColors.length] + '"></div></div>' +
          '<span class="subject-value">' + pct + '%</span></div>';
      });
    }

    if (!hasData) {
      subjectHtml = '<div style="text-align:center;color:var(--gray-400);font-size:13px;padding:8px;">활동 데이터가 부족합니다.</div>';
    }

    // Insight text
    let insightText = '';
    if (hasData) {
      const topActivity = [...learningStats].sort((a, b) => b.cnt - a.cnt)[0];
      insightText = '<strong>' + escapeHtml(toKoActivityType(topActivity.activity_type) || '학습') + '</strong> 활동이 가장 활발합니다. ';
      if (topActivity.avg_score != null) {
        insightText += '평균 점수 ' + Math.round(topActivity.avg_score * 100) + '%를 기록했습니다.';
      }
    } else {
      insightText = '아직 학습 활동 데이터가 충분하지 않습니다.';
    }

    // 데이터 기반 레이더 폴리곤 좌표 계산 (5축)
    // 중심 (50%, 50%), 반지름 50%. 각 축: top, right(72deg), bottom-right(144deg), bottom-left(216deg), left(288deg)
    const axisKeys = ['학습충실도', '학습전략', '학습성취', '학습집중', '학업자존감'];
    const angles = [-90, -18, 54, 126, 198]; // degrees, 시계방향 위→오→아래오→아래왼→왼
    const pts = axisKeys.map((k, i) => {
      const r = (axes[k] || 0) / 100 * 50; // % 반지름
      const rad = angles[i] * Math.PI / 180;
      const x = 50 + r * Math.cos(rad);
      const y = 50 + r * Math.sin(rad);
      return x.toFixed(1) + '% ' + y.toFixed(1) + '%';
    }).join(', ');
    const hasAxes = Object.values(axes).some(v => v > 0);
    const polygonStyle = hasAxes ? 'clip-path: polygon(' + pts + ');' : 'display:none;';

    let axisListHtml = '';
    axisKeys.forEach(k => {
      axisListHtml += '<div class="subject-item">' +
        '<span class="subject-name">' + k + '</span>' +
        '<div class="subject-bar"><div class="subject-bar-fill" style="width:' + (axes[k] || 0) + '%;background:var(--primary);"></div></div>' +
        '<span class="subject-value">' + (axes[k] || 0) + '</span></div>';
    });

    return '<div class="section-card">' +
      '<div class="section-header"><div class="section-title"><div class="section-icon learning">\uD83D\uDCDA</div> 학습 역량</div></div>' +
      '<div class="learning-content">' +
        '<div class="radar-chart">' +
          '<div class="radar-placeholder">' +
            '<div class="radar-polygon" style="' + polygonStyle + '"></div>' +
            '<div class="radar-labels">' +
              '<span class="radar-label top">학습충실도 ' + (axes['학습충실도'] || 0) + '</span>' +
              '<span class="radar-label right">학습전략 ' + (axes['학습전략'] || 0) + '</span>' +
              '<span class="radar-label bottom-right">학습성취 ' + (axes['학습성취'] || 0) + '</span>' +
              '<span class="radar-label bottom-left">학습집중 ' + (axes['학습집중'] || 0) + '</span>' +
              '<span class="radar-label left">학업자존감 ' + (axes['학업자존감'] || 0) + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="learning-details">' +
          '<div class="learning-insight">' + insightText + '</div>' +
          '<div class="subject-growth">' + subjectHtml + '</div>' +
        '</div>' +
      '</div></div>';
  }

  function renderDailyLearningCard(report, areaData) {
    const daily = report.dailyLearning || {};
    const total = daily.total || 0;
    const completed = daily.completed || 0;
    const rate = total > 0 ? Math.round(completed / total * 100) : 0;
    // 평균 정답률(서버에서 누적 정답수/총 문항수 기반 산출). 데이터 없으면 '-'
    const accuracy = (daily.avgAccuracy != null) ? daily.avgAccuracy : null;

    // 실제 데이터 기반 연속일
    const streak = daily.maxStreak || 0;
    const recentDays = daily.recentDays || [];

    // 최근 7일 캘린더 (실제 완료 날짜 기반)
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    let calendarHtml = '';
    const today = new Date();
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const dateStr = d.toISOString().split('T')[0];
      const dayLabel = dayNames[d.getDay()];
      const isCompleted = recentDays.includes(dateStr);
      const cls = isCompleted ? 'completed' : 'none';
      calendarHtml += '<div class="calendar-day ' + cls + '">' + dayLabel + '</div>';
    }

    const insightText = total > 0
      ? '이번 기간 <strong>' + completed + '회</strong> 학습을 완료했습니다. 완료율은 <strong>' + rate + '%</strong>입니다.'
      : '아직 오늘의 학습 기록이 없습니다.';

    return '<div class="section-card">' +
      '<div class="section-header"><div class="section-title"><div class="section-icon daily">\uD83D\uDCDD</div> 오늘의 학습</div></div>' +
      '<div class="daily-content">' +
        '<div class="daily-stats">' +
          '<div class="daily-stat-item"><div class="daily-stat-value">' + completed + '<span class="daily-stat-unit">회</span></div><div class="daily-stat-label">총 활동횟수</div></div>' +
          '<div class="daily-stat-item"><div class="daily-stat-value">' + (accuracy != null ? accuracy : '-') + '<span class="daily-stat-unit">' + (accuracy != null ? '%' : '') + '</span></div><div class="daily-stat-label">평균 정답률</div></div>' +
          '<div class="daily-stat-item"><div class="daily-stat-value">' + rate + '<span class="daily-stat-unit">%</span></div><div class="daily-stat-label">완료율</div></div>' +
          '<div class="daily-stat-item"><div class="daily-stat-value">' + streak + '<span class="daily-stat-unit">일</span></div><div class="daily-stat-label">최대 연속일</div></div>' +
        '</div>' +
        '<div class="daily-details">' +
          '<div class="daily-insight">' + insightText + '</div>' +
          '<div class="daily-calendar">' +
            '<div class="calendar-label">최근 7일 학습 현황</div>' +
            '<div class="calendar-days">' + calendarHtml + '</div>' +
          '</div>' +
        '</div>' +
      '</div></div>';
  }

  function renderReadingActivityCard(report, areaData) {
    const reading = report.readingActivity || {};
    let books = reading.books || [];
    let count = reading.count || books.length || 0;
    const hasData = count > 0;
    const isSample = !hasData;

    // 예시 데이터 (실제 기록이 없을 때 시연용으로 표시)
    if (!hasData) {
      books = [
        { book_title: '어린 왕자', author: '생텍쥐페리', read_date: '2026-04-02' },
        { book_title: '해리 포터와 마법사의 돌', author: 'J.K. 롤링', read_date: '2026-03-18' },
        { book_title: '나무를 심은 사람', author: '장 지오노', read_date: '2026-03-05' }
      ];
      count = 12;
    }

    let booksHtml = '';
    books.slice(0, 3).forEach(b => {
      booksHtml += '<div class="book-item">' +
        '<div class="book-cover">\uD83D\uDCD7</div>' +
        '<div class="book-info">' +
          '<div class="book-title-text">' + escapeHtml(b.book_title || b.bookTitle || '') + '</div>' +
          '<div class="book-meta">' + escapeHtml(b.author || '') + ' · ' + formatDate(b.read_date || b.readDate || '') + '</div>' +
        '</div></div>';
    });

    const sampleBadge = isSample ? '<span class="sample-badge" title="현재 표시되는 데이터는 시연용 예시입니다.">예시 데이터</span>' : '';

    return '<div class="section-card">' +
      '<div class="section-header"><div class="section-title"><div class="section-icon reading">\uD83D\uDCD6</div> 독서 활동' + sampleBadge + '</div></div>' +
      '<div class="reading-content">' +
        '<div class="reading-stats">' +
          '<div class="reading-count">' + count + '</div>' +
          '<div class="reading-count-label">읽은 책</div>' +
        '</div>' +
        '<div class="reading-details">' +
          '<div class="reading-insight">총 <strong>' + count + '권</strong>의 책을 읽었습니다.</div>' +
          '<div class="recent-books">' + booksHtml + '</div>' +
        '</div>' +
      '</div></div>';
  }

  function renderCareerCard(report, areaData) {
    const career = report.careerExploration || {};
    let interests = career.interests || [];
    let logs = career.logs || [];
    const hasData = logs.length > 0;
    const isSample = !hasData;

    // 예시 데이터 (실제 기록이 없을 때 시연용으로 표시)
    if (!hasData) {
      interests = [
        { interest_area: '과학자' },
        { interest_area: '디자이너' },
        { interest_area: '교사' },
        { interest_area: '개발자' }
      ];
      logs = [
        { activity_date: '2026-03-28', title: '과학자 체험 프로그램 참가', activity_type: '체험활동' },
        { activity_date: '2026-03-12', title: '진로 적성 검사', activity_type: '검사' },
        { activity_date: '2026-02-20', title: '직업인 인터뷰 - 초등교사', activity_type: '인터뷰' },
        { activity_date: '2026-02-05', title: '미래 직업 탐색 보고서', activity_type: '보고서' }
      ];
    }

    // 관심 분야 태그 (career_logs의 interest_area 기반)
    let tagsHtml = '';
    interests.slice(0, 5).forEach(s => {
      tagsHtml += '<span class="interest-tag">#' + escapeHtml(s.interest_area) + '</span>';
    });

    // 진로 활동 이력
    let historyHtml = '';
    logs.slice(0, 5).forEach(l => {
      historyHtml += '<div class="history-item">' +
        '<div class="history-date">' + formatDate(l.activity_date) + '</div>' +
        '<div class="history-content-text">' + escapeHtml(l.title || l.activity_type || '활동') + '</div></div>';
    });

    const insightText = interests.length > 0
      ? '<strong>' + escapeHtml(interests[0].interest_area) + '</strong> 분야에 관심을 보이고 있습니다.'
      : '다양한 진로 탐색 활동에 참여하고 있습니다.';

    const careerSampleBadge = isSample ? '<span class="sample-badge" title="현재 표시되는 데이터는 시연용 예시입니다.">예시 데이터</span>' : '';
    return '<div class="section-card">' +
      '<div class="section-header"><div class="section-title"><div class="section-icon career">\uD83C\uDFAF</div> 진로 탐색' +
      careerSampleBadge +
      '</div></div>' +
      '<div class="career-content">' +
        '<div class="career-interests">' +
          '<div class="career-insight">' + insightText + '</div>' +
          '<div class="interest-tags">' + tagsHtml + '</div>' +
        '</div>' +
        '<div class="career-history">' +
          '<div class="history-title">활동 이력</div>' +
          historyHtml +
        '</div>' +
      '</div></div>';
  }

  // ---- Reading Logs ----
  async function loadReadingLogs() {
    try {
      const q = targetStudentId !== currentUser.id ? '?studentId=' + targetStudentId : '';
      const res = await fetchWithAuth('/api/growth/reading' + q);
      const data = await res.json();
      renderReadingLogs(data.logs || data.items || []);
    } catch (err) {
      document.getElementById('readingGrid').innerHTML = '<div class="empty-state"><p>독서 기록을 불러올 수 없습니다.</p></div>';
    }
  }

  function renderReadingLogs(logs) {
    const grid = document.getElementById('readingGrid');
    if (!logs.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-book"></i><p>아직 독서 기록이 없습니다.</p></div>';
      return;
    }
    grid.innerHTML = logs.map(l => {
      const stars = '&#9733;'.repeat(l.rating || 0) + '&#9734;'.repeat(5 - (l.rating || 0));
      return '<div class="reading-card">' +
        '<h4><i class="fas fa-book" style="color:var(--warning)"></i> ' + escapeHtml(l.bookTitle || l.book_title || '') + '</h4>' +
        '<div class="meta">' + escapeHtml(l.author || l.bookAuthor || '') + ' &middot; ' + formatDate(l.readDate || l.read_date || l.created_at) + '</div>' +
        '<div class="star-rating">' + stars + '</div>' +
        (l.review || l.content ? '<div class="review">' + escapeHtml(l.review || l.content) + '</div>' : '') +
      '</div>';
    }).join('');
  }

  // Reading form toggle
  document.getElementById('toggleReadingForm').addEventListener('click', () => {
    const form = document.getElementById('readingForm');
    form.classList.toggle('open');
    if (form.classList.contains('open') && !document.getElementById('readDate').value) {
      document.getElementById('readDate').value = new Date().toISOString().split('T')[0];
    }
  });
  document.getElementById('cancelReadingBtn').addEventListener('click', () => {
    document.getElementById('readingForm').classList.remove('open');
  });

  document.getElementById('submitReadingBtn').addEventListener('click', async () => {
    const bookTitle = document.getElementById('bookTitle').value.trim();
    const author = document.getElementById('bookAuthor').value.trim();
    const readDate = document.getElementById('readDate').value;
    const rating = parseInt(document.getElementById('bookRating').value);
    const review = document.getElementById('bookReview').value.trim();
    if (!bookTitle) { alert('책 제목을 입력하세요.'); return; }
    try {
      const res = await fetchWithAuth('/api/growth/reading', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookTitle, author, readDate, rating, review })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('readingForm').classList.remove('open');
        ['bookTitle','bookAuthor','bookReview'].forEach(id => document.getElementById(id).value = '');
        loadReadingLogs();
      } else { alert(data.message || '저장에 실패했습니다.'); }
    } catch (err) { alert('서버 오류가 발생했습니다.'); }
  });

  // ---- Observations ----
  async function loadObservations() {
    try {
      const res = await fetchWithAuth('/api/growth/report/observations/' + targetStudentId);
      const data = await res.json();
      allObservations = data.observations || [];
      renderObservations(allObservations);
    } catch (err) {
      document.getElementById('obsTimeline').innerHTML = '<div class="empty-state"><p>관찰 기록을 불러올 수 없습니다.</p></div>';
    }
  }

  function renderObservations(observations) {
    const timeline = document.getElementById('obsTimeline');
    // Filter by active tag
    let filtered = observations;
    if (activeObsTag !== 'all') {
      filtered = observations.filter(o => {
        const area = (o.area || '').toLowerCase();
        const tags = o.tags || '';
        return area.includes(activeObsTag.toLowerCase()) || tags.toLowerCase().includes(activeObsTag.toLowerCase());
      });
    }

    if (!filtered.length) {
      timeline.innerHTML = '<div class="empty-state" style="padding:20px;"><i class="fas fa-clipboard-list"></i><p>' +
        (activeObsTag !== 'all' ? '"' + activeObsTag + '" 카테고리의 관찰 기록이 없습니다.' : '관찰 기록이 없습니다.') + '</p></div>';
      return;
    }
    timeline.innerHTML = filtered.map(o => {
      const areaInfo = AREAS.find(a => a.key === o.area) || AREAS[0];
      return '<div class="obs-item">' +
        '<div class="obs-dot" style="background:' + areaInfo.color + '"></div>' +
        '<div class="obs-content">' +
          '<div class="obs-text">' + escapeHtml(o.content) + '</div>' +
          '<div class="obs-meta">' +
            '<span style="color:' + areaInfo.color + ';font-weight:600;">' + (o.area || '') + '</span>' +
            ' &middot; ' + (o.teacherName || o.teacher_name || '교사') +
            ' &middot; ' + formatDate(o.created_at || o.createdAt || o.observation_date) +
          '</div>' +
        '</div></div>';
    }).join('');
  }

  // Observation tag filter
  document.getElementById('obsTagFilter').addEventListener('click', (e) => {
    const btn = e.target.closest('.note-tag');
    if (!btn) return;
    document.querySelectorAll('#obsTagFilter .note-tag').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeObsTag = btn.dataset.tag;
    renderObservations(allObservations);
  });

  // ---- Utilities ----
  function showError(msg) {
    document.querySelector('#individualReportArea .report-container').innerHTML =
      '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>' + msg + '</p></div>';
  }

  function escapeHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
  }
})();
</script>
</body>
</html>
