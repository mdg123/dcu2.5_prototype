<body>

  <script src="/js/common-nav.js"></script>

  <div id="lrsRoot" class="lrs-shell" hidden>

    <aside class="lrs-sidemenu" aria-label="LRS 서브메뉴">

<script>
/* =====================================================================
 * LRS Phase 2 Shell
 * - 역할 기반 IA + dc-period-picker(B4 단일화)
 * - Chart.js 단일 사용, 신규 라이브러리 없음

(function(){
'use strict';

const PERIODS = { '7d':7, '30d':30, '90d':90 };

/* ---- 보안 헬퍼: HTML escape (C-1 XSS 방지) ---- */
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

const state = {
  me: null,
  role: 'student',          // 'student' | 'teacher' | 'admin'
  view: null,               // 현재 뷰 id
  period: '30d',
  from: null,
  to:   null,
  charts: [],
  classId: null,            // teacher's resolved class_id (lazy)
  scope: 'mine',            // 'mine' | 'class' | 'all' — 역할에 따라 자동 계산
};

/* ---- 역할 → 데이터 스코프 계산 ---- */
function computeScope(){
  if (state.role === 'student') return 'mine';
  if (state.role === 'teacher') return 'class';
  if (state.role === 'admin')   return 'all';
  return 'mine';
}

/* ---- scope 자동 부착 대상 엔드포인트 판별 ---- */
function _shouldAttachScope(path){
  if (!path) return false;
  return /^\/api\/lrs\/(stats\/|dashboard|warnings\/)/.test(path);
}

/* ---- 공통 포맷 헬퍼 ---- */
function toMinutes(sec){ return Math.round((Number(sec)||0)/60); }
function fmtDate(s){
  if (!s) return '-';
  const str = String(s);
  // 'YYYY-MM-DD' 그대로 있으면 뒷 5글자(MM-DD) 사용
  const m = str.match(/\d{4}-(\d{2}-\d{2})/);
  return m ? m[1] : str;
}

/* ---- 교사 class_id 해석 (fallback 1) ---- */
async function resolveClassId(){
  if (state.classId) return state.classId;
  // 실제 prefix: /api/class (single)
  for (const path of ['/api/class/my', '/api/classes/my']){
    try {
      const r = await fetch(path, { credentials:'include' });
      if (r.ok){
        const j = await r.json();
        const list = (j && j.classes) || [];
        if (list.length){ state.classId = list[0].id; return state.classId; }
      }
    } catch(_){}
  }
  state.classId = (state.me && (state.me.class_id || state.me.classId)) || 1;
  return state.classId;
}

/* ---- C안 계층형 IA: 2차 메뉴 카테고리 정의 ---- */

    { id:'a-warnings',   label:'학교 경고 집계',   icon:'fa-triangle-exclamation',  group:'학습 활동',       category:'activities' },
    { id:'a-drill',      label:'지역 드릴다운',    icon:'fa-layer-group',           group:'학습 활동',       category:'activities' },

/* ---- 카테고리 → 기본 뷰 (role별 첫 항목) ---- */
function defaultViewForCategory(role, cat){
  const items = MENUS[role] || [];
  const found = items.find(it => it.category === cat);
  return found ? found.id : null;
}

/* ---- 뷰 → 카테고리 ---- */
function categoryForView(role, viewId){
  const items = MENUS[role] || [];
  const found = items.find(it => it.id === viewId);
  return found ? found.category : null;
}

/* ---- 상단 2차메뉴 라벨 (브레드크럼 & 배너용) ---- */
const MENU_LABELS = {
  home:'홈', analytics:'현황 분석', activities:'학습 활동', operations:'운영', reports:'리포트'
};

/* ---- common-nav ?menu=<category> → 역할별 카테고리 기본 뷰 매핑 ---- */
const MENU_TO_VIEW = {
  home:       { student:'s-home',    teacher:'t-home',    admin:'a-home' },
  analytics:  { student:'s-trend',   teacher:'t-usage',   admin:'a-usage' },
  activities: { student:'s-perform', teacher:'t-perform', admin:'a-perform' },
  operations: { student:null,        teacher:'t-teacher-idx', admin:'a-teacher-idx' },
  reports:    { student:null,        teacher:null,        admin:'a-compare' },
};

/* ---- 레거시 URL 호환: 구 뷰 키 또는 뷰 id → 카테고리 ---- */
const LEGACY_MENU_TO_CATEGORY = {
  usage:'analytics', achieve:'analytics', perform:'activities', custom:'activities',
  daily:'activities', teacher:'operations', quality:'operations',
  // 구 뷰 id도 수용
  's-home':'home','s-trend':'analytics','s-achieve':'analytics','s-compare':'analytics','s-xapi':'analytics','t-xapi':'analytics','a-xapi':'analytics',
  's-perform':'activities','s-custom':'activities','s-daily':'activities',
  't-home':'home','t-usage':'analytics','t-subject':'analytics',
  't-perform':'activities','t-custom':'activities','t-daily':'activities',
  't-warnings':'activities','t-drill':'activities','t-teacher-idx':'operations',
  'a-home':'home','a-usage':'analytics','a-achieve':'analytics','a-overview':'analytics',
  'a-perform':'activities','a-custom':'activities','a-daily':'activities',
  'a-warnings':'activities','a-drill':'activities',
  'a-teacher-idx':'operations','a-quality':'operations',
  'a-compare':'reports','a-export':'reports',
};

/* ---- view id → ?menu= 역매핑 (카테고리 기반) ---- */
function viewToMenu(viewId){
  // 1순위: MENUS에서 해당 view의 category 사용
  const cat = categoryForView(state.role, viewId);
  if (cat) return cat;
  // 2순위: 다른 역할의 MENUS 탐색 (역할 스위칭 중간 상태 방어)
  for (const role of Object.keys(MENUS)){
    const found = MENUS[role].find(it => it.id === viewId);
    if (found) return found.category;
  }
  // 3순위: 레거시 매핑
  return LEGACY_MENU_TO_CATEGORY[viewId] || null;
}

/* ---- API 헬퍼 ---- */
function rangeQS(extra, path){
  const params = new URLSearchParams();
  if (state.period === 'custom') {
    if (state.from) params.set('from', state.from);
    if (state.to)   params.set('to',   state.to);
  } else {
    params.set('period', state.period);
  }
  // scope 자동 부착: stats/*, dashboard, warnings/*
  if (path === undefined || _shouldAttachScope(path)){
    const sc = state.scope || computeScope();
    if (sc) params.set('scope', sc);
  }
  if (extra) Object.entries(extra).forEach(([k,v])=>{ if(v!=null) params.set(k,v); });
  const qs = params.toString();
  return qs ? '?' + qs : '';
}

async function apiGet(path, extra){
  try {
    const r = await fetch(path + rangeQS(extra, path), { credentials:'include' });
    if (!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } catch (e) {
    console.warn('[LRS] API 실패', path, e.message);
    return null;
  }
}

/* ---- 상태 패널 ---- */
function tplLoading(n=3){
  let skeletons = '';
  for (let i=0;i<n;i++) skeletons += '<div class="dc-skeleton dc-skeleton-row" style="height:80px;margin-bottom:12px;"></div>';

}
function tplEmpty(msg, cta){

function tplError(msg, onRetry){
  const id = 'retry_'+Math.random().toString(36).slice(2,8);
  setTimeout(()=>{ const b=document.getElementById(id); if(b) b.onclick=onRetry; },0);
  return `<div class="dc-state-panel" role="alert">
    <i class="fas fa-triangle-exclamation" aria-hidden="true" style="color:var(--lrs-danger);"></i>
    <p>${escapeHtml(msg || '데이터를 불러오지 못했습니다')}</p>
    <button id="${id}" class="btn" type="button">다시 시도</button>
  </div>`;
}

/* ---- 차트 라이프사이클 ---- */
function destroyCharts(){ state.charts.forEach(c=>{ try{c.destroy();}catch(_){} }); state.charts = []; }

/* CSS 변수 → 실제 색 해석 (Chart.js는 var(--..) 문자열을 인식 못함) */
const CHART_FALLBACK = ['#2563eb','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#6366f1'];
function _resolveCssVar(str){
  if (typeof str !== 'string') return str;
  const m = str.match(/^\s*var\(\s*(--[\w-]+)\s*(?:,\s*([^)]+))?\)\s*$/);
  if (!m) return str;
  try {
    const v = getComputedStyle(document.documentElement).getPropertyValue(m[1]).trim();
    if (v) return v;
  } catch(_){}
  return m[2] ? m[2].trim() : str;
}
function _resolveColorField(val, idx){
  if (Array.isArray(val)) return val.map((v,i)=> _resolveColorField(v, i));
  const r = _resolveCssVar(val);
  if (typeof r === 'string' && /^\s*var\(/.test(r)) return CHART_FALLBACK[(idx||0) % CHART_FALLBACK.length];
  return r;
}
function _resolveDatasetColors(data){
  if (!data || !Array.isArray(data.datasets)) return data;
  data.datasets.forEach((ds, i)=>{
    ['backgroundColor','borderColor','hoverBackgroundColor','hoverBorderColor','pointBackgroundColor','pointBorderColor'].forEach(k=>{
      if (ds[k] !== undefined) ds[k] = _resolveColorField(ds[k], i);
    });
  });
  return data;
}

/* ---- 라벨 후보 키 헬퍼 (API 응답 필드명 다양성에 방어) ---- */
function pickLabel(row, keys, fallback){
  if (!row) return fallback || '(미분류)';
  for (const k of keys){
    if (row[k] != null && String(row[k]).trim() !== '') return String(row[k]);
  }
  return fallback || '(미분류)';
}

/* ---- Chart.js 공통 폰트 크기 (토큰 --fs-sm = 12px와 정합) ---- */
const LRS_CHART_FONT_SIZE = 12;

/* ---- 도넛 차트용 범례 옵션 (라벨 + 값 병기) ---- */
function donutLegendOpts(unit){
  const u = unit || '건';
  return {
    plugins: {
      legend: {
        position: 'right',
        labels: {
          font: { size: LRS_CHART_FONT_SIZE }, padding: 12, boxWidth: 14, boxHeight: 14,
          generateLabels: (chart) => {
            const data = chart.data;
            const ds = (data.datasets && data.datasets[0]) || {};
            return (data.labels||[]).map((lbl, i) => ({
              text: `${lbl} — ${(Number(ds.data && ds.data[i])||0).toLocaleString()}${u}`,
              fillStyle: Array.isArray(ds.backgroundColor) ? ds.backgroundColor[i] : ds.backgroundColor,
              strokeStyle: 'transparent',
              hidden: false, index: i
            }));
          }
        }
      }
    }
  };
}

function mkChart(canvas, type, data, opts){
  if (!canvas) return null;
  _resolveDatasetColors(data);
  const base = {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ position:'bottom', labels:{ font:{size:LRS_CHART_FONT_SIZE}, usePointStyle:true, boxWidth:14, padding:10 } } },
    animation:{ duration:600, easing:'easeOutCubic' },
  };
  const chart = new Chart(canvas, { type, data, options: Object.assign(base, opts||{}) });
  state.charts.push(chart);
  return chart;
}

/* ---- 렌더 헬퍼 ---- */
function kpiCard(label, value, unit, trend, tone, extra){
  const t = trend || {};
  const cls = t.dir==='up'?'up':t.dir==='down'?'down':'flat';
  const arrow = t.dir==='up'?'▲':t.dir==='down'?'▼':'·';
  const extras = extra ? `<div class="kpi-extra">${extra}</div>` : '';
  return `<article class="dc-kpi-card" data-tone="${escapeAttr(tone||'primary')}" tabindex="0" role="group" aria-label="${escapeAttr(label+' '+value+(unit||''))}">
    <div class="kpi-label">${escapeHtml(label)}</div>
    <div class="kpi-value">${escapeHtml(value)}<span class="kpi-unit">${escapeHtml(unit||'')}</span></div>
    <div class="kpi-trend ${cls}">${arrow} ${escapeHtml(t.text||'-')}</div>
    ${extras}
  </article>`;
}

function chartWrap(id, title, subtitle, insight){
  return `<section class="dc-chart-wrapper">
    <header>
      <div><h2>${escapeHtml(title)}</h2>${subtitle?`<div class="subtitle">${escapeHtml(subtitle)}</div>`:''}</div>
    </header>
    <div class="chart-body"><canvas id="${escapeAttr(id)}" role="img" aria-label="${escapeAttr(title+' 차트')}"></canvas></div>
    ${insight?`<div class="insight" aria-live="polite">💡 ${escapeHtml(insight)}</div>`:''}
  </section>`;
}

/* =====================================================================
 * dc-data-table 구현 (P1-U-01)
 * ===================================================================== */
function renderDataTable(container, config){
  if (!container) return;
  const cols = (config && config.columns) || [];
  const rows = (config && config.rows) || [];
  const sortKey = (config && config.initialSort) || null;
  const sortDir = (config && config.initialDir) || 'asc';

  const state = { sortKey, sortDir, rows: rows.slice() };

  function applySort(){
    if (!state.sortKey) return;
    const dir = state.sortDir === 'asc' ? 1 : -1;
    state.rows.sort((a,b)=>{
      const va = a[state.sortKey], vb = b[state.sortKey];
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === 'number' && typeof vb === 'number') return (va-vb)*dir;
      return String(va).localeCompare(String(vb), 'ko') * dir;
    });
  }

  function draw(){
    applySort();
    const thead = cols.map(c => {
      const cls = ['sortable'];
      if (state.sortKey === c.key) cls.push(state.sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
      return `<th class="${cls.join(' ')}" data-key="${escapeAttr(c.key)}">${escapeHtml(c.label)}</th>`;
    }).join('');
    const tbody = state.rows.map((row, idx) => {
      const tds = cols.map(c => {
        const raw = row[c.key];
        let cell;
        if (typeof c.format === 'function'){
          // format() may return HTML; caller is responsible for escaping
          cell = c.format(raw, row);
        } else {
          cell = escapeHtml(raw == null ? '-' : raw);
        }
        const align = c.align === 'right' ? ' class="num"' : '';
        return `<td${align}>${cell}</td>`;
      }).join('');
      const rowId = row.user_id || row.id || idx;
      return `<tr data-row-id="${escapeAttr(rowId)}" data-row-idx="${idx}">${tds}</tr>`;
    }).join('');

    container.innerHTML = `<div class="dc-data-table-wrap"><table class="dc-data-table">
      <thead><tr>${thead}</tr></thead>
      <tbody>${tbody || `<tr><td colspan="${cols.length}" style="padding:24px;text-align:center;color:var(--gray-500);">표시할 데이터가 없습니다</td></tr>`}</tbody>
    </table></div>`;

    container.querySelectorAll('thead th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.getAttribute('data-key');
        if (state.sortKey === key) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        else { state.sortKey = key; state.sortDir = 'asc'; }
        draw();
      });
    });
    if (typeof config.onRowClick === 'function'){
      container.querySelectorAll('tbody tr[data-row-id]').forEach(tr => {
        tr.addEventListener('click', () => {
          const idx = parseInt(tr.getAttribute('data-row-idx'),10);
          config.onRowClick(state.rows[idx]);
        });
      });
    }
  }
  draw();
}

/* =====================================================================
 * dc-heatmap 구현 (요일×시간 7x24)
 * ===================================================================== */
function renderHeatmap(container, dailyRows){
  if (!container) return;
  const matrix = Array.from({length:7}, () => Array(24).fill(0));
  (dailyRows||[]).forEach(r => {
    const d = r.date ? new Date(r.date) : null;
    if (!d || isNaN(d)) return;
    const dow = d.getDay();
    const hour = r.hour != null ? r.hour : (d.getHours());
    const v = r.count || r.total_count || Math.round((r.total_duration||0)/60) || 0;
    matrix[dow][hour] += v;
  });
  let maxV = 0;
  matrix.forEach(row => row.forEach(v => { if (v>maxV) maxV = v; }));
  function bucket(v){
    if (!maxV || v<=0) return 0;
    const r = v/maxV;
    if (r>.75) return 4;
    if (r>.5)  return 3;
    if (r>.25) return 2;
    if (r>0)   return 1;
    return 0;
  }
  const dows = ['일','월','화','수','목','금','토'];
  const ylabels = dows.map(d => `<div>${d}</div>`).join('');
  const cells = matrix.map((row, di) =>
    row.map((v, hi) => `<div class="cell heat-${bucket(v)}" data-h="${bucket(v)}" title="${dows[di]} ${hi}시: ${v}" aria-label="${dows[di]}요일 ${hi}시 활동 ${v}">${v>0?v:''}</div>`).join('')
  ).join('');
  const xlabels = Array.from({length:24}, (_,i) => `<div>${i%3===0?i:''}</div>`).join('');
  container.innerHTML = `
    <div class="dc-heatmap-wrap">
      <div class="hm-ylabels" style="grid-template-rows:repeat(7,1fr);">${ylabels}</div>
      <div class="dc-heatmap" style="grid-template-columns:repeat(24,1fr);">${cells}</div>
      <div></div>
      <div class="hm-xlabels">${xlabels}</div>
    </div>`;
}

/* =====================================================================
 * dc-gauge 구현 (반원 SVG)
 * ===================================================================== */
function renderGauge(container, current, target, label){
  if (!container) return;
  const pct = target>0 ? Math.min(100, Math.round((current/target)*100)) : 0;
  const cx=80, cy=80, r=64;
  const startA = Math.PI, endA = startA + (pct/100)*Math.PI;
  function pt(a){ return [cx + r*Math.cos(a), cy + r*Math.sin(a)]; }
  const [sx,sy] = pt(startA);
  const [ex,ey] = pt(endA);
  const large = (endA-startA) > Math.PI ? 1 : 0;
  const arcBg = `M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`;
  const arcFg = pct>0 ? `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}` : '';
  container.innerHTML = `
    <div class="gauge-label">${escapeHtml(label||'')}</div>
    <svg viewBox="0 0 160 96" aria-label="${escapeAttr((label||'')+' '+pct+'%')}">
      <path d="${arcBg}" stroke="var(--gray-200)" stroke-width="14" fill="none" stroke-linecap="round"/>
      ${arcFg?`<path d="${arcFg}" stroke="var(--lrs-primary)" stroke-width="14" fill="none" stroke-linecap="round"/>`:''}
    </svg>
    <div class="gauge-value">${pct}%</div>`;
}

/* =====================================================================
 * dc-sparkline 구현 (SVG polyline, 7일)
 * ===================================================================== */
function renderSparkline(container, values, opts){
  if (!container) return;
  const vals = (values||[]).map(v => Number(v)||0);
  if (!vals.length) { container.innerHTML = ''; return; }
  const W=80, H=28, P=2;
  const max = Math.max.apply(null, vals), min = Math.min.apply(null, vals);
  const range = (max-min) || 1;
  const step = vals.length>1 ? (W-P*2)/(vals.length-1) : 0;
  const pts = vals.map((v,i)=> {
    const x = P + i*step;
    const y = H - P - ((v-min)/range)*(H-P*2);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const color = (opts&&opts.color) || 'var(--lrs-primary)';
  container.innerHTML = `<svg class="dc-sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
    <polyline fill="none" stroke="${color}" stroke-width="1.5" points="${pts}"/>
  </svg>`;
}

/* 경고 카드 액션 버튼 이벤트 바인딩 (인라인 onclick 제거) */
function bindWarningActions(container){
  if (!container) return;
  container.addEventListener('click', (ev) => {
    const btn = ev.target.closest('button[data-action]');
    if (!btn) return;
    const actions = btn.closest('.actions');
    if (!actions) return;
    const studentId = actions.getAttribute('data-student-id') || '';
    const code = actions.getAttribute('data-achievement-code') || '';
    const idx = parseInt(actions.getAttribute('data-warn-idx'),10);
    const action = btn.getAttribute('data-action');
    if (action === 'detail'){
      const cached = (LRS._warnCache && !isNaN(idx)) ? LRS._warnCache[idx] : { user_id: studentId };
      LRS.openDrilldown(cached);
    } else {
      LRS.teacherAction(action, studentId, code);
    }
  });
}

/* =====================================================================
 * 관리자 분석 헬퍼 (집계·분포 전용, 개인식별 금지)
 * ===================================================================== */
// URL test-hook: ?aIdxN=1234 등으로 게이트 경계값 수동 주입
function _adminTestHook(key){
  try { const v = new URLSearchParams(location.search).get(key); return v==null? null : v; } catch(_){ return null; }
}

// 최소표본 가드: n<threshold → 차단 패널 렌더하고 false 반환
function _minSampleGuard(root, n, threshold, label){
  if (Number(n) >= Number(threshold)) return true;
  root.innerHTML = `<div class="dc-state-panel" role="status" style="border-left:4px solid #64748b;background:#f1f5f9;">
    <i class="fas fa-lock" aria-hidden="true" style="color:#64748b;">🔒</i>
    <p><strong>표본 부족 — 개인 식별 방지</strong></p>
    <p style="font-size:var(--fs-sm);color:var(--gray-600);line-height:1.6;">
      ${escapeHtml(label||'선택한 범위')}의 표본 수가 ${n}건으로 최소 기준(${threshold}) 미만입니다.
      개인이 식별될 수 있어 결과를 표시하지 않습니다. 기간이나 범위를 더 넓게 선택하세요.
    </p>
  </div>`;
  return false;
}

// 행 단위 셀 마스킹: n<threshold 행의 민감 컬럼을 '***'로 치환 (원본 n/비율만 유지)
function _cellSuppress(rows, opts){
  opts = opts || {};
  const nKey = opts.nKey || 'n';
  const threshold = opts.threshold || 5;
  const maskKeys = opts.maskKeys || [];
  return rows.map(r => {
    if (Number(r[nKey]) < threshold) {
      const out = Object.assign({}, r, { _masked: true });
      maskKeys.forEach(k => { out[k] = '***'; });
      return out;
    }
    return r;
  });
}

// 퍼센타일 (0-100)
function _percentile(sorted, p){
  if (!sorted || !sorted.length) return 0;
  const idx = (sorted.length - 1) * (p/100);
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  if (lo === hi) return sorted[lo];
  return sorted[lo] + (sorted[hi]-sorted[lo]) * (idx-lo);
}

// 시드드 PRNG (deterministic mock)
function _mulberry32(seed){
  return function(){
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t>>>15), t | 1);
    t ^= t + Math.imul(t ^ (t>>>7), t | 61);
    return ((t ^ (t>>>14)) >>> 0) / 4294967296;
  };
}

// 정규분포 근사 (Box-Muller)
function _gaussian(rng, mean, sd){
  const u = Math.max(1e-9, rng()), v = Math.max(1e-9, rng());
  return mean + sd * Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
}

/* ---- 충북 스케일 상수 ---- */
const CB_REGIONS = ['청주교육지원청','충주교육지원청','제천교육지원청','보은교육지원청','옥천교육지원청','영동교육지원청','증평교육지원청','진천교육지원청','괴산교육지원청','음성교육지원청','단양교육지원청'];
const CB_SCHOOL_LEVELS = ['초등학교','중학교','고등학교'];

/* ---- Mock 교사 분포 (충북 ≈ 11,000명) ---- */
// Phase 2: /api/stats/teacher-index-dist?level=&region=&period= 연결 예정
function _mockTeacherIdxDist(filters){
  const n = Number(_adminTestHook('aIdxN')) || 11042;
  const rng = _mulberry32(20260422 + (filters.level==='초등학교'?1:filters.level==='중학교'?2:filters.level==='고등학교'?3:0));
  const scores = [];
  for (let i=0;i<n;i++){
    let v = _gaussian(rng, 62, 14);
    if (v<0) v=0; if (v>100) v=100;
    scores.push(Math.round(v*10)/10);
  }
  scores.sort((a,b)=>a-b);
  // 학교급별 교사분포
  const byLevel = {};
  CB_SCHOOL_LEVELS.forEach((lv,idx)=>{
    const cnt = Math.round(n * [0.55,0.28,0.17][idx]);
    const arr = [];
    const rng2 = _mulberry32(99 + idx*17);
    for (let i=0;i<cnt;i++){
      let v = _gaussian(rng2, 60+idx*3, 13);
      if (v<0) v=0; if (v>100) v=100;
      arr.push(v);
    }
    arr.sort((a,b)=>a-b);
    byLevel[lv] = arr;
  });
  return { n, scores, byLevel };
}

/* ---- Mock 학교별 경고 집계 (충북 ≈ 480개교) ---- */
// Phase 2: /api/stats/school-warnings?period=&region= 연결 예정
function _mockSchoolWarnings(){
  const rng = _mulberry32(7);
  const schools = [];
  const totalSchools = 478;
  for (let i=0;i<totalSchools;i++){
    const region = CB_REGIONS[Math.floor(rng()*CB_REGIONS.length)];
    const level = CB_SCHOOL_LEVELS[Math.floor(rng()*CB_SCHOOL_LEVELS.length)];
    // 학생수: 소규모~대규모 skewed
    let students = Math.round(40 + Math.pow(rng(), 2.2) * 1200);
    // 마스킹 대상 비율 ~10% : students<10 상태로 몇 개
    if (rng() < 0.08) students = 3 + Math.floor(rng()*2); // <5 학생
    // 위험률
    const base = 0.06 + rng()*0.18;
    const warn = Math.round(students * base);
    schools.push({
      schoolId: 'S'+String(1000+i),
      schoolName: `${['남','북','동','서','중앙'][i%5]}${['초','중','고'][CB_SCHOOL_LEVELS.indexOf(level)]}`+`${i+1}`,
      region, level, students,
      warnCount: warn, riskRate: students>0? warn/students : 0,
      trend: (rng()-0.5)*0.04
    });
  }
  // 마스킹 주입
  const maskForce = Number(_adminTestHook('aWarnMaskCount'));
  if (!isNaN(maskForce) && maskForce>0){
    for (let i=0;i<Math.min(maskForce, schools.length);i++) schools[i].students = 3;
  }
  return schools;
}

/* =====================================================================
 * A. a-teacher-idx — 교사 실행지수 분포 (개인 랭킹 제거)
 * ===================================================================== */
VIEWS['a-teacher-idx'] = async function(root){
  root.innerHTML = tplLoading(3);

  // 필터 상태 보관
  state._aIdxLevel  = state._aIdxLevel  || '';
  state._aIdxRegion = state._aIdxRegion || '';

  // 실 API 우선, n<10이면 mock fallback (프로토타입 단계 데모용)
  let dist = null;
  try {
    const qs = new URLSearchParams();
    if (state._aIdxLevel) qs.set('level', state._aIdxLevel);
    if (state._aIdxRegion) qs.set('region', state._aIdxRegion);
    const r = await fetch('/api/lrs/stats/teacher-index-dist?' + qs.toString(), { credentials:'include' });
    if (r.ok) {
      const d = await r.json();
      if (d && d.success && d.n >= 10) dist = { n:d.n, scores:d.scores, byLevel:d.byLevel };
    }
  } catch(_){}
  if (!dist) dist = _mockTeacherIdxDist({ level: state._aIdxLevel, region: state._aIdxRegion });
  const n = dist.n;

  // 필터 UI(셀렉트)
  const filterBar = `
    <section class="dc-filter-bar" aria-label="교사 분포 필터" style="margin-bottom:12px;">
      <label>학교급
        <select id="aIdxLevel">
          <option value="">전체</option>
          ${CB_SCHOOL_LEVELS.map(l=>`<option value="${escapeAttr(l)}" ${state._aIdxLevel===l?'selected':''}>${escapeHtml(l)}</option>`).join('')}
        </select>
      </label>
      <label style="margin-left:12px;">지역
        <select id="aIdxRegion">
          <option value="">전체</option>
          ${CB_REGIONS.map(r=>`<option value="${escapeAttr(r)}" ${state._aIdxRegion===r?'selected':''}>${escapeHtml(r)}</option>`).join('')}
        </select>
      </label>
    </section>`;

  root.innerHTML = filterBar + '<div id="aIdxBody"></div>';
  document.getElementById('aIdxLevel').onchange = e => { state._aIdxLevel = e.target.value; VIEWS['a-teacher-idx'](root); };
  document.getElementById('aIdxRegion').onchange = e => { state._aIdxRegion = e.target.value; VIEWS['a-teacher-idx'](root); };

  const body = document.getElementById('aIdxBody');
  if (!_minSampleGuard(body, n, 10, '교사 분포')) return;

  // 퍼센타일
  const scores = dist.scores;
  const p10 = _percentile(scores,10), p25 = _percentile(scores,25),
        p50 = _percentile(scores,50), p75 = _percentile(scores,75),
        p90 = _percentile(scores,90), p95 = _percentile(scores,95);
  const mean = scores.reduce((s,v)=>s+v,0)/scores.length;

  // 히스토그램 빈(10개, 빈당 n≥10 보장용 기본 width=10)
  const binWidth = 10;
  const bins = Array.from({length:10}, (_,i)=>({ lo:i*10, hi:(i+1)*10, count:0 }));
  scores.forEach(v=>{
    const i = Math.min(9, Math.floor(v/binWidth));
    bins[i].count += 1;
  });
  // 빈당 n<10이면 마스킹
  const histLabels = bins.map(b => `${b.lo}-${b.hi}`);
  const histData   = bins.map(b => b.count>=10 ? b.count : 0);
  const maskedBins = bins.filter(b => b.count>0 && b.count<10).length;

  // 학교급별 박스플롯 데이터 (min/p25/p50/p75/max), 학교별 n<5 마스킹 (여기서는 학교급 셀)
  const boxData = CB_SCHOOL_LEVELS.map(lv => {
    const arr = dist.byLevel[lv];
    if (!arr || arr.length < 5) return { lv, masked:true };
    return {
      lv,
      min: arr[0],
      p25: _percentile(arr,25),
      p50: _percentile(arr,50),
      p75: _percentile(arr,75),
      max: arr[arr.length-1],
      n: arr.length
    };
  });

  body.innerHTML = `
    <section class="dc-kpi-grid">
      ${kpiCard('교사 n',      n.toLocaleString(),        '명', {dir:'flat',text:'집계 대상'},   'primary')}
      ${kpiCard('중위값 p50',  p50.toFixed(1),            '점', {dir:'flat',text:'분포 중심'},   'primary')}
      ${kpiCard('상위 p90',    p90.toFixed(1),            '점', {dir:'flat',text:'상위 10%'},    'success')}
      ${kpiCard('평균',        mean.toFixed(1),           '점', {dir:'flat',text:`p10=${p10.toFixed(1)} · p95=${p95.toFixed(1)}`}, 'warning')}
    </section>
    <section class="dc-chart-grid">
      ${chartWrap('aIdxHist','실행지수 분포 (히스토그램)',`빈 폭 ${binWidth}점 · p10/p50/p90 기준선`,`중위값 ${p50.toFixed(1)}점, 상위 10% 기준 ${p90.toFixed(1)}점`)}
      ${chartWrap('aIdxBox','학교급별 박스플롯','p25·중위·p75 구간 (학교별 교사<5 셀은 마스킹)')}
    </section>
    ${maskedBins>0? `<p style="font-size:var(--fs-sm);color:var(--gray-600);margin-top:8px;">🔒 빈당 교사<10인 구간 ${maskedBins}개는 개인 식별 방지를 위해 숨겼습니다.</p>`:''}
    <section class="dc-state-panel" role="status" style="margin-top:12px;background:#eff6ff;border-left:4px solid #2563eb;">
      <p style="font-size:var(--fs-sm);color:var(--gray-700);line-height:1.6;">
        본 화면은 <strong>집계·분포</strong>만 제공합니다. 개별 교사 식별·랭킹·Top-K 표는 제공하지 않습니다 (개인정보 보호).
      </p>
    </section>`;

  // 히스토그램 + 기준선
  const lineAt = (val, color, label) => ({
    type:'line', xMin:val/binWidth - 0.5, xMax:val/binWidth - 0.5,
    borderColor:color, borderWidth:2, borderDash:[4,3], label:{display:true, content:label, color}
  });
  mkChart(document.getElementById('aIdxHist'),'bar',{
    labels: histLabels,
    datasets:[{ label:'교사 수', data: histData, backgroundColor:'#2563eb' }]
  }, {
    plugins:{ legend:{display:false},
      tooltip:{ callbacks:{ label:(ctx)=> `${ctx.parsed.y.toLocaleString()}명 (${bins[ctx.dataIndex].lo}-${bins[ctx.dataIndex].hi}점)` } } },
    scales:{ y:{ beginAtZero:true, title:{display:true,text:'교사 수'} }, x:{ title:{display:true,text:'실행지수 구간'} } }
  });

  // 박스플롯: Chart.js 기본만 사용 → floating bar (p25~p75) + p50 별도 점 datasets
  const labels = boxData.map(b=>b.lv);
  const boxes = boxData.map(b => b.masked ? [null,null] : [b.p25, b.p75]);
  const medians = boxData.map(b => b.masked ? null : b.p50);
  const mins = boxData.map(b => b.masked ? null : b.min);
  const maxs = boxData.map(b => b.masked ? null : b.max);
  mkChart(document.getElementById('aIdxBox'),'bar',{
    labels,
    datasets:[
      { label:'p25~p75', data: boxes, backgroundColor:'rgba(37,99,235,.35)', borderColor:'#2563eb', borderWidth:1, borderSkipped:false, barPercentage:.4 },
      { label:'중위(p50)', data: medians, type:'line', borderColor:'#ef4444', borderWidth:3, pointRadius:8, pointHoverRadius:9, pointBackgroundColor:'#ef4444', showLine:false },
      { label:'최소', data: mins, type:'line', borderColor:'#64748b', pointStyle:'triangle', pointRadius:6, showLine:false, backgroundColor:'#64748b' },
      { label:'최대', data: maxs, type:'line', borderColor:'#64748b', pointStyle:'rectRot', pointRadius:6, showLine:false, backgroundColor:'#64748b' }
    ]
  }, { indexAxis:'y', scales:{ x:{ min:0, max:100, title:{display:true,text:'실행지수'} } },
       plugins:{ tooltip:{ callbacks:{ label:(ctx)=> {
         const b = boxData[ctx.dataIndex]; if (b.masked) return '🔒 n<5 마스킹';
         return `${ctx.dataset.label}: ${Array.isArray(ctx.raw)? ctx.raw.join('–') : Number(ctx.raw).toFixed(1)}점 (n=${b.n})`;
       } } } } });
};

/* =====================================================================
 * B. a-warnings — 학교 단위 경고 집계 (개인 비노출)
 * ===================================================================== */
VIEWS['a-warnings'] = async function(root){
  root.innerHTML = tplLoading(3);
  // 실 API 우선, 학교 표본 <10이면 mock fallback
  let schools = null;
  try {
    const r = await fetch('/api/lrs/stats/school-warnings', { credentials:'include' });
    if (r.ok) {
      const d = await r.json();
      if (d && d.success && Array.isArray(d.schools) && d.schools.length >= 10) schools = d.schools;
    }
  } catch(_){}
  if (!schools) schools = _mockSchoolWarnings();
  const totalN = schools.length;

  // 전체 게이트 n<10 (학교 표본이 10개 미만이면 전면 차단)
  if (!_minSampleGuard(root, totalN, 10, '학교 집계')) return;

  // 마스킹 처리 (학교 내 학생 n<5 → 절대수 숨김, 비율만)
  const rows = _cellSuppress(schools, { nKey:'students', threshold:5, maskKeys:['warnCount'] });
  const maskedCount = rows.filter(r => r._masked).length;
  const visibleRows = rows.filter(r => !r._masked);
  const highRiskCount = visibleRows.filter(r => r.riskRate > 0.15).length;
  const avgRisk = visibleRows.length
    ? visibleRows.reduce((s,r)=>s+r.riskRate,0)/visibleRows.length
    : 0;

  root.innerHTML = `
    <section class="dc-kpi-grid">
      ${kpiCard('집계 학교 수', totalN.toLocaleString(),      '개', {dir:'flat',text:'전체'},                  'primary')}
      ${kpiCard('고위험 학교',  highRiskCount.toLocaleString(),'개', {dir:highRiskCount?'down':'flat',text:'위험률 > 15%'}, highRiskCount?'danger':'primary')}
      ${kpiCard('평균 위험률',  (avgRisk*100).toFixed(1),      '%', {dir:'flat',text:'학교 평균'},             'warning')}
      ${kpiCard('마스킹 학교',  maskedCount.toLocaleString(),  '개', {dir:'flat',text:'학생 n<5 → 절대수 숨김'}, 'primary')}
    </section>
    <section class="dc-chart-wrapper">
      <header><h2>학교 위험도 트리맵</h2><div class="subtitle">칸 크기 = 학생 수 · 색 = 위험률</div></header>
      <div class="dc-treemap" id="aWarnTreemap" role="img" aria-label="학교 위험도 트리맵"></div>
    </section>
    <section class="dc-chart-wrapper">
      <header><h2>학교별 상세 집계</h2><div class="subtitle">행 클릭 시 지역 드릴다운으로 이동</div></header>
      <div id="aWarnTable"></div>
    </section>`;

  // 간이 트리맵: 상위 60개교를 flex-grow 비례로 배치
  const top = visibleRows.slice().sort((a,b)=> b.students - a.students).slice(0,60);
  const tm = document.getElementById('aWarnTreemap');
  const colorFor = rate => {
    if (rate > 0.20) return '#dc2626';
    if (rate > 0.15) return '#f97316';
    if (rate > 0.10) return '#f59e0b';
    if (rate > 0.05) return '#10b981';
    return '#2563eb';
  };
  tm.innerHTML = top.map(s => {
    const size = Math.max(1, Math.round(s.students / 50));
    return `<div class="cell" style="flex-grow:${size};flex-basis:${size*20}px;background:${colorFor(s.riskRate)};"

// Phase 2: adminFetchWithPeriod('/api/stats/region-drilldown', state.period) 연결 예정
function _mockDrillChildren(level, parentId){
  const rng = _mulberry32((parentId||'root').split('').reduce((s,c)=>s+c.charCodeAt(0),0) + (level==='grade'?99:0));
  if (level === 'region'){
    return CB_REGIONS.map(r => ({
      id:r, label:r, level:'eduoffice',
      n: Math.round(1000 + rng()*18000),
      avgScore: Math.round((55+rng()*20)*10)/10,
      riskRate: Math.round((0.06+rng()*0.12)*1000)/1000,
      acts: Math.round(10000 + rng()*80000)
    }));
  }
  if (level === 'eduoffice'){
    const cnt = 20 + Math.floor(rng()*30);
    return Array.from({length:cnt}, (_,i) => ({
      id:`${parentId}-S${i}`, label:`${['남','북','동','서','중앙'][i%5]}${['초','중','고'][i%3]}${i+1}`, level:'school',
      n: Math.round(40 + rng()*900),
      avgScore: Math.round((55+rng()*20)*10)/10,
      riskRate: Math.round((0.06+rng()*0.15)*1000)/1000,
      acts: Math.round(200 + rng()*6000)
    }));
  }
  if (level === 'school'){
    const grades = ['1학년','2학년','3학년','4학년','5학년','6학년'];
    return grades.map(g => ({
      id:`${parentId}-${g}`, label:g, level:'grade',
      n: Math.round(20 + rng()*140),
      avgScore: Math.round((55+rng()*20)*10)/10,
      riskRate: Math.round((0.06+rng()*0.15)*1000)/1000,
      acts: Math.round(100 + rng()*1200)
    }));
  }
  return [];
}

  if (!state._drillPath) state._drillPath = [];
  // test-hook
  const forceLevel = _adminTestHook('aDrillLevel');

  else if (forceLevel === 'eduoffice') state._drillPath = [{ level:'region', id:'청주교육지원청', label:'청주교육지원청' }];
  else if (forceLevel === 'school') state._drillPath = [{ level:'region', id:'청주교육지원청', label:'청주교육지원청' },{ level:'eduoffice', id:'청주-OFF', label:'청주-오피스' }];
  else if (forceLevel === 'grade') state._drillPath = [{ level:'region', id:'청주교육지원청', label:'청주교육지원청' },{ level:'eduoffice', id:'청주-OFF', label:'청주-오피스' },{ level:'school', id:'S1001', label:'청주남초1' },{ level:'grade', id:'S1001-3학년', label:'3학년' }];

  const path = state._drillPath;
  const cur = path[path.length-1];
  const curLevel = cur ? (cur.level==='region'?'eduoffice':cur.level==='eduoffice'?'school':cur.level==='school'?'grade':'done') : 'region';
  const parentId = cur ? cur.id : 'root';

  // 브레드크럼
  const bc = [`<button type="button" data-idx="-1">충북</button>`]
    .concat(path.map((p,i)=> `<span class="sep">▸</span><button type="button" data-idx="${i}" ${i===path.length-1?'aria-current="page"':''}>${escapeHtml(p.label)}</button>`))

  root.innerHTML = `
    <nav class="dc-drill-bc" id="aDrillBc" aria-label="드릴다운 경로">${bc}</nav>
    <div id="aDrillBody"></div>`;
  root.querySelectorAll('#aDrillBc button').forEach(btn => {
    btn.onclick = () => {
      const idx = Number(btn.dataset.idx);
      state._drillPath = idx < 0 ? [] : state._drillPath.slice(0, idx+1);
      VIEWS['a-drill'](root);
    };
  });

  const body = document.getElementById('aDrillBody');

  // 경계(학년) 도달
  if (cur && cur.level === 'grade'){
    body.innerHTML = `<div class="dc-state-panel" role="status" style="border-left:4px solid #64748b;background:#f1f5f9;">
      <span style="font-size:var(--fs-display);">🔒</span>
      <p><strong>개인 식별 보호 — 학년 단위까지만 제공됩니다</strong></p>
      <p style="font-size:var(--fs-sm);color:var(--gray-600);line-height:1.6;">
        ${escapeHtml(path.map(p=>p.label).join(' ▸ '))} ▸ ${escapeHtml(cur.label)}의 하위 단위(학급·개인)는 개인정보 보호 원칙에 따라 표시하지 않습니다.
      </p>
    </div>`;
    return;
  }

  // 실 API 우선, 자식 <1 또는 모두 n<10이면 mock fallback
  let children = null;
  try {
    const qs = new URLSearchParams({ level: cur ? cur.level : 'region', parent: parentId });
    const r = await fetch('/api/lrs/stats/region-drilldown?' + qs.toString(), { credentials:'include' });
    if (r.ok) {
      const d = await r.json();
      if (d && d.success && Array.isArray(d.children) && d.children.filter(c=>c.n>=10).length >= 1) {
        children = d.children.map(c => ({ ...c, acts: c.n*10 }));
      }
    }
  } catch(_){}
  if (!children) children = _mockDrillChildren(cur ? cur.level : 'region', parentId);
  children = children.filter(c => c.n >= 10); // 모든 셀 n≥10 강제
  if (!children.length) { body.innerHTML = tplEmpty('하위 집계가 n≥10 기준을 충족하지 않습니다'); return; }

  const totalStu = children.reduce((s,c)=>s+c.n,0);
  const wAvg = children.reduce((s,c)=>s+c.avgScore*c.n,0) / Math.max(1,totalStu);
  const wRisk = children.reduce((s,c)=>s+c.riskRate*c.n,0) / Math.max(1,totalStu);
  const totalActs = children.reduce((s,c)=>s+c.acts,0);

  body.innerHTML = `
    <section class="dc-kpi-grid">
      ${kpiCard('학생 수', totalStu.toLocaleString(),           '명', {dir:'flat',text:`하위 단위 ${children.length}개`}, 'primary')}
      ${kpiCard('평균 지수', wAvg.toFixed(1),                   '점', {dir:'flat',text:'가중 평균'},                   'success')}
      ${kpiCard('위험률',   (wRisk*100).toFixed(1),             '%', {dir:wRisk>0.15?'down':'flat',text:''},           wRisk>0.15?'danger':'warning')}
      ${kpiCard('활동량',   totalActs.toLocaleString(),         '건', {dir:'flat',text:'누적'},                        'primary')}
    </section>
    <section class="dc-chart-wrapper">
      <header><h2>하위 단위 지수 비교</h2><div class="subtitle">바 클릭 시 드릴다운</div></header>
      <div class="chart-body"><canvas id="aDrillBar" role="img" aria-label="하위 단위 지수 바차트"></canvas></div>
    </section>
    <section class="dc-chart-wrapper">
      <header><h2>하위 단위 상세</h2></header>
      <div id="aDrillTable"></div>
    </section>`;

  const chart = mkChart(document.getElementById('aDrillBar'),'bar',{
    labels: children.map(c=>c.label),
    datasets:[{ label:'평균 지수', data: children.map(c=>c.avgScore), backgroundColor:'#2563eb' }]
  }, { onClick:(evt, els) => {
      if (!els || !els.length) return;
      const c = children[els[0].index];
      if (c.level === 'grade') { // 학년까지만 push, 이후 경계표시는 재렌더가 처리
        state._drillPath = state._drillPath.concat([{ level:'grade', id:c.id, label:c.label }]);
      } else {
        state._drillPath = state._drillPath.concat([{ level:c.level, id:c.id, label:c.label }]);
      }
      VIEWS['a-drill'](root);
    } });

  renderDataTable(document.getElementById('aDrillTable'), {
    columns:[
      { key:'label',    label:'단위' },
      { key:'n',        label:'학생수',  align:'right', format:v=>Number(v).toLocaleString() },
      { key:'avgScore', label:'평균지수',align:'right', format:v=>Number(v).toFixed(1) },
      { key:'riskRate', label:'위험률',  align:'right', format:v=>(Number(v)*100).toFixed(1)+'%' },
      { key:'acts',     label:'활동량',  align:'right', format:v=>Number(v).toLocaleString() }
    ],
    rows: children, initialSort:'n', initialDir:'desc',
    onRowClick:(row) => {
      state._drillPath = state._drillPath.concat([{ level:row.level, id:row.id, label:row.label }]);
      VIEWS['a-drill'](root);
    }
  });
};

/* ---- daily-snapshot 공통 차트 ---- */
function _dailyHourChart(canvasId, today, yesterday){
  const labels = Array.from({length:24}, (_,h)=> h+'시');
  mkChart(document.getElementById(canvasId),'bar', {
    labels,
    datasets:[
      { label:'오늘', data:(today.byHour||[]).map(r=>r.count),       backgroundColor:'#2563eb' },
      { label:'어제', data:(yesterday.byHour||[]).map(r=>r.count),   backgroundColor:'#94a3b8' }
    ]
  });
}
function _deltaTrend(curr, prev){
  const diff = (curr||0) - (prev||0);
  return { dir: diff>0?'up':(diff<0?'down':'flat'), text: `어제 대비 ${diff>=0?'+':''}${diff}` };
}

VIEWS['s-home'] = async function(root){
  root.innerHTML = tplLoading(4);
  const uid = state.me && state.me.id;
  const [insights, daily, dash] = await Promise.all([
    uid ? apiGet(`/api/lrs/insights/${uid}`) : Promise.resolve(null),
    apiGet('/api/lrs/stats/daily'),
    apiGet('/api/lrs/dashboard')
  ]);

  // API shape: {snapshot:{streakDays, weeklyDurationMin, weeklyTarget, weeklyScoreAvg, engagementIndex}, weaknesses:[...]}
  const snap = (insights && insights.snapshot) || {};
  const weakList = (insights && insights.weaknesses) || [];
  const dashStats = (dash && dash.stats) || {};
  const totalMinutes = snap.weeklyDurationMin != null
    ? Number(snap.weeklyDurationMin)
    : (dashStats.totalDurationMinutes || 0);
  const avgScore = Math.round(Number(snap.weeklyScoreAvg || 0) * 10) / 10;
  const streakDays = snap.streakDays || 0;
  const doneTasks = dashStats.totalActivities || 0;
  const summary = { total_minutes: totalMinutes, done_tasks: doneTasks, avg_score: avgScore, streak_days: streakDays };

  // 관리자 계정이 학생 뷰 (scope=mine) 로 볼 때 전부 0이면 안내
  const allZero = !totalMinutes && !doneTasks && !avgScore && !streakDays;
  const isAdminAsStudent = (state.me && state.me.role === 'admin') && state.role === 'student';
  const adminHintHtml = (allZero && isAdminAsStudent) ? `
    <div class="dc-state-panel" role="status" style="border-left:4px solid var(--lrs-primary);background:rgba(37,99,235,.06);margin-bottom:12px;">
      <i class="fas fa-lightbulb" aria-hidden="true"></i>
      <p>관리자 계정의 개인 학습 데이터가 없습니다. 실제 학생 화면을 보려면 학생 계정으로 로그인하거나 <button type="button" class="btn" id="sHomeSampleBtn" style="margin-left:6px;"><i class="fas fa-user-magnifying-glass"></i> 샘플 학생 보기</button> 버튼을 클릭하세요.</p>
    </div>` : '';

  const kpiHtml = `
    <div class="dc-kpi-grid">
      ${kpiCard('이번 기간 학습시간', (summary.total_minutes||0).toLocaleString(), '분', {dir:'up', text:'지난 기간 대비'}, 'primary',
        '<div class="dc-gauge" id="sHomeGauge"></div>')}
      ${kpiCard('완료 과제',         (summary.done_tasks||0).toLocaleString(), '건', {dir:'flat', text:'이번 기간'}, 'success',
        '<div id="sHomeSpark" class="kpi-spark"></div>')}
      ${kpiCard('평균 성취',          (summary.avg_score||0),                   '점', {dir:'up',   text:'지난 기간 대비'}, 'primary')}
      ${kpiCard('연속 학습',          (summary.streak_days||0),                 '일', {dir:'flat', text:'현재'},            'warning')}
    </div>`;

  const chartsHtml = `
    <div class="grid-2">
      ${chartWrap('sHomeDaily',  '일별 학습시간 추이', '최근 기간', null)}
      ${chartWrap('sHomeWeak',   '내 약점 성취기준 Top 5', '정답률 낮은 순', '약점 카드를 눌러 스스로채움 추천 콘텐츠로 이동합니다')}
    </div>
    <section class="dc-chart-wrapper" aria-label="약점 카드 리스트">
      <header><h2>약점 영역 & 추천 액션</h2></header>
      <div id="sWeakCards"></div>
    </section>`;

VIEWS['s-achieve'] = async function(root){
  root.innerHTML = tplLoading(2);
  const uid = state.me && state.me.id;
  // 실제 응답: {standards:[{code, subject_code, attempts, success, avg_score, level, lastAt}]}
  const cid = await resolveClassId();
  const r = await apiGet('/api/lrs/achievement-progress', { userId: uid, classId: cid });
  const standards = (r && (r.standards || r.byAchievement)) || [];

  if (!standards.length) {
    // 역할 전환 힌트 + 샘플 학생 보기 버튼
    const isAdmin = state.me && state.me.role === 'admin';
    const hint = isAdmin
      ? '관리자 계정에는 개인 성취 데이터가 없어요. 학생 계정으로 로그인하거나, 상단 역할 스위처로 <b>교사</b>로 전환 후 "학생 드릴다운"에서 학생을 선택하세요.'
      : '아직 진단 결과가 충분하지 않아요. 학습을 진행하면 성취 데이터가 집계됩니다.';
    root.innerHTML = `
      <div class="dc-state-panel" role="status">
        <i class="fas fa-award" aria-hidden="true"></i>
        <p>${hint}</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px;">
          ${isAdmin ? `<button type="button" class="btn" id="sAchGotoDrill"><i class="fas fa-user-magnifying-glass"></i> 샘플 학생 보기</button>` : ''}
          <a class="btn" href="/self-learn/"><i class="fas fa-book-open-reader"></i> 스스로채움</a>
        </div>
      </div>`;
    const go = document.getElementById('sAchGotoDrill');
    if (go) go.addEventListener('click', async () => {
      // 교사로 전환 후 t-drill → 첫 학생 drawer 자동 오픈
      setRole('teacher');
      await setView('t-drill');
      setTimeout(() => {
        const first = (LRS._warnCache||[])[0];
        if (first) LRS.openDrilldown(first);
      }, 300);
    });
    return;
  }

  // 레벨별 카운트 집계
  const levelMap = { '상':0, '중':0, '하':0, '미도달':0 };
  standards.forEach(s => {
    const lv = s.level || s.last_level || '미도달';
    if (levelMap[lv] != null) levelMap[lv]++; else levelMap['미도달']++;
  });

  // KPI 계산
  const reached = (levelMap['상']||0) + (levelMap['중']||0) + (levelMap['하']||0);
  let accSum=0, accN=0;
  standards.forEach(s => {
    const v = Number(s.avg_score);
    if (!isNaN(v) && v >= 0){ accSum += v; accN++; }
  });
  const avgAcc = accN ? (accSum/accN) : 0;
  // 약점: avg_score < 60 또는 level === '미도달'/'하'
  const weaknesses = standards.filter(s => {
    const v = Number(s.avg_score);
    const lv = s.level || s.last_level;
    return (isFinite(v) && v < 60) || lv === '미도달' || lv === '하';
  });

  root.innerHTML = `
    <div class="dc-kpi-grid">
      ${kpiCard('도달 성취기준', reached, '개', {dir:'flat',text:'상/중/하 합계'}, 'success')}
      ${kpiCard('평균 정답률',   avgAcc.toFixed(1), '%', {dir:'flat',text:'성취기준 전체 평균'}, 'primary')}
      ${kpiCard('약점 성취기준', weaknesses.length, '개', {dir:weaknesses.length?'down':'flat', text:'60점 미만/미도달'}, weaknesses.length?'danger':'primary')}
    </div>
    <div class="grid-2">
      ${chartWrap('sAchDist','성취수준 분포','상/중/하/미도달 비율')}
      ${chartWrap('sAchBar','성취기준별 평균 점수','상위 15개')}
    </div>
    <section class="dc-chart-wrapper">
      <header><h2>약점 Top 5</h2><div class="subtitle">평균점수 낮은 순</div></header>
      <div id="sAchWeakTable"></div>
    </section>`;

  mkChart(document.getElementById('sAchDist'),'doughnut',{
    labels:['상','중','하','미도달'],
    datasets:[{
      data:[levelMap['상'], levelMap['중'], levelMap['하'], levelMap['미도달']],
      backgroundColor:['var(--lvl-high)','var(--lvl-mid)','var(--lvl-low)','var(--gray-300)']
    }]
  }, donutLegendOpts('개'));

  const top = standards.slice().sort((a,b)=> (Number(b.avg_score)||0)-(Number(a.avg_score)||0)).slice(0,15);
  mkChart(document.getElementById('sAchBar'),'bar',{
    labels: top.map(s => s.code || s.achievement_code || '-'),
    datasets:[{
      label:'평균 점수',
      data: top.map(s => Number(s.avg_score)||0),
      backgroundColor:'var(--chart-2)'
    }]
  }, { indexAxis:'y', scales:{ x:{ beginAtZero:true, max:100 } } });

  const weakTop5 = weaknesses.slice().sort((a,b)=> (Number(a.avg_score)||0)-(Number(b.avg_score)||0)).slice(0,5);
  if (weakTop5.length){
    renderDataTable(document.getElementById('sAchWeakTable'), {
      columns: [
        { key:'achievement_code', label:'성취기준', format:(_,r)=>escapeHtml(r.code||r.achievement_code||'-') },
        { key:'avg_score',        label:'평균점수', align:'right', format:v=>escapeHtml(v==null?'-':Number(v).toFixed(1)) },
        { key:'attempts',         label:'시도횟수', align:'right', format:(_,r)=>escapeHtml(Number(r.attempts||r.attempt_count||0).toLocaleString()) }
      ],
      rows: weakTop5,
      initialSort:'avg_score', initialDir:'asc'
    });
  } else {
    document.getElementById('sAchWeakTable').innerHTML = `<p style="color:var(--gray-600);padding:12px 0;">약점 성취기준이 없습니다. 좋은 페이스를 유지하세요!</p>`;
  }
};

/* ===== 교사 경고 응답 → 통합 목록 변환 =====
 * 입력: {inactive:[], noData:[], consecutiveWrong:[], weakAchievements:[], summary:{...}}
 * 출력: [{user_id, name, severity, reason, achievement_code?, last_active?, _kind}]
 */
function flattenWarnings(w){
  if (!w) return { all:[], summary:{inactiveCount:0,noDataCount:0,wrongCount:0,weakCount:0} };
  const raw = w.summary || {};
  const summary = {
    inactiveCount: raw.inactiveCount != null ? raw.inactiveCount : (w.inactive||[]).length,
    noDataCount:   raw.noDataCount   != null ? raw.noDataCount   : (w.noData||[]).length,
    wrongCount:    raw.wrongCount    != null ? raw.wrongCount    : (raw.consecutiveWrongCount != null ? raw.consecutiveWrongCount : (w.consecutiveWrong||[]).length),
    weakCount:     raw.weakCount     != null ? raw.weakCount     : (w.weakAchievements||[]).length
  };
  // 공통 helper: 다양한 필드명 허용 (user_id|userId|id), (name|displayName|student_name)
  const uidOf = x => x.user_id || x.userId || x.id || '';
  const nameOf = x => x.name || x.displayName || x.student_name || ('학생 #'+uidOf(x));
  const all = [];
  (w.inactive||[]).forEach(x => all.push({
    user_id: uidOf(x), name: nameOf(x), severity: x.severity||'medium',
    reason: `미접속 ${x.daysInactive||'-'}일 (최근: ${x.lastActivityDate||'-'})`,
    last_active: x.lastActivityDate||'-', _kind:'inactive'
  }));
  (w.consecutiveWrong||[]).forEach(x => all.push({
    user_id: uidOf(x), name: nameOf(x), severity: x.severity||'high',
    reason: `연속 오답 ${x.wrongStreak||x.streak||'-'}회`, _kind:'wrong'
  }));
  // weakAchievements: 학생별로 items 배열 — 각 item당 한 행
  (w.weakAchievements||[]).forEach(x => {
    const items = x.items || [{ achievement_code: x.achievement_code, avg_score: x.avg_score, last_level: x.last_level, attempt_count: x.attempt_count }];
    items.forEach(it => all.push({
      user_id: uidOf(x), name: nameOf(x),
      severity: it.severity || (it.avg_score != null && it.avg_score < 50 ? 'high' : 'medium'),
      reason: `${it.achievement_code||'-'} · ${it.last_level||'미도달'}${it.avg_score!=null?` (평균 ${it.avg_score})`:''} · ${it.attempt_count||'-'}회 시도`,
      achievement_code: it.achievement_code, _kind:'weak'
    }));
  });
  (w.noData||[]).forEach(x => all.push({
    user_id: uidOf(x), name: nameOf(x), severity:'low',
    reason:'학습 데이터 없음', _kind:'noData'
  }));
  return { all, summary, raw: w };
}

VIEWS['t-home'] = async function(root){
  root.innerHTML = tplLoading(4);
  const cid = await resolveClassId();
  const [dash, warnings, daily] = await Promise.all([
    apiGet('/api/lrs/dashboard'),
    apiGet('/api/lrs/warnings/' + encodeURIComponent(cid)),
    apiGet('/api/lrs/stats/daily')
  ]);

  const stats = (dash && dash.stats) || {};
  const wf = flattenWarnings(warnings);
  const warns = wf.all;
  const summary = wf.summary;

  const drowsRaw = (daily && daily.data) || [];
  let wSum = 0, wCnt = 0;

    if (s > 0 && c > 0){ wSum += s*c; wCnt += c; }
  });
  const avgScore = wCnt ? Math.round((wSum/wCnt)*10)/10 : 0;

  const totalActs = stats.totalActivities || 0;

      ${kpiCard('경고 학생',      warnCount,     '건', {dir:warnCount?'down':'flat', text:`미접속 ${summary.inactiveCount||0}·연속오답 ${summary.wrongCount||0}·약점 ${summary.weakCount||0}`}, warnCount?'danger':'primary')}

    mkChart(document.getElementById('tHomeDaily'),'bar',{

      `<header><h2>일별 학급 활동량</h2></header>` + tplEmpty();
  }

  if (!warns.length){
    warnListEl.innerHTML = tplEmpty('현재 경고 학생이 없어요');

      const name = w.name || ('학생 #'+(w.user_id||'?'));

    labels: codes.map(c => codeToLabel[c]),

// 관리자 views 공통: period 파라미터 붙여 호출 (apiGet은 state.period 자동 부착)
async function adminFetchWithPeriod(path, period){
  try {
    const params = new URLSearchParams();
    if (period) params.set('period', period);
    if (_shouldAttachScope(path)){
      const sc = state.scope || computeScope();
      if (sc) params.set('scope', sc);
    }
    const qs = params.toString();
    const r = await fetch(path + (qs?'?'+qs:''), { credentials:'include' });
    if (!r.ok) return null;
    return await r.json();
  } catch(_){ return null; }
}

/* ---- 홈 공용: DoD(어제 대비 오늘) 미니 위젯 ---- */
async function renderDodMini(root){
  try {
    const dd = await apiGet('/api/lrs/stats/daily-snapshot');
    if (!dd || !dd.success) return;
    const t = dd.today || {};
    const y = dd.yesterday || {};
    const deltaActs = (Number(t.totalActs)||0) - (Number(y.totalActs)||0);
    const deltaUsers = (Number(t.uniqueUsers)||0) - (Number(y.uniqueUsers)||0);
    const deltaDur = (Number(t.durationMin)||0) - (Number(y.durationMin)||0);
    const colorOf = v => (v>=0?'var(--lrs-success, #10b981)':'var(--lrs-danger, #ef4444)');
    const arrow = v => (v>0?'▲':(v<0?'▼':'■'));
    const html = `
      <section class="dc-dod-mini" aria-label="어제 대비 오늘 요약"
        style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding:12px 14px;background:var(--gray-50);border-radius:8px;border:1px solid var(--gray-100);">
        <div style="min-width:140px;">
          <span class="label" style="font-size:var(--fs-cap);color:var(--gray-500);">오늘 활동</span>
          <strong style="font-size:var(--fs-h2);display:block;">${(Number(t.totalActs)||0).toLocaleString()}건</strong>
          <span style="font-size:var(--fs-sm);color:${colorOf(deltaActs)};">${arrow(deltaActs)} 어제 대비 ${deltaActs>=0?'+':''}${deltaActs}</span>
        </div>
        <div style="min-width:140px;">
          <span class="label" style="font-size:var(--fs-cap);color:var(--gray-500);">활성 사용자</span>
          <strong style="font-size:var(--fs-h2);display:block;">${(Number(t.uniqueUsers)||0).toLocaleString()}명</strong>
          <span style="font-size:var(--fs-sm);color:${colorOf(deltaUsers)};">${arrow(deltaUsers)} 어제 ${(Number(y.uniqueUsers)||0)}명 → ${deltaUsers>=0?'+':''}${deltaUsers}</span>
        </div>
        <div style="min-width:140px;">
          <span class="label" style="font-size:var(--fs-cap);color:var(--gray-500);">학습시간</span>
          <strong style="font-size:var(--fs-h2);display:block;">${(Number(t.durationMin)||0).toLocaleString()}분</strong>
          <span style="font-size:var(--fs-sm);color:${colorOf(deltaDur)};">${arrow(deltaDur)} 어제 대비 ${deltaDur>=0?'+':''}${deltaDur}분</span>
        </div>
      </section>`;
    root.insertAdjacentHTML('afterbegin', html);
  } catch(e) { console.warn('[LRS] DoD mini 렌더 실패', e); }
}

/* =====================================================================
 * D. a-compare — 지역·학교급 세분화 비교 (덤벨 + 바)
 * ===================================================================== */
// Phase 2: adminFetchWithPeriod('/api/stats/period-compare', {periodA, periodB, level, region}) 연결 예정
function _mockCompareCells(periodA, periodB, filters){
  const rng = _mulberry32(42 + (filters.level?filters.level.length:0));
  const cells = [];
  const regions = filters.region ? [filters.region] : CB_REGIONS;
  const levels  = filters.level  ? [filters.level]  : CB_SCHOOL_LEVELS;
  regions.forEach(r => levels.forEach(lv => {
    const nA = Math.round(400 + rng()*5000);
    const nB = Math.round(400 + rng()*5000);
    const vA = Math.round((55+rng()*18)*10)/10;
    const vB = Math.round((55+rng()*18)*10)/10;
    cells.push({ region:r, level:lv, nA, nB, vA, vB, delta: vB-vA, ci:Math.round(rng()*8)/10 });
  }));
  return cells;
}

VIEWS['a-compare'] = async function(root){
  root.innerHTML = tplLoading(2);

  state._aCmpPeriodA = state._aCmpPeriodA || '30d';
  state._aCmpPeriodB = state._aCmpPeriodB || '90d';
  state._aCmpLevel   = state._aCmpLevel   || '';
  state._aCmpRegion  = state._aCmpRegion  || '';

  const filterBar = `
    <section class="dc-filter-bar" aria-label="비교 필터" style="margin-bottom:12px;">
      <label>기간 A
        <select id="aCmpA">
          ${['7d','30d','90d'].map(p=>`<option value="${p}" ${state._aCmpPeriodA===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </label>
      <label style="margin-left:8px;">기간 B
        <select id="aCmpB">
          ${['7d','30d','90d'].map(p=>`<option value="${p}" ${state._aCmpPeriodB===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </label>
      <label style="margin-left:12px;">학교급
        <select id="aCmpLevel"><option value="">전체</option>${CB_SCHOOL_LEVELS.map(l=>`<option value="${escapeAttr(l)}" ${state._aCmpLevel===l?'selected':''}>${escapeHtml(l)}</option>`).join('')}</select>
      </label>
      <label style="margin-left:8px;">지역
        <select id="aCmpRegion"><option value="">전체</option>${CB_REGIONS.map(r=>`<option value="${escapeAttr(r)}" ${state._aCmpRegion===r?'selected':''}>${escapeHtml(r)}</option>`).join('')}</select>
      </label>
    </section>`;
  root.innerHTML = filterBar + '<div id="aCmpBody"></div>';
  const rerender = () => VIEWS['a-compare'](root);
  document.getElementById('aCmpA').onchange = e => { state._aCmpPeriodA = e.target.value; rerender(); };
  document.getElementById('aCmpB').onchange = e => { state._aCmpPeriodB = e.target.value; rerender(); };
  document.getElementById('aCmpLevel').onchange = e => { state._aCmpLevel = e.target.value; rerender(); };
  document.getElementById('aCmpRegion').onchange = e => { state._aCmpRegion = e.target.value; rerender(); };

  const body = document.getElementById('aCmpBody');
  // 실 API 우선, pairs<5면 mock fallback
  let cells = null;
  try {
    const days = state._aCmpPeriodB==='7d'?7:state._aCmpPeriodB==='90d'?90:30;
    const qs = new URLSearchParams({ days: String(days) });
    if (state._aCmpLevel) qs.set('level', state._aCmpLevel);
    if (state._aCmpRegion) qs.set('region', state._aCmpRegion);
    const r = await fetch('/api/lrs/stats/period-compare?' + qs.toString(), { credentials:'include' });
    if (r.ok) {
      const d = await r.json();
      if (d && d.success && Array.isArray(d.pairs) && d.pairs.length >= 5) {
        cells = d.pairs.map(p => ({
          region: (p.label||'').split(' ')[0] || '미분류',
          level:  state._aCmpLevel || '전체',
          nA: p.previous.activeUsers*10, nB: p.current.activeUsers*10,
          vA: p.previous.acts, vB: p.current.acts,
          delta: p.current.acts - p.previous.acts,
          ci: 0.5
        }));
      }
    }
  } catch(_){}
  if (!cells) cells = _mockCompareCells(state._aCmpPeriodA, state._aCmpPeriodB, { level:state._aCmpLevel, region:state._aCmpRegion });

  // 게이트: 양 기간 모두 n≥20 (test-hook으로 전체 n 주입 가능)
  const forceN = Number(_adminTestHook('aCmpN'));
  if (!isNaN(forceN) && forceN>0) { cells.forEach(c => { c.nA = forceN; c.nB = forceN; }); }
  const minN = cells.reduce((m,c)=> Math.min(m, c.nA, c.nB), Infinity);
  if (!_minSampleGuard(body, minN, 20, '기간 A/B 최소 표본')) return;

  // 덤벨차트용 정렬 (|delta| 큰 순)

      ${kpiCard('평균 변화', (cells.reduce((s,c)=>s+c.delta,0)/cells.length).toFixed(2), '점', {dir:'flat',text:'B-A'}, 'warning')}
      ${kpiCard('A기간', state._aCmpPeriodA, '', {dir:'flat',text:''}, 'primary')}
      ${kpiCard('B기간', state._aCmpPeriodB, '', {dir:'flat',text:''}, 'success')}
    </section>

      <div class="dc-dumbbell-legend">
        <span><span class="swatch" style="background:#94a3b8;"></span>A기간</span>
        <span><span class="swatch" style="background:#2563eb;"></span>B기간</span>
      </div>
      <div class="chart-body" style="height:${Math.max(320, sorted.length*22)}px;"><canvas id="aCmpDumbbell" role="img" aria-label="덤벨차트"></canvas></div>
    </section>
    <section class="dc-chart-wrapper">
      <header><h2>학교급별 평균 비교 (바차트)</h2></header>
      <div class="chart-body"><canvas id="aCmpBar" role="img" aria-label="학교급별 비교 바차트"></canvas></div>
    </section>`;

  // 덤벨차트: 수평 라인 + A(회색)·B(파랑) 포인트
  const labels = sorted.map(c => `${c.region.replace('교육지원청','')} · ${c.level}`);
  mkChart(document.getElementById('aCmpDumbbell'),'bar',{
    labels,
    datasets:[
      // A~B 범위를 floating bar로 그려 '라인' 역할
      { label:'변화 범위', data: sorted.map(c => [Math.min(c.vA,c.vB), Math.max(c.vA,c.vB)]),
        backgroundColor:'rgba(148,163,184,.35)', borderColor:'#cbd5e1', borderWidth:1, barPercentage:.25, borderSkipped:false },
      { label:`A기간 (${state._aCmpPeriodA})`, type:'line', data: sorted.map(c=>c.vA),
        pointBackgroundColor:'#94a3b8', pointBorderColor:'#64748b', pointRadius:6, showLine:false },
      { label:`B기간 (${state._aCmpPeriodB})`, type:'line', data: sorted.map(c=>c.vB),
        pointBackgroundColor:'#2563eb', pointBorderColor:'#1d4ed8', pointRadius:6, showLine:false }
    ]
  }, { indexAxis:'y', scales:{ x:{ min:40, max:90, title:{display:true,text:'실행지수'} } },

       } } } } });

  // 바차트: 학교급별 평균 비교
  const levelAgg = CB_SCHOOL_LEVELS.map(lv => {
    const sub = cells.filter(c => c.level === lv);
    const nA = sub.reduce((s,c)=>s+c.nA,0), nB = sub.reduce((s,c)=>s+c.nB,0);
    return {
      lv,
      a: nA ? sub.reduce((s,c)=>s+c.vA*c.nA,0)/nA : 0,
      b: nB ? sub.reduce((s,c)=>s+c.vB*c.nB,0)/nB : 0

/* legacy a-compare (api 연결 경로, 사용 안 함) --- 보존용 주석 처리 */
VIEWS['__a-compare-legacy'] = async function(root){
  root.innerHTML = tplLoading(2);
  const periodA = state.period === 'custom' ? '30d' : state.period;
  const periodB = periodA === '7d' ? '30d' : (periodA === '30d' ? '90d' : '90d');

  // daily / by-service 를 각 period로 2번 호출
  async function fetchPack(period){
    const [daily, svc, dash] = await Promise.all([
      adminFetchWithPeriod('/api/lrs/stats/daily', period),
      adminFetchWithPeriod('/api/lrs/stats/by-service', period),
      adminFetchWithPeriod('/api/lrs/dashboard', period)
    ]);
    return {
      daily: (daily && daily.data) || [],
      svc:   (svc && (svc.stats||svc.data)) || [],
      stats: (dash && dash.stats) || {}
    };
  }
  const [packA, packB] = await Promise.all([fetchPack(periodA), fetchPack(periodB)]);

  function aggregate(pack){
    const totalActivities = pack.daily.reduce((s,r)=>s+(Number(r.count)||0),0);
    const totalDurationSec = pack.daily.reduce((s,r)=>s+(Number(r.total_duration_sec)||0),0);
    let ws=0, wc=0;
    pack.daily.forEach(r => { if (r.avg_score != null && r.count){ ws += Number(r.avg_score)*Number(r.count); wc += Number(r.count); } });
    const avgScore = wc ? ws/wc : 0;
    const activeUsers = pack.daily.reduce((m,r)=>Math.max(m, Number(r.users)||0), 0);
    return { totalActivities, totalDurationSec, avgScore, activeUsers };
  }
  const aggA = aggregate(packA);
  const aggB = aggregate(packB);

  // 전체 로그 기간(최소~최대 stat_date) 확인 → 짧으면 배너 노출
  const allDates = [...packA.daily, ...packB.daily]
    .map(r => (r.stat_date||'').slice(0,10))
    .filter(Boolean)
    .sort();
  const minD = allDates[0] || null;
  const maxD = allDates[allDates.length-1] || null;
  let dataDays = 0;
  if (minD && maxD){
    const ms = new Date(maxD).getTime() - new Date(minD).getTime();
    dataDays = Math.max(1, Math.round(ms/86400000) + 1);
  }
  const SHORT_THRESHOLD = 14; // 2주 미만이면 A/B 비교 유의미성 낮음
  const shortData = dataDays > 0 && dataDays < SHORT_THRESHOLD;

  function delta(a,b){
    if (!b) return { dir:'flat', text:'-' };
    // 값이 동일하면 데이터 부족 힌트
    if (a === b){
      return { dir:'flat', text: shortData ? '동일(데이터 기간 부족)' : '동일' };
    }
    const pct = ((a-b)/b)*100;
    const dir = pct>0.5?'up':pct<-0.5?'down':'flat';
    const arrow = dir==='up'?'▲':dir==='down'?'▼':'·';
    return { dir, text: arrow + ' ' + (pct>=0?'+':'') + pct.toFixed(1) + '%' };
  }

  const shortBanner = shortData ? `
    <div class="dc-state-panel warning" role="status" style="border-left:4px solid var(--lrs-warning, #f59e0b);background:rgba(245,158,11,.08);">
      <i class="fas fa-circle-info" aria-hidden="true"></i>
      <p>현재 수집된 로그 기간이 짧아 A/B 비교가 유의미하지 않을 수 있습니다. (수집 범위: ${escapeHtml(minD)} ~ ${escapeHtml(maxD)}, ${dataDays}일)</p>
    </div>` : '';

  root.innerHTML = `
    ${shortBanner}
    <section class="dc-chart-wrapper">
      <header>
        <h2>기간 비교</h2>
        <div class="subtitle">A기간: <strong>${escapeHtml(periodA)}</strong> · B기간: <strong>${escapeHtml(periodB)}</strong></div>
      </header>
      <div class="dc-kpi-grid">
        ${kpiCard('총 활동(A기간)', aggA.totalActivities.toLocaleString(), '건', delta(aggA.totalActivities, aggB.totalActivities), 'primary')}
        ${kpiCard('총 활동(B기간)', aggB.totalActivities.toLocaleString(), '건', {dir:'flat',text:'기준'}, 'primary')}
        ${kpiCard('학습시간(A기간)', Math.round(aggA.totalDurationSec/3600).toLocaleString(), '시간', delta(aggA.totalDurationSec, aggB.totalDurationSec), 'success')}
        ${kpiCard('학습시간(B기간)', Math.round(aggB.totalDurationSec/3600).toLocaleString(), '시간', {dir:'flat',text:'기준'}, 'success')}
      </div>
      <div class="dc-kpi-grid">
        ${kpiCard('활성 사용자(A기간)', aggA.activeUsers.toLocaleString(), '명', delta(aggA.activeUsers, aggB.activeUsers), 'primary')}
        ${kpiCard('활성 사용자(B기간)', aggB.activeUsers.toLocaleString(), '명', {dir:'flat',text:'기준'}, 'primary')}
        ${kpiCard('평균 성취(A기간)', aggA.avgScore.toFixed(1), '점', delta(aggA.avgScore, aggB.avgScore), 'warning')}
        ${kpiCard('평균 성취(B기간)', aggB.avgScore.toFixed(1), '점', {dir:'flat',text:'기준'}, 'warning')}
      </div>
    </section>

    <section class="dc-chart-wrapper">
      <header><h2>일별 활동량 비교 (정규화: 1일차..N일차)</h2></header>
      <div class="chart-body"><canvas id="aCmp" role="img" aria-label="기간 비교 라인 차트"></canvas></div>
    </section>

    <section class="dc-chart-wrapper">
      <header><h2>서비스별 비교 (A기간 vs B기간)</h2></header>
      <div class="chart-body"><canvas id="aCmpSvc" role="img" aria-label="서비스별 비교 스택바"></canvas></div>
    </section>`;

  // 일별 라인 (Day 1..N 정규화)
  const maxLen = Math.max(packA.daily.length, packB.daily.length);
  if (maxLen) {
    mkChart(document.getElementById('aCmp'),'line',{
      labels: Array.from({length:maxLen},(_,i)=>`${i+1}일차`),
      datasets:[
        { label:`A기간 (${periodA})`, data:packA.daily.map(r=>Number(r.count)||0), borderColor:'var(--chart-1)', backgroundColor:'rgba(37,99,235,.1)', tension:.3, fill:false },
        { label:`B기간 (${periodB})`, data:packB.daily.map(r=>Number(r.count)||0), borderColor:'var(--chart-5)', tension:.3, fill:false, borderDash:[6,4] }
      ]
    });
  } else {
    document.getElementById('aCmp').closest('.dc-chart-wrapper').innerHTML = `<header><h2>일별 활동량 비교</h2></header>` + tplEmpty();
  }

  // 서비스별 스택바 (A vs B): 서비스 라벨 merge
  const _svcKey = r => pickLabel(r, ['service_label','service','source_service','service_key','service_name'], '(미분류)');
  const svcLabels = Array.from(new Set([
    ...packA.svc.map(_svcKey),
    ...packB.svc.map(_svcKey)
  ]));
  if (svcLabels.length) {
    const mapA = Object.fromEntries(packA.svc.map(r=>[_svcKey(r), Number(r.count)||0]));
    const mapB = Object.fromEntries(packB.svc.map(r=>[_svcKey(r), Number(r.count)||0]));
    mkChart(document.getElementById('aCmpSvc'),'bar',{

        { label:`B기간 (${periodB})`, data: svcLabels.map(s=>mapB[s]||0), backgroundColor:'var(--chart-5)' }
      ]
    }, { scales:{ x:{ stacked:false }, y:{ stacked:false } } });
  } else {
    document.getElementById('aCmpSvc').closest('.dc-chart-wrapper').innerHTML = `<header><h2>서비스별 비교</h2></header>` + tplEmpty();
  }
};

function setRole(role){
  const allowed = state.me && state.me.role === 'admin' ? ['student','teacher','admin']
                 : state.me && state.me.role === 'teacher' ? ['student','teacher']
                 : ['student'];
  if (!allowed.includes(role)) role = allowed[allowed.length-1];
  state.role = role;
  state.scope = computeScope();
  // 이전 역할의 view id가 남아 있으면 새 역할 랜딩 뷰 전환 판정이 어긋나므로 리셋
  state.view = null;

  document.querySelectorAll('.dc-role-switcher button').forEach(b=>{
    const r = b.dataset.role;
    b.setAttribute('aria-pressed', r===role ? 'true':'false');
    b.disabled = !allowed.includes(r);
    if (!allowed.includes(r)) {
      b.title = '이 계정에는 해당 역할 보기 권한이 없습니다';
      b.setAttribute('aria-disabled','true');
    } else {
      b.removeAttribute('title');
      b.removeAttribute('aria-disabled');
    }
  });

  // 역할 전환 시 현재 카테고리가 해당 역할에서 지원되지 않으면 home으로 되돌림
  if (!ROLE_CATEGORIES[role].includes(state.category || 'home')) {
    state.category = 'home';
  }
  renderSideMenu(state.category || 'home');
  const firstId = defaultViewForCategory(role, state.category || 'home') || MENUS[role][0].id;
  setView(firstId);
}

function renderSideMenu(cat){
  const useCat = cat || state.category || 'home';
  state.category = useCat;
  const aside = document.querySelector('.lrs-sidemenu');
  const allItems = MENUS[state.role] || [];
  // 홈 카테고리: 사이드바 전체 숨김 (빈 pill 금지)
  if (useCat === 'home'){
    if (aside) aside.setAttribute('data-hidden', 'true');
    const m = document.getElementById('roleMenu'); if (m) m.innerHTML = '';
    document.getElementById('bcRole').textContent =
      state.role==='student'?'학생':state.role==='teacher'?'교사':'관리자';
    return;
  }
  if (aside) aside.setAttribute('data-hidden', 'false');

  const items = allItems.filter(it => it.category === useCat);
  document.getElementById('roleMenuTitle').textContent = MENU_LABELS[useCat] || '메뉴';

  // group 필드로 묶어 헤더 삽입
  const groups = [];
  const seen = new Map();
  items.forEach(it => {
    const g = it.group || '기타';
    if (!seen.has(g)){ seen.set(g, groups.length); groups.push({ name:g, items:[] }); }
    groups[seen.get(g)].items.push(it);
  });
  const catLabel = MENU_LABELS[useCat] || '';
  document.getElementById('roleMenu').innerHTML = groups.map(g => `
    <div class="dc-sidemenu-group">
      ${(groups.length>1 && g.name !== catLabel) ? `<div class="dc-sidemenu-group-title">${escapeHtml(g.name)}</div>` : ''}
      ${g.items.map(it=>`
        <button class="menu-item" type="button" data-view="${escapeAttr(it.id)}"
          ${state.view===it.id?'aria-current="page"':''}
          aria-label="${escapeAttr(it.label)}로 이동">
          <i class="fas ${escapeAttr(it.icon)}" aria-hidden="true"></i><span class="label">${escapeHtml(it.label)}</span>
        </button>`).join('')}
    </div>`).join('');
  document.getElementById('roleMenu').querySelectorAll('button').forEach(b=>{
    b.onclick = ()=> setView(b.dataset.view);
  });
  document.getElementById('bcRole').textContent =
    state.role==='student'?'학생':state.role==='teacher'?'교사':'관리자';
}

async function setView(id){
  state.view = id;
  const items = MENUS[state.role] || [];
  const cur = items.find(it=>it.id===id);
  document.getElementById('bcPage').textContent = cur ? cur.label : '—';
  const menuKey = viewToMenu(id);
  state.category = menuKey || state.category || 'home';
  const bcMenuEl = document.getElementById('bcMenu');
  // 브레드크럼: 홈 카테고리면 "역할 > 홈" 3단, 그 외 4단
  const isHome = state.category === 'home';
  if (bcMenuEl) {
    if (isHome) {
      bcMenuEl.textContent = '';
      bcMenuEl.setAttribute('hidden','');
      // 홈에서는 bcPage만 "홈"으로
      document.getElementById('bcPage').textContent = '홈';
    } else {
      bcMenuEl.removeAttribute('hidden');
      bcMenuEl.textContent = MENU_LABELS[state.category] || '—';
    }
  }
  renderSideMenu(state.category);
  // URL 동기화: hash + ?menu= 둘 다 갱신
  try {
    const url = new URL(location.href);
    url.hash = id;
    if (menuKey) url.searchParams.set('menu', menuKey);
    const next = url.pathname + url.search + url.hash;
    const curr = location.pathname + location.search + location.hash;
    if (next !== curr) {
      history.replaceState(null, '', next);
      try { window.dispatchEvent(new CustomEvent('dacheum:menu-changed', { detail: { menu: menuKey, view: id } })); } catch(_){}
    }
  } catch(_) {
    if (('#'+id) !== location.hash) { try { location.hash = id; } catch(__){} }
  }

  destroyCharts();
  const root = document.getElementById('viewRoot');
  // 클릭 즉시 로딩 표시가 보이도록 프레임 양보 없이 바로 갱신
  root.innerHTML = tplLoading(3);
  try {
    const fn = VIEWS[id] || (r => { r.innerHTML = tplEmpty('준비 중인 화면입니다'); });
    await fn(root);
  } catch (e) {
    console.error('[LRS] 뷰 렌더 실패', e);
    root.innerHTML = tplError(e.message, ()=>setView(id));
  }
  document.getElementById('syncTime').textContent = '동기화: ' + new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
}

function bindPeriodPicker(){
  const root = document.getElementById('periodPicker');
  root.querySelectorAll('button[data-period]').forEach(btn => {
    btn.onclick = () => {
      const p = btn.dataset.period;
      root.querySelectorAll('button[data-period]').forEach(b=>b.setAttribute('aria-pressed', b===btn?'true':'false'));
      document.getElementById('customRange').hidden = (p !== 'custom');
      state.period = p;
      if (p !== 'custom' && state.view) setView(state.view);
    };
  });
  document.getElementById('applyCustom').onclick = () => {
    state.from = document.getElementById('rangeFrom').value || null;
    state.to   = document.getElementById('rangeTo').value || null;
    if (state.view) setView(state.view);
  };
}

  closeDrawer(){
    document.getElementById('drawerOverlay').setAttribute('data-open','false');
    const d = document.getElementById('drilldownDrawer');
    d.setAttribute('data-open','false');
    d.setAttribute('aria-hidden','true');
  },
  /* 교사 실액션 딥링크 (UI-P0-1) */
  teacherAction(kind, uid, code){
    if (!uid){
      alert('학생 ID를 확인할 수 없습니다.');
      return;
    }
    const classId = state.classId || (state.me && (state.me.class_id || state.me.classId)) || '';
    const cp = (k,v) => (v?('&'+k+'='+encodeURIComponent(v)):'');
    const classQ = classId ? ('classId='+encodeURIComponent(classId)) : '';
    const sid = encodeURIComponent(uid);
    if (kind === 'message'){
      location.href = '/class/class-home.html?' + classQ + '&tab=message&to=' + sid;
    } else if (kind === 'homework' || kind === 'assign'){
      location.href = '/class/class-home.html?' + classQ + '&tab=homework&new=1&to=' + sid;
    } else if (kind === 'recommend'){
      location.href = '/self-learn/?user_id=' + sid + cp('achievement_code', code||'');
    } else {
      console.warn('[LRS] unknown teacherAction:', kind);
    }
  },
  exportData(fmt, scope){
    const extra = { format: fmt };
    if (scope) extra.scope = scope;
    const qs = rangeQS(extra);
    // 다운로드 이력 LocalStorage 기록 (a-export 뷰에서 사용)
    try {
      const hist = JSON.parse(localStorage.getItem('lrs_export_hist')||'[]');
      hist.unshift({ fmt, scope: scope||'all', at: new Date().toISOString(), period: state.period });
      localStorage.setItem('lrs_export_hist', JSON.stringify(hist.slice(0,10)));
    } catch(_){}
    window.location.href = '/api/lrs/export' + qs;
  }
};

/* =====================================================================
 * 부트스트랩
 * ===================================================================== */
async function boot(){
  let me = null;
  try {
    const r = await fetch('/api/auth/me', { credentials:'include' });
    if (r.ok) me = await r.json();
  } catch(_) {}
  // /api/auth/me returns {success, user:{...}}; older code expected flat
  const user = (me && me.user) ? me.user : me;
  if (!user || !user.id) { location.href = '/login.html'; return; }
  state.me = user;

  document.getElementById('lrsRoot').hidden = false;

  document.querySelectorAll('.dc-role-switcher button').forEach(b=>{
    b.onclick = ()=> {
      const r = b.dataset.role;
      if (!r) return;
      if (state.role === r) return; // 같은 역할이면 무시
      setRole(r);
    };
  });

  bindPeriodPicker();

  // 쿼리/해시 기반 초기 뷰
  const urlParams = new URLSearchParams(location.search);
  let menuParam = urlParams.get('menu');
  const hash = (location.hash||'').replace('#','');

  // 레거시 URL 정규화: 구 뷰 키(usage/achieve/...) 또는 구 뷰 id(a-usage, t-warnings...)를 카테고리로 보정
  let legacyHashOverride = null;
  if (menuParam && !MENU_TO_VIEW[menuParam] && LEGACY_MENU_TO_CATEGORY[menuParam]) {
    const mappedCat = LEGACY_MENU_TO_CATEGORY[menuParam];
    // 구 뷰 id였다면 해당 뷰로 진입, 카테고리 키였다면 카테고리 기본 뷰로 진입
    if (VIEWS[menuParam] && !location.hash) {
      legacyHashOverride = menuParam;
      try { history.replaceState(null, '', '/lrs/index.html?menu=' + mappedCat + '#' + menuParam); } catch(_) {}
    } else {
      try { history.replaceState(null, '', '/lrs/index.html?menu=' + mappedCat); } catch(_) {}
    }
    menuParam = mappedCat;
    urlParams.set('menu', mappedCat);
  }

  // 초기 역할 결정: 해시 prefix 우선, 없으면 user.role
  const roleByHash = hash.startsWith('s-')?'student':hash.startsWith('t-')?'teacher':hash.startsWith('a-')?'admin':null;
  const initialRole = roleByHash || (user.role==='admin'?'admin':user.role==='teacher'?'teacher':'student');

  // ?menu= 우선 결정 — setRole의 기본 setView와 레이스 방지를 위해 한 번만 setView 호출
  let overrideViewId = null;
  let denied403Menu = null;
  if (legacyHashOverride && VIEWS[legacyHashOverride]) {
    overrideViewId = legacyHashOverride;
  } else if (hash && VIEWS[hash]) {
    // 사용자 지정 hash가 있으면 최우선 (카테고리 default 무시)
    overrideViewId = hash;
  } else if (menuParam && MENU_TO_VIEW[menuParam]) {
    // 역할 권한 확정 (setRole의 허용 로직 복제)
    const allowed = user.role === 'admin' ? ['student','teacher','admin']
                  : user.role === 'teacher' ? ['student','teacher']
                  : ['student'];
    const effRole = allowed.includes(initialRole) ? initialRole : allowed[allowed.length-1];
    overrideViewId = MENU_TO_VIEW[menuParam][effRole];
    if (!overrideViewId) {
      // 권한 없는 메뉴(예: 학생이 ?menu=teacher) → 홈으로 안내 + 배너
      denied403Menu = menuParam;
      overrideViewId = MENU_TO_VIEW.home[effRole];
    }
    if (overrideViewId && !VIEWS[overrideViewId]) overrideViewId = null;
  } else if (hash && VIEWS[hash]) {
    overrideViewId = hash;
  }

  if (overrideViewId) {
    // setRole이 내부적으로 setView(MENUS[role][0])을 부르지 않도록 수동 처리
    const allowed = user.role === 'admin' ? ['student','teacher','admin']
                  : user.role === 'teacher' ? ['student','teacher']
                  : ['student'];
    const effRole = allowed.includes(initialRole) ? initialRole : allowed[allowed.length-1];
    state.role = effRole;
    state.scope = computeScope();
    state.view = null;
    document.querySelectorAll('.dc-role-switcher button').forEach(b=>{
      const r = b.dataset.role;
      b.setAttribute('aria-pressed', r===effRole ? 'true':'false');
      b.disabled = !allowed.includes(r);
      if (!allowed.includes(r)) {
        b.title = '이 계정에는 해당 역할 보기 권한이 없습니다';
        b.setAttribute('aria-disabled','true');
      } else {
        b.removeAttribute('title');
        b.removeAttribute('aria-disabled');
      }
    });
    renderSideMenu();
    await setView(overrideViewId);
  } else {
    setRole(initialRole);
  }

  // 권한 없는 ?menu= 접근 시 인라인 403 배너
  if (denied403Menu) {
    try {
      const banner = document.createElement('div');
      banner.className = 'dc-state-panel';
      banner.setAttribute('role','alert');
      banner.style.cssText = 'background:#FFF3CD;color:var(--gray-800);margin:12px 0;padding:12px 16px;border-radius:8px;border-left:4px solid #F59E0B;';
      banner.innerHTML = '<strong>접근 권한 없음:</strong> 요청하신 "'
        + escapeHtml(MENU_LABELS[denied403Menu]||denied403Menu)
        + '" 메뉴는 현재 역할에서 이용할 수 없습니다. 홈 화면으로 이동했습니다.';
      const rootEl = document.getElementById('viewRoot');
      if (rootEl) rootEl.insertBefore(banner, rootEl.firstChild);
      setTimeout(()=>{ try{ banner.remove(); }catch(_){} }, 6000);
    } catch(_){}
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') LRS.closeDrawer(); });
  const closeBtn = document.getElementById('drawerCloseBtn');
  if (closeBtn) closeBtn.addEventListener('click', LRS.closeDrawer);
}

boot();
})();
</script>
