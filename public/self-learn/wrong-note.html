<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다채움 - 오답노트</title>
  <link rel="stylesheet" href="/css/common-nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #4A7CFF; --primary-light: #E8F0FF; --primary-dark: #3A5FCC;
      --accent: #FF6B6B; --accent-light: #FFE8E8;
      --secondary: #7C4DFF; --secondary-light: #EDE7FF;
      --success: #00C48C; --success-light: #E0FFF5;
      --warning: #FFB800; --warning-light: #FFF8E0;
      --gray-50: #F8FAFC; --gray-100: #F1F5F9; --gray-200: #E2E8F0; --gray-300: #CBD5E1;
      --gray-400: #94A3B8; --gray-500: #64748B; --gray-600: #475569; --gray-700: #334155; --gray-800: #1E293B;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px; --radius-xl: 24px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard','Noto Sans KR',system-ui,sans-serif; background: linear-gradient(135deg, #F0F4FF 0%, #FAFBFF 100%); color: var(--gray-800); min-height: 100vh; }

    .app-layout { display: flex; min-height: calc(100vh - 60px); }
    .sidebar-nav { width: 220px; background: #fff; border-right: 1px solid var(--gray-200); padding: 20px 0; flex-shrink: 0; }
    .sidebar-menu { list-style: none; }
    .sidebar-menu li { padding: 10px 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--gray-600); transition: all .15s; text-decoration: none; }
    .sidebar-menu li:hover { background: var(--gray-50); }
    .sidebar-menu li.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-right: 3px solid var(--primary); }
    .sidebar-menu li i { width: 18px; text-align: center; }
    .sidebar-menu a { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px; width: 100%; }
    .main-content { flex: 1; padding: 24px; max-width: 1800px; }

    /* Page Header */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .page-header p { font-size: 14px; color: var(--gray-500); margin-top: 4px; }

    /* Tabs */
    .tab-bar { display: flex; gap: 4px; background: var(--gray-100); border-radius: var(--radius-md); padding: 4px; margin-bottom: 24px; width: fit-content; }
    .tab-btn { padding: 8px 20px; border: none; background: none; font-size: 14px; font-weight: 500; color: var(--gray-500); cursor: pointer; border-radius: var(--radius-sm); transition: all .2s; font-family: inherit; }
    .tab-btn.active { background: #fff; color: var(--primary); box-shadow: var(--shadow-sm); font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Dashboard Cards */
    .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .dash-card { background: #fff; border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); text-align: center; }
    .dash-card .dash-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 20px; }
    .dash-card .dash-value { font-size: 28px; font-weight: 700; }
    .dash-card .dash-label { font-size: 13px; color: var(--gray-500); margin-top: 4px; }

    /* Charts Row */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .chart-card { background: #fff; border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); }
    .chart-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .chart-wrap { position: relative; height: 240px; }

    /* Filter Bar */
    .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input { padding: 8px 14px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: #fff; color: var(--gray-700); }
    .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--primary); }
    .btn { padding: 8px 16px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--gray-100); color: var(--gray-700); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #00a87a; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #e55a5a; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .filter-spacer { flex: 1; }

    /* Wrong Note Cards */
    .wrong-note-list { display: flex; flex-direction: column; gap: 16px; }
    .wn-card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; border-left: 4px solid var(--accent); transition: all .2s; }
    .wn-card.resolved { border-left-color: var(--success); }
    .wn-card:hover { box-shadow: var(--shadow-md); }
    .wn-card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; }
    .wn-card-header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .wn-status-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .wn-status-badge.unresolved { background: var(--accent-light); color: var(--accent); }
    .wn-status-badge.resolved { background: var(--success-light); color: var(--success); }
    .wn-subject-tag { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; background: var(--primary-light); color: var(--primary); white-space: nowrap; }
    .wn-question-preview { font-size: 14px; font-weight: 500; color: var(--gray-700); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .wn-card-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .wn-attempt-count { font-size: 12px; color: var(--gray-500); display: flex; align-items: center; gap: 4px; }
    .wn-expand-btn { background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: 14px; transition: transform .2s; }
    .wn-card.expanded .wn-expand-btn { transform: rotate(180deg); }
    .wn-card-body { display: none; padding: 0 20px 20px; }
    .wn-card.expanded .wn-card-body { display: block; }
    .wn-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .wn-detail-box { background: var(--gray-50); border-radius: var(--radius-md); padding: 14px; }
    .wn-detail-box.correct { background: var(--success-light); }
    .wn-detail-box.wrong { background: var(--accent-light); }
    .wn-detail-label { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; font-weight: 500; }
    .wn-detail-value { font-size: 14px; font-weight: 600; }
    .wn-question-full { background: var(--gray-50); border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px; font-size: 14px; line-height: 1.6; }
    .wn-tags-area { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .wn-tag { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; background: var(--secondary-light); color: var(--secondary); display: flex; align-items: center; gap: 4px; }
    .wn-tag .remove-tag { cursor: pointer; opacity: .7; }
    .wn-tag .remove-tag:hover { opacity: 1; }
    .wn-tag-input { padding: 4px 10px; border: 1px dashed var(--gray-300); border-radius: 12px; font-size: 11px; background: none; color: var(--gray-500); cursor: pointer; }
    .wn-tag-input:hover { border-color: var(--secondary); color: var(--secondary); }
    .wn-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .wn-retry-area { display: flex; gap: 8px; align-items: center; flex: 1; }
    .wn-retry-input { flex: 1; max-width: 300px; padding: 8px 14px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; }
    .wn-retry-input:focus { outline: none; border-color: var(--primary); }
    .wn-explanation { background: #FFF9E6; border-radius: var(--radius-md); padding: 14px; margin-top: 12px; font-size: 13px; line-height: 1.6; border-left: 3px solid var(--warning); }

    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 6px; margin-top: 24px; }
    .page-btn { width: 36px; height: 36px; border: 1px solid var(--gray-200); background: #fff; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; font-family: inherit; color: var(--gray-600); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn:hover:not(.active) { background: var(--gray-50); }

    /* Problem Sets */
    .ps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .ps-card { background: #fff; border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); transition: all .2s; cursor: pointer; border: 2px solid transparent; }
    .ps-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .ps-card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .ps-card-meta { font-size: 13px; color: var(--gray-500); display: flex; gap: 16px; margin-bottom: 12px; }
    .ps-card-meta span { display: flex; align-items: center; gap: 4px; }
    .ps-progress-bar { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .ps-progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width .3s; }
    .ps-card-footer { display: flex; justify-content: space-between; align-items: center; }
    .ps-score { font-size: 14px; font-weight: 600; color: var(--primary); }

    /* Problem Set Detail */
    .ps-detail { background: #fff; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); }
    .ps-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .ps-detail-title { font-size: 18px; font-weight: 700; }
    .ps-item-list { display: flex; flex-direction: column; gap: 12px; }
    .ps-item { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--gray-50); border-radius: var(--radius-md); }
    .ps-item-num { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-light); color: var(--primary); font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ps-item-text { flex: 1; font-size: 14px; }
    .ps-item-subject { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: var(--primary-light); color: var(--primary); }
    .ps-item-remove { background: none; border: none; color: var(--gray-400); cursor: pointer; font-size: 14px; }
    .ps-item-remove:hover { color: var(--accent); }

    /* Solving mode */
    .ps-solving { display: none; }
    .ps-solving.active { display: block; }
    .ps-solve-question { background: #fff; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
    .ps-solve-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .ps-solve-progress-bar { flex: 1; height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
    .ps-solve-progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .3s; }
    .ps-solve-progress-text { font-size: 13px; color: var(--gray-500); white-space: nowrap; }
    .ps-solve-q-text { font-size: 16px; font-weight: 500; margin-bottom: 20px; line-height: 1.6; }
    .ps-solve-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .ps-solve-option { padding: 14px 18px; border: 2px solid var(--gray-200); border-radius: var(--radius-md); cursor: pointer; font-size: 14px; transition: all .2s; }
    .ps-solve-option:hover { border-color: var(--primary); background: var(--primary-light); }
    .ps-solve-option.selected { border-color: var(--primary); background: var(--primary-light); font-weight: 600; }
    .ps-solve-input { width: 100%; padding: 12px 16px; border: 1px solid var(--gray-200); border-radius: var(--radius-md); font-size: 14px; font-family: inherit; margin-bottom: 20px; }
    .ps-solve-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: var(--radius-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--gray-100); }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 18px; color: var(--gray-400); cursor: pointer; }
    .modal-body { padding: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding: 16px 24px; border-top: 1px solid var(--gray-100); }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
    .empty-state i { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; }

    /* Tag Stats */
    .tag-stats { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-stat-item { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; background: var(--secondary-light); color: var(--secondary); display: flex; align-items: center; gap: 6px; }
    .tag-stat-count { background: var(--secondary); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 600; }

    /* Loading */
    .loading-spinner { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--gray-400); font-size: 14px; gap: 10px; }

    @media (max-width: 768px) {
      .sidebar-nav { display: none; }
      .dash-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
      .wn-detail-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .ps-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div style="max-width:1800px;margin:0 auto;padding:24px 20px;">
    <main class="main-content" style="padding:0;">
      <div class="page-header">
        <h1><i class="fas fa-eraser" style="color:var(--accent)"></i> 오답노트</h1>
        <p>틀린 문제를 분석하고 다시 도전하여 실력을 키워보세요</p>
      </div>

      <!-- Tabs (역할에 따라 동적 생성) -->
      <div class="tab-bar" id="mainTabBar">
        <!-- JS에서 역할별 탭 생성 -->
      </div>
      <!-- 학생 탭 (숨김 처리, JS에서 전환) -->
      <div class="tab-bar student-tabs" style="display:none;">
        <button class="tab-btn active" data-tab="wrong-notes"><i class="fas fa-list"></i> 오답 목록</button>
        <button class="tab-btn" data-tab="problem-sets"><i class="fas fa-book"></i> 나의 문제집</button>
      </div>

      <!-- ========== TAB 1: 오답 목록 ========== -->
      <div id="tab-wrong-notes" class="tab-panel active">

        <!-- Dashboard Summary -->
        <div class="dash-grid" id="dashGrid">
          <div class="dash-card">
            <div class="dash-icon" style="background:var(--accent-light);color:var(--accent)"><i class="fas fa-times-circle"></i></div>
            <div class="dash-value" id="dashTotal">0</div>
            <div class="dash-label">전체 오답</div>
          </div>
          <div class="dash-card">
            <div class="dash-icon" style="background:var(--success-light);color:var(--success)"><i class="fas fa-check-circle"></i></div>
            <div class="dash-value" id="dashResolved">0</div>
            <div class="dash-label">해결 완료</div>
          </div>
          <div class="dash-card">
            <div class="dash-icon" style="background:var(--warning-light);color:var(--warning)"><i class="fas fa-redo"></i></div>
            <div class="dash-value" id="dashRetryAvg">0</div>
            <div class="dash-label">평균 재도전 횟수</div>
          </div>
          <div class="dash-card">
            <div class="dash-icon" style="background:var(--primary-light);color:var(--primary)"><i class="fas fa-percentage"></i></div>
            <div class="dash-value" id="dashResolveRate">0%</div>
            <div class="dash-label">해결률</div>
          </div>
        </div>

        <!-- Charts -->
        <div class="charts-row">
          <div class="chart-card">
            <h3><i class="fas fa-chart-pie" style="color:var(--primary)"></i> 과목별 오답 분포</h3>
            <div class="chart-wrap"><canvas id="subjectPieChart"></canvas></div>
          </div>
          <div class="chart-card">
            <h3><i class="fas fa-chart-line" style="color:var(--success)"></i> 해결 추이</h3>
            <div class="chart-wrap"><canvas id="resolutionTrendChart"></canvas></div>
          </div>
        </div>

        <!-- Tag Stats -->
        <div class="chart-card" style="margin-bottom:24px" id="tagStatsCard">
          <h3><i class="fas fa-tags" style="color:var(--secondary)"></i> 태그별 통계</h3>
          <div class="tag-stats" id="tagStatsContainer"></div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
          <select id="filterSubject">
            <option value="">전체 과목</option>
          </select>
          <select id="filterStatus">
            <option value="">전체 상태</option>
            <option value="unresolved">미해결</option>
            <option value="resolved">해결 완료</option>
          </select>
          <select id="filterSort">
            <option value="newest">최신순</option>
            <option value="oldest">오래된순</option>
            <option value="most_attempts">재도전 많은순</option>
          </select>
          <div class="filter-spacer"></div>
          <button class="btn btn-primary" onclick="openManualModal()"><i class="fas fa-plus"></i> 수동 등록</button>
        </div>

        <!-- Wrong Note List -->
        <div class="wrong-note-list" id="wrongNoteList">
          <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> 오답 목록을 불러오는 중...</div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
      </div>

      <!-- ========== TAB 2: 나의 문제집 ========== -->
      <div id="tab-problem-sets" class="tab-panel">
        <div class="filter-bar" style="margin-bottom:20px">
          <h2 style="font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px"><i class="fas fa-book" style="color:var(--secondary)"></i> 나의 문제집</h2>
          <div class="filter-spacer"></div>
          <button class="btn btn-primary" onclick="openCreatePSModal()"><i class="fas fa-plus"></i> 문제집 만들기</button>
        </div>

        <!-- Problem Set List View -->
        <div id="psListView">
          <div class="ps-grid" id="psGrid">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> 문제집을 불러오는 중...</div>
          </div>
        </div>

        <!-- Problem Set Detail View -->
        <div id="psDetailView" style="display:none">
          <div class="ps-detail" id="psDetailContent"></div>
        </div>

        <!-- Problem Set Solving View -->
        <div id="psSolvingView" class="ps-solving"></div>
      </div>
    </main>
  </div>

  <!-- Manual Wrong Note Modal -->
  <div class="modal-overlay" id="manualModal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-plus-circle"></i> 오답 수동 등록</h3>
        <button class="modal-close" onclick="closeManualModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>과목</label>
          <select id="manualSubject">
            <option value="국어">국어</option>
            <option value="수학">수학</option>
            <option value="영어">영어</option>
            <option value="사회">사회</option>
            <option value="과학">과학</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>문제</label>
          <textarea id="manualQuestion" placeholder="틀린 문제를 입력하세요"></textarea>
        </div>
        <div class="form-group">
          <label>정답</label>
          <input type="text" id="manualCorrectAnswer" placeholder="정답을 입력하세요">
        </div>
        <div class="form-group">
          <label>내가 쓴 답</label>
          <input type="text" id="manualMyAnswer" placeholder="내가 쓴 답을 입력하세요">
        </div>
        <div class="form-group">
          <label>해설 (선택)</label>
          <textarea id="manualExplanation" placeholder="해설이 있으면 입력하세요"></textarea>
        </div>
        <div class="form-group">
          <label>태그 (쉼표로 구분)</label>
          <input type="text" id="manualTags" placeholder="예: 분수, 소수, 나눗셈">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeManualModal()">취소</button>
        <button class="btn btn-primary" onclick="submitManualNote()">등록</button>
      </div>
    </div>
  </div>

  <!-- Create Problem Set Modal -->
  <div class="modal-overlay" id="createPSModal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-book-medical"></i> 문제집 만들기</h3>
        <button class="modal-close" onclick="closeCreatePSModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>문제집 이름</label>
          <input type="text" id="psTitle" placeholder="예: 수학 오답 모음">
        </div>
        <div class="form-group">
          <label>설명 (선택)</label>
          <textarea id="psDescription" placeholder="문제집에 대한 설명을 입력하세요"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreatePSModal()">취소</button>
        <button class="btn btn-primary" onclick="submitCreatePS()">만들기</button>
      </div>
    </div>
  </div>

  <!-- Tag Edit Modal -->
  <div class="modal-overlay" id="tagEditModal">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-tags"></i> 태그 수정</h3>
        <button class="modal-close" onclick="closeTagEditModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>태그 (쉼표로 구분)</label>
          <input type="text" id="tagEditInput" placeholder="예: 분수, 소수, 나눗셈">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeTagEditModal()">취소</button>
        <button class="btn btn-primary" onclick="submitTagEdit()">저장</button>
      </div>
    </div>
  </div>

  <script src="/js/common-nav.js"></script>
  <script>
    'use strict';

    let currentUser = null;
    let wrongNotes = [];
    let currentPage = 1;
    let totalPages = 1;
    let dashboardData = null;
    let problemSets = [];
    let currentPSDetail = null;
    let solvingState = null;
    let tagEditNoteId = null;

    // Charts
    let subjectPieChart = null;
    let resolutionTrendChart = null;

    // ===== Auth =====
    async function fetchWithAuth(url, options = {}) {
      const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json', ...(options.headers || {}) } });
      if (res.status === 401) { window.location.href = '/login.html'; return null; }
      return res.json();
    }

    window.addEventListener('dacheim:user-loaded', (e) => {
      currentUser = e.detail;
      initTabsByRole();
      loadDashboard();
      loadWrongNotes();
    });

    function initTabsByRole() {
      const tabBar = document.getElementById('mainTabBar');
      if (!tabBar) return;
      const isTeacher = currentUser && (currentUser.role === 'teacher' || currentUser.role === 'admin');
      if (isTeacher) {
        tabBar.innerHTML = `
          <button class="tab-btn active" data-tab="wrong-notes"><i class="fas fa-chart-bar"></i> 학급 오답 대시보드</button>
          <button class="tab-btn" data-tab="exam-analysis"><i class="fas fa-clipboard-list"></i> 평가지별 분석</button>
          <button class="tab-btn" data-tab="question-analysis"><i class="fas fa-search"></i> 문항 분석</button>
          <button class="tab-btn" data-tab="student-status"><i class="fas fa-users"></i> 학생별 현황</button>
        `;
      } else {
        tabBar.innerHTML = `
          <button class="tab-btn active" data-tab="wrong-notes"><i class="fas fa-list"></i> 오답 목록</button>
          <button class="tab-btn" data-tab="problem-sets"><i class="fas fa-book"></i> 나의 문제집</button>
        `;
      }
      // 탭 이벤트 재바인딩
      tabBar.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const tab = btn.dataset.tab;
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          const panel = document.getElementById('panel-' + tab);
          if (panel) panel.classList.add('active');
          if (tab === 'wrong-notes') { loadWrongNotes(); }
          else if (tab === 'problem-sets') { loadProblemSets(); }
          else if (tab === 'exam-analysis') { loadExamAnalysis(); }
          else if (tab === 'question-analysis') { loadQuestionAnalysis(); }
          else if (tab === 'student-status') { loadStudentStatus(); }
        });
      });
    }

    // 교사 전용 탭 로드 함수 (플레이스홀더)
    async function loadExamAnalysis() {
      let panel = document.getElementById('panel-exam-analysis');
      if (!panel) { panel = document.createElement('div'); panel.id = 'panel-exam-analysis'; panel.className = 'tab-panel active'; document.querySelector('.main-content').appendChild(panel); }
      panel.classList.add('active');
      panel.innerHTML = '<div style="text-align:center;padding:60px;color:var(--gray-400);"><i class="fas fa-clipboard-list" style="font-size:48px;margin-bottom:16px;"></i><h3>평가지별 오답 분석</h3><p style="margin-top:8px;">클래스의 평가지를 선택하면 문항별 오답률을 확인할 수 있습니다.</p></div>';
      // TODO: 실제 평가지 목록 로드
    }

    async function loadQuestionAnalysis() {
      let panel = document.getElementById('panel-question-analysis');
      if (!panel) { panel = document.createElement('div'); panel.id = 'panel-question-analysis'; panel.className = 'tab-panel active'; document.querySelector('.main-content').appendChild(panel); }
      panel.classList.add('active');
      panel.innerHTML = '<div style="text-align:center;padding:60px;color:var(--gray-400);"><i class="fas fa-search" style="font-size:48px;margin-bottom:16px;"></i><h3>문항 분석</h3><p style="margin-top:8px;">개별 문항의 오답 패턴과 난이도를 분석합니다.</p></div>';
    }

    async function loadStudentStatus() {
      let panel = document.getElementById('panel-student-status');
      if (!panel) { panel = document.createElement('div'); panel.id = 'panel-student-status'; panel.className = 'tab-panel active'; document.querySelector('.main-content').appendChild(panel); }
      panel.classList.add('active');
      try {
        const data = await fetchWithAuth('/api/self-learn/wrong-notes/teacher-dashboard');
        if (!data || !data.success) { panel.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400);">데이터를 불러올 수 없습니다.</div>'; return; }
        const students = data.students || [];
        panel.innerHTML = `
          <h3 style="margin-bottom:16px;font-size:16px;font-weight:700;"><i class="fas fa-users" style="color:var(--primary);margin-right:6px;"></i>학생별 오답 현황 (${students.length}명)</h3>
          <table style="width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);">
            <thead><tr style="background:var(--gray-50);">
              <th style="padding:12px;font-size:12px;text-align:left;">학생</th>
              <th style="padding:12px;font-size:12px;text-align:center;">전체 오답</th>
              <th style="padding:12px;font-size:12px;text-align:center;">미해결</th>
              <th style="padding:12px;font-size:12px;text-align:center;">해결률</th>
            </tr></thead>
            <tbody>
              ${students.length ? students.map(st => `<tr>
                <td style="padding:10px 12px;font-size:13px;font-weight:500;">${st.display_name || st.username}</td>
                <td style="padding:10px;text-align:center;font-size:13px;">${st.total_wrong || 0}</td>
                <td style="padding:10px;text-align:center;font-size:13px;color:var(--accent);font-weight:600;">${(st.total_wrong||0) - (st.resolved_wrong||0)}</td>
                <td style="padding:10px;text-align:center;font-size:13px;">${st.total_wrong ? Math.round(st.resolved_wrong / st.total_wrong * 100) + '%' : '-'}</td>
              </tr>`).join('') : '<tr><td colspan="4" style="padding:30px;text-align:center;color:var(--gray-400);">오답 데이터가 없습니다.</td></tr>'}
            </tbody>
          </table>
        `;
      } catch { panel.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray-400);">로드 실패</div>'; }
    }

    // ===== Tabs =====
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'problem-sets') loadProblemSets();
      });
    });

    // ===== Dashboard =====
    async function loadDashboard() {
      const isTeacher = currentUser && (currentUser.role === 'teacher' || currentUser.role === 'admin');

      if (isTeacher) {
        // 교사: 학적 기반 학급 오답 통계 (같은 학교+학년+반)
        const data = await fetchWithAuth('/api/self-learn/wrong-notes/teacher-dashboard');
        if (!data || !data.success) return;

        // 학급 정보 표시 (한번만)
        if (!document.getElementById('classInfo') && (data.schoolName || data.grade)) {
          const infoHtml = `<div id="classInfo" style="margin-bottom:16px;padding:12px 20px;background:linear-gradient(135deg,var(--primary-light),#E0F2FE);border-radius:12px;display:flex;align-items:center;gap:12px;">
            <i class="fas fa-school" style="font-size:20px;color:var(--primary);"></i>
            <div><span style="font-size:15px;font-weight:700;color:var(--gray-800);">${data.schoolName || ''} ${data.grade || ''}학년 ${data.classNumber || ''}반</span>
            <span style="font-size:12px;color:var(--gray-500);margin-left:8px;">담임교사: ${currentUser.display_name}</span></div>
          </div>`;
          document.getElementById('dashGrid').insertAdjacentHTML('beforebegin', infoHtml);
        }
        dashboardData = data;
        const students = data.students || [];
        const totalWrong = students.reduce((s, st) => s + (st.total_wrong || 0), 0);
        const totalResolved = students.reduce((s, st) => s + (st.resolved_wrong || 0), 0);

        document.getElementById('dashTotal').textContent = totalWrong;
        document.getElementById('dashResolved').textContent = totalResolved;
        document.getElementById('dashRetryAvg').textContent = students.length + '명';
        document.getElementById('dashResolveRate').textContent = totalWrong > 0 ? Math.round(totalResolved / totalWrong * 100) + '%' : '0%';

        // 카드 라벨 변경
        document.querySelectorAll('.dash-label').forEach(el => {
          if (el.textContent === '평균 재도전 횟수') el.textContent = '관리 학생';
        });

        renderSubjectChart(data.bySubject || data.by_subject || []);
        renderTrendChart(data.trend || []);
        renderTagStats(data.byTag || data.by_tag || []);
        populateSubjectFilter(data.bySubject || data.by_subject || []);
        return;
      }

      // 학생: 내 오답 통계
      const data = await fetchWithAuth('/api/self-learn/wrong-notes/dashboard');
      if (!data || !data.success) return;
      dashboardData = data;

      const total = data.total || 0;
      const resolved = data.resolved || 0;
      document.getElementById('dashTotal').textContent = total;
      document.getElementById('dashResolved').textContent = resolved;
      document.getElementById('dashRetryAvg').textContent = (data.avg_attempts || 0).toFixed(1);
      document.getElementById('dashResolveRate').textContent = total > 0 ? Math.round((resolved / total) * 100) + '%' : '0%';

      renderSubjectChart(data.bySubject || data.by_subject || []);
      renderTrendChart(data.trend || []);
      renderTagStats(data.byTag || data.by_tag || []);
      populateSubjectFilter(data.bySubject || data.by_subject || []);
    }

    function renderSubjectChart(bySubject) {
      const ctx = document.getElementById('subjectPieChart').getContext('2d');
      if (subjectPieChart) subjectPieChart.destroy();
      const labels = bySubject.map(s => s.subject || '기타');
      const values = bySubject.map(s => s.cnt || s.count || 0);
      const colors = ['#4A7CFF','#FF6B6B','#00C48C','#FFB800','#7C4DFF','#FF9F43','#54A0FF','#5F27CD'];
      subjectPieChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 12, family: 'Pretendard' }, padding: 12 } } } }
      });
    }

    function renderTrendChart(trend) {
      const ctx = document.getElementById('resolutionTrendChart').getContext('2d');
      if (resolutionTrendChart) resolutionTrendChart.destroy();
      const labels = trend.map(t => t.date || t.month || t.label || '');
      const added = trend.map(t => t.added || 0);
      const resolvedArr = trend.map(t => t.resolved || 0);
      resolutionTrendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: '추가된 오답', data: added, borderColor: '#FF6B6B', backgroundColor: 'rgba(255,107,107,.1)', fill: true, tension: .3 },
            { label: '해결된 오답', data: resolvedArr, borderColor: '#00C48C', backgroundColor: 'rgba(0,196,140,.1)', fill: true, tension: .3 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { font: { size: 12, family: 'Pretendard' } } } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });
    }

    function renderTagStats(byTag) {
      const container = document.getElementById('tagStatsContainer');
      if (!byTag.length) {
        container.innerHTML = '<span style="color:var(--gray-400);font-size:13px">등록된 태그가 없습니다</span>';
        return;
      }
      container.innerHTML = byTag.map(t =>
        `<div class="tag-stat-item"><span>${t.tag}</span><span class="tag-stat-count">${t.count}</span></div>`
      ).join('');
    }

    function populateSubjectFilter(bySubject) {
      const sel = document.getElementById('filterSubject');
      const existing = new Set([...sel.options].map(o => o.value));
      bySubject.forEach(s => {
        if (s.subject && !existing.has(s.subject)) {
          const opt = document.createElement('option');
          opt.value = s.subject;
          opt.textContent = s.subject;
          sel.appendChild(opt);
        }
      });
    }

    // ===== Wrong Notes List =====
    async function loadWrongNotes() {
      const subject = document.getElementById('filterSubject').value;
      const status = document.getElementById('filterStatus').value;
      const sort = document.getElementById('filterSort').value;
      const params = new URLSearchParams({ page: currentPage });
      if (subject) params.set('subject', subject);
      if (status) params.set('status', status);
      if (sort) params.set('sort', sort);

      const data = await fetchWithAuth('/api/self-learn/wrong-notes?' + params);
      if (!data || !data.success) return;

      wrongNotes = data.notes || data.items || [];
      totalPages = data.totalPages || data.total_pages || 1;
      renderWrongNotes();
      renderPagination();
    }

    function renderWrongNotes() {
      const container = document.getElementById('wrongNoteList');
      if (!wrongNotes.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-clipboard-check"></i><p>등록된 오답이 없습니다</p></div>';
        return;
      }
      container.innerHTML = wrongNotes.map(note => {
        const isResolved = note.status === 'resolved' || note.is_resolved;
        const tags = (note.tags || '').split(',').filter(t => t.trim());
        return `
          <div class="wn-card ${isResolved ? 'resolved' : ''}" id="wn-${note.id}">
            <div class="wn-card-header" onclick="toggleWNCard(${note.id})">
              <div class="wn-card-header-left">
                <span class="wn-status-badge ${isResolved ? 'resolved' : 'unresolved'}">${isResolved ? '해결' : '미해결'}</span>
                <span class="wn-subject-tag">${note.subject || '기타'}</span>
                <span class="wn-question-preview">${escapeHtml(note.question_text || note.question || '')}</span>
              </div>
              <div class="wn-card-header-right">
                <span class="wn-attempt-count"><i class="fas fa-redo"></i> ${note.attempt_count || note.retry_count || 0}회</span>
                <button class="wn-expand-btn"><i class="fas fa-chevron-down"></i></button>
              </div>
            </div>
            <div class="wn-card-body">
              <div class="wn-question-full">${escapeHtml(note.question_text || note.question || '')}</div>
              <div class="wn-detail-grid">
                <div class="wn-detail-box correct">
                  <div class="wn-detail-label">정답</div>
                  <div class="wn-detail-value">${escapeHtml(note.correct_answer || '')}</div>
                </div>
                <div class="wn-detail-box wrong">
                  <div class="wn-detail-label">내가 쓴 답</div>
                  <div class="wn-detail-value">${escapeHtml(note.my_answer || note.user_answer || '')}</div>
                </div>
              </div>
              ${note.explanation ? `<div class="wn-explanation"><strong>해설:</strong> ${escapeHtml(note.explanation)}</div>` : ''}
              <div class="wn-tags-area">
                <i class="fas fa-tags" style="color:var(--secondary);font-size:13px"></i>
                ${tags.map(t => `<span class="wn-tag">${escapeHtml(t.trim())}</span>`).join('')}
                <button class="wn-tag-input" onclick="event.stopPropagation();openTagEditModal(${note.id}, '${escapeHtml(note.tags || '')}')"><i class="fas fa-pen"></i> 태그 수정</button>
              </div>
              <div class="wn-actions">
                ${!isResolved ? `
                  <div class="wn-retry-area">
                    <input type="text" class="wn-retry-input" id="retry-input-${note.id}" placeholder="정답을 입력하세요">
                    <button class="btn btn-success btn-sm" onclick="retryWrongNote(${note.id})"><i class="fas fa-paper-plane"></i> 재도전</button>
                  </div>
                ` : '<span style="color:var(--success);font-size:13px;font-weight:500"><i class="fas fa-check-circle"></i> 해결 완료</span>'}
                <button class="btn btn-secondary btn-sm" onclick="addToProblemSet(${note.id})"><i class="fas fa-plus"></i> 문제집에 추가</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function toggleWNCard(id) {
      const card = document.getElementById('wn-' + id);
      if (card) card.classList.toggle('expanded');
    }

    function renderPagination() {
      const container = document.getElementById('pagination');
      if (totalPages <= 1) { container.innerHTML = ''; return; }
      let html = '';
      if (currentPage > 1) html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        } else if (Math.abs(i - currentPage) === 3) {
          html += `<button class="page-btn" disabled>...</button>`;
        }
      }
      if (currentPage < totalPages) html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
      container.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; loadWrongNotes(); }

    // Filter events
    document.getElementById('filterSubject').addEventListener('change', () => { currentPage = 1; loadWrongNotes(); });
    document.getElementById('filterStatus').addEventListener('change', () => { currentPage = 1; loadWrongNotes(); });
    document.getElementById('filterSort').addEventListener('change', () => { currentPage = 1; loadWrongNotes(); });

    // ===== Retry =====
    async function retryWrongNote(id) {
      const input = document.getElementById('retry-input-' + id);
      if (!input) return;
      const answer = input.value.trim();
      if (!answer) { alert('답을 입력해주세요.'); return; }
      const data = await fetchWithAuth('/api/self-learn/wrong-notes/' + id + '/retry', {
        method: 'POST',
        body: JSON.stringify({ answer })
      });
      if (!data) return;
      if (data.success) {
        if (data.correct || data.is_correct) {
          alert('정답입니다! 오답이 해결되었습니다.');
        } else {
          alert('아쉽지만 오답입니다. 다시 도전해보세요!');
        }
        loadDashboard();
        loadWrongNotes();
      } else {
        alert(data.message || '오류가 발생했습니다.');
      }
    }

    // ===== Tag Edit =====
    function openTagEditModal(noteId, tags) {
      tagEditNoteId = noteId;
      document.getElementById('tagEditInput').value = tags;
      document.getElementById('tagEditModal').classList.add('show');
    }
    function closeTagEditModal() { document.getElementById('tagEditModal').classList.remove('show'); tagEditNoteId = null; }

    async function submitTagEdit() {
      if (!tagEditNoteId) return;
      const tags = document.getElementById('tagEditInput').value.trim();
      const data = await fetchWithAuth('/api/self-learn/wrong-notes/' + tagEditNoteId + '/tags', {
        method: 'PUT',
        body: JSON.stringify({ tags })
      });
      if (data && data.success) {
        closeTagEditModal();
        loadDashboard();
        loadWrongNotes();
      } else {
        alert((data && data.message) || '태그 수정에 실패했습니다.');
      }
    }

    // ===== Manual Wrong Note =====
    function openManualModal() { document.getElementById('manualModal').classList.add('show'); }
    function closeManualModal() { document.getElementById('manualModal').classList.remove('show'); }

    async function submitManualNote() {
      const body = {
        subject: document.getElementById('manualSubject').value,
        question_text: document.getElementById('manualQuestion').value.trim(),
        correct_answer: document.getElementById('manualCorrectAnswer').value.trim(),
        my_answer: document.getElementById('manualMyAnswer').value.trim(),
        explanation: document.getElementById('manualExplanation').value.trim(),
        tags: document.getElementById('manualTags').value.trim()
      };
      if (!body.question_text || !body.correct_answer) { alert('문제와 정답을 입력해주세요.'); return; }
      const data = await fetchWithAuth('/api/self-learn/wrong-notes/manual', {
        method: 'POST',
        body: JSON.stringify(body)
      });
      if (data && data.success) {
        closeManualModal();
        document.getElementById('manualQuestion').value = '';
        document.getElementById('manualCorrectAnswer').value = '';
        document.getElementById('manualMyAnswer').value = '';
        document.getElementById('manualExplanation').value = '';
        document.getElementById('manualTags').value = '';
        loadDashboard();
        loadWrongNotes();
      } else {
        alert((data && data.message) || '등록에 실패했습니다.');
      }
    }

    // ===== Problem Sets =====
    async function loadProblemSets() {
      const data = await fetchWithAuth('/api/self-learn/problem-sets');
      if (!data || !data.success) return;
      problemSets = data.sets || [];
      renderProblemSets();
    }

    function renderProblemSets() {
      const grid = document.getElementById('psGrid');
      document.getElementById('psListView').style.display = '';
      document.getElementById('psDetailView').style.display = 'none';
      document.getElementById('psSolvingView').style.display = 'none';
      document.getElementById('psSolvingView').classList.remove('active');

      if (!problemSets.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><p>아직 문제집이 없습니다. 문제집을 만들어보세요!</p></div>';
        return;
      }
      grid.innerHTML = problemSets.map(ps => {
        const itemCount = ps.item_count || ps.items_count || 0;
        const solvedCount = ps.solved_count || 0;
        const pct = itemCount > 0 ? Math.round((solvedCount / itemCount) * 100) : 0;
        return `
          <div class="ps-card" onclick="openPSDetail(${ps.id})">
            <div class="ps-card-title">${escapeHtml(ps.title)}</div>
            <div class="ps-card-meta">
              <span><i class="fas fa-list"></i> ${itemCount}문항</span>
              <span><i class="fas fa-clock"></i> ${ps.created_at ? new Date(ps.created_at).toLocaleDateString('ko-KR') : ''}</span>
            </div>
            <div class="ps-progress-bar"><div class="ps-progress-fill" style="width:${pct}%"></div></div>
            <div class="ps-card-footer">
              <span class="ps-score">${pct}% 완료</span>
              <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();startProblemSet(${ps.id})"><i class="fas fa-play"></i> 풀기</button>
            </div>
          </div>`;
      }).join('');
    }

    async function openPSDetail(id) {
      const data = await fetchWithAuth('/api/self-learn/problem-sets/' + id);
      if (!data || !data.success) return;
      currentPSDetail = data;

      document.getElementById('psListView').style.display = 'none';
      document.getElementById('psDetailView').style.display = '';

      const items = data.items || [];
      document.getElementById('psDetailContent').innerHTML = `
        <div class="ps-detail-header">
          <div>
            <div class="ps-detail-title">${escapeHtml(data.title || data.set?.title || '')}</div>
            <div style="font-size:13px;color:var(--gray-500);margin-top:4px">${items.length}개 문항</div>
          </div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-secondary" onclick="renderProblemSets()"><i class="fas fa-arrow-left"></i> 목록</button>
            ${items.length > 0 ? `<button class="btn btn-primary" onclick="startProblemSet(${id})"><i class="fas fa-play"></i> 풀기 시작</button>` : ''}
          </div>
        </div>
        <div class="ps-item-list">
          ${items.length ? items.map((item, idx) => `
            <div class="ps-item">
              <div class="ps-item-num">${idx + 1}</div>
              <div class="ps-item-text">${escapeHtml(item.question_text || item.question || '')}</div>
              <span class="ps-item-subject">${escapeHtml(item.subject || '기타')}</span>
              <button class="ps-item-remove" onclick="removePSItem(${id}, ${item.id || item.item_id})" title="제거"><i class="fas fa-times"></i></button>
            </div>
          `).join('') : '<div class="empty-state"><i class="fas fa-inbox"></i><p>문항이 없습니다. 오답노트에서 문항을 추가해보세요.</p></div>'}
        </div>`;
    }

    async function removePSItem(psId, itemId) {
      if (!confirm('이 문항을 문제집에서 제거하시겠습니까?')) return;
      const data = await fetchWithAuth('/api/self-learn/problem-sets/' + psId + '/items/' + itemId, { method: 'DELETE' });
      if (data && data.success) openPSDetail(psId);
    }

    // Create Problem Set
    function openCreatePSModal() { document.getElementById('createPSModal').classList.add('show'); }
    function closeCreatePSModal() { document.getElementById('createPSModal').classList.remove('show'); }

    async function submitCreatePS() {
      const title = document.getElementById('psTitle').value.trim();
      if (!title) { alert('문제집 이름을 입력해주세요.'); return; }
      const description = document.getElementById('psDescription').value.trim();
      const data = await fetchWithAuth('/api/self-learn/problem-sets', {
        method: 'POST',
        body: JSON.stringify({ title, description })
      });
      if (data && data.success) {
        closeCreatePSModal();
        document.getElementById('psTitle').value = '';
        document.getElementById('psDescription').value = '';
        loadProblemSets();
      } else {
        alert((data && data.message) || '문제집 생성에 실패했습니다.');
      }
    }

    // Add to Problem Set
    async function addToProblemSet(noteId) {
      // Load problem sets if not loaded
      if (!problemSets.length) {
        const data = await fetchWithAuth('/api/self-learn/problem-sets');
        if (data && data.success) problemSets = data.sets || [];
      }
      if (!problemSets.length) {
        alert('먼저 문제집을 만들어주세요.');
        return;
      }
      const options = problemSets.map(ps => ps.title).join('\n');
      const choice = prompt('추가할 문제집을 선택하세요 (번호 입력):\n' + problemSets.map((ps, i) => `${i + 1}. ${ps.title}`).join('\n'));
      if (!choice) return;
      const idx = parseInt(choice) - 1;
      if (idx < 0 || idx >= problemSets.length) { alert('올바른 번호를 입력해주세요.'); return; }
      const data = await fetchWithAuth('/api/self-learn/problem-sets/' + problemSets[idx].id + '/items', {
        method: 'POST',
        body: JSON.stringify({ contentId: noteId })
      });
      if (data && data.success) {
        alert('문제집에 추가되었습니다.');
      } else {
        alert((data && data.message) || '추가에 실패했습니다.');
      }
    }

    // Start Problem Set
    async function startProblemSet(id) {
      const data = await fetchWithAuth('/api/self-learn/problem-sets/' + id + '/start', { method: 'POST' });
      if (!data || !data.success) { alert((data && data.message) || '문제집 시작에 실패했습니다.'); return; }

      solvingState = {
        psId: id,
        items: data.items || data.questions || [],
        currentIdx: 0,
        answers: {}
      };

      if (!solvingState.items.length) { alert('문항이 없습니다.'); return; }

      document.getElementById('psListView').style.display = 'none';
      document.getElementById('psDetailView').style.display = 'none';
      document.getElementById('psSolvingView').style.display = 'block';
      document.getElementById('psSolvingView').classList.add('active');

      renderSolvingQuestion();
    }

    function renderSolvingQuestion() {
      const view = document.getElementById('psSolvingView');
      const s = solvingState;
      if (!s || s.currentIdx >= s.items.length) return;

      const item = s.items[s.currentIdx];
      const total = s.items.length;
      const pct = Math.round(((s.currentIdx) / total) * 100);
      const options = item.options ? (typeof item.options === 'string' ? JSON.parse(item.options) : item.options) : null;
      const savedAnswer = s.answers[item.id || s.currentIdx] || '';

      view.innerHTML = `
        <div class="ps-solve-question">
          <div class="ps-solve-progress">
            <div class="ps-solve-progress-bar"><div class="ps-solve-progress-fill" style="width:${pct}%"></div></div>
            <div class="ps-solve-progress-text">${s.currentIdx + 1} / ${total}</div>
          </div>
          <div style="margin-bottom:12px">
            <span class="wn-subject-tag">${escapeHtml(item.subject || '기타')}</span>
          </div>
          <div class="ps-solve-q-text">${escapeHtml(item.question_text || item.question || '')}</div>
          ${options && Array.isArray(options) ? `
            <div class="ps-solve-options">
              ${options.map((opt, i) => `
                <div class="ps-solve-option ${savedAnswer === opt ? 'selected' : ''}" onclick="selectSolveOption(this, '${escapeHtml(opt)}')">${i + 1}. ${escapeHtml(opt)}</div>
              `).join('')}
            </div>
          ` : `
            <input type="text" class="ps-solve-input" id="solveAnswerInput" value="${escapeHtml(savedAnswer)}" placeholder="답을 입력하세요">
          `}
          <div class="ps-solve-actions">
            ${s.currentIdx > 0 ? `<button class="btn btn-secondary" onclick="prevSolveQuestion()"><i class="fas fa-arrow-left"></i> 이전</button>` : ''}
            <div style="flex:1"></div>
            ${s.currentIdx < total - 1
              ? `<button class="btn btn-primary" onclick="nextSolveQuestion()">다음 <i class="fas fa-arrow-right"></i></button>`
              : `<button class="btn btn-success" onclick="submitProblemSetAnswers()"><i class="fas fa-paper-plane"></i> 제출</button>`
            }
          </div>
        </div>
        <div style="text-align:center;margin-top:12px">
          <button class="btn btn-secondary" onclick="cancelSolving()"><i class="fas fa-times"></i> 풀기 취소</button>
        </div>`;
    }

    function selectSolveOption(el, value) {
      el.parentElement.querySelectorAll('.ps-solve-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      const item = solvingState.items[solvingState.currentIdx];
      solvingState.answers[item.id || solvingState.currentIdx] = value;
    }

    function saveSolveAnswer() {
      const item = solvingState.items[solvingState.currentIdx];
      const input = document.getElementById('solveAnswerInput');
      if (input) solvingState.answers[item.id || solvingState.currentIdx] = input.value.trim();
    }

    function nextSolveQuestion() {
      saveSolveAnswer();
      solvingState.currentIdx++;
      renderSolvingQuestion();
    }

    function prevSolveQuestion() {
      saveSolveAnswer();
      solvingState.currentIdx--;
      renderSolvingQuestion();
    }

    function cancelSolving() {
      if (!confirm('풀기를 취소하시겠습니까?')) return;
      solvingState = null;
      renderProblemSets();
    }

    async function submitProblemSetAnswers() {
      saveSolveAnswer();
      const s = solvingState;
      if (!s) return;

      // Build answers array
      const answers = s.items.map(item => ({
        item_id: item.id || item.item_id,
        answer: s.answers[item.id || item.item_id] || s.answers[s.items.indexOf(item)] || ''
      }));

      const data = await fetchWithAuth('/api/self-learn/problem-sets/' + s.psId + '/submit', {
        method: 'POST',
        body: JSON.stringify({ answers })
      });

      if (data && data.success) {
        const score = data.score != null ? data.score : '?';
        const total = data.total != null ? data.total : s.items.length;
        const pct = data.percentage != null ? data.percentage : (total > 0 ? Math.round((score / total) * 100) : 0);

        document.getElementById('psSolvingView').innerHTML = `
          <div class="ps-solve-question" style="text-align:center">
            <div style="font-size:48px;margin-bottom:16px">${pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📝'}</div>
            <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">문제집 풀기 완료!</h2>
            <p style="font-size:16px;color:var(--gray-500);margin-bottom:24px">${score}/${total} 정답 (${pct}%)</p>
            <div style="display:flex;gap:12px;justify-content:center">
              <button class="btn btn-secondary" onclick="renderProblemSets()"><i class="fas fa-list"></i> 목록으로</button>
              <button class="btn btn-primary" onclick="startProblemSet(${s.psId})"><i class="fas fa-redo"></i> 다시 풀기</button>
            </div>
          </div>`;
        solvingState = null;
        loadDashboard();
      } else {
        alert((data && data.message) || '제출에 실패했습니다.');
      }
    }

    // ===== Helpers =====
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
