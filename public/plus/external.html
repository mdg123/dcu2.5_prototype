<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다채움 - 외부 서비스</title>
  <link rel="stylesheet" href="/css/common-nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Pretendard','Noto Sans KR',system-ui,sans-serif; background: #F5F7FA; }
    .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    .service-card {
      background: #fff; border-radius: 20px; padding: 60px 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .service-icon {
      width: 100px; height: 100px; border-radius: 24px; margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center; font-size: 40px;
    }
    .service-title { font-size: 28px; font-weight: 800; margin-bottom: 12px; color: #1A1A2E; }
    .service-desc { font-size: 15px; color: #6B7280; line-height: 1.7; margin-bottom: 32px; }
    .service-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 999px; font-size: 14px; font-weight: 600;
      background: #FEF3C7; color: #D97706;
    }
    .service-features {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-top: 32px; text-align: left;
    }
    .feature-item {
      padding: 16px; background: #F9FAFB; border-radius: 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .feature-item i { font-size: 18px; width: 24px; text-align: center; }
    .feature-item span { font-size: 13px; color: #374151; }
  </style>
</head>
<body>
  <script src="/js/common-nav.js"></script>
  <div class="container">
    <div class="service-card">
      <div class="service-icon" id="serviceIcon"></div>
      <h1 class="service-title" id="serviceTitle"></h1>
      <p class="service-desc" id="serviceDesc"></p>
      <div class="service-badge"><i class="fas fa-link"></i> 외부 연계 서비스 (준비 중)</div>
      <div class="service-features" id="serviceFeatures"></div>
    </div>
  </div>
  <script>
    const services = {
      coding: {
        title: '채움코딩',
        icon: 'fas fa-code',
        color: '#3B82F6',
        bg: '#EFF6FF',
        desc: '블록코딩부터 텍스트코딩까지, 단계별 코딩 교육 플랫폼입니다.\n충청북도교육청 소속 학생들을 위한 맞춤형 코딩 학습 환경을 제공합니다.',
        features: [
          { icon: 'fas fa-cubes', text: '블록코딩 (스크래치 기반)', color: '#F59E0B' },
          { icon: 'fas fa-terminal', text: '파이썬 텍스트코딩', color: '#10B981' },
          { icon: 'fas fa-robot', text: 'AI 프로젝트 실습', color: '#8B5CF6' },
          { icon: 'fas fa-trophy', text: '코딩 챌린지 & 대회', color: '#EF4444' }
        ]
      },
      typing: {
        title: '채움타자',
        icon: 'fas fa-keyboard',
        color: '#10B981',
        bg: '#ECFDF5',
        desc: '한글/영문 타자 연습 프로그램입니다.\n재미있는 게임과 함께 타자 실력을 키울 수 있습니다.',
        features: [
          { icon: 'fas fa-font', text: '한글 타자 연습', color: '#2563EB' },
          { icon: 'fas fa-language', text: '영문 타자 연습', color: '#DC2626' },
          { icon: 'fas fa-gamepad', text: '타자 게임', color: '#F59E0B' },
          { icon: 'fas fa-chart-line', text: '타자 속도 기록', color: '#8B5CF6' }
        ]
      },
      math: {
        title: '채움수학',
        icon: 'fas fa-calculator',
        color: '#EF4444',
        bg: '#FEF2F2',
        desc: '초등 수학 교과과정에 맞춘 학습 플랫폼입니다.\nAI 기반 맞춤 문제 추천과 단계별 학습을 제공합니다.',
        features: [
          { icon: 'fas fa-book', text: '단원별 학습', color: '#2563EB' },
          { icon: 'fas fa-brain', text: 'AI 맞춤 문제', color: '#8B5CF6' },
          { icon: 'fas fa-pencil-alt', text: '서술형 풀이', color: '#10B981' },
          { icon: 'fas fa-star', text: '수학 올림피아드', color: '#F59E0B' }
        ]
      },
      english: {
        title: '채움영어',
        icon: 'fas fa-globe-americas',
        color: '#8B5CF6',
        bg: '#F5F3FF',
        desc: '듣기, 말하기, 읽기, 쓰기 4영역 통합 영어 학습 플랫폼입니다.\n원어민 발음과 AI 음성인식 기술로 영어 실력을 키웁니다.',
        features: [
          { icon: 'fas fa-headphones', text: '리스닝 연습', color: '#2563EB' },
          { icon: 'fas fa-microphone', text: 'AI 스피킹', color: '#EF4444' },
          { icon: 'fas fa-book-reader', text: '리딩 학습', color: '#10B981' },
          { icon: 'fas fa-pen-fancy', text: '라이팅 연습', color: '#F59E0B' }
        ]
      }
    };

    const params = new URLSearchParams(location.search);
    const serviceKey = params.get('service') || 'coding';
    const svc = services[serviceKey] || services.coding;

    document.title = `다채움 - ${svc.title}`;
    document.getElementById('serviceIcon').innerHTML = `<i class="${svc.icon}"></i>`;
    document.getElementById('serviceIcon').style.background = svc.bg;
    document.getElementById('serviceIcon').style.color = svc.color;
    document.getElementById('serviceTitle').textContent = svc.title;
    document.getElementById('serviceDesc').textContent = svc.desc;
    document.getElementById('serviceFeatures').innerHTML = svc.features.map(f =>
      `<div class="feature-item"><i class="${f.icon}" style="color:${f.color};"></i><span>${f.text}</span></div>`
    ).join('');
  </script>
</body>
</html>
