<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다채움 - 로그인</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 50%, #1e40af 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    .login-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area h1 {
      color: #fff;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .logo-area p {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-top: 8px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      padding: 36px;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid #e5e7eb;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #9ca3af;
      position: relative;
      transition: color 0.2s;
      font-family: inherit;
    }
    .tab-btn.active {
      color: #2563eb;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #2563eb;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .form-group .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }
    .role-selector {
      display: flex;
      gap: 10px;
    }
    .role-option {
      flex: 1;
      position: relative;
    }
    .role-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .role-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 8px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
    }
    .role-option label i {
      font-size: 22px;
    }
    .role-option input[type="radio"]:checked + label {
      border-color: #2563eb;
      background: #eff6ff;
      color: #2563eb;
    }
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      margin-top: 6px;
    }
    .submit-btn:hover { background: #1d4ed8; }
    .submit-btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    @media (max-width: 480px) {
      .login-card { padding: 24px; }
      .logo-area h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="logo-area">
      <h1>다채움</h1>
      <p>충청북도교육청 통합 교육 플랫폼</p>
    </div>
    <div class="login-card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">로그인</button>
        <button class="tab-btn" data-tab="signup">회원가입</button>
      </div>

      <!-- 로그인 -->
      <div id="tab-login" class="tab-content active">
        <div id="loginError" class="error-msg"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginId">아이디</label>
            <input type="text" id="loginId" placeholder="아이디를 입력하세요" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="loginPw">비밀번호</label>
            <input type="password" id="loginPw" placeholder="숫자 4자리" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" required autocomplete="current-password">
          </div>
          <button type="submit" class="submit-btn">로그인</button>
        </form>
      </div>

      <!-- 회원가입 -->
      <div id="tab-signup" class="tab-content">
        <div id="signupError" class="error-msg"></div>
        <div id="signupSuccess" class="success-msg"></div>
        <form id="signupForm">
          <div class="form-group">
            <label for="signupId">아이디</label>
            <input type="text" id="signupId" placeholder="아이디를 입력하세요" required>
            <div class="hint">영문, 숫자 조합 권장</div>
          </div>
          <div class="form-group">
            <label for="signupName">이름</label>
            <input type="text" id="signupName" placeholder="이름을 입력하세요" required>
          </div>
          <div class="form-group">
            <label>역할 선택</label>
            <div class="role-selector" style="flex-wrap:wrap;">
              <div class="role-option">
                <input type="radio" name="role" id="roleStudent" value="student" checked>
                <label for="roleStudent"><i class="fas fa-user-graduate"></i>학생</label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="roleTeacher" value="teacher">
                <label for="roleTeacher"><i class="fas fa-chalkboard-teacher"></i>교사</label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="roleParent" value="parent">
                <label for="roleParent"><i class="fas fa-users"></i>학부모</label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="roleStaff" value="staff">
                <label for="roleStaff"><i class="fas fa-id-badge"></i>교직원</label>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="signupSchool">소속학교</label>
            <input type="text" id="signupSchool" placeholder="예: 금성초등학교" style="margin-bottom:8px;">
          </div>
          <div style="display:flex;gap:10px;">
            <div class="form-group" style="flex:1;">
              <label for="signupGrade">학년</label>
              <select id="signupGrade" style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;">
                <option value="">선택</option>
                <option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option>
                <option value="4">4학년</option><option value="5">5학년</option><option value="6">6학년</option>
              </select>
            </div>
            <div class="form-group" style="flex:1;">
              <label for="signupClass">반</label>
              <select id="signupClass" style="width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;">
                <option value="">선택</option>
                <option value="1">1반</option><option value="2">2반</option><option value="3">3반</option>
                <option value="4">4반</option><option value="5">5반</option><option value="6">6반</option>
                <option value="7">7반</option><option value="8">8반</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="signupPw">비밀번호</label>
            <input type="password" id="signupPw" placeholder="숫자 4자리" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" required>
            <div class="hint">숫자 4자리를 입력하세요</div>
          </div>
          <div class="form-group">
            <label for="signupPw2">비밀번호 확인</label>
            <input type="password" id="signupPw2" placeholder="비밀번호 재입력" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" required>
          </div>
          <button type="submit" class="submit-btn">회원가입</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // 탭 전환
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // 에러 표시 헬퍼
    function showError(el, msg) {
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideError(el) {
      el.style.display = 'none';
    }

    // 로그인
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      hideError(errEl);

      const username = document.getElementById('loginId').value.trim();
      const password = document.getElementById('loginPw').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/index.html';
        } else {
          showError(errEl, data.message);
        }
      } catch (err) {
        showError(errEl, '서버 연결에 실패했습니다.');
      }
    });

    // 회원가입
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('signupError');
      const succEl = document.getElementById('signupSuccess');
      hideError(errEl);
      hideError(succEl);

      const username = document.getElementById('signupId').value.trim();
      const displayName = document.getElementById('signupName').value.trim();
      const role = document.querySelector('input[name="role"]:checked').value;
      const password = document.getElementById('signupPw').value;
      const password2 = document.getElementById('signupPw2').value;

      if (!/^[0-9]{4}$/.test(password)) {
        showError(errEl, '비밀번호는 숫자 4자리입니다.');
        return;
      }
      if (password !== password2) {
        showError(errEl, '비밀번호가 일치하지 않습니다.');
        return;
      }

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username, password, displayName, role,
            school_name: document.getElementById('signupSchool').value.trim() || null,
            grade: document.getElementById('signupGrade').value ? parseInt(document.getElementById('signupGrade').value) : null,
            class_number: document.getElementById('signupClass').value ? parseInt(document.getElementById('signupClass').value) : null
          })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/index.html';
        } else {
          showError(errEl, data.message);
        }
      } catch (err) {
        showError(errEl, '서버 연결에 실패했습니다.');
      }
    });

    // 이미 로그인 상태이면 메인으로
    fetch('/api/auth/me').then(r => r.json()).then(data => {
      if (data.success && data.user) window.location.href = '/index.html';
    }).catch(() => {});
  </script>
</body>
</html>
