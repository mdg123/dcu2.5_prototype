<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설문 - 다채움</title>
  <link rel="stylesheet" href="/css/common-nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;background:#F5F7FA;min-height:100vh;}
    .container{max-width:1800px;margin:0 auto;padding:24px 20px;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:22px;font-weight:700;color:var(--gray-800);}
    .page-title i{color:var(--primary);margin-right:8px;}
    .header-actions{display:flex;gap:8px;align-items:center;}
    .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-primary{background:var(--primary);color:#fff;}.btn-primary:hover{background:var(--primary-dark);}
    .btn-outline{background:#fff;color:var(--gray-600);border:1.5px solid var(--gray-300);}.btn-outline:hover{background:var(--gray-50);}
    .btn-sm{padding:6px 12px;font-size:11px;}
    .btn-danger{background:var(--danger);color:#fff;}
    .class-select{padding:8px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;min-width:200px;}

    .survey-list{display:flex;flex-direction:column;gap:12px;}
    .survey-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--gray-100);transition:all .2s;cursor:pointer;}
    .survey-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);}
    .survey-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
    .survey-title{font-size:15px;font-weight:700;color:var(--gray-800);}
    .survey-desc{font-size:13px;color:var(--gray-500);margin-bottom:12px;line-height:1.5;}
    .survey-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
    .meta-tag{font-size:11px;padding:4px 8px;border-radius:6px;font-weight:600;}
    .tag-active{background:#dcfce7;color:#16a34a;}
    .tag-closed{background:#f3f4f6;color:var(--gray-500);}
    .tag-responded{background:#dbeafe;color:#2563eb;}
    .progress-bar-wrap{flex:1;min-width:120px;display:flex;align-items:center;gap:8px;}
    .progress-bar-bg{flex:1;height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;}
    .progress-bar-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s;}
    .progress-text{font-size:11px;color:var(--gray-400);white-space:nowrap;}
    .survey-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--gray-100);}
    .survey-date{font-size:12px;color:var(--gray-400);}
    .survey-actions{display:flex;gap:6px;}

    .empty-state{text-align:center;padding:60px 20px;color:var(--gray-400);}
    .empty-state i{font-size:48px;margin-bottom:16px;display:block;}

    /* 모달 */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;}
    .modal-overlay.active{display:flex;}
    .modal-card{background:#fff;border-radius:16px;width:90%;max-width:640px;max-height:90vh;overflow-y:auto;}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--gray-100);}
    .modal-header h3{font-size:16px;font-weight:700;}
    .modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--gray-400);padding:4px 8px;border-radius:6px;}
    .modal-close:hover{background:var(--gray-100);}
    .modal-body{padding:20px 24px;}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid var(--gray-100);}
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:5px;}
    .form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;font-family:inherit;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);outline:none;}
    .form-textarea{resize:vertical;min-height:70px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

    .q-item{background:var(--gray-50);border-radius:8px;padding:14px;margin-bottom:10px;position:relative;}
    .q-item .q-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .q-item .q-num{font-size:12px;font-weight:700;color:var(--primary);}
    .q-item .q-remove{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:13px;}.q-item .q-remove:hover{color:var(--danger);}
    .add-q-btn{width:100%;padding:10px;border:2px dashed var(--gray-300);border-radius:8px;background:none;color:var(--gray-500);cursor:pointer;font-size:12px;font-family:inherit;}
    .add-q-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}

    /* 응답 폼 */
    .respond-q{margin-bottom:20px;}
    .respond-q .q-label{font-size:14px;font-weight:600;color:var(--gray-800);margin-bottom:8px;}
    .respond-q .radio-group{display:flex;flex-direction:column;gap:6px;}
    .respond-q .radio-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s;}
    .respond-q .radio-item:hover{border-color:var(--primary);background:var(--primary-light);}
    .respond-q .radio-item.selected{border-color:var(--primary);background:var(--primary-light);}

    /* 결과 차트 */
    .result-section{margin-bottom:24px;}
    .result-q-title{font-size:14px;font-weight:600;color:var(--gray-700);margin-bottom:8px;}
    .chart-wrap{max-width:400px;margin:0 auto 16px;}
    .text-responses{font-size:13px;color:var(--gray-600);}
    .text-responses li{padding:4px 0;border-bottom:1px solid var(--gray-100);}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gray-800);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;z-index:9999;display:none;}
  </style>
</head>
<body>
<script src="/js/common-nav.js"></script>

<div class="container" id="mainContent" style="display:none;">
  <div class="page-header">
    <div class="page-title"><i class="fas fa-poll"></i> 설문</div>
    <div class="header-actions">
      <select class="class-select" id="classSelect"><option value="">클래스를 선택하세요</option></select>
      <button class="btn btn-primary" id="createBtn" style="display:none;" onclick="showCreateModal()"><i class="fas fa-plus"></i> 설문 만들기</button>
    </div>
  </div>

  <div class="survey-list" id="surveyList">
    <div class="empty-state"><i class="fas fa-poll-h"></i><p>클래스를 선택하세요.</p></div>
  </div>
</div>

<!-- 설문 생성/수정 모달 -->
<div class="modal-overlay" id="createModal">
  <div class="modal-card">
    <div class="modal-header"><h3 id="createModalTitle">설문 만들기</h3><button class="modal-close" onclick="closeModal('createModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">설문 제목 *</label><input class="form-input" id="surveyTitle" placeholder="예: 수업 만족도 조사"></div>
      <div class="form-group"><label class="form-label">설명</label><textarea class="form-textarea" id="surveyDesc" placeholder="설문에 대한 설명"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">상태</label><select class="form-select" id="surveyStatus"><option value="active">공개</option><option value="draft">임시저장</option><option value="closed">마감</option></select></div>
        <div class="form-group"><label class="form-label">마감일</label><input class="form-input" id="surveyDeadline" type="date"></div>
      </div>

      <div class="form-group">
        <label class="form-label">질문 항목</label>
        <div id="questionItems"></div>
        <button class="add-q-btn" onclick="addSurveyQuestion()"><i class="fas fa-plus"></i> 질문 추가</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('createModal')">취소</button>
      <button class="btn btn-primary" onclick="saveSurvey()">저장</button>
    </div>
  </div>
</div>

<!-- 설문 응답 모달 -->
<div class="modal-overlay" id="respondModal">
  <div class="modal-card">
    <div class="modal-header"><h3 id="respondTitle">설문 응답</h3><button class="modal-close" onclick="closeModal('respondModal')">&times;</button></div>
    <div class="modal-body" id="respondBody"></div>
    <div class="modal-footer" id="respondFooter">
      <button class="btn btn-outline" onclick="closeModal('respondModal')">취소</button>
      <button class="btn btn-primary" onclick="submitResponse()"><i class="fas fa-check"></i> 제출</button>
    </div>
  </div>
</div>

<!-- 설문 결과 모달 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-card">
    <div class="modal-header"><h3>설문 결과</h3><button class="modal-close" onclick="closeModal('resultModal')">&times;</button></div>
    <div class="modal-body" id="resultBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/auth.js"></script>
<script>
  let currentUser = null;
  let selectedClassId = null;
  let myClasses = [];
  let surveyQuestions = [];
  let editingSurveyId = null;
  let respondingAnswers = {};
  let respondingSurveyId = null;
  let chartInstances = [];

  document.addEventListener('dacheim:user-loaded', (e) => { currentUser = e.detail; init(); });

  async function init() {
    if (!currentUser) { currentUser = await checkAuth(); if (!currentUser) return; }
    document.getElementById('mainContent').style.display = '';
    await loadMyClasses();
  }

  async function loadMyClasses() {
    try {
      const res = await fetch('/api/class/my');
      const data = await res.json();
      if (data.success) {
        myClasses = data.classes || [];
        const sel = document.getElementById('classSelect');
        myClasses.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.name; sel.appendChild(o); });
        sel.addEventListener('change', () => {
          selectedClassId = sel.value ? parseInt(sel.value) : null;
          const cls = myClasses.find(c => c.id === selectedClassId);
          const isOwner = cls && (cls.role === 'owner' || currentUser.role === 'admin');
          document.getElementById('createBtn').style.display = isOwner ? '' : 'none';
          loadSurveys();
        });
        // URL 파라미터 classId
        const urlClassId = new URLSearchParams(location.search).get('classId');
        if (urlClassId && myClasses.find(c => c.id === parseInt(urlClassId))) {
          sel.value = urlClassId;
        } else if (myClasses.length > 0) {
          sel.value = myClasses[0].id;
        }
        sel.dispatchEvent(new Event('change'));
      }
    } catch (e) { console.error(e); }
  }

  async function loadSurveys() {
    const list = document.getElementById('surveyList');
    if (!selectedClassId) { list.innerHTML = '<div class="empty-state"><i class="fas fa-poll-h"></i><p>클래스를 선택하세요.</p></div>'; return; }
    list.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>불러오는 중...</p></div>';
    try {
      const res = await fetch(`/api/survey/${selectedClassId}`);
      const data = await res.json();
      if (!data.success) { list.innerHTML = '<div class="empty-state"><p>데이터를 불러올 수 없습니다.</p></div>'; return; }
      const surveys = data.surveys || [];
      if (surveys.length === 0) { list.innerHTML = '<div class="empty-state"><i class="fas fa-poll-h"></i><p>등록된 설문이 없습니다.</p></div>'; return; }

      const cls = myClasses.find(c => c.id === selectedClassId);
      const isOwner = cls && (cls.role === 'owner' || currentUser.role === 'admin');

      list.innerHTML = surveys.map(s => {
        const statusTag = s.status === 'active' ? '<span class="meta-tag tag-active">진행 중</span>' :
                          s.status === 'closed' ? '<span class="meta-tag tag-closed">마감</span>' :
                          '<span class="meta-tag tag-closed">임시저장</span>';
        const qs = typeof s.questions === 'string' ? JSON.parse(s.questions || '[]') : (s.questions || []);
        const responded = s.my_response ? '<span class="meta-tag tag-responded">응답 완료</span>' : '';
        const responseRate = s.total_members ? Math.round((s.response_count || 0) / s.total_members * 100) : 0;

        return `<div class="survey-card" onclick="openSurvey(${s.id})">
          <div class="survey-card-top">
            <div class="survey-title">${escHtml(s.title)}</div>
            <div style="display:flex;gap:4px;">${statusTag}${responded}</div>
          </div>
          <div class="survey-desc">${escHtml(s.description || '')}</div>
          <div class="survey-meta">
            <span class="meta-tag" style="background:var(--primary-light);color:var(--primary);"><i class="fas fa-question-circle"></i> ${qs.length}개 질문</span>
            <div class="progress-bar-wrap">
              <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${responseRate}%"></div></div>
              <span class="progress-text">${s.response_count || 0}명 응답 (${responseRate}%)</span>
            </div>
          </div>
          <div class="survey-footer">
            <span class="survey-date">${s.deadline ? '마감: ' + s.deadline : formatDate(s.created_at)}</span>
            <div class="survey-actions" onclick="event.stopPropagation()">
              ${isOwner ? `<button class="btn btn-sm btn-outline" onclick="viewResults(${s.id})"><i class="fas fa-chart-pie"></i> 결과</button>
              <button class="btn btn-sm btn-outline" onclick="editSurvey(${s.id})"><i class="fas fa-edit"></i></button>
              <button class="btn btn-sm btn-outline" style="color:var(--danger);" onclick="deleteSurvey(${s.id})"><i class="fas fa-trash"></i></button>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
    } catch (e) { console.error(e); list.innerHTML = '<div class="empty-state"><p>오류가 발생했습니다.</p></div>'; }
  }

  async function openSurvey(surveyId) {
    const cls = myClasses.find(c => c.id === selectedClassId);
    const isOwner = cls && (cls.role === 'owner' || currentUser.role === 'admin');
    if (isOwner) { viewResults(surveyId); return; }
    // 학생: 응답 폼 표시
    try {
      const res = await fetch(`/api/survey/${selectedClassId}/${surveyId}`);
      const data = await res.json();
      if (!data.success) { showToast('설문을 불러올 수 없습니다.'); return; }
      const survey = data.survey;
      const qs = typeof survey.questions === 'string' ? JSON.parse(survey.questions || '[]') : (survey.questions || []);

      if (data.response) {
        showToast('이미 응답한 설문입니다.');
        return;
      }
      if (survey.status !== 'active') { showToast('현재 응답할 수 없는 설문입니다.'); return; }

      respondingSurveyId = surveyId;
      respondingAnswers = {};
      document.getElementById('respondTitle').textContent = survey.title;
      const body = document.getElementById('respondBody');

      body.innerHTML = qs.map((q, i) => {
        if (q.type === 'choice' || q.type === 'objective') {
          const opts = q.options || [];
          return `<div class="respond-q">
            <div class="q-label">${i + 1}. ${escHtml(q.text)}</div>
            <div class="radio-group">${opts.map((o, j) => `
              <div class="radio-item" onclick="selectResponseOption(${i},${j},this)">${escHtml(o)}</div>
            `).join('')}</div>
          </div>`;
        } else if (q.type === 'scale') {
          return `<div class="respond-q">
            <div class="q-label">${i + 1}. ${escHtml(q.text)}</div>
            <div class="radio-group" style="flex-direction:row;gap:8px;flex-wrap:wrap;">
              ${[1,2,3,4,5].map(n => `<div class="radio-item" style="flex:1;min-width:40px;justify-content:center;" onclick="selectResponseOption(${i},${n},this)">${n}점</div>`).join('')}
            </div>
          </div>`;
        } else {
          return `<div class="respond-q">
            <div class="q-label">${i + 1}. ${escHtml(q.text)}</div>
            <textarea class="form-textarea" placeholder="답변을 입력하세요" onchange="respondingAnswers[${i}]=this.value"></textarea>
          </div>`;
        }
      }).join('');

      document.getElementById('respondFooter').style.display = '';
      document.getElementById('respondModal').classList.add('active');
    } catch (e) { showToast('오류가 발생했습니다.'); }
  }

  function selectResponseOption(qIdx, value, el) {
    respondingAnswers[qIdx] = value;
    el.parentElement.querySelectorAll('.radio-item').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
  }

  async function submitResponse() {
    if (!respondingSurveyId) return;
    try {
      const res = await fetch(`/api/survey/${selectedClassId}/${respondingSurveyId}/submit`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answers: respondingAnswers })
      });
      const data = await res.json();
      if (data.success) {
        showToast('응답이 제출되었습니다.');
        closeModal('respondModal');
        loadSurveys();
      } else { showToast(data.message || '제출 실패'); }
    } catch (e) { showToast('오류가 발생했습니다.'); }
  }

  // 교사: 설문 생성
  function showCreateModal() {
    editingSurveyId = null;
    surveyQuestions = [];
    document.getElementById('createModalTitle').textContent = '설문 만들기';
    document.getElementById('surveyTitle').value = '';
    document.getElementById('surveyDesc').value = '';
    document.getElementById('surveyStatus').value = 'active';
    document.getElementById('surveyDeadline').value = '';
    renderSurveyQuestions();
    document.getElementById('createModal').classList.add('active');
  }

  function addSurveyQuestion() {
    surveyQuestions.push({ text: '', type: 'choice', options: ['', ''] });
    renderSurveyQuestions();
  }

  function removeSurveyQuestion(i) {
    surveyQuestions.splice(i, 1);
    renderSurveyQuestions();
  }

  function renderSurveyQuestions() {
    const container = document.getElementById('questionItems');
    container.innerHTML = surveyQuestions.map((q, i) => `
      <div class="q-item">
        <div class="q-head"><span class="q-num">질문 ${i + 1}</span><button class="q-remove" onclick="removeSurveyQuestion(${i})">&times;</button></div>
        <input class="form-input" style="margin-bottom:6px;" placeholder="질문 내용" value="${escHtml(q.text)}" onchange="surveyQuestions[${i}].text=this.value">
        <select class="form-select" style="margin-bottom:6px;width:auto;" onchange="surveyQuestions[${i}].type=this.value;renderSurveyQuestions()">
          <option value="choice" ${q.type === 'choice' ? 'selected' : ''}>객관식</option>
          <option value="text" ${q.type === 'text' ? 'selected' : ''}>주관식</option>
          <option value="scale" ${q.type === 'scale' ? 'selected' : ''}>점수(1~5)</option>
        </select>
        ${q.type === 'choice' ? `
          <div style="display:flex;flex-direction:column;gap:4px;">
            ${(q.options || []).map((o, j) => `<div style="display:flex;gap:4px;align-items:center;">
              <input class="form-input" style="padding:6px 8px;font-size:12px;" placeholder="보기 ${j + 1}" value="${escHtml(o)}" onchange="surveyQuestions[${i}].options[${j}]=this.value">
              <button style="background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:12px;" onclick="surveyQuestions[${i}].options.splice(${j},1);renderSurveyQuestions()">&times;</button>
            </div>`).join('')}
            <button class="btn btn-sm btn-outline" style="align-self:flex-start;margin-top:4px;" onclick="surveyQuestions[${i}].options.push('');renderSurveyQuestions()"><i class="fas fa-plus"></i> 보기 추가</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  }

  async function saveSurvey() {
    const title = document.getElementById('surveyTitle').value.trim();
    if (!title) { showToast('제목을 입력하세요.'); return; }
    const body = {
      title,
      description: document.getElementById('surveyDesc').value.trim(),
      status: document.getElementById('surveyStatus').value,
      deadline: document.getElementById('surveyDeadline').value || null,
      questions: surveyQuestions
    };
    try {
      const url = editingSurveyId ? `/api/survey/${selectedClassId}/${editingSurveyId}` : `/api/survey/${selectedClassId}`;
      const method = editingSurveyId ? 'PUT' : 'POST';
      const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (data.success) {
        showToast(editingSurveyId ? '수정되었습니다.' : '생성되었습니다.');
        closeModal('createModal');
        loadSurveys();
      } else { showToast(data.message || '저장 실패'); }
    } catch (e) { showToast('오류가 발생했습니다.'); }
  }

  async function editSurvey(surveyId) {
    try {
      const res = await fetch(`/api/survey/${selectedClassId}/${surveyId}`);
      const data = await res.json();
      if (!data.success) { showToast('불러올 수 없습니다.'); return; }
      const s = data.survey;
      editingSurveyId = surveyId;
      document.getElementById('createModalTitle').textContent = '설문 수정';
      document.getElementById('surveyTitle').value = s.title || '';
      document.getElementById('surveyDesc').value = s.description || '';
      document.getElementById('surveyStatus').value = s.status || 'active';
      document.getElementById('surveyDeadline').value = s.deadline || '';
      surveyQuestions = typeof s.questions === 'string' ? JSON.parse(s.questions || '[]') : (s.questions || []);
      renderSurveyQuestions();
      document.getElementById('createModal').classList.add('active');
    } catch (e) { showToast('오류가 발생했습니다.'); }
  }

  async function deleteSurvey(surveyId) {
    if (!confirm('이 설문을 삭제하시겠습니까?')) return;
    try {
      const res = await fetch(`/api/survey/${selectedClassId}/${surveyId}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) { showToast('삭제되었습니다.'); loadSurveys(); }
      else { showToast(data.message || '삭제 실패'); }
    } catch (e) { showToast('오류가 발생했습니다.'); }
  }

  async function viewResults(surveyId) {
    const body = document.getElementById('resultBody');
    body.innerHTML = '<div style="text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin"></i></div>';
    chartInstances.forEach(c => c.destroy());
    chartInstances = [];
    document.getElementById('resultModal').classList.add('active');
    try {
      const res = await fetch(`/api/survey/${selectedClassId}/${surveyId}`);
      const data = await res.json();
      if (!data.success) { body.innerHTML = '<p>데이터를 불러올 수 없습니다.</p>'; return; }
      const survey = data.survey;
      const responses = data.responses || [];
      const qs = typeof survey.questions === 'string' ? JSON.parse(survey.questions || '[]') : (survey.questions || []);

      let html = `<h4 style="margin-bottom:4px;">${escHtml(survey.title)}</h4>
        <p style="font-size:13px;color:var(--gray-500);margin-bottom:20px;">${responses.length}명 응답</p>`;

      qs.forEach((q, i) => {
        html += `<div class="result-section"><div class="result-q-title">${i + 1}. ${escHtml(q.text)}</div>`;
        if (q.type === 'choice' || q.type === 'objective') {
          html += `<div class="chart-wrap"><canvas id="chart${i}"></canvas></div>`;
        } else if (q.type === 'scale') {
          html += `<div class="chart-wrap"><canvas id="chart${i}"></canvas></div>`;
        } else {
          const texts = responses.map(r => { const a = typeof r.answers === 'string' ? JSON.parse(r.answers) : (r.answers || {}); return a[i]; }).filter(Boolean);
          html += `<ul class="text-responses">${texts.map(t => `<li>${escHtml(String(t))}</li>`).join('') || '<li style="color:var(--gray-400);">응답 없음</li>'}</ul>`;
        }
        html += '</div>';
      });

      body.innerHTML = html;

      // 차트 렌더링
      qs.forEach((q, i) => {
        const canvas = document.getElementById(`chart${i}`);
        if (!canvas) return;
        const answerData = responses.map(r => { const a = typeof r.answers === 'string' ? JSON.parse(r.answers) : (r.answers || {}); return a[i]; });

        if (q.type === 'choice' || q.type === 'objective') {
          const opts = q.options || [];
          const counts = opts.map((_, j) => answerData.filter(a => a === j).length);
          const chart = new Chart(canvas, {
            type: 'doughnut',
            data: { labels: opts, datasets: [{ data: counts, backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'] }] },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
          });
          chartInstances.push(chart);
        } else if (q.type === 'scale') {
          const counts = [1,2,3,4,5].map(n => answerData.filter(a => a === n).length);
          const chart = new Chart(canvas, {
            type: 'bar',
            data: { labels: ['1점','2점','3점','4점','5점'], datasets: [{ label: '응답 수', data: counts, backgroundColor: '#3b82f6' }] },
            options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
          });
          chartInstances.push(chart);
        }
      });
    } catch (e) { body.innerHTML = '<p>오류가 발생했습니다.</p>'; }
  }

  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function formatDate(d) { if (!d) return ''; try { return new Date(d).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }); } catch(e) { return d; } }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
</script>
</body>
</html>
