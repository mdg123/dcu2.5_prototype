<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다채움 - 나의 학습 아카이브</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-bg: #eef2ff;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --best: #f59e0b;
            --danger: #ef4444;
        }

        body { font-family: 'Pretendard Variable', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* 1. 상단 대시보드 (역량 차트 + 요약) */
        .dashboard-header {
            display: flex; gap: 20px; margin-bottom: 20px;
        }
        .profile-card {
            flex: 1; background: var(--surface); border-radius: 16px; padding: 24px;
            display: flex; align-items: center; gap: 20px; border: 1px solid var(--border);
        }
        .profile-img { width: 80px; height: 80px; background: #cbd5e1; border-radius: 50%; }
        .chart-card {
            flex: 0 0 300px; background: var(--surface); border-radius: 16px; padding: 20px;
            border: 1px solid var(--border); position: relative;
        }
        .chart-container { height: 160px; width: 100%; display:flex; justify-content:center; }

        /* 2. 컨트롤 바 (필터 + 뷰 전환 + 내보내기) */
        .control-bar {
            background: var(--surface); padding: 16px; border-radius: 12px; margin-bottom: 20px;
            border: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between;
        }
        
        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .select-box, .input-date {
            padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
        }
        
        .view-toggles { display: flex; background: var(--bg); padding: 4px; border-radius: 8px; }
        .view-btn {
            border: none; background: transparent; padding: 6px 12px; cursor: pointer; border-radius: 6px; color: var(--text-sub);
        }
        .view-btn.active { background: white; color: var(--primary); font-weight: bold; shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .btn-primary { background: var(--primary); color: white; padding: 8px 16px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; display:flex; gap:6px; align-items:center; }
        .btn-primary:hover { background: #4338ca; }

        /* 3. 콘텐츠 영역 (뷰 모드에 따라 스타일 변경) */
        .content-area { min-height: 400px; }

        /* A. 카드 뷰 (Grid) */
        .view-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card-item {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
            position: relative; transition: transform 0.2s; cursor: pointer;
        }
        .card-item:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-item.is-best { border: 2px solid var(--best); }
        
        .best-ribbon {
            position: absolute; top: 10px; right: 10px; background: var(--best); color: white;
            padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; z-index: 2;
        }
        
        .card-thumb { height: 140px; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--primary); }
        .card-body { padding: 16px; }
        .card-title { font-size: 16px; font-weight: 700; margin: 0 0 8px 0; }
        .card-info { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; }
        .tag-list { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
        .tag { font-size: 11px; padding: 2px 6px; background: #f1f5f9; border-radius: 4px; color: var(--text-sub); }

        /* B. 리스트 뷰 (Table) */
        .view-list { display: none; width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .view-list th { background: #f8fafc; padding: 12px; text-align: left; font-size: 13px; color: var(--text-sub); border-bottom: 1px solid var(--border); }
        .view-list td { padding: 16px 12px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        .view-list tr:last-child td { border-bottom: none; }
        .view-list tr:hover { background: #f8fafc; }

        /* C. 타임라인 뷰 (Growth) */
        .view-timeline { display: none; position: relative; padding-left: 30px; border-left: 2px solid var(--border); margin-left: 20px; }
        .timeline-item { position: relative; margin-bottom: 30px; }
        .timeline-dot {
            position: absolute; left: -36px; top: 0; width: 10px; height: 10px; background: var(--primary);
            border-radius: 50%; border: 4px solid white; box-shadow: 0 0 0 2px var(--primary);
        }
        .timeline-date { font-size: 13px; color: var(--text-sub); margin-bottom: 4px; font-weight: 600; }
        .timeline-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }

        /* 모달 (회고) */
        .modal-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 999;
        }
        .modal { background: white; padding: 24px; border-radius: 16px; width: 500px; max-width: 90%; }
        .modal h3 { margin-top: 0; }
        .tag-select { display: flex; gap: 8px; margin: 10px 0; }
        .tag-option { 
            padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 13px; 
        }
        .tag-option.selected { background: var(--primary); color: white; border-color: var(--primary); }

    </style>
</head>
<body>

<div class="container">
    
    <div class="dashboard-header">
        <div class="profile-card">
            <div class="profile-img"></div>
            <div>
                <h2 style="margin:0 0 8px 0;">문동국 학생의 아카이브</h2>
                <div style="font-size:14px; color:var(--text-sub);">
                    <span>채움중학교 3학년 1반</span> | 
                    <span>⭐ 인생과제 3건</span> | 
                    <span>📝 회고 5건</span>
                </div>
            </div>
        </div>
        <div class="chart-card">
            <h4 style="margin:0 0 10px 0; font-size:14px; color:var(--text-sub);">나의 역량 레이더</h4>
            <div class="chart-container">
                <canvas id="radarChart"></canvas>
            </div>
        </div>
    </div>

    <div class="control-bar">
        <div class="filter-group">
            <select class="select-box">
                <option>2026학년도</option>
                <option>2025학년도</option>
            </select>
            <select class="select-box">
                <option>전체 학기</option>
                <option>1학기</option>
                <option>2학기</option>
            </select>
            <div style="display:flex; align-items:center; gap:4px;">
                <input type="date" class="input-date"> ~ <input type="date" class="input-date">
            </div>
            <select class="select-box">
                <option>전체 과목</option>
                <option>과학</option>
                <option>국어</option>
                <option>수학</option>
            </select>
        </div>

        <div style="display:flex; gap:12px; align-items:center;">
            <div class="view-toggles">
                <button class="view-btn active" onclick="switchView('grid')" title="카드형"><i class="fa-solid fa-grid-2"></i> 카드</button>
                <button class="view-btn" onclick="switchView('list')" title="목록형"><i class="fa-solid fa-list"></i> 목록</button>
                <button class="view-btn" onclick="switchView('timeline')" title="성장 타임라인"><i class="fa-solid fa-clock-rotate-left"></i> 성장</button>
            </div>
            <button class="btn-primary" onclick="alert('PDF 보고서가 생성되었습니다.')">
                <i class="fa-solid fa-file-export"></i> 내보내기
            </button>
        </div>
    </div>

    <div id="contentContainer" class="content-area view-grid">
        </div>

</div>

<div class="modal-backdrop" id="reflectionModal">
    <div class="modal">
        <h3>📝 나의 배움 노트 (회고)</h3>
        <p style="color:var(--text-sub); font-size:14px; margin-bottom:15px;" id="modalTargetTitle">활동명</p>
        
        <label style="font-weight:600; font-size:13px;">무엇을 배웠나요?</label>
        <textarea style="width:100%; height:100px; padding:10px; border:1px solid var(--border); border-radius:8px; margin-top:5px; resize:none;" placeholder="느낀점, 성장한 점을 기록해 주세요."></textarea>
        
        <label style="font-weight:600; font-size:13px; display:block; margin-top:15px;">역량 태그 선택</label>
        <div class="tag-select">
            <span class="tag-option" onclick="this.classList.toggle('selected')">#창의력</span>
            <span class="tag-option" onclick="this.classList.toggle('selected')">#문제해결력</span>
            <span class="tag-option" onclick="this.classList.toggle('selected')">#협동심</span>
            <span class="tag-option" onclick="this.classList.toggle('selected')">#의사소통</span>
        </div>

        <div style="text-align:right; margin-top:20px;">
            <button class="btn-primary" style="display:inline-flex;" onclick="closeModal()">저장하기</button>
            <button onclick="closeModal()" style="border:none; background:transparent; cursor:pointer; color:var(--text-sub);">닫기</button>
        </div>
    </div>
</div>

<script>
    // [데이터] 활동 데이터 (목록/카드/타임라인 공통 사용)
    const items = [
        {
            id: 1, date: '2026.03.15', subject: '과학', class: '과학탐구반', teacher: '김과학',
            title: '친환경 에너지 도시 설계', score: 'A (95)', isBest: true,
            desc: '태양광 효율 실험 및 보고서 작성',
            reflection: '데이터 분석의 중요성을 깨달음', tags: ['#문제해결력', '#창의력']
        },
        {
            id: 2, date: '2026.04.02', subject: '국어', class: '3학년 1반', teacher: '이국어',
            title: '현대 소설 비평문 쓰기', score: 'B+ (88)', isBest: false,
            desc: '소설 "광장"을 읽고 비평문 작성',
            reflection: '', tags: ['#비판적사고']
        },
        {
            id: 3, date: '2026.05.20', subject: '미술', class: '예술창작반', teacher: '박미술',
            title: '우리 마을 벽화 디자인', score: 'Pass', isBest: true,
            desc: '지역 사회 연계 프로젝트',
            reflection: '팀원과의 협업을 배움', tags: ['#협동심', '#심미적감성']
        },
        {
            id: 4, date: '2026.06.10', subject: '수학', class: '3학년 1반', teacher: '최수학',
            title: '1학기 기말고사 수학', score: '92점', isBest: false,
            desc: '지필 평가',
            reflection: '', tags: ['#지식정보']
        }
    ];

    const container = document.getElementById('contentContainer');

    // [기능 1] 뷰 모드 전환 (Grid / List / Timeline)
    function switchView(mode) {
        // 버튼 스타일 초기화
        document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // 컨테이너 클래스 변경
        container.className = `content-area view-${mode}`;
        
        // 렌더링
        renderItems(mode);
    }

    // [기능 2] 렌더링 함수
    function renderItems(mode) {
        let html = '';

        if (mode === 'grid') { // 카드형
            items.forEach(item => {
                html += `
                    <div class="card-item ${item.isBest ? 'is-best' : ''}" onclick="openModal('${item.title}')">
                        ${item.isBest ? '<div class="best-ribbon">⭐ Pick</div>' : ''}
                        <div class="card-thumb"><i class="fa-solid fa-file-lines"></i></div>
                        <div class="card-body">
                            <div class="card-info">${item.date} | ${item.subject}</div>
                            <h3 class="card-title">${item.title}</h3>
                            <div class="card-info">담당: ${item.teacher} 선생님</div>
                            <div class="tag-list">
                                ${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });
        } else if (mode === 'list') { // 목록형 (테이블)
            html = `<table class="view-list">
                <thead><tr><th>날짜</th><th>교과/클래스</th><th>활동명</th><th>담당교사</th><th>점수/결과</th><th>관리</th></tr></thead>
                <tbody>`;
            items.forEach(item => {
                html += `
                    <tr>
                        <td>${item.date}</td>
                        <td><span class="tag">${item.subject}</span> ${item.class}</td>
                        <td style="font-weight:bold;">${item.isBest ? '⭐ ' : ''}${item.title}</td>
                        <td>${item.teacher}</td>
                        <td>${item.score}</td>
                        <td>
                            <button class="btn-primary" style="padding:4px 8px; font-size:12px;" onclick="openModal('${item.title}')">
                                <i class="fa-solid fa-pen"></i> 회고
                            </button>
                        </td>
                    </tr>
                `;
            });
            html += `</tbody></table>`;
        } else if (mode === 'timeline') { // 타임라인 (성장 뷰)
            items.forEach(item => {
                html += `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-date">${item.date}</div>
                        <div class="timeline-card">
                            <div style="display:flex; justify-content:space-between;">
                                <strong style="font-size:16px;">${item.title}</strong>
                                <span class="tag">${item.subject}</span>
                            </div>
                            <p style="margin:8px 0; color:var(--text-sub); font-size:14px;">${item.desc}</p>
                            ${item.reflection ? `<div style="background:#fffbeb; padding:8px; border-radius:6px; font-size:13px; margin-top:8px;">💡 "${item.reflection}"</div>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        container.innerHTML = html;
    }

    // [기능 3] 회고 모달 제어
    function openModal(title) {
        document.getElementById('modalTargetTitle').innerText = title;
        document.getElementById('reflectionModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('reflectionModal').style.display = 'none';
    }

    // [기능 4] 차트 초기화
    new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: {
            labels: ['지식', '창의', '감성', '소통', '공동체', '자기관리'],
            datasets: [{
                label: '나의 역량',
                data: [80, 90, 70, 85, 60, 75],
                backgroundColor: 'rgba(79, 70, 229, 0.2)',
                borderColor: '#4f46e5',
                pointBackgroundColor: '#4f46e5'
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { r: { suggestedMin: 0, suggestedMax: 100, ticks: { display: false } } },
            maintainAspectRatio: false
        }
    });

    // 초기 렌더링
    renderItems('grid');

</script>

</body>
</html>
