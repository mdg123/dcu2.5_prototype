<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다채움 - 명예의 전당</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../common-nav.css">
    <style>
        /* ============================================
           CSS 변수 및 리셋
           ============================================ */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --purple: #8b5cf6;
            --pink: #ec4899;

            --medal-gold: #FFD700;
            --medal-silver: #C0C0C0;
            --medal-bronze: #CD7F32;
            --medal-diamond: #b9f2ff;
            --rank-highlight-bg: #FFFBEB;

            --bg-page: #F5F7FA;
            --bg-card: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #1f2937;
            --text-muted: #6B7280;
            --border-color: #e5e7eb;

            --card-radius: 12px;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.08);
            --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ============================================
           메인 컨테이너
           ============================================ */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        /* ============================================
           페이지 헤더
           ============================================ */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .page-title-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .period-select {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-secondary);
            background: var(--bg-card);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .period-select:focus {
            border-color: var(--primary);
        }

        .btn-archive {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-archive:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ============================================
           탭 메뉴
           ============================================ */
        .tab-bar {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
            gap: 0;
        }

        .tab-item {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            user-select: none;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: 'Pretendard', sans-serif;
        }

        .tab-item:hover {
            color: var(--primary);
        }

        .tab-item.active {
            color: var(--primary);
            font-weight: 600;
            border-bottom-color: var(--primary);
        }

        /* ============================================
           컨트롤 바
           ============================================ */
        .control-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .sort-select {
            padding: 7px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-secondary);
            background: var(--bg-card);
            cursor: pointer;
            outline: none;
        }

        .sort-select:focus {
            border-color: var(--primary);
        }

        .count-btns {
            display: flex;
            gap: 6px;
        }

        .count-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .count-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .count-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* ============================================
           랭킹 리스트
           ============================================ */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ranking-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: var(--bg-card);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            transition: all 0.2s;
            cursor: pointer;
        }

        .ranking-card:hover {
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-1px);
        }

        .ranking-card.top-rank {
            background: var(--rank-highlight-bg);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .ranking-card.top-rank:hover {
            border-color: rgba(255, 215, 0, 0.4);
        }

        /* 순위 영역 */
        .rank-area {
            flex-shrink: 0;
            width: 48px;
            text-align: center;
        }

        .rank-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .rank-medal {
            font-size: 32px;
            line-height: 1;
        }

        /* 썸네일 */
        .rank-thumb {
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        .rank-thumb.class-thumb {
            border-radius: 12px;
        }

        /* 정보 영역 */
        .rank-info {
            flex: 1;
            min-width: 0;
        }

        .rank-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .rank-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .rank-badge.badge-bronze {
            background: #fef3e2;
            color: #CD7F32;
        }

        .rank-badge.badge-silver {
            background: #f3f4f6;
            color: #71717a;
        }

        .rank-badge.badge-gold {
            background: #fefce8;
            color: #b45309;
        }

        .rank-badge.badge-diamond {
            background: #ecfeff;
            color: #0891b2;
        }

        .rank-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .rank-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .rank-meta i {
            font-size: 12px;
        }

        /* 점수 영역 */
        .rank-score-area {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .score-bars {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 200px;
        }

        .score-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-bar-label {
            font-size: 11px;
            color: var(--text-muted);
            width: 42px;
            text-align: right;
            flex-shrink: 0;
        }

        .score-bar-track {
            flex: 1;
            height: 6px;
            background: #f3f4f6;
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .score-bar-fill.bar-activity {
            background: var(--primary);
        }

        .score-bar-fill.bar-attendance {
            background: var(--success);
        }

        .score-bar-fill.bar-feedback {
            background: var(--warning);
        }

        .score-bar-fill.bar-members {
            background: var(--purple);
        }

        .score-bar-value {
            font-size: 11px;
            color: var(--text-muted);
            width: 28px;
            flex-shrink: 0;
        }

        .total-score {
            text-align: center;
            flex-shrink: 0;
        }

        .total-score-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .total-score-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* 차트 보기 버튼 */
        .btn-chart {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-chart:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #eff6ff;
        }

        /* ============================================
           레이더 차트 모달
           ============================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            max-width: 480px;
            width: 100%;
            overflow: hidden;
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: #f3f4f6;
        }

        .modal-body {
            padding: 24px;
        }

        .chart-container {
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
        }

        .modal-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
        }

        .modal-info-label {
            color: var(--text-muted);
        }

        .modal-info-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ============================================
           아카이브 모달
           ============================================ */
        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }

        .archive-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            background: #f9fafb;
            transition: background 0.2s;
        }

        .archive-item:hover {
            background: #f3f4f6;
        }

        .archive-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .archive-month {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .archive-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .archive-item-current {
            background: #eff6ff;
            border: 1px solid rgba(37, 99, 235, 0.15);
        }

        .archive-current-badge {
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
        }

        .btn-archive-detail {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 12px;
            font-family: 'Pretendard', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-archive-detail:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ============================================
           배지 범례
           ============================================ */
        .badge-legend {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            box-shadow: var(--card-shadow);
            flex-wrap: wrap;
        }

        .badge-legend-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-right: 4px;
        }

        .badge-legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .badge-legend-icon {
            font-size: 14px;
        }

        /* ============================================
           크리에이터 전용 스타일
           ============================================ */
        .creator-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .creator-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .creator-stat strong {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* ============================================
           반응형: 1024px 이하
           ============================================ */
        @media (max-width: 1024px) {
            .main-container {
                padding: 24px 16px 48px;
            }

            .score-bars {
                width: 160px;
            }

            .total-score-value {
                font-size: 24px;
            }
        }

        /* ============================================
           반응형: 768px 이하
           ============================================ */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
            }

            .period-select {
                flex: 1;
            }

            .tab-item {
                padding: 10px 16px;
                font-size: 14px;
            }

            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .count-btns {
                justify-content: flex-end;
            }

            .ranking-card {
                flex-wrap: wrap;
                padding: 14px 16px;
                gap: 12px;
            }

            .rank-area {
                width: 36px;
            }

            .rank-number {
                font-size: 18px;
            }

            .rank-medal {
                font-size: 24px;
            }

            .rank-thumb {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }

            .rank-thumb.class-thumb {
                border-radius: 10px;
            }

            .rank-name {
                font-size: 14px;
            }

            .rank-score-area {
                width: 100%;
                padding-left: 52px;
                gap: 12px;
            }

            .score-bars {
                flex: 1;
                width: auto;
            }

            .total-score-value {
                font-size: 22px;
            }

            .rank-meta {
                font-size: 12px;
                gap: 8px;
            }

            .badge-legend {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .modal-card {
                max-width: 100%;
                margin: 0 8px;
            }

            .creator-stats {
                gap: 10px;
            }

            .creator-stat {
                font-size: 12px;
            }
        }

        /* ============================================
           빈 상태 (확장 시)
           ============================================ */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ============================================
           스크롤바 커스텀
           ============================================ */
        .archive-list::-webkit-scrollbar {
            width: 6px;
        }

        .archive-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .archive-list::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
    </style>
</head>
<body data-gnb-page="portal" data-gnb-base="../">

    <!-- 메인 컨테이너 -->
    <div class="main-container">
        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div class="page-title-area">
                <button onclick="history.back()" style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border-color);background:#fff;cursor:pointer;color:var(--text-muted);font-size:16px;flex-shrink:0;transition:all 0.2s" onmouseover="this.style.background='var(--bg-page)';this.style.color='var(--text-primary)'" onmouseout="this.style.background='#fff';this.style.color='var(--text-muted)'" title="이전 페이지로 돌아가기"><i class="fas fa-arrow-left"></i></button>
                <div class="page-title-icon">
                    <i class="fas fa-trophy"></i>
                </div>
                <div>
                    <div class="page-title">명예의 전당</div>
                    <div class="page-title-sub">다채움 인기 클래스와 크리에이터를 확인하세요</div>
                </div>
            </div>
            <div class="header-controls">
                <select class="period-select" id="periodSelect">
                    <option value="2026-03" selected>2026년 3월</option>
                    <option value="2026-02">2026년 2월</option>
                    <option value="2026-01">2026년 1월</option>
                    <option value="2025-12">2025년 12월</option>
                    <option value="2025-11">2025년 11월</option>
                    <option value="2025-10">2025년 10월</option>
                    <option value="2025-09">2025년 9월</option>
                    <option value="2025-08">2025년 8월</option>
                    <option value="2025-07">2025년 7월</option>
                    <option value="2025-06">2025년 6월</option>
                    <option value="2025-05">2025년 5월</option>
                    <option value="2025-04">2025년 4월</option>
                </select>
                <button class="btn-archive" id="btnArchive" onclick="openArchiveModal()">
                    <i class="fas fa-clock-rotate-left"></i>
                    이전 기록 보기
                </button>
            </div>
        </div>

        <!-- 탭 바 -->
        <div class="tab-bar">
            <button class="tab-item active" data-tab="classes" onclick="switchTab('classes')">
                <i class="fas fa-chalkboard-user"></i>&nbsp; 인기 클래스
            </button>
            <button class="tab-item" data-tab="creators" onclick="switchTab('creators')">
                <i class="fas fa-user-star"></i>&nbsp; 인기 크리에이터
            </button>
        </div>

        <!-- 배지 범례 -->
        <div class="badge-legend">
            <span class="badge-legend-title"><i class="fas fa-medal"></i> 배지 등급</span>
            <span class="badge-legend-item">
                <span class="badge-legend-icon" style="color: var(--medal-bronze);">
                    <i class="fas fa-award"></i>
                </span>
                브론즈 (1회)
            </span>
            <span class="badge-legend-item">
                <span class="badge-legend-icon" style="color: var(--medal-silver);">

    <!-- 레이더 차트 모달 -->

                    <i class="fas fa-xmark"></i>

                <div class="archive-list" id="archiveList">
                    <!-- JS 동적 생성 -->
                </div>
            </div>
        </div>
    </div>

    <script src="../common-nav.js"></script>
    <script>
        // ============================================
        // 더미 데이터
        // ============================================

        const CLASS_COLORS = [
            '#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6',
            '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6366f1'
        ];

        const topClasses = [
            { rank: 1, name: "초등 수학 3-1 곱셈구구", creator: "김영희", members: 342, badge: "gold", badgeCount: 7, score: { activity: 95, attendance: 92, feedback: 88, members: 85 }, total: 90 },
            { rank: 2, name: "중학 과학 실험교실", creator: "이철수", members: 287, badge: "silver", badgeCount: 4, score: { activity: 91, attendance: 89, feedback: 90, members: 78 }, total: 87 },
            { rank: 3, name: "고등 영어 독해 마스터", creator: "박지원", members: 256, badge: "gold", badgeCount: 6, score: { activity: 88, attendance: 94, feedback: 82, members: 72 }, total: 84 },
            { rank: 4, name: "초등 코딩 스크래치", creator: "정하윤", members: 198, badge: "bronze", badgeCount: 2, score: { activity: 82, attendance: 85, feedback: 79, members: 68 }, total: 79 },
            { rank: 5, name: "중학 국어 독서토론", creator: "최수아", members: 176, badge: "silver", badgeCount: 3, score: { activity: 78, attendance: 91, feedback: 75, members: 65 }, total: 77 },
            { rank: 6, name: "고등 물리 심화", creator: "한도윤", members: 145, badge: null, badgeCount: 0, score: { activity: 85, attendance: 78, feedback: 71, members: 60 }, total: 74 },
            { rank: 7, name: "초등 음악 우쿨렐레", creator: "강서연", members: 134, badge: "bronze", badgeCount: 1, score: { activity: 74, attendance: 88, feedback: 68, members: 58 }, total: 72 },
            { rank: 8, name: "중학 역사 탐구", creator: "윤민서", members: 128, badge: null, badgeCount: 0, score: { activity: 76, attendance: 82, feedback: 65, members: 55 }, total: 70 },
            { rank: 9, name: "고등 수학 미적분", creator: "임지우", members: 115, badge: "diamond", badgeCount: 12, score: { activity: 72, attendance: 80, feedback: 70, members: 52 }, total: 69 },
            { rank: 10, name: "초등 미술 수채화", creator: "송하은", members: 108, badge: "bronze", badgeCount: 1, score: { activity: 70, attendance: 76, feedback: 72, members: 50 }, total: 67 }
        ];

        const topCreators = [
            { rank: 1, name: "김영희", school: "청주교육대학교부설초", classes: 12, contents: 156, subscribers: 1240, badge: "diamond", badgeCount: 11, score: 95 },
            { rank: 2, name: "이철수", school: "충북과학고등학교", classes: 8, contents: 98, subscribers: 980, badge: "gold", badgeCount: 7, score: 91 },
            { rank: 3, name: "박지원", school: "청주중앙중학교", classes: 10, contents: 134, subscribers: 870, badge: "gold", badgeCount: 5, score: 88 },
            { rank: 4, name: "정하윤", school: "옥천초등학교", classes: 6, contents: 72, subscribers: 650, badge: "silver", badgeCount: 4, score: 82 },
            { rank: 5, name: "최수아", school: "충주중학교", classes: 7, contents: 89, subscribers: 580, badge: "silver", badgeCount: 3, score: 79 },
            { rank: 6, name: "한도윤", school: "청주고등학교", classes: 5, contents: 65, subscribers: 420, badge: "bronze", badgeCount: 2, score: 76 },
            { rank: 7, name: "강서연", school: "보은초등학교", classes: 4, contents: 48, subscribers: 380, badge: "bronze", badgeCount: 1, score: 73 },
            { rank: 8, name: "윤민서", school: "제천중학교", classes: 3, contents: 42, subscribers: 310, badge: null, badgeCount: 0, score: 70 },
            { rank: 9, name: "임지우", school: "음성고등학교", classes: 5, contents: 58, subscribers: 290, badge: "bronze", badgeCount: 1, score: 68 },
            { rank: 10, name: "송하은", school: "단양초등학교", classes: 3, contents: 35, subscribers: 250, badge: null, badgeCount: 0, score: 65 }
        ];

        // 아카이브 이력
        const archiveHistory = [
            { month: "2026년 3월", classCount: 10, creatorCount: 10, current: true },
            { month: "2026년 2월", classCount: 10, creatorCount: 10, current: false },
            { month: "2026년 1월", classCount: 10, creatorCount: 10, current: false },
            { month: "2025년 12월", classCount: 10, creatorCount: 10, current: false },
            { month: "2025년 11월", classCount: 10, creatorCount: 10, current: false },
            { month: "2025년 10월", classCount: 10, creatorCount: 10, current: false },
            { month: "2025년 9월", classCount: 10, creatorCount: 8, current: false },
            { month: "2025년 8월", classCount: 10, creatorCount: 10, current: false },
            { month: "2025년 7월", classCount: 10, creatorCount: 10, current: false },
            { month: "2025년 6월", classCount: 10, creatorCount: 10, current: false },
            { month: "2025년 5월", classCount: 10, creatorCount: 9, current: false },
            { month: "2025년 4월", classCount: 10, creatorCount: 10, current: false }
        ];

        // ============================================
        // 상태 관리
        // ============================================
        let currentTab = 'classes';
        let currentSort = 'total';
        let currentDisplayCount = 10;
        let radarChartInstance = null;

        // ============================================
        // 유틸 함수
        // ============================================

        function getMedalHTML(rank) {
            if (rank === 1) return '<span class="rank-medal" title="1위"><i class="fas fa-medal" style="color: #FFD700;"></i></span>';
            if (rank === 2) return '<span class="rank-medal" title="2위"><i class="fas fa-medal" style="color: #C0C0C0;"></i></span>';
            if (rank === 3) return '<span class="rank-medal" title="3위"><i class="fas fa-medal" style="color: #CD7F32;"></i></span>';
            return '<span class="rank-number">' + rank + '</span>';
        }

        function getBadgeHTML(badge, count) {
            if (!badge) return '';
            const map = {
                bronze: { cls: 'badge-bronze', icon: '<i class="fas fa-award" style="color:#CD7F32;"></i>', label: '브론즈' },
                silver: { cls: 'badge-silver', icon: '<i class="fas fa-award" style="color:#C0C0C0;"></i>', label: '실버' },
                gold: { cls: 'badge-gold', icon: '<i class="fas fa-award" style="color:#FFD700;"></i>', label: '골드' },
                diamond: { cls: 'badge-diamond', icon: '<i class="fas fa-gem" style="color:#0891b2;"></i>', label: '다이아' }
            };
            const b = map[badge];
            if (!b) return '';
            return '<span class="rank-badge ' + b.cls + '">' + b.icon + ' ' + b.label + ' ' + count + '회</span>';
        }

        function getBadgeText(badge, count) {
            if (!badge) return '-';
            const map = { bronze: '브론즈', silver: '실버', gold: '골드', diamond: '다이아' };
            return (map[badge] || '-') + ' (' + count + '회 선정)';
        }

        function getThumbColor(index) {
            return CLASS_COLORS[index % CLASS_COLORS.length];
        }

        function getInitial(name) {
            return name.charAt(0);
        }

        // ============================================
        // 탭 전환
        // ============================================
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-item').forEach(function(el) {
                el.classList.toggle('active', el.getAttribute('data-tab') === tab);
            });

            // 정렬 옵션 업데이트
            const sortSelect = document.getElementById('sortSelect');
            if (tab === 'creators') {
                sortSelect.innerHTML = '<option value="total">종합점수순</option><option value="classes">클래스 수순</option><option value="contents">콘텐츠순</option><option value="subscribers">구독자순</option>';
            } else {
                sortSelect.innerHTML = '<option value="total">종합점수순</option><option value="activity">활동량순</option><option value="attendance">출석률순</option><option value="feedback">피드백순</option><option value="members">멤버수순</option>';
            }
            currentSort = 'total';
            renderList();
        }

        // ============================================
        // 정렬
        // ============================================
        function applySort() {
            currentSort = document.getElementById('sortSelect').value;
            renderList();
        }

        function sortData(data, tab) {
            const sorted = [...data];
            if (tab === 'classes') {
                switch (currentSort) {
                    case 'activity':    sorted.sort((a, b) => b.score.activity - a.score.activity); break;
                    case 'attendance':  sorted.sort((a, b) => b.score.attendance - a.score.attendance); break;
                    case 'feedback':    sorted.sort((a, b) => b.score.feedback - a.score.feedback); break;
                    case 'members':     sorted.sort((a, b) => b.members - a.members); break;
                    default:            sorted.sort((a, b) => b.total - a.total);
                }
            } else {
                switch (currentSort) {
                    case 'classes':     sorted.sort((a, b) => b.classes - a.classes); break;
                    case 'contents':    sorted.sort((a, b) => b.contents - a.contents); break;
                    case 'subscribers': sorted.sort((a, b) => b.subscribers - a.subscribers); break;
                    default:            sorted.sort((a, b) => b.score - a.score);
                }
            }
            // 정렬 후 순위 재부여
            sorted.forEach((item, i) => { item._displayRank = i + 1; });
            return sorted;
        }

        // ============================================
        // 표시 개수 변경
        // ============================================
        function setDisplayCount(count) {
            currentDisplayCount = count;
            document.querySelectorAll('.count-btn').forEach(function(el) {
                el.classList.toggle('active', parseInt(el.getAttribute('data-count')) === count);
            });
            renderList();
        }

        // ============================================
        // 리스트 렌더링
        // ============================================
        function renderList() {
            const container = document.getElementById('rankingList');
            container.innerHTML = '';

            if (currentTab === 'classes') {
                renderClassList(container);
            } else {
                renderCreatorList(container);
            }
        }

        function renderClassList(container) {
            const sorted = sortData(topClasses, 'classes');
            const items = sorted.slice(0, currentDisplayCount);

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-trophy"></i><p>데이터가 없습니다.</p></div>';
                return;
            }

            items.forEach(function(item, index) {
                const rank = item._displayRank;
                const isTop = rank <= 3;
                const color = getThumbColor(index);

                const card = document.createElement('div');
                card.className = 'ranking-card' + (isTop ? ' top-rank' : '');
                card.onclick = function() { openChartModal(item); };

                card.innerHTML =
                    '<div class="rank-area">' + getMedalHTML(rank) + '</div>' +
                    '<div class="rank-thumb class-thumb" style="background:' + color + ';">' +
                        '<i class="fas fa-chalkboard"></i>' +
                    '</div>' +
                    '<div class="rank-info">' +
                        '<div class="rank-name-row">' +
                            '<span class="rank-name">' + item.name + '</span>' +
                            getBadgeHTML(item.badge, item.badgeCount) +
                        '</div>' +
                        '<div class="rank-meta">' +
                            '<span><i class="fas fa-user-pen"></i> ' + item.creator + '</span>' +
                            '<span><i class="fas fa-users"></i> ' + item.members.toLocaleString() + '명</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="rank-score-area">' +
                        '<div class="score-bars">' +
                            renderScoreBar('활동량', item.score.activity, 'bar-activity') +
                            renderScoreBar('출석률', item.score.attendance, 'bar-attendance') +
                            renderScoreBar('피드백', item.score.feedback, 'bar-feedback') +
                            renderScoreBar('멤버수', item.score.members, 'bar-members') +
                        '</div>' +
                        '<div class="total-score">' +
                            '<div class="total-score-value">' + item.total + '</div>' +
                            '<div class="total-score-label">종합</div>' +
                        '</div>' +
                        '<button class="btn-chart" title="분석 차트 보기" onclick="event.stopPropagation(); openChartModal(topClasses[' + (item.rank - 1) + ']);">' +
                            '<i class="fas fa-chart-radar"></i>' +
                        '</button>' +
                    '</div>';

                container.appendChild(card);
            });

            // 더미 추가 (표시 개수 > 10 일 때)
            if (currentDisplayCount > items.length) {
                const remaining = currentDisplayCount - items.length;
                for (let i = 0; i < Math.min(remaining, 5); i++) {
                    const fakeRank = items.length + i + 1;
                    const card = document.createElement('div');
                    card.className = 'ranking-card';
                    card.style.opacity = '0.5';
                    card.innerHTML =
                        '<div class="rank-area"><span class="rank-number">' + fakeRank + '</span></div>' +
                        '<div class="rank-thumb class-thumb" style="background:#d1d5db;"><i class="fas fa-chalkboard"></i></div>' +
                        '<div class="rank-info"><div class="rank-name" style="color: var(--text-muted);">준비 중인 클래스 데이터</div><div class="rank-meta"><span>추가 데이터 로딩 시 표시됩니다</span></div></div>';
                    container.appendChild(card);
                }
            }
        }

        function renderCreatorList(container) {
            const sorted = sortData(topCreators, 'creators');
            const items = sorted.slice(0, currentDisplayCount);

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-trophy"></i><p>데이터가 없습니다.</p></div>';
                return;
            }

            items.forEach(function(item, index) {
                const rank = item._displayRank;
                const isTop = rank <= 3;
                const color = getThumbColor(index);

                const card = document.createElement('div');
                card.className = 'ranking-card' + (isTop ? ' top-rank' : '');

                card.innerHTML =
                    '<div class="rank-area">' + getMedalHTML(rank) + '</div>' +
                    '<div class="rank-thumb" style="background:' + color + ';">' +
                        getInitial(item.name) +
                    '</div>' +
                    '<div class="rank-info">' +
                        '<div class="rank-name-row">' +
                            '<span class="rank-name">' + item.name + '</span>' +
                            getBadgeHTML(item.badge, item.badgeCount) +
                        '</div>' +
                        '<div class="rank-meta">' +
                            '<span><i class="fas fa-school"></i> ' + item.school + '</span>' +
                        '</div>' +
                        '<div class="creator-stats" style="margin-top: 6px;">' +
                            '<span class="creator-stat"><i class="fas fa-chalkboard-user" style="color:var(--primary);"></i> 클래스 <strong>' + item.classes + '</strong></span>' +
                            '<span class="creator-stat"><i class="fas fa-file-lines" style="color:var(--success);"></i> 콘텐츠 <strong>' + item.contents + '</strong></span>' +
                            '<span class="creator-stat"><i class="fas fa-user-plus" style="color:var(--purple);"></i> 구독 <strong>' + item.subscribers.toLocaleString() + '</strong></span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="rank-score-area">' +
                        '<div class="total-score">' +
                            '<div class="total-score-value">' + item.score + '</div>' +
                            '<div class="total-score-label">종합</div>' +
                        '</div>' +
                    '</div>';

                container.appendChild(card);
            });

            // 더미 추가
            if (currentDisplayCount > items.length) {
                const remaining = currentDisplayCount - items.length;
                for (let i = 0; i < Math.min(remaining, 5); i++) {
                    const fakeRank = items.length + i + 1;
                    const card = document.createElement('div');
                    card.className = 'ranking-card';
                    card.style.opacity = '0.5';
                    card.innerHTML =
                        '<div class="rank-area"><span class="rank-number">' + fakeRank + '</span></div>' +
                        '<div class="rank-thumb" style="background:#d1d5db;">' + '-' + '</div>' +
                        '<div class="rank-info"><div class="rank-name" style="color: var(--text-muted);">준비 중인 크리에이터 데이터</div><div class="rank-meta"><span>추가 데이터 로딩 시 표시됩니다</span></div></div>';
                    container.appendChild(card);
                }
            }
        }

        function renderScoreBar(label, value, barClass) {
            return '<div class="score-bar-row">' +
                '<span class="score-bar-label">' + label + '</span>' +
                '<div class="score-bar-track"><div class="score-bar-fill ' + barClass + '" style="width:' + value + '%;"></div></div>' +
                '<span class="score-bar-value">' + value + '</span>' +
            '</div>';
        }

        // ============================================
        // 레이더 차트 모달
        // ============================================
        function openChartModal(item) {
            const modal = document.getElementById('chartModal');
            modal.classList.add('open');

            document.getElementById('chartModalTitle').textContent = item.name + ' - 선정 기준 분석';

            // 모달 정보 업데이트
            document.querySelector('#modalInfoRank .modal-info-value').textContent = item.rank + '위';
            document.querySelector('#modalInfoTotal .modal-info-value').textContent = item.total + '점';
            document.querySelector('#modalInfoMembers .modal-info-value').textContent = item.members.toLocaleString() + '명';
            document.querySelector('#modalInfoBadge .modal-info-value').textContent = getBadgeText(item.badge, item.badgeCount);

            // 기존 차트 파괴
            if (radarChartInstance) {
                radarChartInstance.destroy();
            }

            const ctx = document.getElementById('radarChart').getContext('2d');
            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['활동량', '출석률', '피드백', '멤버수'],
                    datasets: [{
                        label: item.name,
                        data: [item.score.activity, item.score.attendance, item.score.feedback, item.score.members],
                        backgroundColor: 'rgba(37, 99, 235, 0.15)',
                        borderColor: '#2563eb',
                        borderWidth: 2,
                        pointBackgroundColor: '#2563eb',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(30, 41, 59, 0.92)',
                            titleFont: { family: 'Pretendard', size: 13, weight: '600' },
                            bodyFont: { family: 'Pretendard', size: 12 },
                            padding: 10,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    return context.label + ': ' + context.raw + '점';
                                }
                            }
                        }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            min: 0,
                            ticks: {
                                stepSize: 20,
                                font: { family: 'Pretendard', size: 10 },
                                color: '#9ca3af',
                                backdropColor: 'transparent'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.06)'
                            },
                            angleLines: {
                                color: 'rgba(0, 0, 0, 0.06)'
                            },
                            pointLabels: {
                                font: { family: 'Pretendard', size: 13, weight: '500' },
                                color: '#374151'
                            }
                        }
                    }
                }
            });
        }

        function closeChartModal() {
            document.getElementById('chartModal').classList.remove('open');
        }

        // ============================================
        // 아카이브 모달
        // ============================================
        function openArchiveModal() {
            const modal = document.getElementById('archiveModal');
            modal.classList.add('open');

            const list = document.getElementById('archiveList');
            list.innerHTML = '';

            archiveHistory.forEach(function(item) {
                const div = document.createElement('div');
                div.className = 'archive-item' + (item.current ? ' archive-item-current' : '');

                div.innerHTML =
                    '<div class="archive-item-left">' +
                        '<span class="archive-month">' + item.month + '</span>' +
                        '<span class="archive-count">클래스 ' + item.classCount + '건 / 크리에이터 ' + item.creatorCount + '건</span>' +
                    '</div>' +
                    (item.current
                        ? '<span class="archive-current-badge">현재</span>'
                        : '<button class="btn-archive-detail" onclick="loadArchive(\'' + item.month + '\')">상세 보기</button>'
                    );

                list.appendChild(div);
            });
        }

        function closeArchiveModal() {
            document.getElementById('archiveModal').classList.remove('open');
        }

        function loadArchive(month) {
            closeArchiveModal();
            // 기간 셀렉트를 해당 월로 변경 (UI 시뮬레이션)
            const selectEl = document.getElementById('periodSelect');
            const options = selectEl.options;
            for (let i = 0; i < options.length; i++) {
                if (options[i].textContent === month) {
                    selectEl.selectedIndex = i;
                    break;
                }
            }
            renderList();
        }

        // ============================================
        // 모달 바깥 클릭 닫기
        // ============================================
        document.getElementById('chartModal').addEventListener('click', function(e) {
            if (e.target === this) closeChartModal();
        });

        document.getElementById('archiveModal').addEventListener('click', function(e) {
            if (e.target === this) closeArchiveModal();
        });

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeChartModal();
                closeArchiveModal();
            }
        });

        // ============================================
        // 초기 렌더
        // ============================================
        renderList();
    </script>
</body>
</html>
