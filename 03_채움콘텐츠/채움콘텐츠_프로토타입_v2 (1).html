<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채움콘텐츠 프로토타입</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-200: #bfdbfe; --blue-400: #60a5fa;
  --blue-500: #3b82f6; --blue-600: #2563eb; --blue-700: #1d4ed8;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
  --emerald-50: #ecfdf5; --emerald-100: #d1fae5; --emerald-500: #10b981; --emerald-600: #059669; --emerald-700: #047857;
  --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-500: #f59e0b; --amber-700: #b45309;
  --red-50: #fef2f2; --red-100: #fee2e2; --red-400: #f87171; --red-500: #ef4444; --red-600: #dc2626; --red-700: #b91c1c;
  --purple-50: #faf5ff; --purple-100: #f3e8ff; --purple-200: #e9d5ff; --purple-500: #a855f7; --purple-600: #9333ea;
}
body { font-family: 'Pretendard Variable', 'Noto Sans KR', -apple-system, sans-serif; background: #eef1f6; color: var(--gray-800); font-size: 14px; line-height: 1.5; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input, select { font: inherit; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Main */
.main { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Cards */
.stat-card { flex: 1; background: #fff; border-radius: 12px; padding: 16px; border: 1px solid var(--gray-100); cursor: pointer; transition: all .2s; text-align: left; }
.stat-card:hover { border-color: var(--blue-200); box-shadow: 0 4px 12px rgba(59,130,246,.1); }
.stat-card-label { font-size: 11px; color: var(--gray-400); margin-bottom: 4px; }
.stat-card-value { font-size: 24px; font-weight: 800; color: var(--gray-800); }
.stat-card:hover .stat-card-value { color: var(--blue-600); }
.stat-card-change { font-size: 11px; margin-top: 4px; }
.stat-card-change.up { color: var(--emerald-500); }
.stat-card-change.down { color: var(--red-400); }

/* Status Badge */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 50px; font-size: 11px; font-weight: 600; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-public { background: var(--emerald-100); color: var(--emerald-700); }
.badge-public .badge-dot { background: var(--emerald-500); }
.badge-review { background: var(--amber-100); color: var(--amber-700); }
.badge-review .badge-dot { background: var(--amber-500); }
.badge-rejected { background: var(--red-100); color: var(--red-700); }
.badge-rejected .badge-dot { background: var(--red-500); }
.badge-private { background: var(--gray-100); color: var(--gray-500); }
.badge-private .badge-dot { background: var(--gray-400); }

/* Type Badge */
.type-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.type-영상 { background: #eff6ff; color: #2563eb; }
.type-이미지 { background: #faf5ff; color: #9333ea; }
.type-문서 { background: #fff7ed; color: #ea580c; }
.type-문항 { background: #f0fdfa; color: #0d9488; }
.type-평가지 { background: #fdf2f8; color: #db2777; }
.type-활동지 { background: #f7fee7; color: #65a30d; }
.type-수업꾸러미 { background: #fefce8; color: #a16207; }
.type-수업레시피 { background: #ecfeff; color: #0891b2; }

/* Content Card */
.content-card { background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); overflow: hidden; transition: all .25s; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.content-card:hover { box-shadow: 0 8px 24px rgba(37,99,235,.1); border-color: var(--blue-200); transform: translateY(-3px); }
.card-thumb { height: 140px; background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 50%, #ede9fe 100%); position: relative; display: flex; align-items: center; justify-content: center; }
.card-thumb-icon { font-size: 40px; opacity: .25; filter: saturate(0); }
.card-thumb .badge { position: absolute; top: 8px; left: 8px; }
.card-thumb .type-badge { position: absolute; top: 8px; right: 8px; }
.card-body { padding: 14px; }
.card-title { font-size: 13px; font-weight: 700; color: var(--gray-800); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 6px; }
.card-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--gray-500); margin-bottom: 8px; }
.card-meta .author-link { color: var(--blue-600); cursor: pointer; font-weight: 500; }
.card-meta .author-link:hover { text-decoration: underline; }
.card-actions { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--gray-400); }
.card-actions span { display: flex; align-items: center; gap: 3px; cursor: pointer; transition: color .15s; }
.card-actions span:hover { color: var(--blue-500); }

/* Compact Card */
.compact-card { display: flex; gap: 14px; background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); padding: 14px; transition: all .25s; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.compact-card:hover { box-shadow: 0 6px 18px rgba(37,99,235,.08); border-color: var(--blue-200); }
.compact-card .card-body { flex: 1; min-width: 0; padding: 0; }
.compact-badges { display: flex; gap: 6px; margin-bottom: 4px; }

/* List Row */
.list-row { display: flex; align-items: center; gap: 14px; background: #fff; border-radius: 12px; border: 1px solid var(--gray-200); padding: 14px; transition: all .2s; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.list-row:hover { box-shadow: 0 4px 14px rgba(37,99,235,.08); border-color: var(--blue-200); }
.list-row-thumb { width: 64px; height: 48px; border-radius: 10px; background: linear-gradient(135deg, #e0e7ff, #dbeafe); display: flex; align-items: center; justify-content: center; font-size: 20px; opacity: .5; flex-shrink: 0; }
.list-row-body { flex: 1; min-width: 0; }
.list-row-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--gray-800); }
.list-row-meta { font-size: 11px; color: var(--gray-500); }

/* Action Alert */
.action-alert { background: linear-gradient(135deg, var(--amber-50), var(--red-50)); border-radius: 12px; padding: 16px; border: 1px solid rgba(245,158,11,.15); margin-bottom: 20px; }
.action-alert-title { font-size: 11px; font-weight: 800; color: var(--amber-700); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.action-items { display: flex; gap: 10px; flex-wrap: wrap; }
.action-item { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 8px; padding: 8px 16px; font-size: 13px; box-shadow: 0 1px 3px rgba(0,0,0,.06); cursor: pointer; transition: box-shadow .15s; }
.action-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
.action-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Grid Layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.flex-row { display: flex; gap: 8px; align-items: center; }
.flex-wrap { flex-wrap: wrap; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-1 { flex: 1; min-width: 0; }
.flex-col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; } .gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.mb-4 { margin-bottom: 4px; } .mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; } .mb-16 { margin-bottom: 16px; } .mb-20 { margin-bottom: 20px; } .mb-32 { margin-bottom: 32px; }
.mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
.section-label { font-size: 11px; font-weight: 800; color: var(--gray-400); letter-spacing: .05em; margin-bottom: 12px; }
.section-title { font-size: 15px; font-weight: 800; color: var(--gray-800); }
.link-sm { font-size: 11px; color: var(--blue-500); cursor: pointer; }
.link-sm:hover { text-decoration: underline; }
.text-xs { font-size: 11px; } .text-sm { font-size: 13px; }
.text-gray { color: var(--gray-400); } .text-blue { color: var(--blue-500); } .text-bold { font-weight: 700; } .text-center { text-align: center; }

/* Filters */
.filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-label { font-size: 11px; color: var(--gray-400); margin-right: 4px; }
.filter-check { display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font-size: 11px; border: 1px solid var(--gray-100); background: #fff; color: var(--gray-500); cursor: pointer; transition: all .15s; user-select: none; }
.filter-check:hover { border-color: var(--gray-200); }
.filter-check.active { background: var(--blue-50); border-color: var(--blue-200); color: var(--blue-600); }
.filter-check input[type="checkbox"] { width: 12px; height: 12px; accent-color: var(--blue-500); }
.status-btn { padding: 4px 10px; border-radius: 50px; font-size: 11px; color: var(--gray-500); background: var(--gray-50); cursor: pointer; transition: all .15s; }
.status-btn:hover { background: var(--gray-100); }
.status-btn.active { background: var(--gray-800); color: #fff; }
.period-btn { padding: 2px 8px; border-radius: 4px; font-size: 11px; color: var(--gray-500); background: var(--gray-100); cursor: pointer; transition: all .15s; }
.period-btn:hover { background: var(--gray-200); }
.period-btn.active { background: var(--blue-500); color: #fff; }
.metric-btn { padding: 4px 10px; border-radius: 50px; font-size: 11px; color: var(--gray-400); cursor: pointer; transition: all .15s; }
.metric-btn:hover { background: var(--gray-50); }
.metric-btn.active { background: var(--blue-100); color: var(--blue-600); font-weight: 600; }
.view-toggle { display: flex; gap: 2px; border: 1px solid var(--gray-100); border-radius: 8px; padding: 2px; }
.view-btn { padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.view-btn.active { background: var(--gray-100); }
.tag-btn { padding: 4px 12px; background: var(--gray-50); border-radius: 50px; font-size: 11px; color: var(--gray-600); cursor: pointer; white-space: nowrap; transition: all .15s; }
.tag-btn:hover { background: var(--blue-50); color: var(--blue-600); }
.keyword-tag { padding: 4px 12px; background: #fff; border-radius: 50px; font-size: 11px; color: var(--gray-600); border: 1px solid var(--gray-200); }
.keyword-edit-btn { padding: 4px 12px; border-radius: 50px; font-size: 11px; color: var(--blue-500); border: 1px solid var(--blue-200); background: var(--blue-50); cursor: pointer; }
.keyword-edit-btn:hover { background: var(--blue-100); }
.btn-primary { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--blue-500); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .15s; }
.btn-primary:hover { background: var(--blue-600); }
.btn-secondary { padding: 8px 16px; background: var(--gray-100); border-radius: 8px; font-size: 13px; color: var(--gray-600); transition: background .15s; }
.btn-secondary:hover { background: var(--gray-200); }
.btn-outline { padding: 6px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 12px; color: var(--gray-600); transition: all .15s; }
.btn-outline:hover { border-color: var(--blue-300); color: var(--blue-600); background: var(--blue-50); }
.btn-white { padding: 8px 20px; background: #fff; color: var(--blue-600); border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .15s; }
.btn-white:hover { background: var(--blue-50); }
.dismiss-btn { position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,.8); backdrop-filter: blur(4px); border-radius: 50px; padding: 2px 8px; font-size: 11px; color: var(--gray-400); cursor: pointer; transition: all .15s; }
.dismiss-btn:hover { color: var(--red-400); background: var(--red-50); }

/* Card Checkbox & Menu */
.content-card { position: relative; }
.card-checkbox { position: absolute; top: 8px; left: 8px; z-index: 5; width: 20px; height: 20px; accent-color: var(--blue-500); cursor: pointer; opacity: 0; transition: opacity .15s; }
.content-card:hover .card-checkbox, .card-checkbox:checked { opacity: 1; }
.content-card.selected { border-color: var(--blue-400); box-shadow: 0 0 0 2px var(--blue-100), 0 4px 12px rgba(37,99,235,.12); }
.card-menu-btn { position: absolute; top: 8px; right: 8px; z-index: 5; width: 26px; height: 26px; border-radius: 6px; background: rgba(255,255,255,.85); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--gray-500); cursor: pointer; opacity: 0; transition: all .15s; border: 1px solid var(--gray-200); }
.content-card:hover .card-menu-btn { opacity: 1; }
.card-menu-btn:hover { background: #fff; color: var(--gray-800); }

/* Card Dropdown Menu */
.card-dropdown { position: absolute; top: 36px; right: 8px; z-index: 50; background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.12); min-width: 150px; padding: 4px; }
.card-dropdown-item { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 12px; border-radius: 6px; font-size: 12px; color: var(--gray-600); cursor: pointer; transition: background .1s; }
.card-dropdown-item:hover { background: var(--gray-50); }
.card-dropdown-item svg { flex-shrink: 0; }
.card-dropdown-item.danger { color: var(--red-500); }
.card-dropdown-item.danger:hover { background: var(--red-50); }

/* Bulk Action Toolbar */
.bulk-toolbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--blue-600); color: #fff; border-radius: 10px; margin-bottom: 12px; font-size: 13px; animation: slideDown .2s ease; }
.bulk-toolbar-count { font-weight: 700; }
.bulk-toolbar-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; background: rgba(255,255,255,.15); color: #fff; }
.bulk-toolbar-btn:hover { background: rgba(255,255,255,.25); }
.bulk-toolbar-btn.danger { background: rgba(239,68,68,.3); }
.bulk-toolbar-btn.danger:hover { background: rgba(239,68,68,.5); }
.bulk-toolbar .bulk-close { margin-left: auto; padding: 4px; border-radius: 4px; cursor: pointer; opacity: .7; }
.bulk-toolbar .bulk-close:hover { opacity: 1; background: rgba(255,255,255,.15); }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* Folder Modal */
.folder-modal-list { max-height: 260px; overflow-y: auto; }
.folder-modal-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; cursor: pointer; transition: background .1s; border: 1px solid transparent; }
.folder-modal-item:hover { background: var(--gray-50); }
.folder-modal-item.selected { background: var(--blue-50); border-color: var(--blue-200); }
.folder-modal-item-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; color: var(--gray-500); }
.folder-modal-item.selected .folder-modal-item-icon { background: var(--blue-100); color: var(--blue-600); }
.folder-modal-item-name { font-size: 13px; font-weight: 600; color: var(--gray-700); }
.folder-modal-item-count { font-size: 11px; color: var(--gray-400); }
.folder-modal-input { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; transition: border-color .15s; }
.folder-modal-input:focus { border-color: var(--blue-400); }

/* List Row Checkbox */
.list-row { position: relative; }
.list-row-check { width: 16px; height: 16px; accent-color: var(--blue-500); cursor: pointer; flex-shrink: 0; }
.list-row.selected { background: var(--blue-50); border-color: var(--blue-200); }

/* Sidebar */
.page-with-sidebar { display: flex; gap: 20px; }
.sidebar { width: 210px; flex-shrink: 0; }
.sidebar-box { background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sidebar-title { font-size: 11px; font-weight: 800; color: var(--gray-400); letter-spacing: .05em; }
.folder-btn { width: 100%; text-align: left; padding: 6px 8px; border-radius: 8px; font-size: 13px; color: var(--gray-600); display: flex; align-items: center; justify-content: space-between; transition: all .15s; margin-bottom: 2px; }
.folder-btn:hover { background: var(--gray-50); }
.folder-btn.active { background: var(--blue-50); color: var(--blue-600); font-weight: 600; }
.folder-btn-inner { display: flex; align-items: center; gap: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.folder-count { font-size: 11px; color: var(--gray-300); }
.subfolder-btn { width: 100%; text-align: left; padding: 4px 8px 4px 28px; border-radius: 8px; font-size: 11px; color: var(--gray-500); transition: background .15s; }
.subfolder-btn:hover { background: var(--gray-50); }
.add-btn { padding: 4px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.add-btn:hover { background: var(--gray-100); }

/* Line Chart */
.chart-box { background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.line-chart { width: 100%; height: 160px; }

/* Channel */
.channel-banner { background: linear-gradient(135deg, var(--blue-500), var(--blue-400), var(--purple-500)); border-radius: 16px; padding: 24px; color: #fff; position: relative; overflow: hidden; margin-bottom: 16px; }
.channel-banner-pattern { position: absolute; inset: 0; opacity: .08; background-image: radial-gradient(circle at 20% 50%, #fff 1px, transparent 1px); background-size: 20px 20px; }
.channel-banner-inner { position: relative; display: flex; align-items: center; gap: 16px; }
.channel-avatar-lg { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,.2); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid rgba(255,255,255,.3); flex-shrink: 0; }
.channel-info h2 { font-size: 20px; font-weight: 800; }
.channel-info p { font-size: 13px; color: rgba(255,255,255,.7); margin-top: 2px; }
.channel-stats { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; color: rgba(255,255,255,.8); }
.channel-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--gray-100); margin-bottom: 16px; }
.channel-tab { padding: 8px 16px; font-size: 13px; border-bottom: 2px solid transparent; color: var(--gray-400); transition: all .15s; }
.channel-tab:hover { color: var(--gray-600); }
.channel-tab.active { border-bottom-color: var(--blue-500); color: var(--blue-600); font-weight: 600; }
.channel-card { background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); padding: 16px; cursor: pointer; transition: all .25s; text-align: left; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.channel-card:hover { box-shadow: 0 6px 20px rgba(37,99,235,.1); border-color: var(--blue-200); transform: translateY(-2px); }
.channel-card-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-100), var(--purple-100)); display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 8px; }
.channel-card-name { font-size: 13px; font-weight: 700; }
.channel-card-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.channel-card-stats { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--gray-400); }
.post-card { background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); padding: 16px; cursor: pointer; transition: all .25s; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.post-card:hover { box-shadow: 0 4px 14px rgba(37,99,235,.08); border-color: var(--blue-200); }
.post-title { font-size: 13px; font-weight: 600; }
.post-meta { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--gray-400); }
.channel-info-box { background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); padding: 24px; max-width: 500px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.folder-section { margin-bottom: 24px; }
.folder-section-title { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; }

/* My Channel Manage */
.manage-banner { background: linear-gradient(135deg, var(--blue-500), var(--blue-400), var(--purple-500)); border-radius: 16px; padding: 24px; color: #fff; position: relative; overflow: hidden; margin-bottom: 20px; }
.manage-banner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.15); opacity: 0; transition: opacity .2s; border-radius: 16px; }
.manage-banner:hover .manage-banner-overlay { opacity: 1; }
.manage-section { background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }

.manage-input { width: 100%; padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; transition: border-color .15s; }

.folder-expose-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 6px; }

.toggle-switch { position: relative; width: 36px; height: 20px; background: var(--gray-300); border-radius: 10px; cursor: pointer; transition: background .2s; }

/* Sub channel list */
.sub-channel-item { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 14px; border: 1px solid var(--gray-200); padding: 16px; margin-bottom: 8px; transition: all .25s; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.sub-channel-item:hover { box-shadow: 0 4px 14px rgba(37,99,235,.08); border-color: var(--blue-200); }
.sub-ch-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-100), var(--purple-100)); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.sub-ch-info { flex: 1; min-width: 0; }
.sub-ch-name { font-size: 13px; font-weight: 700; }
.sub-ch-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.sub-ch-meta { font-size: 11px; color: var(--gray-400); margin-top: 4px; display: flex; gap: 12px; }

/* Modal */

.modal-overlay.top { align-items: flex-start; padding-top: 80px; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px); }
.modal-content { position: relative; width: 100%; margin: 0 16px; background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; }
.modal-content.sm { max-width: 420px; } .modal-content.md { max-width: 520px; } .modal-content.lg { max-width: 640px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--gray-100); }
.modal-header h3 { font-size: 15px; font-weight: 700; }
.modal-close { padding: 4px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--gray-100); }
.modal-body { padding: 16px; }
.search-input-row { display: flex; align-items: center; gap: 12px; padding: 16px; border-bottom: 2px solid var(--gray-200); background: var(--gray-50); }
.search-input-row svg { color: var(--blue-500); }
.search-input { flex: 1; border: none; outline: none; font-size: 15px; font-weight: 500; background: transparent; }
.search-input::placeholder { color: var(--gray-400); font-weight: 400; }
.search-results { max-height: 384px; overflow-y: auto; padding: 8px; }
.search-result-item { width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; text-align: left; transition: background .1s; }
.search-result-item:hover { background: var(--gray-50); }
.search-tags { padding: 16px; }
.search-tags-label { font-size: 11px; color: var(--gray-400); margin-bottom: 8px; }
.search-tags-list { display: flex; gap: 8px; flex-wrap: wrap; }
.reject-reason-box { background: var(--red-50); border-radius: 8px; padding: 12px; margin-top: 12px; }
.reject-reason-text { font-size: 13px; color: var(--red-700); }
.reject-reason-date { font-size: 11px; color: var(--red-400); margin-top: 8px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn-primary { flex: 1; justify-content: center; }
.stat-modal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.stat-modal-cell { border-radius: 8px; padding: 12px; text-align: center; }
.stat-modal-cell-val { font-size: 18px; font-weight: 700; }
.stat-modal-cell-label { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
.mini-chart { display: flex; align-items: flex-end; gap: 2px; height: 120px; padding: 8px 0; }
.mini-bar { flex: 1; background: var(--blue-200); border-radius: 2px 2px 0 0; min-height: 4px; transition: all .15s; }
.mini-bar:hover { background: var(--blue-500); }
.back-link { font-size: 11px; color: var(--blue-500); cursor: pointer; margin-bottom: 12px; display: inline-block; }
.back-link:hover { text-decoration: underline; }
.section-badge { display: inline-block; background: var(--blue-500); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 50px; font-weight: 600; margin-right: 8px; }
.recommend-section { margin-bottom: 32px; }
.keyword-area { background: #fff; border: 1px solid var(--gray-200); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.content-relative { position: relative; }
.empty-state { text-align: center; padding: 80px 20px; }
.empty-state p { color: var(--gray-400); font-size: 13px; }

/* 바로풀기 - 썸네일 오버레이 */
.card-thumb { position:relative; }
.card-solve-overlay { position:absolute;bottom:0;left:0;right:0;padding:6px 8px;display:flex;align-items:center;gap:6px;z-index:2; }
.card-solve-overlay.completed { background:linear-gradient(transparent,rgba(0,0,0,.55)); }
.card-solve-overlay.progress { background:linear-gradient(transparent,rgba(0,0,0,.45)); }
.card-solve-badge { display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:50px;font-size:9px;font-weight:700; }
.card-solve-badge.done { background:var(--emerald-500);color:#fff; }
.card-solve-badge.ing { background:var(--amber-500);color:#fff; }
.card-solve-score { font-size:12px;font-weight:800;color:#fff;margin-left:auto; }
.card-solve-pbar { flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:3px;overflow:hidden;max-width:60px; }
.card-solve-pfill { height:100%;background:var(--amber-300);border-radius:3px;transition:width .3s; }
/* 바로풀기 - 인라인 버튼 (card-actions 내) */
.solve-btn-inline { display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;margin-left:auto;background:var(--emerald-500);color:#fff;border:none;white-space:nowrap; }
.solve-btn-inline:hover { filter:brightness(1.1);transform:translateY(-1px); }
.solve-btn-inline.resume { background:var(--amber-500); }
.solve-btn-inline.result { background:var(--blue-500); }
.solve-btn-inline svg { width:12px;height:12px; }

/* 바로풀기 모달 */
.quiz-overlay { position:fixed;inset:0;z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px; }
.quiz-backdrop { position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px); }
.quiz-modal { position:relative;width:680px;max-width:100%;max-height:90vh;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);display:flex;flex-direction:column;overflow:hidden; }
.quiz-header { display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray-100);background:var(--gray-50); }
.quiz-header-title { font-size:15px;font-weight:700;color:var(--gray-800);display:flex;align-items:center;gap:8px; }
.quiz-header-info { font-size:11px;color:var(--gray-500); }
.quiz-progress-bar { height:4px;background:var(--gray-200);margin:0 20px; }
.quiz-progress-fill { height:100%;background:var(--blue-500);border-radius:4px;transition:width .4s ease; }
.quiz-body { flex:1;overflow-y:auto;padding:24px 20px; }
.quiz-question { margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--gray-100); }

.quiz-q-num { display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:var(--blue-500);color:#fff;font-size:12px;font-weight:700;flex-shrink:0; }
.quiz-q-num.answered { background:var(--emerald-500); }
.quiz-q-num.wrong { background:var(--red-500); }
.quiz-q-text { font-size:14px;font-weight:600;color:var(--gray-800);line-height:1.6;flex:1; }
.quiz-q-type { font-size:10px;color:var(--gray-400);padding:2px 6px;border:1px solid var(--gray-200);border-radius:4px;white-space:nowrap;flex-shrink:0; }
.quiz-options { display:flex;flex-direction:column;gap:8px;margin-left:38px; }
.quiz-option { display:flex;align-items:center;gap:10px;padding:12px 16px;border:1.5px solid var(--gray-200);border-radius:10px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--gray-700); }
.quiz-option:hover { border-color:var(--blue-300);background:var(--blue-50); }
.quiz-option.selected { border-color:var(--blue-500);background:var(--blue-50);color:var(--blue-700);font-weight:600; }
.quiz-option.correct { border-color:var(--emerald-500);background:var(--emerald-50);color:var(--emerald-700); }
.quiz-option.wrong-answer { border-color:var(--red-400);background:var(--red-50);color:var(--red-600); }
.quiz-option-num { width:24px;height:24px;border-radius:50%;border:1.5px solid var(--gray-300);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .15s; }
.quiz-option.selected .quiz-option-num { background:var(--blue-500);border-color:var(--blue-500);color:#fff; }
.quiz-option.correct .quiz-option-num { background:var(--emerald-500);border-color:var(--emerald-500);color:#fff; }
.quiz-option.wrong-answer .quiz-option-num { background:var(--red-500);border-color:var(--red-500);color:#fff; }
.quiz-descriptive { margin-left:38px;font-size:12px;color:var(--gray-400);padding:12px 16px;background:var(--gray-50);border-radius:10px;border:1px dashed var(--gray-300); }
.quiz-explain { margin:8px 0 0 38px;padding:10px 14px;background:#fffbeb;border-radius:8px;font-size:12px;color:var(--amber-700);border:1px solid var(--amber-100);line-height:1.6; }
.quiz-footer { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--gray-100);background:var(--gray-50);gap:8px; }
.quiz-footer-left { display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray-500); }
.quiz-footer-right { display:flex;gap:8px; }
.quiz-btn { padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s; }
.quiz-btn-primary { background:var(--blue-500);color:#fff; }
.quiz-btn-primary:hover { background:var(--blue-600); }
.quiz-btn-secondary { background:var(--gray-100);color:var(--gray-600); }
.quiz-btn-secondary:hover { background:var(--gray-200); }
.quiz-btn-submit { background:var(--emerald-500);color:#fff; }
.quiz-btn-submit:hover { background:var(--emerald-600); }
.quiz-btn-save { background:var(--amber-500);color:#fff; }
.quiz-btn-save:hover { background:#d97706; }

/* 결과 화면 */
.quiz-result-header { text-align:center;padding:20px 0; }
.quiz-result-score { font-size:48px;font-weight:800;color:var(--blue-600);line-height:1; }
.quiz-result-label { font-size:13px;color:var(--gray-500);margin-top:8px; }
.quiz-result-stats { display:flex;gap:12px;justify-content:center;margin:16px 0 24px; }
.quiz-result-stat { padding:10px 18px;background:var(--gray-50);border-radius:10px;text-align:center;border:1px solid var(--gray-100); }
.quiz-result-stat-val { font-size:18px;font-weight:700; }
.quiz-result-stat-label { font-size:10px;color:var(--gray-400);margin-top:2px; }
.quiz-result-stat.correct .quiz-result-stat-val { color:var(--emerald-600); }
.quiz-result-stat.wrong .quiz-result-stat-val { color:var(--red-500); }

.quiz-saved-notice { display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--blue-50);border-radius:8px;font-size:12px;color:var(--blue-700);margin-bottom:20px; }

/* 문제집 저장 모달 */
.qsave-modal { position:relative;width:420px;max-width:95vw;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden; }

.qsave-header-text { flex:1; }
.qsave-header-title { font-size:15px;font-weight:700;color:var(--gray-800); }
.qsave-header-sub { font-size:11px;color:var(--gray-500);margin-top:2px; }
.qsave-body { padding:16px 20px; }
.qsave-label { font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:10px; }
.qsave-folders { display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;margin-bottom:12px; }
.qsave-folder { display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:10px;cursor:pointer;transition:all .15s;background:#fff;text-align:left;font-size:13px;color:var(--gray-700); }
.qsave-folder:hover { border-color:var(--blue-300);background:var(--blue-50); }

.qsave-new-btn:hover { border-color:var(--blue-400);color:var(--blue-500); }

.qsave-footer { display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--gray-100);background:var(--gray-50); }

/* Rocket Search (콘텐츠 검색) */
.rocket-search-bar { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 16px; background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; cursor: pointer; transition: all .2s; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.rocket-search-bar:hover { border-color: var(--blue-300); box-shadow: 0 2px 8px rgba(37,99,235,.1); }
.rocket-search-bar .rocket-icon { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: var(--blue-50); border-radius: 8px; color: var(--blue-600); flex-shrink: 0; }
.rocket-search-bar .rocket-placeholder { flex: 1; font-size: 13px; color: var(--gray-400); }
.rocket-search-bar .rocket-kbd { font-size: 10px; color: var(--gray-300); border: 1px solid var(--gray-200); border-radius: 4px; padding: 2px 6px; }

.rocket-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: flex-start; justify-content: center; padding-top: 10vh; }
.rocket-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(4px); }
.rocket-modal { position: relative; width: 580px; max-width: calc(100vw - 32px); background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.25), 0 0 0 1px rgba(0,0,0,.05); overflow: hidden; display: flex; flex-direction: column; max-height: 70vh; }
.rocket-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--gray-100); cursor: move; user-select: none; background: var(--gray-50); }
.rocket-header-title { font-size: 14px; font-weight: 700; color: var(--gray-800); display: flex; align-items: center; gap: 6px; }
.rocket-close-btn { padding: 4px; border-radius: 6px; color: var(--gray-400); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.rocket-close-btn:hover { background: var(--gray-100); color: var(--gray-600); }
.rocket-search-row { display: flex; align-items: center; gap: 10px; margin: 14px 18px; padding: 12px 16px; border: 2px solid var(--gray-300); border-radius: 10px; background: #fff; transition: border-color .15s, box-shadow .15s; }
.rocket-search-row:focus-within { border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
.rocket-search-row svg { flex-shrink: 0; color: var(--blue-500); }
.rocket-search-input { flex: 1; border: none; outline: none; font-size: 15px; color: var(--gray-800); background: transparent; font-weight: 500; }
.rocket-search-input::placeholder { color: var(--gray-400); font-weight: 400; }
.rocket-search-hint { font-size: 10px; color: var(--gray-400); border: 1px solid var(--gray-300); border-radius: 4px; padding: 2px 6px; white-space: nowrap; }
.rocket-results { flex: 1; overflow-y: auto; max-height: 340px; }
.rocket-results-empty { padding: 40px 20px; text-align: center; color: var(--gray-400); font-size: 13px; }
.rocket-results-loading { padding: 40px 20px; text-align: center; color: var(--gray-400); font-size: 13px; }
.rocket-result-item { display: flex; flex-direction: column; gap: 6px; padding: 14px 18px; cursor: pointer; transition: background .1s; border-bottom: 1px solid var(--gray-100); }
.rocket-result-item:last-child { border-bottom: none; }
.rocket-result-item:hover { background: var(--blue-50); }
.rocket-result-item.active { background: var(--blue-50); outline: 2px solid var(--blue-300); outline-offset: -2px; border-radius: 0; }
.rocket-result-top { display: flex; align-items: baseline; gap: 8px; }
.rocket-result-code { font-size: 11px; font-weight: 700; color: var(--blue-600); white-space: nowrap; flex-shrink: 0; letter-spacing: .02em; }
.rocket-result-std { font-size: 11px; color: var(--gray-500); line-height: 1.4; font-weight: 400; }
.rocket-result-std mark, .rocket-result-code mark, .rocket-result-meta mark { background: #fef08a; color: inherit; border-radius: 2px; padding: 0 1px; }
.rocket-result-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.rocket-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; white-space: nowrap; }
.rocket-badge-school { background: var(--emerald-50); color: var(--emerald-600); }
.rocket-badge-subject { background: var(--amber-50); color: var(--amber-700); }
.rocket-badge-unit { background: var(--gray-100); color: var(--gray-700); font-size: 13px; font-weight: 600; }
.rocket-badge-lesson { background: var(--purple-50); color: var(--purple-600); font-size: 13px; font-weight: 600; }
.rocket-sub-row { display: flex; align-items: center; gap: 8px; margin: 0 18px 14px; padding: 12px 16px; border: 2px solid var(--gray-300); border-radius: 10px; background: var(--gray-50); transition: border-color .15s, box-shadow .15s, background .15s; }
.rocket-sub-row:focus-within { border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(37,99,235,.15); background: #fff; }
.rocket-sub-row svg { flex-shrink: 0; color: var(--gray-400); width: 16px; height: 16px; }
.rocket-sub-input { flex: 1; border: none; outline: none; padding: 0; font-size: 14px; color: var(--gray-800); background: transparent; font-weight: 500; }
.rocket-sub-input::placeholder { color: var(--gray-400); font-weight: 400; }
.rocket-submit-btn { padding: 8px 18px; background: var(--blue-500); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; white-space: nowrap; }
.rocket-submit-btn:hover { background: var(--blue-600); }
.rocket-submit-btn:disabled { background: var(--gray-300); cursor: not-allowed; }
.rocket-selected-bar { display: flex; align-items: center; gap: 8px; padding: 8px 18px; background: var(--blue-50); border-top: 1px solid var(--blue-100); font-size: 12px; color: var(--blue-700); }

.rocket-selected-bar .rocket-clear-btn { margin-left: auto; color: var(--gray-400); cursor: pointer; font-size: 11px; }
.rocket-selected-bar .rocket-clear-btn:hover { color: var(--red-500); }

/* Rocket toast */
.rocket-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--gray-800); color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,.2); z-index: 10000; opacity: 0; transition: all .3s ease; pointer-events: none; max-width: 500px; text-align: center; }

.create-field { margin-bottom: 16px; }

.create-textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 10px; font-size: 13px; outline: none; min-height: 100px; resize: vertical; transition: border-color .15s; }

.create-radio-item:hover { border-color: var(--blue-300); }

.create-file-text { font-size: 13px; color: var(--gray-500); }

.create-btn-submit { padding: 12px 40px; background: var(--blue-500); color: #fff; border-radius: 10px; font-size: 14px; font-weight: 700; transition: background .15s; }

// Generate line chart data
function genLineData(n){ const d=[]; for(let i=0;i<n;i++) d.push(Math.floor(Math.random()*50)+10); return d; }
const TREND_DATA=genLineData(30);

function drawLineChart(data, w, h, color){
  const max=Math.max(...data); const min=Math.min(...data);
  const padT=10, padB=20, padL=30, padR=10;
  const cw=w-padL-padR, ch=h-padT-padB;
  const stepX=cw/(data.length-1);
  let pts=[]; data.forEach((v,i)=>{ const x=padL+i*stepX; const y=padT+ch-(v-min)/(max-min||1)*ch; pts.push(`${x},${y}`); });
  const polyline=pts.join(' ');
  // Y axis labels
  const yLabels=[min,Math.round((max+min)/2),max];
  let ylHtml='';
  yLabels.forEach(v=>{ const y=padT+ch-(v-min)/(max-min||1)*ch; ylHtml+=`<text x="${padL-4}" y="${y+3}" text-anchor="end" fill="#ccc" font-size="9">${v}</text><line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`; });
  // X axis labels (every 5)
  let xlHtml='';
  data.forEach((v,i)=>{ if(i%5===0){ const x=padL+i*stepX; xlHtml+=`<text x="${x}" y="${h-4}" text-anchor="middle" fill="#ccc" font-size="9">${i+1}일</text>`; }});
  // Area fill
  const areaPts=`${padL},${padT+ch} ${polyline} ${padL+(data.length-1)*stepX},${padT+ch}`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    ${ylHtml}${xlHtml}
    <polygon points="${areaPts}" fill="${color}" opacity="0.08"/>
    <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

  ids.forEach(id=>{

}

function selectQuizAnswer(contentId,qIdx,optIdx){
  const qs=getQuizState(contentId);
  if(qs.submitted) return; // 이미 제출된 경우 변경 불가
  qs.answers[qIdx]=optIdx;
  // DOM 직접 조작으로 빠른 반응
  const qEl=document.querySelectorAll('.quiz-question')[qIdx];
  if(qEl){
    const opts=qEl.querySelectorAll('.quiz-option');
    opts.forEach(function(el,i){
      el.classList.remove('selected');
      el.querySelector('.quiz-option-num').style.cssText='';
      if(i===optIdx){
        el.classList.add('selected');
      }
    });
    // 번호 배지 업데이트
    const numEl=qEl.querySelector('.quiz-q-num');
    if(numEl){numEl.classList.add('answered');}
    // 진행률 업데이트
    updateQuizProgress(contentId);
  }
}

function updateQuizProgress(contentId){
  const questions=QUIZ_ITEMS[contentId];
  if(!questions)return;
  const qs=getQuizState(contentId);
  const objQ=questions.filter(function(x){return x.type==='객관식';});
  const answered=Object.keys(qs.answers).length;
  const pct=Math.round(answered/objQ.length*100);
  var bar=document.getElementById('quizProgressFill');
  if(bar) bar.style.width=pct+'%';
  var info=document.getElementById('quizProgressInfo');
  if(info) info.textContent=answered+'/'+objQ.length+' 풀이 완료';
  // 제출 버튼 활성화/비활성화 업데이트
  var submitBtn=document.querySelector('.quiz-btn-submit');
  if(submitBtn){
    if(answered>0){
      submitBtn.disabled=false;
      submitBtn.style.opacity='';
      submitBtn.style.cursor='';
    }else{
      submitBtn.disabled=true;
      submitBtn.style.opacity='.5';
      submitBtn.style.cursor='not-allowed';
    }
  }
}

function submitQuiz(contentId){
  const questions=QUIZ_ITEMS[contentId];
  if(!questions)return;
  const qs=getQuizState(contentId);
  const objQ=questions.filter(function(x){return x.type==='객관식';});
  const answered=Object.keys(qs.answers).length;

  if(answered<objQ.length){
    if(!confirm('아직 풀지 않은 문항이 '+(objQ.length-answered)+'개 있습니다.\n그래도 제출하시겠습니까?')) return;
  }

  // 채점
  let correct=0;
  let objIdx=0;
  questions.forEach(function(q,i){
    if(q.type!=='객관식')return;
    if(qs.answers[objIdx]===q.answer) correct++;
    objIdx++;
  });

  qs.submitted=true;
  qs.score=correct;
  qs.total=objQ.length;

  // 폴더 선택 모달 표시
  state.quizSaveModal=contentId;
  state.quizSaveFolder=null;
  state.quizSaveNewFolder=false;
  render();
}

function retryQuiz(contentId){
  QUIZ_STATE[contentId]={answers:{},submitted:false,score:null,total:null,startedAt:Date.now()};
  render();
}

function selectQuizSaveFolder(folderName){
  state.quizSaveFolder=folderName;
  state.quizSaveNewFolder=false;
  render();
}

function toggleQuizNewFolder(){
  state.quizSaveNewFolder=!state.quizSaveNewFolder;
  state.quizSaveFolder=null;
  render();
}

function confirmQuizSave(){
  const contentId=state.quizSaveModal;
  if(!contentId)return;
  let folderName=state.quizSaveFolder;
  if(state.quizSaveNewFolder){
    const input=document.getElementById('quizNewFolderName');
    if(!input||!input.value.trim()){alert('폴더 이름을 입력하세요.');return;}
    folderName=input.value.trim();
    // 새 폴더 생성
    const exists=SAVED_FOLDERS.some(function(f){return f.name===folderName;});
    if(!exists){
      SAVED_FOLDERS.push({id:'sf'+Date.now(),name:folderName,count:0,children:[]});
    }
  }
  if(!folderName){alert('저장할 폴더를 선택하세요.');return;}
  // 저장 시뮬레이션
  const folder=SAVED_FOLDERS.find(function(f){return f.name===folderName;});
  if(folder)folder.count++;
  // 저장 완료 상태
  const qs=getQuizState(contentId);
  qs.savedFolder=folderName;
  state.quizSaveModal=null;
  state.quizSaveFolder=null;
  state.quizSaveNewFolder=false;
  render();
}

function getQuizContentTitle(contentId){
  const all=[...MY_CONTENTS,...SAVED_CONTENTS,...PUBLIC_CONTENTS];
  const item=all.find(function(c){return c.id===contentId;});
  return item?item.title:'문항';
}

function getQuizContentType(contentId){
  const all=[...MY_CONTENTS,...SAVED_CONTENTS,...PUBLIC_CONTENTS];
  const item=all.find(function(c){return c.id===contentId;});
  return item?item.type:'문항';
}

function renderQuizModal(){
  const contentId=state.quizModal;
  if(!contentId)return '';
  const questions=QUIZ_ITEMS[contentId];
  if(!questions)return '';
  const qs=getQuizState(contentId);
  const title=getQuizContentTitle(contentId);
  const cType=getQuizContentType(contentId);
  const objQ=questions.filter(function(x){return x.type==='객관식';});
  const answered=Object.keys(qs.answers).length;
  const pct=qs.submitted?100:Math.round(answered/objQ.length*100);

  let bodyHtml='';

  if(qs.submitted){
    // ===== 결과 화면 =====
    const wrong=qs.total-qs.score;
    const skip=objQ.length-Object.keys(qs.answers).length;
    const scorePct=Math.round(qs.score/qs.total*100);
    const emoji=scorePct>=80?'🎉':scorePct>=60?'👍':'💪';

    if(qs.savedFolder){
      bodyHtml+=`<div class="quiz-saved-notice"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> 풀이 결과가 <strong>${qs.savedFolder}</strong> 폴더에 저장되었습니다.</div>`;
    }else{
      bodyHtml+=`<div class="quiz-saved-notice" style="background:var(--amber-50);color:var(--amber-700);border:1px solid var(--amber-100)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> 아직 폴더에 저장하지 않았습니다. <button onclick="state.quizSaveModal=${contentId};render();" style="background:var(--blue-500);color:#fff;border:none;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;margin-left:4px">저장하기</button></div>`;
    }
    bodyHtml+=`<div class="quiz-result-header"><div style="font-size:32px;margin-bottom:8px">${emoji}</div><div class="quiz-result-score">${scorePct}<span style="font-size:24px;color:var(--gray-400)">점</span></div><div class="quiz-result-label">${qs.score}문항 정답 / ${qs.total}문항 중</div></div>`;
    bodyHtml+=`<div class="quiz-result-stats"><div class="quiz-result-stat correct"><div class="quiz-result-stat-val">${qs.score}</div><div class="quiz-result-stat-label">정답</div></div><div class="quiz-result-stat wrong"><div class="quiz-result-stat-val">${wrong}</div><div class="quiz-result-stat-label">오답</div></div>${skip>0?`<div class="quiz-result-stat skip"><div class="quiz-result-stat-val">${skip}</div><div class="quiz-result-stat-label">미풀이</div></div>`:''}</div>`;
    bodyHtml+=`<div style="font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:16px;display:flex;align-items:center;gap:6px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> 정오답 확인</div>`;

    // 각 문항 결과 표시
    let objIdx=0;
    questions.forEach(function(q,i){
      if(q.type==='서술형'){
        bodyHtml+=`<div class="quiz-question"><div class="quiz-q-header"><div class="quiz-q-num" style="background:var(--gray-400)">${i+1}</div><div class="quiz-q-text">${q.q}</div><div class="quiz-q-type">서술형</div></div><div class="quiz-descriptive">✍ 서술형 문항은 자동 채점이 불가합니다. 선생님 확인 후 피드백이 제공됩니다.</div></div>`;
        return;
      }
      const userAns=qs.answers[objIdx];
      const isCorrect=userAns===q.answer;
      const numCls=isCorrect?'answered':'wrong';
      bodyHtml+=`<div class="quiz-question"><div class="quiz-q-header"><div class="quiz-q-num ${numCls}">${i+1}</div><div class="quiz-q-text">${q.q}</div><div class="quiz-q-type">${isCorrect?'<span style="color:var(--emerald-600)">✓ 정답</span>':'<span style="color:var(--red-500)">✗ 오답</span>'}</div></div><div class="quiz-options">`;
      q.options.forEach(function(opt,oi){
        let cls='';
        if(oi===q.answer) cls='correct';
        else if(oi===userAns&&!isCorrect) cls='wrong-answer';
        bodyHtml+=`<div class="quiz-option ${cls}" style="cursor:default"><div class="quiz-option-num">${oi+1}</div><span>${opt}</span>${oi===q.answer?'<span style="margin-left:auto;font-size:10px;font-weight:700;color:var(--emerald-600)">정답</span>':''}${oi===userAns&&!isCorrect?'<span style="margin-left:auto;font-size:10px;font-weight:700;color:var(--red-500)">내 답</span>':''}</div>`;
      });
      bodyHtml+=`</div>`;
      if(!isCorrect){
        bodyHtml+=`<div class="quiz-explain">💡 <strong>해설:</strong> 정답은 <strong>${q.options[q.answer]}</strong>입니다.</div>`;
      }
      bodyHtml+=`</div>`;
      objIdx++;
    });
  } else {
    // ===== 풀이 화면 =====
    const hasDesc=questions.some(function(q){return q.type==='서술형';});
    if(hasDesc){
      bodyHtml+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--amber-50);border-radius:8px;font-size:12px;color:var(--amber-700);margin-bottom:20px;border:1px solid var(--amber-100)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> 서술형 문항은 바로풀기에서 자동 채점되지 않습니다. 객관식만 풀이 가능합니다.</div>`;
    }
    let objIdx=0;
    questions.forEach(function(q,i){
      if(q.type==='서술형'){
        bodyHtml+=`<div class="quiz-question"><div class="quiz-q-header"><div class="quiz-q-num" style="background:var(--gray-400)">${i+1}</div><div class="quiz-q-text">${q.q}</div><div class="quiz-q-type">서술형</div></div><div class="quiz-descriptive">✍ 서술형 문항은 온라인 풀이를 지원하지 않습니다.</div></div>`;
        return;
      }
      const isAnswered=qs.answers[objIdx]!==undefined;
      bodyHtml+=`<div class="quiz-question"><div class="quiz-q-header"><div class="quiz-q-num ${isAnswered?'answered':''}">${i+1}</div><div class="quiz-q-text">${q.q}</div><div class="quiz-q-type">객관식</div></div><div class="quiz-options">`;
      q.options.forEach(function(opt,oi){
        const selected=qs.answers[objIdx]===oi?'selected':'';
        bodyHtml+=`<div class="quiz-option ${selected}" onclick="selectQuizAnswer(${contentId},${objIdx},${oi})"><div class="quiz-option-num">${oi+1}</div><span>${opt}</span></div>`;
      });
      bodyHtml+=`</div></div>`;
      objIdx++;
    });
  }

  // 하단 버튼
  let footerHtml='';
  if(qs.submitted){
    footerHtml=`<div class="quiz-footer-left"><span style="color:var(--emerald-600);font-weight:600">✓ 채점 완료</span></div><div class="quiz-footer-right"><button class="quiz-btn quiz-btn-secondary" onclick="retryQuiz(${contentId})">🔄 다시 풀기</button><button class="quiz-btn quiz-btn-primary" onclick="closeQuizModal()">닫기</button></div>`;
  } else {
    footerHtml=`<div class="quiz-footer-left"><span id="quizProgressInfo">${answered}/${objQ.length} 풀이 완료</span></div><div class="quiz-footer-right"><button class="quiz-btn quiz-btn-secondary" onclick="closeQuizModal()">나중에 풀기</button><button class="quiz-btn quiz-btn-submit" onclick="submitQuiz(${contentId})" ${answered===0?'disabled style="opacity:.5;cursor:not-allowed"':''}>제출하기</button></div>`;
  }

  return `<div class="quiz-overlay" onclick="closeQuizModal()"><div class="quiz-backdrop"></div><div class="quiz-modal" onclick="event.stopPropagation()">
    <div class="quiz-header"><div class="quiz-header-title">${typeBadge(cType)} ${title}</div><div class="quiz-header-info">객관식 ${objQ.length}문항${questions.length>objQ.length?' · 서술형 '+(questions.length-objQ.length)+'문항':''}</div><button class="modal-close" onclick="closeQuizModal()" style="margin-left:12px">${SVG.x}</button></div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgressFill" style="width:${pct}%"></div></div>
    <div class="quiz-body">${bodyHtml}</div>
    <div class="quiz-footer">${footerHtml}</div>
  </div></div>`;
}

// ===== 인라인 성취기준 스마트 검색 =====
window._smartState={
  query:'',
  results:[],
  activeIdx:-1,
  visible:false
};

window.onSmartInput=function(val){
  _smartState.query=val;
  _smartState.activeIdx=-1;
  if(!val||!val.trim()){
    _smartState.results=[];
    _smartState.visible=false;
    updateSmartDropdown();
    return;
  }
  // Rocket 데이터가 로드되지 않았다면 로드
  if(!rocketState.loaded&&!rocketState.loading){
    RocketLogic.loadDB().then(function(){
      _smartState.results=RocketLogic.search(val);
      _smartState.visible=true;
      updateSmartDropdown();
    });
    return;
  }
  _smartState.results=RocketLogic.search(val);
  _smartState.visible=true;
  updateSmartDropdown();
};

window.onSmartFocus=function(){
  if(_smartState.query&&_smartState.results.length>0){
    _smartState.visible=true;
    updateSmartDropdown();
  }
  // 데이터 로드
  if(!rocketState.loaded&&!rocketState.loading){
    RocketLogic.loadDB();
  }
};

window.onSmartKeydown=function(e){
  var results=_smartState.results;
  if(e.key==='Escape'){
    e.preventDefault();
    _smartState.visible=false;
    updateSmartDropdown();
    return;
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(results.length>0){
      _smartState.activeIdx=Math.min(_smartState.activeIdx+1,results.length-1);
      updateSmartDropdown();
      scrollSmartActive();
    }
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(results.length>0){
      _smartState.activeIdx=Math.max(_smartState.activeIdx-1,0);
      updateSmartDropdown();
      scrollSmartActive();
    }
  }else if(e.key==='Enter'){
    e.preventDefault();
    if(_smartState.activeIdx>=0&&_smartState.activeIdx<results.length){
      addCreateStd(_smartState.activeIdx);
    }else if(results.length>0){
      addCreateStd(0);
    }
  }
};

function scrollSmartActive(){
  setTimeout(function(){
    var dd=document.getElementById('smartDropdown');
    var active=dd&&dd.querySelector('.smart-result-item.active');
    if(active&&dd){
      var ct=dd.getBoundingClientRect();
      var at=active.getBoundingClientRect();
      if(at.bottom>ct.bottom)dd.scrollTop+=at.bottom-ct.bottom+8;
      if(at.top<ct.top)dd.scrollTop-=ct.top-at.top+8;
    }
  },10);
}

function updateSmartDropdown(){
  var dd=document.getElementById('smartDropdown');
  if(!dd)return;
  if(!_smartState.visible||!_smartState.query){
    dd.style.display='none';
    return;
  }
  dd.style.display='block';
  var results=_smartState.results;
  var q=_smartState.query;
  if(results.length===0){
    dd.innerHTML='<div class="smart-dropdown-empty">검색 결과가 없습니다</div>';
    return;
  }
  var html='';
  for(var i=0;i<Math.min(results.length,30);i++){
    var r=results[i];
    var isActive=i===_smartState.activeIdx;
    html+='<div class="smart-result-item'+(isActive?' active':'')+'" onclick="addCreateStd('+i+')" onmouseenter="_smartState.activeIdx='+i+';updateSmartDropdown()">';
    html+='<div class="smart-badges">';
    if(r.school||r.grade)html+='<span class="rocket-badge rocket-badge-school">'+RocketLogic.highlight((r.school?r.school+' ':'')+r.grade+'학년',q)+'</span>';
    if(r.subject)html+='<span class="rocket-badge rocket-badge-subject">'+RocketLogic.highlight(r.subject,q)+'</span>';
    if(r.unit)html+='<span class="rocket-badge rocket-badge-unit" style="font-size:10px">'+RocketLogic.highlight(r.unit,q)+'</span>';
    if(r.lesson)html+='<span class="rocket-badge rocket-badge-lesson" style="font-size:10px">'+RocketLogic.highlight(r.lesson,q)+'</span>';
    html+='</div>';
    html+='<div style="display:flex;align-items:baseline;gap:8px">';
    if(r.code)html+='<span class="smart-code">'+RocketLogic.highlight(r.code,q)+'</span>';
    html+='<span class="smart-std">'+RocketLogic.highlight(r.std,q)+'</span>';
    html+='</div></div>';
  }
  if(results.length>30)html+='<div class="smart-dropdown-empty" style="padding:10px">... 외 '+(results.length-30)+'개 결과</div>';
  dd.innerHTML=html;
}

window.addCreateStd=function(idx){
  var r=_smartState.results[idx];
  if(!r)return;
  // 중복 체크
  var isDup=state.createStds.some(function(s){return s.code===r.code&&s.std===r.std;});
  if(isDup){
    showRocketToast('이미 추가된 성취기준입니다.');
    return;
  }
  var stds=state.createStds.slice();
  stds.push({code:r.code,std:r.std,school:r.school,grade:r.grade,subject:r.subject,unit:r.unit,area:r.area,lesson:r.lesson});
  state.createStds=stds;
  // 검색 초기화
  _smartState.query='';
  _smartState.results=[];
  _smartState.visible=false;
  _smartState.activeIdx=-1;
  render();
  showRocketToast('['+r.code+'] 성취기준이 추가되었습니다.');

// ===== ROCKET SEARCH (콘텐츠 검색) =====
(function(){

// --- IndexedDB Helper ---
const IDB={
  open:function(dbName,storeName){
    return new Promise(function(resolve,reject){
      const req=indexedDB.open(dbName,1);
      req.onupgradeneeded=function(e){e.target.result.createObjectStore(storeName);};
      req.onsuccess=function(e){resolve(e.target.result);};
      req.onerror=function(e){reject(e.target.error);};
    });
  },
  put:function(db,storeName,key,val){
    return new Promise(function(resolve,reject){
      const tx=db.transaction(storeName,'readwrite');
      tx.objectStore(storeName).put(val,key);
      tx.oncomplete=function(){resolve();};
      tx.onerror=function(e){reject(e.target.error);};
    });
  },
  get:function(db,storeName,key){
    return new Promise(function(resolve,reject){
      const tx=db.transaction(storeName,'readonly');
      const req=tx.objectStore(storeName).get(key);
      req.onsuccess=function(e){resolve(e.target.result);};
      req.onerror=function(e){reject(e.target.error);};
    });
  }
};

// --- Config ---
const rocketConfig={
  TSV_URL:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRQ3UgBkKZb1MIfqFkJw1VqhIsfafdr9xkKhHLHwhzQvYgjqIsxNpnh91AFekXC5B9dvfEL-v1laVGK/pub?output=tsv',
  DB_NAME:'RocketDB_Ext_Final',
  STORE_NAME:'curriculum',
  COLS:{SCHOOL:0,SUBJECT:1,GRADE:2,TERM:3,UNIT:4,LESSON:5,AREA:6,CODE:7,STD:8,PUB:9}
};

// --- Rocket State (window-scoped for inline event handlers) ---
window.rocketState={
  db:null,
  rows:[],
  loaded:false,
  loading:false,
  query:'',
  results:[],
  activeIdx:-1,
  selectedItem:null,
  subKeyword:'',
  dragOffset:null,
  modalPos:null
};

// --- Data Logic ---
var RocketLogic=window.RocketLogic={
  loadDB:function(){
    if(rocketState.loaded||rocketState.loading)return Promise.resolve();
    rocketState.loading=true;
    return IDB.open(rocketConfig.DB_NAME,rocketConfig.STORE_NAME).then(function(db){
      rocketState.db=db;
      return IDB.get(db,rocketConfig.STORE_NAME,'data');
    }).then(function(cached){
      if(cached&&cached.rows&&cached.rows.length>0){
        rocketState.rows=cached.rows;
        rocketState.loaded=true;
        rocketState.loading=false;
        console.log('[Rocket] Loaded '+rocketState.rows.length+' rows from IndexedDB cache');
        return RocketLogic.fetchData(true);
      }else{
        return RocketLogic.fetchData(false);
      }
    }).catch(function(err){
      console.warn('[Rocket] IndexedDB error, fetching directly:',err);
      return RocketLogic.fetchData(false);
    });
  },

  fetchData:function(isBackground){
    if(!isBackground){rocketState.loading=true;updateRocketResults();}
    var urls=[
      rocketConfig.TSV_URL,
      'https://corsproxy.io/?'+encodeURIComponent(rocketConfig.TSV_URL),
      'https://api.allorigins.win/raw?url='+encodeURIComponent(rocketConfig.TSV_URL)
    ];
    function tryFetch(idx){
      if(idx>=urls.length){
        console.error('[Rocket] All fetch attempts failed');
        rocketState.loading=false;
        updateRocketResults();
        return Promise.resolve();
      }
      return fetch(urls[idx]).then(function(r){
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.text();
      }).then(function(tsv){
        var lines=tsv.split('\n');
        var rows=[];
        for(var i=1;i<lines.length;i++){
          var cols=lines[i].split('\t');
          if(cols.length>=9){
            rows.push(cols.map(function(c){return c.trim();}));
          }
        }
        if(rows.length>0){
          rocketState.rows=rows;
          rocketState.loaded=true;
          rocketState.loading=false;
          if(rocketState.db){
            IDB.put(rocketState.db,rocketConfig.STORE_NAME,'data',{rows:rows,ts:Date.now()}).catch(function(){});
          }
          console.log('[Rocket] Fetched '+rows.length+' rows (source #'+idx+')');
          updateRocketResults();
        }else{
          throw new Error('Empty data');
        }
      }).catch(function(err){
        console.warn('[Rocket] Fetch attempt #'+idx+' failed:',err.message);
        return tryFetch(idx+1);
      });
    }
    return tryFetch(0);
  },

  search:function(query){
    if(!query||!query.trim())return[];
    var terms=query.toLowerCase().split(/\s+/).filter(function(t){return t.length>0;});
    var C=rocketConfig.COLS;
    var results=[];
    for(var i=0;i<rocketState.rows.length;i++){
      var row=rocketState.rows[i];
      var gradeStr=(row[C.GRADE]||'')+'학년';
      var combined=(row.join(' ')+' '+gradeStr).toLowerCase();
      var match=true;
      for(var t=0;t<terms.length;t++){
        if(combined.indexOf(terms[t])===-1){match=false;break;}
      }
      if(match){
        results.push({
          school:row[C.SCHOOL]||'',
          subject:row[C.SUBJECT]||'',
          grade:row[C.GRADE]||'',
          term:row[C.TERM]||'',
          unit:row[C.UNIT]||'',
          lesson:row[C.LESSON]||'',
          area:row[C.AREA]||'',
          code:row[C.CODE]||'',
          std:row[C.STD]||'',
          pub:row[C.PUB]||''
        });
        if(results.length>=50)break;
      }
    }
    return results;
  },

  highlight:function(text,query){
    if(!query||!text)return text||'';
    var terms=query.toLowerCase().split(/\s+/).filter(function(t){return t.length>0;});
    var result=text;
    for(var i=0;i<terms.length;i++){
      var esc=terms[i].replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      result=result.replace(new RegExp('('+esc+')','gi'),'<mark>$1</mark>');
    }
    return result;
  }
};

// --- UI Functions ---
window.openRocketSearch=function(){
  setState({rocketOpen:true});
  RocketLogic.loadDB();
  setTimeout(function(){
    updateRocketResults();
    var inp=document.getElementById('rocketSearchInput');
    if(inp)inp.focus();
  },100);
};

window.closeRocketSearch=function(){
  rocketState.query='';
  rocketState.results=[];
  rocketState.activeIdx=-1;
  rocketState.selectedItem=null;
  rocketState.subKeyword='';
  rocketState.modalPos=null;
  setState({rocketOpen:false});
};

window.rocketSelectItem=function(idx){
  if(idx>=0&&idx<rocketState.results.length){
    rocketState.selectedItem=rocketState.results[idx];
    rocketState.subKeyword='';
    // Re-render to show selected bar and sub-input
    render();
    setTimeout(function(){
      // 결과 목록도 다시 표시
      updateRocketResults();
      var sub=document.getElementById('rocketSubInput');
      if(sub)sub.focus();
    },30);
  }
};

window.rocketClearSelection=function(){
  rocketState.selectedItem=null;
  rocketState.subKeyword='';
  // Re-render to remove selected bar
  render();
  setTimeout(function(){
    updateRocketResults();
    var inp=document.getElementById('rocketSearchInput');
    if(inp)inp.focus();
  },30);
};

window.rocketSubmit=function(){
  var sel=rocketState.selectedItem;
  var kw=rocketState.subKeyword.trim();
  if(!sel&&!kw)return;
  var parts=[];
  if(sel){var dc=sel.code.replace(/^\[+/,'').replace(/\]+$/,'');parts.push('['+dc+'] '+sel.std);}
  if(kw)parts.push(kw);
  console.log('[Rocket Submit]',{code:sel?sel.code:'',std:sel?sel.std:'',keyword:kw});
  showRocketToast(sel?'성취기준: '+sel.code+(kw?' | 키워드: '+kw:''):'키워드: '+kw);
  closeRocketSearch();
};

window.onRocketInput=function(val){
  rocketState.query=val;
  rocketState.activeIdx=-1;
  rocketState.selectedItem=null;
  updateRocketResults();
};

window.onRocketSubInput=function(val){
  rocketState.subKeyword=val;
};

window.onRocketKeydown=function(e){
  var results=rocketState.results;
  if(e.key==='Escape'){
    e.preventDefault();
    closeRocketSearch();
    return;
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(results.length>0){
      rocketState.activeIdx=Math.min(rocketState.activeIdx+1,results.length-1);
      updateRocketResults();
      scrollRocketActive();
    }
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(results.length>0){
      if(rocketState.activeIdx<=0){
        rocketState.activeIdx=0;
      }else{
        rocketState.activeIdx=rocketState.activeIdx-1;
      }
      updateRocketResults();
      scrollRocketActive();
    }
  }else if(e.key==='Enter'){
    e.preventDefault();
    if(rocketState.selectedItem){
      rocketSubmit();
    }else if(rocketState.activeIdx>=0&&rocketState.activeIdx<results.length){
      rocketSelectItem(rocketState.activeIdx);
    }else if(results.length>0){
      // 활성 인덱스 없이 Enter 누르면 첫 번째 결과 자동 선택
      rocketState.activeIdx=0;
      rocketSelectItem(0);
    }
  }
};

window.onRocketSubKeydown=function(e){
  if(e.key==='Escape'){
    e.preventDefault();
    closeRocketSearch();
  }else if(e.key==='Enter'){
    e.preventDefault();
    rocketSubmit();
  }
};

function scrollRocketActive(){
  setTimeout(function(){
    var container=document.querySelector('.rocket-results');
    var active=container&&container.querySelector('.rocket-result-item.active');
    if(active&&container){
      var ct=container.getBoundingClientRect();
      var at=active.getBoundingClientRect();
      if(at.bottom>ct.bottom)container.scrollTop+=at.bottom-ct.bottom+8;
      if(at.top<ct.top)container.scrollTop-=ct.top-at.top+8;
    }
  },10);
}

window.rocketSetHover=function(idx){
  if(rocketState.activeIdx===idx)return;
  rocketState.activeIdx=idx;
  // 기존 active 클래스 제거 후 새로 추가 (DOM 직접 조작으로 빠른 반영)
  var items=document.querySelectorAll('.rocket-result-item');
  items.forEach(function(el,i){
    if(i===idx)el.classList.add('active');
    else el.classList.remove('active');
  });
};

function updateRocketResults(){
  var container=document.getElementById('rocketResultsContainer');
  if(!container)return;

  if(rocketState.loading&&!rocketState.loaded){
    container.innerHTML='<div class="rocket-results-loading">교육과정 데이터를 불러오는 중...</div>';
    return;
  }

  if(!rocketState.loaded){
    container.innerHTML='<div class="rocket-results-empty" style="padding:30px 20px"><div style="font-size:28px;margin-bottom:8px">⚠️</div><div style="color:var(--gray-500);font-size:13px;margin-bottom:12px">데이터를 불러오지 못했습니다.</div><button onclick="rocketState.loaded=false;rocketState.loading=false;RocketLogic.fetchData(false)" style="padding:8px 20px;background:var(--blue-500);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">🔄 다시 시도</button></div>';
    return;
  }

  var q=rocketState.query.trim();
  if(!q){
    container.innerHTML='<div class="rocket-results-empty" style="padding:30px 20px"><div style="font-size:28px;margin-bottom:8px">🚀</div><div style="color:var(--gray-500);font-size:13px">교과, 학년, 성취기준 코드 등으로 검색하세요</div><div style="color:var(--gray-300);font-size:11px;margin-top:4px">예: 수학 3학년, 6수01-06, 도형</div></div>';
    return;
  }

  var results=RocketLogic.search(q);
  rocketState.results=results;

  if(results.length===0){
    container.innerHTML='<div class="rocket-results-empty">검색 결과가 없습니다.</div>';
    return;
  }

  var html='';
  for(var i=0;i<results.length;i++){
    var r=results[i];
    var isActive=i===rocketState.activeIdx;
    html+='<div class="rocket-result-item'+(isActive?' active':'')+'" onclick="rocketSelectItem('+i+')" onmouseenter="rocketSetHover('+i+')">';
    html+='<div class="rocket-result-meta">';
    if(r.school||r.grade)html+='<span class="rocket-badge rocket-badge-school">'+RocketLogic.highlight((r.school?r.school+' ':'')+r.grade+'학년',q)+'</span>';
    if(r.subject)html+='<span class="rocket-badge rocket-badge-subject">'+RocketLogic.highlight(r.subject,q)+'</span>';
    if(r.unit)html+='<span class="rocket-badge rocket-badge-unit">'+RocketLogic.highlight(r.unit,q)+'</span>';
    if(r.lesson)html+='<span class="rocket-badge rocket-badge-lesson">'+RocketLogic.highlight(r.lesson,q)+'</span>';
    html+='</div>';
    html+='<div class="rocket-result-top">';
    if(r.code)html+='<span class="rocket-result-code">'+RocketLogic.highlight(r.code,q)+'</span>';
    html+='<span class="rocket-result-std">'+RocketLogic.highlight(r.std,q)+'</span>';
    html+='</div>';
    html+='</div>';
  }
  container.innerHTML=html;
}

// --- Render Rocket Modal ---
window.renderRocketModal=function(){
  var selHtml='';
  if(rocketState.selectedItem){
    var s=rocketState.selectedItem;
    var displayCode=s.code.replace(/^\[+/,'').replace(/\]+$/,'');
    selHtml='<div class="rocket-selected-bar"><span>선택:</span><span class="rocket-selected-code">['+displayCode+']</span><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+s.std+'</span><span class="rocket-clear-btn" onclick="rocketClearSelection()">취소</span></div>';
  }
  selHtml+='<div style="margin:0 18px 4px;font-size:11px;font-weight:600;color:var(--gray-500);">🔍 상세 검색</div><div class="rocket-sub-row">'+SVG.search+'<input class="rocket-sub-input" id="rocketSubInput" type="text" placeholder="저작자명, 제목, 키워드, 출처 등 추가 검색어 입력" value="'+rocketState.subKeyword.replace(/"/g,'&quot;')+'" oninput="onRocketSubInput(this.value)" onkeydown="onRocketSubKeydown(event)"><button class="rocket-submit-btn" onclick="rocketSubmit()">검색</button></div>';

  return '<div class="rocket-overlay" onclick="closeRocketSearch()"><div class="rocket-backdrop"></div>'
    +'<div class="rocket-modal" onclick="event.stopPropagation()"'+(rocketState.modalPos?' style="position:fixed;left:'+rocketState.modalPos.x+'px;top:'+rocketState.modalPos.y+'px;margin:0"':'')+'>'
    +'<div class="rocket-header" onmousedown="startRocketDrag(event)"><div class="rocket-header-title"><span style="font-size:16px">🚀</span> 콘텐츠 검색</div><button class="rocket-close-btn" onclick="closeRocketSearch()">'+SVG.x+'</button></div>'
    +'<div class="rocket-search-row">'+SVG.search+'<input class="rocket-search-input" id="rocketSearchInput" type="text" placeholder="교과, 학년, 성취기준 코드로 검색..." value="'+rocketState.query.replace(/"/g,'&quot;')+'" oninput="onRocketInput(this.value)" onkeydown="onRocketKeydown(event)" autofocus><span class="rocket-search-hint">ESC</span></div>'
    +'<div class="rocket-results" id="rocketResultsContainer"></div>'
    +selHtml
    +'</div></div>';
};

// --- Drag Logic ---
window.startRocketDrag=function(e){
  if(e.target.closest('.rocket-close-btn'))return;
  var modal=e.target.closest('.rocket-modal');
  if(!modal)return;
  var rect=modal.getBoundingClientRect();
  rocketState.dragOffset={x:e.clientX-rect.left,y:e.clientY-rect.top};
  function onMove(ev){
    rocketState.modalPos={x:ev.clientX-rocketState.dragOffset.x,y:ev.clientY-rocketState.dragOffset.y};
    modal.style.position='fixed';
    modal.style.left=rocketState.modalPos.x+'px';
    modal.style.top=rocketState.modalPos.y+'px';
    modal.style.margin='0';
  }
  function onUp(){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    rocketState.dragOffset=null;
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
};

// --- Toast ---
window.showRocketToast=function showRocketToast(msg){
  var existing=document.querySelector('.rocket-toast');
  if(existing)existing.remove();
  var toast=document.createElement('div');
  toast.className='rocket-toast';
  toast.textContent=msg;
  document.body.appendChild(toast);
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      toast.classList.add('show');
    });
  });
  setTimeout(function(){
    toast.classList.remove('show');
    setTimeout(function(){toast.remove();},300);
  },3500);
}

// Update rocket results after render (because innerHTML wipes the results container)
var _origRender=render;
render=function(){
  _origRender();
  // 스마트 검색 드롭다운 (콘텐츠 만들기 페이지)
  if(state.page==='createContent'){
    updateSmartDropdown();
    // 데이터 프리로드
    if(!rocketState.loaded&&!rocketState.loading)RocketLogic.loadDB();
  }
  if(state.rocketOpen){
    updateRocketResults();
    setTimeout(function(){
      var inp=document.getElementById('rocketSearchInput');
      if(inp&&document.activeElement!==inp&&!document.getElementById('rocketSubInput')){
        inp.focus();
        inp.setSelectionRange(inp.value.length,inp.value.length);
      }
    },10);
  }
};

})();
