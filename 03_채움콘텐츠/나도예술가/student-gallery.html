<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나도 예술가 - 다채움</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../common-nav.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-200: #bfdbfe; --blue-400: #60a5fa;
  --blue-500: #3b82f6; --blue-600: #2563eb; --blue-700: #1d4ed8;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
  --emerald-50: #ecfdf5; --emerald-100: #d1fae5; --emerald-500: #10b981; --emerald-600: #059669; --emerald-700: #047857;
  --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-500: #f59e0b; --amber-700: #b45309;
  --red-50: #fef2f2; --red-100: #fee2e2; --red-400: #f87171; --red-500: #ef4444; --red-600: #dc2626; --red-700: #b91c1c;
  --purple-50: #faf5ff; --purple-100: #f3e8ff; --purple-500: #8b5cf6; --purple-600: #7c3aed;
  --pink-500: #ec4899; --pink-600: #db2777;
  --cat-art: #8B5CF6; --cat-music: #EC4899; --cat-literature: #F59E0B; --cat-video: #3B82F6; --cat-etc: #6B7280;
}

body {
  font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #F9FAFB;
  color: var(--gray-800);
  font-size: 14px;
  line-height: 1.5;
  padding-top: 100px;
}
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input, select, textarea { font: inherit; }

/* ===== Page Layout ===== */
.page-container { max-width: 1280px; margin: 0 auto; padding: 24px 24px 60px; }

/* ===== Page Header ===== */
.page-header { margin-bottom: 24px; }
.page-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 24px; font-weight: 800; color: var(--gray-800); display: flex; align-items: center; gap: 10px; }
.page-title i { color: var(--purple-500); }
.page-subtitle { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* ===== View Tabs ===== */
.view-tabs { display: flex; gap: 4px; background: var(--gray-100); border-radius: 10px; padding: 4px; }
.view-tab { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--gray-500); transition: all .2s; display: flex; align-items: center; gap: 6px; }
.view-tab:hover { color: var(--gray-700); }
.view-tab.active { background: #fff; color: var(--blue-600); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.view-tab .tab-badge { background: var(--red-500); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 50px; min-width: 18px; text-align: center; }

/* ===== Category Tabs ===== */
.category-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.cat-chip { padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 500; color: var(--gray-600); background: #fff; border: 1px solid var(--gray-200); transition: all .2s; }
.cat-chip:hover { border-color: var(--gray-300); background: var(--gray-50); }
.cat-chip.active { color: #fff; border-color: transparent; }
.cat-chip[data-cat="all"].active { background: var(--gray-800); }
.cat-chip[data-cat="미술"].active { background: var(--cat-art); }
.cat-chip[data-cat="음악"].active { background: var(--cat-music); }
.cat-chip[data-cat="문학"].active { background: var(--cat-literature); }
.cat-chip[data-cat="영상"].active { background: var(--cat-video); }
.cat-chip[data-cat="기타"].active { background: var(--cat-etc); }
.cat-count { font-size: 11px; font-weight: 700; margin-left: 4px; opacity: .7; }

/* ===== Filter Bar ===== */
.filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-box { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
.search-box input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; background: #fff; outline: none; transition: border-color .2s; }
.search-box input:focus { border-color: var(--blue-400); }
.search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 13px; }
.filter-select { padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; background: #fff; color: var(--gray-600); outline: none; cursor: pointer; }
.filter-select:focus { border-color: var(--blue-400); }
.result-count { font-size: 12px; color: var(--gray-400); margin-left: auto; }

/* ===== Grid ===== */
.masonry-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
@media (max-width: 1200px) { .masonry-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 1024px) { .masonry-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .masonry-grid { grid-template-columns: 1fr; } }

/* ===== Art Card ===== */
.art-card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid var(--gray-200); transition: all .25s; cursor: pointer; display: flex; flex-direction: column; }
.art-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.1); transform: translateY(-3px); border-color: var(--blue-200); }
.art-card-thumb { position: relative; overflow: hidden; }
.art-card-thumb-img { width: 100%; display: block; }
.art-card-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .25s; }
.art-card:hover .art-card-overlay { opacity: 1; }
.art-card-overlay span { color: #fff; font-size: 13px; font-weight: 600; padding: 8px 20px; border: 2px solid rgba(255,255,255,.7); border-radius: 50px; backdrop-filter: blur(4px); }
.art-card-cat { position: absolute; top: 10px; left: 10px; padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; color: #fff; }
.art-card-status { position: absolute; top: 10px; right: 10px; padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; }
.status-pending { background: #FEF3C7; color: var(--amber-700); }
.status-approved { background: #D1FAE5; color: var(--emerald-700); }
.status-rejected { background: #FEE2E2; color: var(--red-700); }
.art-card-type-icon { position: absolute; bottom: 10px; right: 10px; width: 32px; height: 32px; background: rgba(0,0,0,.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
.art-card-body { padding: 14px; }
.art-card-title { font-size: 14px; font-weight: 700; color: var(--gray-800); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.art-card-author { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; }
.art-card-author strong { color: var(--gray-700); font-weight: 600; }
.art-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.art-card-tag { padding: 2px 8px; background: var(--gray-50); border-radius: 50px; font-size: 11px; color: var(--gray-500); }
.art-card-stats { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--gray-400); }
.art-card-stats span { display: flex; align-items: center; gap: 4px; }
.art-card-stats .liked { color: var(--red-500); }

/* Placeholder gradients per category */
.thumb-미술 { background: linear-gradient(135deg, #c084fc, #f472b6, #818cf8); }
.thumb-음악 { background: linear-gradient(135deg, #f472b6, #e879f9, #a78bfa); }
.thumb-문학 { background: linear-gradient(135deg, #fbbf24, #f59e0b, #fb923c); }
.thumb-영상 { background: linear-gradient(135deg, #60a5fa, #818cf8, #6366f1); }
.thumb-기타 { background: linear-gradient(135deg, #9ca3af, #6b7280, #a1a1aa); }
.thumb-placeholder { display: flex; align-items: center; justify-content: center; font-size: 48px; color: rgba(255,255,255,.6); }
.thumb-h-sm, .thumb-h-md, .thumb-h-lg, .thumb-h-xl { height: 200px; }

/* ===== Buttons ===== */
.btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--blue-600); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .2s; }
.btn-primary:hover { background: var(--blue-700); }
.btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--gray-100); color: var(--gray-700); border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .2s; }
.btn-secondary:hover { background: var(--gray-200); }
.btn-success { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--emerald-500); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .2s; }
.btn-success:hover { background: var(--emerald-600); }
.btn-danger { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--red-500); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .2s; }
.btn-danger:hover { background: var(--red-600); }
.btn-outline { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; color: var(--gray-600); transition: all .2s; background: #fff; }
.btn-outline:hover { border-color: var(--blue-300); color: var(--blue-600); background: var(--blue-50); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--gray-200); background: #fff; color: var(--gray-500); transition: all .2s; }
.btn-icon:hover { border-color: var(--blue-300); color: var(--blue-600); background: var(--blue-50); }

/* ===== Modal ===== */
.modal-overlay { position: fixed; inset: 0; z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); }
.modal-content { position: relative; width: 100%; background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
.modal-content.detail-modal { max-width: 900px; }
.modal-content.form-modal { max-width: 640px; }
.modal-content.reject-modal { max-width: 480px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--gray-100); flex-shrink: 0; }
.modal-header h3 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 16px; color: var(--gray-400); transition: all .15s; }
.modal-close:hover { background: var(--gray-100); color: var(--gray-600); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 20px; border-top: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-shrink: 0; }

/* ===== Detail Modal ===== */
.detail-artwork { margin-bottom: 20px; }
.detail-artwork-img { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
.detail-artwork-img .thumb-placeholder { min-height: 320px; border-radius: 12px; }
.detail-meta { margin-bottom: 16px; }
.detail-title { font-size: 20px; font-weight: 800; color: var(--gray-800); margin-bottom: 4px; }
.detail-author-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-500); margin-bottom: 8px; }
.detail-cat-badge { padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; color: #fff; }
.detail-date { font-size: 12px; color: var(--gray-400); }
.detail-desc { font-size: 14px; color: var(--gray-600); line-height: 1.7; margin-bottom: 16px; padding: 16px; background: var(--gray-50); border-radius: 10px; }
.detail-stats { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
.detail-stat { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--gray-600); }
.detail-stat i { font-size: 16px; }
.detail-stat.liked i { color: var(--red-500); }
.detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.detail-tag { padding: 4px 12px; background: var(--gray-100); border-radius: 50px; font-size: 12px; color: var(--gray-600); }

/* Comments */
.comments-section { border-top: 1px solid var(--gray-100); padding-top: 16px; }
.comments-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.comments-title .count { color: var(--blue-600); }
.comment-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-50); }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-100), var(--purple-100)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--blue-600); flex-shrink: 0; }
.comment-body { flex: 1; }
.comment-author { font-size: 12px; font-weight: 600; color: var(--gray-700); }
.comment-author .teacher-badge { font-size: 10px; background: var(--blue-100); color: var(--blue-600); padding: 1px 6px; border-radius: 50px; margin-left: 4px; font-weight: 700; }
.comment-text { font-size: 13px; color: var(--gray-600); margin-top: 2px; }
.comment-date { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
.comment-input-row { display: flex; gap: 8px; margin-top: 12px; }
.comment-input { flex: 1; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; resize: none; }
.comment-input:focus { border-color: var(--blue-400); }

/* ===== Register Form ===== */
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
.form-label .required { color: var(--red-500); margin-left: 2px; }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; transition: border-color .2s; }
.form-input:focus { border-color: var(--blue-400); }
.form-select { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; background: #fff; cursor: pointer; }
.form-textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; min-height: 100px; resize: vertical; transition: border-color .2s; }
.form-textarea:focus { border-color: var(--blue-400); }

/* Type selector */
.type-selector { display: flex; gap: 8px; }
.type-option { flex: 1; padding: 12px; border: 2px solid var(--gray-200); border-radius: 10px; text-align: center; cursor: pointer; transition: all .2s; }
.type-option:hover { border-color: var(--gray-300); }
.type-option.active { border-color: var(--blue-500); background: var(--blue-50); }
.type-option i { font-size: 24px; color: var(--gray-400); margin-bottom: 4px; display: block; }
.type-option.active i { color: var(--blue-600); }
.type-option span { font-size: 12px; font-weight: 600; color: var(--gray-500); }
.type-option.active span { color: var(--blue-600); }

/* Upload area */
.upload-area { border: 2px dashed #D1D5DB; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all .2s; background: var(--gray-50); }
.upload-area:hover, .upload-area.dragover { border-color: var(--blue-400); background: var(--blue-50); }
.upload-area i { font-size: 36px; color: var(--gray-300); margin-bottom: 10px; }
.upload-area.dragover i { color: var(--blue-400); }
.upload-area-text { font-size: 14px; color: var(--gray-500); margin-bottom: 4px; }
.upload-area-hint { font-size: 12px; color: var(--gray-400); }
.upload-preview { margin-top: 16px; display: none; }
.upload-preview.show { display: block; }
.upload-preview-inner { display: flex; align-items: center; gap: 12px; padding: 12px; background: #fff; border: 1px solid var(--gray-200); border-radius: 10px; }
.upload-preview-thumb { width: 60px; height: 60px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.upload-preview-thumb div { width: 100%; height: 100%; }
.upload-preview-info { flex: 1; min-width: 0; }
.upload-preview-name { font-size: 13px; font-weight: 600; color: var(--gray-700); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.upload-preview-size { font-size: 11px; color: var(--gray-400); }
.upload-preview-remove { color: var(--gray-400); font-size: 14px; padding: 4px; }
.upload-preview-remove:hover { color: var(--red-500); }

/* Class link */
.class-link-section { padding: 16px; background: var(--gray-50); border-radius: 10px; }
.class-link-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-700); cursor: pointer; }
.class-link-check input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--blue-500); }
.class-link-select { margin-top: 10px; display: none; }
.class-link-select.show { display: block; }

/* Tags input */
.tags-input-container { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 8px; min-height: 42px; align-items: center; background: #fff; cursor: text; }
.tags-input-container:focus-within { border-color: var(--blue-400); }
.tag-item { display: flex; align-items: center; gap: 4px; padding: 3px 10px; background: var(--blue-50); border-radius: 50px; font-size: 12px; color: var(--blue-600); }
.tag-item button { font-size: 10px; color: var(--blue-400); display: flex; align-items: center; }
.tag-item button:hover { color: var(--red-500); }
.tags-input { border: none; outline: none; font-size: 13px; flex: 1; min-width: 80px; background: transparent; }

/* ===== Approval View ===== */
.approval-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.approval-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.approval-count { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 24px; background: var(--amber-100); color: var(--amber-700); font-size: 12px; font-weight: 700; border-radius: 50px; padding: 0 8px; }
.status-tabs { display: flex; gap: 4px; }
.status-tab { padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 500; color: var(--gray-500); background: var(--gray-100); transition: all .2s; }
.status-tab:hover { background: var(--gray-200); }
.status-tab.active { background: var(--gray-800); color: #fff; }
.status-tab .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.status-tab .dot-pending { background: var(--amber-500); }
.status-tab .dot-approved { background: var(--emerald-500); }
.status-tab .dot-rejected { background: var(--red-500); }

.approval-list { display: flex; flex-direction: column; gap: 12px; }
.approval-card { display: flex; gap: 16px; padding: 16px; background: #fff; border-radius: 12px; border: 1px solid var(--gray-200); transition: all .2s; }
.approval-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.06); border-color: var(--blue-200); }
.approval-thumb { width: 120px; height: 90px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.approval-thumb .thumb-placeholder { width: 100%; height: 100%; font-size: 28px; }
.approval-info { flex: 1; min-width: 0; }
.approval-info-title { font-size: 14px; font-weight: 700; color: var(--gray-800); margin-bottom: 2px; }
.approval-info-meta { font-size: 12px; color: var(--gray-500); margin-bottom: 4px; }
.approval-info-cat { display: inline-block; padding: 2px 8px; border-radius: 50px; font-size: 11px; font-weight: 600; color: #fff; margin-right: 6px; }
.approval-info-date { font-size: 11px; color: var(--gray-400); }
.approval-info-desc { font-size: 12px; color: var(--gray-500); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.approval-actions { display: flex; flex-direction: column; gap: 6px; justify-content: center; flex-shrink: 0; }
.approval-reject-reason { margin-top: 8px; padding: 8px 12px; background: var(--red-50); border-radius: 8px; font-size: 12px; color: var(--red-700); }

/* Reject modal */
.reject-reasons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.reject-reason-option { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; cursor: pointer; transition: all .15s; font-size: 13px; color: var(--gray-700); }
.reject-reason-option:hover { border-color: var(--gray-300); background: var(--gray-50); }
.reject-reason-option.selected { border-color: var(--red-400); background: var(--red-50); color: var(--red-700); }
.reject-reason-option input[type="radio"] { width: 16px; height: 16px; accent-color: var(--red-500); }

/* ===== View Mode Toggle ===== */
.view-mode-toggle { display: flex; gap: 2px; background: var(--gray-100); border-radius: 8px; padding: 2px; }
.view-mode-btn { display: flex; align-items: center; justify-content: center; width: 34px; height: 30px; border-radius: 6px; color: var(--gray-400); transition: all .2s; }

.list-view-table tbody td { padding: 10px 14px; font-size: 13px; color: var(--gray-700); vertical-align: middle; }

// ===== State =====
let currentView = 'gallery';
let currentCategory = 'all';
let currentApprovalStatus = 'pending';
let displayMode = 'card'; // 'card' or 'list'
let likedArtworks = new Set();

// ===== Category colors =====
const catColors = { '미술': '#8B5CF6', '음악': '#EC4899', '문학': '#F59E0B', '영상': '#3B82F6', '기타': '#6B7280' };

const thumbHeights = ['thumb-h-sm', 'thumb-h-md', 'thumb-h-lg', 'thumb-h-xl'];
const typeIcons = { 'image': 'fa-image', 'video': 'fa-play', 'text': 'fa-align-left' };

// ===== School level detection =====
function getSchoolLevel(school) {
  if (school.includes('초')) return '초등';
  if (school.includes('중')) return '중등';
  if (school.includes('고')) return '고등';
  return '';
}

// ===== View Switching =====
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.getElementById('galleryView').style.display = view === 'gallery' ? '' : 'none';
  document.getElementById('approvalView').style.display = view === 'approval' ? '' : 'none';
  if (view === 'approval') renderApprovalList();
}

// ===== Category Filtering =====
function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
  applyFilters();
}

// ===== Apply Filters =====
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const schoolFilter = document.getElementById('schoolFilter').value;

  let filtered = artworks.filter(a => a.status === 'approved');

  if (currentCategory !== 'all') {
    filtered = filtered.filter(a => a.category === currentCategory);
  }
  if (search) {
    filtered = filtered.filter(a =>
      a.title.toLowerCase().includes(search) ||
      a.author.name.toLowerCase().includes(search) ||
      a.tags.some(t => t.toLowerCase().includes(search))
    );
  }
  if (schoolFilter !== 'all') {
    filtered = filtered.filter(a => getSchoolLevel(a.author.school) === schoolFilter);
  }

  // Sort
  if (sort === 'latest') filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
  else if (sort === 'popular') filtered.sort((a, b) => b.stats.views - a.stats.views);
  else if (sort === 'likes') filtered.sort((a, b) => b.stats.likes - a.stats.likes);

  if (displayMode === 'list') {
    renderListView(filtered);
  } else {
    renderGallery(filtered);
  }
  document.getElementById('resultCount').textContent = filtered.length + '개 작품';
}

// ===== Render Gallery =====
function renderGallery(items) {
  const grid = document.getElementById('masonryGrid');
  const empty = document.getElementById('emptyState');

  if (items.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = items.map((art, i) => {
    const heightClass = thumbHeights[i % thumbHeights.length];
    const catColor = catColors[art.category] || '#6B7280';
    const icon = catIcons[art.category] || 'fa-shapes';
    const tIcon = typeIcons[art.type] || 'fa-file';
    const isLiked = likedArtworks.has(art.id);

    return `
      <div class="art-card" onclick="openDetail(${art.id})">
        <div class="art-card-thumb thumb-${art.category} ${heightClass} thumb-placeholder">
          <i class="fa-solid ${icon}"></i>
          <span class="art-card-cat" style="background:${catColor}">${art.category}</span>
          ${art.type !== 'image' ? `<span class="art-card-type-icon"><i class="fa-solid ${tIcon}"></i></span>` : ''}
          <div class="art-card-overlay"><span>자세히 보기</span></div>
        </div>
        <div class="art-card-body">
          <div class="art-card-title">${art.title}</div>
          <div class="art-card-author"><strong>${art.author.name}</strong> &middot; ${art.author.school} ${art.author.grade}</div>
          ${art.tags.length ? `<div class="art-card-tags">${art.tags.map(t => `<span class="art-card-tag">#${t}</span>`).join('')}</div>` : ''}
          <div class="art-card-stats">
            <span class="${isLiked ? 'liked' : ''}" onclick="event.stopPropagation();toggleLike(${art.id})"><i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> ${art.stats.likes + (isLiked ? 1 : 0)}</span>
            <span><i class="fa-regular fa-comment"></i> ${art.stats.comments}</span>
            <span><i class="fa-regular fa-eye"></i> ${art.stats.views}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ===== Display Mode Toggle =====
function setDisplayMode(mode) {
  displayMode = mode;
  document.querySelectorAll('.view-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('masonryGrid').style.display = mode === 'card' ? '' : 'none';
  document.getElementById('listViewContainer').style.display = mode === 'list' ? '' : 'none';
  applyFilters();
}

// ===== Render List View =====
function renderListView(items) {
  const container = document.getElementById('listViewContainer');
  const empty = document.getElementById('emptyState');

  if (items.length === 0) {
    container.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  let html = `<table class="list-view-table">
    <thead><tr>
      <th style="width:40%">작품</th>
      <th>분야</th>
      <th>작성자</th>
      <th>등록일</th>
      <th>반응</th>
    </tr></thead><tbody>`;

  items.forEach(art => {
    const catColor = catColors[art.category] || '#6B7280';
    const icon = catIcons[art.category] || 'fa-shapes';
    const isLiked = likedArtworks.has(art.id);
    const dateStr = art.date.slice(0, 10);

    html += `<tr onclick="openDetail(${art.id})">
      <td>
        <div class="list-title-cell">
          <div class="list-thumb thumb-${art.category}"><i class="fa-solid ${icon}"></i></div>
          <span class="list-title-text">${art.title}</span>
        </div>
      </td>
      <td><span class="list-cat-badge" style="background:${catColor}">${art.category}</span></td>
      <td class="list-author-cell">${art.author.name}<br>${art.author.school}</td>
      <td class="list-date-cell">${dateStr}</td>
      <td>
        <div class="list-stats">
          <span class="${isLiked ? 'liked' : ''}"><i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> ${art.stats.likes + (isLiked ? 1 : 0)}</span>
          <span><i class="fa-regular fa-comment"></i> ${art.stats.comments}</span>
          <span><i class="fa-regular fa-eye"></i> ${art.stats.views}</span>
        </div>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ===== Category Counts =====
function updateCategoryCounts() {
  const approved = artworks.filter(a => a.status === 'approved');
  document.getElementById('countAll').textContent = ' ' + approved.length;
  ['미술', '음악', '문학', '영상', '기타'].forEach(cat => {
    const el = document.getElementById('count' + cat);
    if (el) el.textContent = ' ' + approved.filter(a => a.category === cat).length;
  });
}

// ===== Like Toggle =====

  else likedArtworks.add(id);

}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('show');

function addComment(artId) {
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;

  artComments.push({
    id: artComments.length + 1,
    artworkId: artId,
    author: "나",
    content: text,
    date: new Date().toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\./g, '-').replace(' ', '')
  });

  const art = artworks.find(a => a.id === artId);
  if (art) art.stats.comments++;

  openDetail(artId);
  showToast('댓글이 등록되었습니다.');
}

// ===== Register Modal =====
function openRegisterModal() {
  document.getElementById('registerModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeRegisterModal() {
  document.getElementById('registerModal').classList.remove('show');
  document.body.style.overflow = '';
}

function selectType(type) {
  document.querySelectorAll('.type-option').forEach(o => o.classList.toggle('active', o.dataset.type === type));
  const uploadGroup = document.getElementById('uploadGroup');
  const textGroup = document.getElementById('textGroup');
  const hint = document.getElementById('uploadHint');

  if (type === 'text') {
    uploadGroup.style.display = 'none';
    textGroup.style.display = '';
  } else {
    uploadGroup.style.display = '';
    textGroup.style.display = 'none';
    hint.textContent = type === 'image' ? '이미지: JPG, PNG (최대 10MB)' : '영상: MP4 (최대 100MB)';
  }
}

function handleDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('dragover');
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('dragover');
}

function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  showUploadPreview('dropped-file.jpg', '3.2MB');
}

function handleFileSelect(e) {
  if (e.target.files.length > 0) {
    const f = e.target.files[0];
    showUploadPreview(f.name, (f.size / 1024 / 1024).toFixed(1) + 'MB');
  }
}

function showUploadPreview(name, size) {
  document.getElementById('previewName').textContent = name;
  document.getElementById('previewSize').textContent = size;
  document.getElementById('uploadPreview').classList.add('show');
  document.getElementById('uploadArea').style.display = 'none';
}

function removeUpload() {
  document.getElementById('uploadPreview').classList.remove('show');
  document.getElementById('uploadArea').style.display = '';
  document.getElementById('fileInput').value = '';
}

function toggleClassLink() {
  const checked = document.getElementById('classLinkCheck').checked;
  document.getElementById('classLinkSelect').classList.toggle('show', checked);
}

function handleTagInput(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !formTags.includes(val)) {
      formTags.push(val);
      renderFormTags();
    }
    e.target.value = '';
  }
}

function removeTag(tag) {
  formTags = formTags.filter(t => t !== tag);
  renderFormTags();
}

function renderFormTags() {
  const container = document.getElementById('tagsContainer');
  const input = document.getElementById('tagInput');
  container.querySelectorAll('.tag-item').forEach(el => el.remove());
  formTags.forEach(tag => {
    const el = document.createElement('span');
    el.className = 'tag-item';
    el.innerHTML = `#${tag} <button onclick="removeTag('${tag}')"><i class="fa-solid fa-xmark"></i></button>`;
    container.insertBefore(el, input);
  });
}

function saveDraft() {
  showToast('임시저장 되었습니다.');
  closeRegisterModal();
}

function submitArtwork() {
  const title = document.getElementById('regTitle').value.trim();
  const category = document.getElementById('regCategory').value;

  if (!title) { showToast('작품 제목을 입력하세요.'); return; }
  if (!category) { showToast('카테고리를 선택하세요.'); return; }

  const activeType = document.querySelector('.type-option.active');
  const type = activeType ? activeType.dataset.type : 'image';

  artworks.unshift({
    id: artworks.length + 1,
    title: title,
    category: category,
    type: type,
    author: { name: "나", school: "청주중앙초", grade: "5학년" },
    description: document.getElementById('regDesc').value.trim() || '',
    date: new Date().toISOString().slice(0, 10),
    status: "pending",
    stats: { likes: 0, comments: 0, views: 0 },
    tags: [...formTags]
  });

  updatePendingBadge();
  updateCategoryCounts();
  showToast('작품이 등록 신청되었습니다. 교사 승인 후 전시됩니다.');
  closeRegisterModal();

  // Reset form
  document.getElementById('regTitle').value = '';
  document.getElementById('regCategory').value = '';
  document.getElementById('regDesc').value = '';
  formTags = [];
  renderFormTags();
  removeUpload();
}

      actionButtons = `
        <button class="btn-outline btn-sm" onclick="openDetail(${art.id})"><i class="fa-solid fa-eye"></i> 미리보기</button>
        <button class="btn-success btn-sm" onclick="approveArtwork(${art.id})"><i class="fa-solid fa-check"></i> 승인</button>
        <button class="btn-danger btn-sm" onclick="openRejectModal(${art.id})"><i class="fa-solid fa-xmark"></i> 반려</button>
      `;
    } else if (art.status === 'approved') {
      actionButtons = `<button class="btn-outline btn-sm" onclick="openDetail(${art.id})"><i class="fa-solid fa-eye"></i> 보기</button>`;
    } else if (art.status === 'rejected') {
      actionButtons = `<button class="btn-outline btn-sm" onclick="openDetail(${art.id})"><i class="fa-solid fa-eye"></i> 보기</button>`;
    }

    return `
      <div class="approval-card">
        <div class="approval-thumb">
          <div class="thumb-${art.category} thumb-placeholder" style="font-size:28px;">
            <i class="fa-solid ${icon}"></i>
          </div>
        </div>
        <div class="approval-info">
          <div class="approval-info-title">${art.title}</div>
          <div class="approval-info-meta">
            <span class="approval-info-cat" style="background:${catColor}">${art.category}</span>
            ${art.author.name} &middot; ${art.author.school} ${art.author.grade}
          </div>
          <div class="approval-info-date"><i class="fa-regular fa-calendar"></i> ${formatDate(art.date)}</div>
          <div class="approval-info-desc">${art.description}</div>
          ${art.status === 'rejected' && art.rejectReason ? `<div class="approval-reject-reason"><i class="fa-solid fa-circle-info"></i> 반려 사유: ${art.rejectReason}</div>` : ''}
        </div>
        <div class="approval-actions">${actionButtons}</div>
      </div>`;
  }).join('');
}

function approveArtwork(id) {
  const art = artworks.find(a => a.id === id);
  if (art) {
    art.status = 'approved';
    updatePendingBadge();
    updateCategoryCounts();
    renderApprovalList();
    applyFilters();
    showToast(`"${art.title}" 작품이 승인되었습니다.`);
  }
}

// ===== Reject Modal =====
function openRejectModal(id) {
  rejectTargetId = id;
  document.getElementById('rejectModal').classList.add('show');
  // Reset
  document.querySelectorAll('.reject-reason-option').forEach(o => { o.classList.remove('selected'); o.querySelector('input').checked = false; });
  document.getElementById('rejectDetail').value = '';
}

function closeRejectModal() {
  document.getElementById('rejectModal').classList.remove('show');
  rejectTargetId = null;
}

function selectRejectReason(el) {
  document.querySelectorAll('.reject-reason-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked = true;
}

function confirmReject() {
  const selected = document.querySelector('input[name="rejectReason"]:checked');
  if (!selected) { showToast('반려 사유를 선택하세요.'); return; }

  const art = artworks.find(a => a.id === rejectTargetId);
  if (art) {
    art.status = 'rejected';
    const detail = document.getElementById('rejectDetail').value.trim();
    art.rejectReason = selected.value + (detail ? ' - ' + detail : '');
    updatePendingBadge();
    renderApprovalList();
    closeRejectModal();
    showToast(`"${art.title}" 작품이 반려 처리되었습니다.`);
  }
}

// ===== Pending Badge =====
function updatePendingBadge() {
  const count = artworks.filter(a => a.status === 'pending').length;
  document.getElementById('pendingBadge').textContent = count;
  document.getElementById('pendingBadge').style.display = count > 0 ? '' : 'none';
  document.getElementById('approvalPendingCount').textContent = count;
}

// ===== Utils =====
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', function() {
  updateCategoryCounts();
  updatePendingBadge();
  applyFilters();
});
</script>
</body>
</html>
