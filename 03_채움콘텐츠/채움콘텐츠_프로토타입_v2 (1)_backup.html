<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채움콘텐츠 프로토타입</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-200: #bfdbfe; --blue-400: #60a5fa;
  --blue-500: #3b82f6; --blue-600: #2563eb; --blue-700: #1d4ed8;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
  --emerald-50: #ecfdf5; --emerald-100: #d1fae5; --emerald-500: #10b981; --emerald-600: #059669; --emerald-700: #047857;
  --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-500: #f59e0b; --amber-700: #b45309;
  --red-50: #fef2f2; --red-100: #fee2e2; --red-400: #f87171; --red-500: #ef4444; --red-600: #dc2626; --red-700: #b91c1c;
  --purple-50: #faf5ff; --purple-100: #f3e8ff; --purple-200: #e9d5ff; --purple-500: #a855f7; --purple-600: #9333ea;
}
body { font-family: 'Pretendard Variable', 'Noto Sans KR', -apple-system, sans-serif; background: #f8f9fb; color: var(--gray-800); font-size: 14px; line-height: 1.5; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input, select { font: inherit; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Header */
.header { background: #fff; border-bottom: 1px solid var(--gray-100); position: sticky; top: 0; z-index: 40; }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.logo-icon { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, #4ade80, #3b82f6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 800; }
.logo-text { font-size: 14px; font-weight: 800; color: var(--gray-800); }
.nav { display: flex; align-items: center; gap: 4px; margin-left: 24px; }
.nav-item { position: relative; }
.nav-btn { padding: 6px 12px; border-radius: 8px; font-size: 13px; color: var(--gray-500); transition: all .15s; }
.nav-btn:hover { color: var(--gray-800); background: var(--gray-50); }
.nav-btn.active { color: var(--blue-600); background: var(--blue-50); font-weight: 600; }
.nav-dropdown { position: absolute; top: 100%; left: 0; margin-top: 4px; background: #fff; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,.12); border: 1px solid var(--gray-100); padding: 4px; min-width: 140px; display: none; z-index: 50; }
.nav-item:hover .nav-dropdown { display: block; }
.nav-drop-btn { width: 100%; text-align: left; padding: 6px 12px; border-radius: 6px; font-size: 13px; color: var(--gray-600); }
.nav-drop-btn:hover { background: var(--gray-50); }
.nav-drop-btn.active { color: var(--blue-600); font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 12px; }
.search-trigger { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--gray-50); border-radius: 8px; font-size: 13px; color: var(--gray-400); transition: background .15s; }
.search-trigger:hover { background: var(--gray-100); }
.search-trigger kbd { font-size: 10px; border: 1px solid var(--gray-200); border-radius: 3px; padding: 1px 5px; margin-left: 8px; }
.bell-btn { position: relative; padding: 6px; border-radius: 8px; }
.bell-btn:hover { background: var(--gray-100); }
.bell-dot { position: absolute; top: 2px; right: 2px; width: 7px; height: 7px; background: var(--red-500); border-radius: 50%; }
.user-area { display: flex; align-items: center; gap: 8px; padding-left: 12px; border-left: 1px solid var(--gray-100); }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #bfdbfe, #e9d5ff); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--blue-700); }
.user-name { font-size: 13px; font-weight: 600; color: var(--gray-700); }

/* Sub Nav */
.sub-nav { background: #fff; border-bottom: 1px solid var(--gray-100); }
.sub-nav-inner { max-width: 1200px; margin: 0 auto; padding: 8px 20px; display: flex; gap: 4px; }
.sub-nav-btn { padding: 6px 16px; border-radius: 8px; font-size: 13px; color: var(--gray-500); transition: all .15s; }
.sub-nav-btn:hover { background: var(--gray-100); }
.sub-nav-btn.active { background: var(--gray-800); color: #fff; font-weight: 600; }

/* Main */
.main { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Cards */
.stat-card { flex: 1; background: #fff; border-radius: 12px; padding: 16px; border: 1px solid var(--gray-100); cursor: pointer; transition: all .2s; text-align: left; }
.stat-card:hover { border-color: var(--blue-200); box-shadow: 0 4px 12px rgba(59,130,246,.1); }
.stat-card-label { font-size: 11px; color: var(--gray-400); margin-bottom: 4px; }
.stat-card-value { font-size: 24px; font-weight: 800; color: var(--gray-800); }
.stat-card:hover .stat-card-value { color: var(--blue-600); }
.stat-card-change { font-size: 11px; margin-top: 4px; }
.stat-card-change.up { color: var(--emerald-500); }
.stat-card-change.down { color: var(--red-400); }

/* Status Badge */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 50px; font-size: 11px; font-weight: 600; }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-public { background: var(--emerald-100); color: var(--emerald-700); }
.badge-public .badge-dot { background: var(--emerald-500); }
.badge-review { background: var(--amber-100); color: var(--amber-700); }
.badge-review .badge-dot { background: var(--amber-500); }
.badge-rejected { background: var(--red-100); color: var(--red-700); }
.badge-rejected .badge-dot { background: var(--red-500); }
.badge-private { background: var(--gray-100); color: var(--gray-500); }
.badge-private .badge-dot { background: var(--gray-400); }

/* Type Badge */
.type-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.type-영상 { background: #eff6ff; color: #2563eb; }
.type-이미지 { background: #faf5ff; color: #9333ea; }
.type-문서 { background: #fff7ed; color: #ea580c; }
.type-문항 { background: #f0fdfa; color: #0d9488; }
.type-평가지 { background: #fdf2f8; color: #db2777; }
.type-활동지 { background: #f7fee7; color: #65a30d; }
.type-수업꾸러미 { background: #fefce8; color: #a16207; }
.type-수업레시피 { background: #ecfeff; color: #0891b2; }

/* Content Card */
.content-card { background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); overflow: hidden; transition: all .2s; }
.content-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.08); border-color: var(--gray-200); }
.card-thumb { height: 140px; background: linear-gradient(135deg, var(--gray-100), var(--gray-50)); position: relative; display: flex; align-items: center; justify-content: center; }
.card-thumb-icon { font-size: 36px; opacity: .15; }
.card-thumb .badge { position: absolute; top: 8px; left: 8px; }
.card-thumb .type-badge { position: absolute; top: 8px; right: 8px; }
.card-body { padding: 12px; }
.card-title { font-size: 13px; font-weight: 700; color: var(--gray-800); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 6px; }
.card-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--gray-400); margin-bottom: 8px; }
.card-meta .author-link { color: var(--blue-500); cursor: pointer; }
.card-meta .author-link:hover { text-decoration: underline; }
.card-actions { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--gray-400); }
.card-actions span { display: flex; align-items: center; gap: 3px; cursor: pointer; transition: color .15s; }
.card-actions span:hover { color: var(--blue-500); }

/* Compact Card */
.compact-card { display: flex; gap: 12px; background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 12px; transition: all .2s; }
.compact-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.06); }
.compact-card .card-body { flex: 1; min-width: 0; padding: 0; }
.compact-badges { display: flex; gap: 6px; margin-bottom: 4px; }

/* List Row */
.list-row { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 10px; border: 1px solid var(--gray-100); padding: 12px; transition: all .15s; cursor: pointer; }
.list-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.list-row-thumb { width: 64px; height: 48px; border-radius: 8px; background: var(--gray-50); display: flex; align-items: center; justify-content: center; font-size: 18px; opacity: .3; flex-shrink: 0; }
.list-row-body { flex: 1; min-width: 0; }
.list-row-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-row-meta { font-size: 11px; color: var(--gray-400); }

/* Action Alert */
.action-alert { background: linear-gradient(135deg, var(--amber-50), var(--red-50)); border-radius: 12px; padding: 16px; border: 1px solid rgba(245,158,11,.15); margin-bottom: 20px; }
.action-alert-title { font-size: 11px; font-weight: 800; color: var(--amber-700); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.action-items { display: flex; gap: 10px; flex-wrap: wrap; }
.action-item { display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 8px; padding: 8px 16px; font-size: 13px; box-shadow: 0 1px 3px rgba(0,0,0,.06); cursor: pointer; transition: box-shadow .15s; }
.action-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
.action-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Grid Layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.flex-row { display: flex; gap: 8px; align-items: center; }
.flex-wrap { flex-wrap: wrap; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-1 { flex: 1; min-width: 0; }
.flex-col { display: flex; flex-direction: column; }
.gap-4 { gap: 4px; } .gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.mb-4 { margin-bottom: 4px; } .mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; } .mb-16 { margin-bottom: 16px; } .mb-20 { margin-bottom: 20px; } .mb-32 { margin-bottom: 32px; }
.mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
.section-label { font-size: 11px; font-weight: 800; color: var(--gray-400); letter-spacing: .05em; margin-bottom: 12px; }
.section-title { font-size: 15px; font-weight: 800; color: var(--gray-800); }
.link-sm { font-size: 11px; color: var(--blue-500); cursor: pointer; }
.link-sm:hover { text-decoration: underline; }
.text-xs { font-size: 11px; } .text-sm { font-size: 13px; }
.text-gray { color: var(--gray-400); } .text-blue { color: var(--blue-500); } .text-bold { font-weight: 700; } .text-center { text-align: center; }

/* Filters */
.filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-label { font-size: 11px; color: var(--gray-400); margin-right: 4px; }
.filter-check { display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; font-size: 11px; border: 1px solid var(--gray-100); background: #fff; color: var(--gray-500); cursor: pointer; transition: all .15s; user-select: none; }
.filter-check:hover { border-color: var(--gray-200); }
.filter-check.active { background: var(--blue-50); border-color: var(--blue-200); color: var(--blue-600); }
.filter-check input[type="checkbox"] { width: 12px; height: 12px; accent-color: var(--blue-500); }
.status-btn { padding: 4px 10px; border-radius: 50px; font-size: 11px; color: var(--gray-500); background: var(--gray-50); cursor: pointer; transition: all .15s; }
.status-btn:hover { background: var(--gray-100); }
.status-btn.active { background: var(--gray-800); color: #fff; }
.period-btn { padding: 2px 8px; border-radius: 4px; font-size: 11px; color: var(--gray-500); background: var(--gray-100); cursor: pointer; transition: all .15s; }
.period-btn:hover { background: var(--gray-200); }
.period-btn.active { background: var(--blue-500); color: #fff; }
.metric-btn { padding: 4px 10px; border-radius: 50px; font-size: 11px; color: var(--gray-400); cursor: pointer; transition: all .15s; }
.metric-btn:hover { background: var(--gray-50); }
.metric-btn.active { background: var(--blue-100); color: var(--blue-600); font-weight: 600; }
.view-toggle { display: flex; gap: 2px; border: 1px solid var(--gray-100); border-radius: 8px; padding: 2px; }
.view-btn { padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.view-btn.active { background: var(--gray-100); }
.tag-btn { padding: 4px 12px; background: var(--gray-50); border-radius: 50px; font-size: 11px; color: var(--gray-600); cursor: pointer; white-space: nowrap; transition: all .15s; }
.tag-btn:hover { background: var(--blue-50); color: var(--blue-600); }
.keyword-tag { padding: 4px 12px; background: #fff; border-radius: 50px; font-size: 11px; color: var(--gray-600); border: 1px solid var(--gray-200); }
.keyword-edit-btn { padding: 4px 12px; border-radius: 50px; font-size: 11px; color: var(--blue-500); border: 1px solid var(--blue-200); background: var(--blue-50); cursor: pointer; }
.keyword-edit-btn:hover { background: var(--blue-100); }
.btn-primary { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--blue-500); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .15s; }
.btn-primary:hover { background: var(--blue-600); }
.btn-secondary { padding: 8px 16px; background: var(--gray-100); border-radius: 8px; font-size: 13px; color: var(--gray-600); transition: background .15s; }
.btn-secondary:hover { background: var(--gray-200); }
.btn-outline { padding: 6px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 12px; color: var(--gray-600); transition: all .15s; }
.btn-outline:hover { border-color: var(--blue-300); color: var(--blue-600); background: var(--blue-50); }
.btn-white { padding: 8px 20px; background: #fff; color: var(--blue-600); border-radius: 8px; font-size: 13px; font-weight: 600; transition: background .15s; }
.btn-white:hover { background: var(--blue-50); }
.dismiss-btn { position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,.8); backdrop-filter: blur(4px); border-radius: 50px; padding: 2px 8px; font-size: 11px; color: var(--gray-400); cursor: pointer; transition: all .15s; }
.dismiss-btn:hover { color: var(--red-400); background: var(--red-50); }

/* Sidebar */
.page-with-sidebar { display: flex; gap: 20px; }
.sidebar { width: 210px; flex-shrink: 0; }
.sidebar-box { background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 12px; }
.sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sidebar-title { font-size: 11px; font-weight: 800; color: var(--gray-400); letter-spacing: .05em; }
.folder-btn { width: 100%; text-align: left; padding: 6px 8px; border-radius: 8px; font-size: 13px; color: var(--gray-600); display: flex; align-items: center; justify-content: space-between; transition: all .15s; margin-bottom: 2px; }
.folder-btn:hover { background: var(--gray-50); }
.folder-btn.active { background: var(--blue-50); color: var(--blue-600); font-weight: 600; }
.folder-btn-inner { display: flex; align-items: center; gap: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.folder-count { font-size: 11px; color: var(--gray-300); }
.subfolder-btn { width: 100%; text-align: left; padding: 4px 8px 4px 28px; border-radius: 8px; font-size: 11px; color: var(--gray-500); transition: background .15s; }
.subfolder-btn:hover { background: var(--gray-50); }
.add-btn { padding: 4px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.add-btn:hover { background: var(--gray-100); }

/* Line Chart */
.chart-box { background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 16px; }
.line-chart { width: 100%; height: 160px; }

/* Channel */
.channel-banner { background: linear-gradient(135deg, var(--blue-500), var(--blue-400), var(--purple-500)); border-radius: 16px; padding: 24px; color: #fff; position: relative; overflow: hidden; margin-bottom: 16px; }
.channel-banner-pattern { position: absolute; inset: 0; opacity: .08; background-image: radial-gradient(circle at 20% 50%, #fff 1px, transparent 1px); background-size: 20px 20px; }
.channel-banner-inner { position: relative; display: flex; align-items: center; gap: 16px; }
.channel-avatar-lg { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,.2); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid rgba(255,255,255,.3); flex-shrink: 0; }
.channel-info h2 { font-size: 20px; font-weight: 800; }
.channel-info p { font-size: 13px; color: rgba(255,255,255,.7); margin-top: 2px; }
.channel-stats { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; color: rgba(255,255,255,.8); }
.channel-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--gray-100); margin-bottom: 16px; }
.channel-tab { padding: 8px 16px; font-size: 13px; border-bottom: 2px solid transparent; color: var(--gray-400); transition: all .15s; }
.channel-tab:hover { color: var(--gray-600); }
.channel-tab.active { border-bottom-color: var(--blue-500); color: var(--blue-600); font-weight: 600; }
.channel-card { background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 16px; cursor: pointer; transition: all .2s; text-align: left; }
.channel-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.08); border-color: var(--gray-200); }
.channel-card-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-100), var(--purple-100)); display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 8px; }
.channel-card-name { font-size: 13px; font-weight: 700; }
.channel-card-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.channel-card-stats { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--gray-400); }
.post-card { background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 16px; cursor: pointer; transition: all .15s; margin-bottom: 8px; }
.post-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.post-title { font-size: 13px; font-weight: 600; }
.post-meta { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--gray-400); }
.channel-info-box { background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 24px; max-width: 500px; }
.folder-section { margin-bottom: 24px; }
.folder-section-title { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; }

/* My Channel Manage */
.manage-banner { background: linear-gradient(135deg, var(--blue-500), var(--blue-400), var(--purple-500)); border-radius: 16px; padding: 24px; color: #fff; position: relative; overflow: hidden; margin-bottom: 20px; }
.manage-banner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.15); opacity: 0; transition: opacity .2s; border-radius: 16px; }
.manage-banner:hover .manage-banner-overlay { opacity: 1; }
.manage-section { background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 20px; margin-bottom: 16px; }
.manage-section-title { font-size: 13px; font-weight: 700; color: var(--gray-800); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.manage-field { margin-bottom: 12px; }
.manage-field label { display: block; font-size: 11px; color: var(--gray-500); margin-bottom: 4px; font-weight: 600; }
.manage-input { width: 100%; padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; transition: border-color .15s; }
.manage-input:focus { border-color: var(--blue-400); }
.manage-textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 13px; outline: none; min-height: 80px; resize: vertical; }
.manage-textarea:focus { border-color: var(--blue-400); }
.folder-expose-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 6px; }
.folder-expose-item .text-sm { flex: 1; }
.toggle-switch { position: relative; width: 36px; height: 20px; background: var(--gray-300); border-radius: 10px; cursor: pointer; transition: background .2s; }
.toggle-switch.on { background: var(--blue-500); }
.toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .2s; }
.toggle-switch.on::after { transform: translateX(16px); }

/* Sub channel list */
.sub-channel-item { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 16px; margin-bottom: 8px; transition: all .15s; }

// Generate line chart data
function genLineData(n){ const d=[]; for(let i=0;i<n;i++) d.push(Math.floor(Math.random()*50)+10); return d; }
const TREND_DATA=genLineData(30);

function drawLineChart(data, w, h, color){
  const max=Math.max(...data); const min=Math.min(...data);
  const padT=10, padB=20, padL=30, padR=10;
  const cw=w-padL-padR, ch=h-padT-padB;
  const stepX=cw/(data.length-1);
  let pts=[]; data.forEach((v,i)=>{ const x=padL+i*stepX; const y=padT+ch-(v-min)/(max-min||1)*ch; pts.push(`${x},${y}`); });
  const polyline=pts.join(' ');
  // Y axis labels
  const yLabels=[min,Math.round((max+min)/2),max];
  let ylHtml='';
  yLabels.forEach(v=>{ const y=padT+ch-(v-min)/(max-min||1)*ch; ylHtml+=`<text x="${padL-4}" y="${y+3}" text-anchor="end" fill="#ccc" font-size="9">${v}</text><line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`; });
  // X axis labels (every 5)
  let xlHtml='';
  data.forEach((v,i)=>{ if(i%5===0){ const x=padL+i*stepX; xlHtml+=`<text x="${x}" y="${h-4}" text-anchor="middle" fill="#ccc" font-size="9">${i+1}일</text>`; }});
  // Area fill
  const areaPts=`${padL},${padT+ch} ${polyline} ${padL+(data.length-1)*stepX},${padT+ch}`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    ${ylHtml}${xlHtml}
    <polygon points="${areaPts}" fill="${color}" opacity="0.08"/>
    <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderFolderSidebar(folders,dataType){
  const items=dataType==='mydata'?MY_CONTENTS:SAVED_CONTENTS;
  let h=`<div class="sidebar"><div class="sidebar-box"><div class="sidebar-header"><span class="sidebar-title">폴더</span><button class="add-btn">${SVG.plus}</button></div>
  <button class="folder-btn ${!state.selectedFolder?'active':''}" onclick="setState({selectedFolder:null})"><span class="folder-btn-inner">전체 보기</span></button>`;
  folders.forEach(f=>{
    h+=`<button class="folder-btn ${state.selectedFolder===f.name?'active':''}" onclick="setState({selectedFolder:'${f.name}'})${f.children.length?`;toggleExpand('${f.id}')`:''}'"><span class="folder-btn-inner">${SVG.folder} ${f.name}</span><span class="folder-count">${f.count}</span></button>`;
    if(f.children.length&&state.expandedFolders.has(f.id)) f.children.forEach(s=>{h+=`<button class="subfolder-btn" onclick="setState({selectedFolder:'${s.name}'})">${s.name} <span style="color:var(--gray-300)">(${s.count})</span></button>`;});
  });
  h+=`</div>
  <div style="margin-top:12px;background:#fff;border-radius:12px;border:1px solid var(--gray-100);padding:12px">
    <div class="sidebar-title" style="margin-bottom:8px">유형별 집계</div>
    ${CONTENT_TYPES.map(t=>{const cnt=items.filter(c=>c.type===t).length;return cnt?'<div class="flex-between" style="padding:3px 0;font-size:11px"><span style="color:var(--gray-600)">'+t+'</span><span style="font-weight:700;color:var(--gray-700)">'+cnt+'</span></div>':'';}).join('')}
    <div class="flex-between" style="padding:4px 0;margin-top:4px;border-top:1px solid var(--gray-100);font-size:11px;font-weight:700"><span>합계</span><span>${items.length}</span></div>
  </div></div>`;
  return h;
}

function renderMyData(type){
  const items=type==="mydata"?MY_CONTENTS:SAVED_CONTENTS;
  const folders=type==="mydata"?FOLDERS:SAVED_FOLDERS;
  const isMyData=type==="mydata";
  let filtered=items.filter(c=>{
    if(state.selectedFolder&&c.folder!==state.selectedFolder)return false;
    if(state.typeFilters.size>0&&!state.typeFilters.has(c.type))return false;
    if(isMyData&&state.statusFilter!=="전체"&&c.status!==state.statusFilter)return false;
    return true;
  });
  let h=`<div class="page-with-sidebar">${renderFolderSidebar(folders,type)}<div class="flex-1">
    <div class="flex-between mb-16"><h3 class="section-title">${isMyData?"내자료":"담은자료"}${state.selectedFolder?' / '+state.selectedFolder:''}</h3>
    ${isMyData?`<button class="btn-primary">${SVG.plus} 새로 만들기</button>`:''}</div>
    <div class="filter-row"><span class="filter-label">유형</span>
    ${CONTENT_TYPES.map(t=>`<label class="filter-check ${state.typeFilters.has(t)?'active':''}"><input type="checkbox" ${state.typeFilters.has(t)?'checked':''} onchange="toggleTypeFilter('${t}')"> ${t}</label>`).join('')}</div>`;
  if(isMyData) h+=`<div class="filter-row"><span class="filter-label">상태</span>
    ${["전체","public","review","rejected","private"].map(s=>`<button class="status-btn ${state.statusFilter===s?'active':''}" onclick="setState({statusFilter:'${s}'})">${s==="전체"?"전체":STATUS_MAP[s].label}</button>`).join('')}
    <div class="flex-1"></div><div class="view-toggle"><button class="view-btn ${state.viewMode==='card'?'active':''}" onclick="setState({viewMode:'card'})">${SVG.grid}</button><button class="view-btn ${state.viewMode==='list'?'active':''}" onclick="setState({viewMode:'list'})">${SVG.list}</button></div></div>`;
  h+=`<div class="text-xs text-gray mb-12">총 <strong class="text-blue">${filtered.length}</strong>개</div>`;
  if(state.viewMode==='card') h+=`<div class="grid-3">${filtered.map(c=>contentCard(c,{showStatus:isMyData})).join('')}</div>`;
  else h+=`<div class="flex-col gap-4">${filtered.map(c=>listRow(c,isMyData)).join('')}</div>`;
  return h+`</div></div>`;
}

  const contents=MY_CONTENTS.filter(c=>c.status==="public");
  let h=`<span class="back-link" onclick="navigate('dashboard')">← 뒤로가기</span>
  <div class="channel-banner"><div class="channel-banner-pattern"></div><div class="channel-banner-inner"><div class="channel-avatar-lg">${ch.name[0]}</div><div class="channel-info flex-1"><h2>${ch.name}</h2><p>${ch.desc}</p><div class="channel-stats"><span>구독자 ${ch.subscribers}명</span><span>콘텐츠 ${contents.length}개</span><span>총 조회수 1,245</span></div></div><button class="btn-white">구독하기</button></div></div>
  <div class="channel-tabs">${["홈","콘텐츠","게시판","정보"].map(t=>`<button class="channel-tab ${state.channelTab===t?'active':''}" onclick="setState({channelTab:'${t}'})">${t}</button>`).join('')}</div>`;
  if(state.channelTab==="홈"){
    const byF={};contents.forEach(c=>{const f=c.folder||"기타";if(!byF[f])byF[f]=[];byF[f].push(c);});
    for(const[f,items]of Object.entries(byF)) h+=`<div class="folder-section"><div class="folder-section-title">📁 ${f}</div><div class="grid-4">${items.map(c=>contentCard(c)).join('')}</div></div>`;
  } else if(state.channelTab==="콘텐츠"){
    h+=`<div class="grid-4">${contents.map(c=>contentCard(c)).join('')}</div>`;
  } else if(state.channelTab==="게시판"){
    [{title:"2학기 수학 수업 자료 업데이트 안내",date:"2026.02.15",comments:5},{title:"일차함수 수업 팁 공유합니다",date:"2026.02.10",comments:12},{title:"새 활동지 시리즈를 준비하고 있습니다",date:"2026.02.05",comments:3}].forEach(p=>{h+=`<div class="post-card"><div class="post-title">${p.title}</div><div class="post-meta"><span>${p.date}</span><span>${SVG.comment} ${p.comments}</span></div></div>`;});
  } else {
    h+=`<div class="channel-info-box"><h4 style="font-weight:700;margin-bottom:12px">채널 소개</h4><p class="text-sm" style="color:var(--gray-600);margin-bottom:16px">중학교 수학 교사입니다. 학생들이 수학을 쉽고 재미있게 배울 수 있는 콘텐츠를 만들고 있습니다.</p><h4 style="font-weight:700;margin-bottom:8px">SNS</h4><div class="flex-row gap-8"><span class="tag-btn">📝 블로그</span><span class="tag-btn">▶ 유튜브</span></div><p class="text-xs text-gray mt-16">채널 생성일: 2024.03.15</p></div>`;
  }
  return h;
}

function renderSearchStd(){
  return `<div class="empty-state"><p>성취기준별 콘텐츠 찾기</p><p class="text-xs" style="color:var(--gray-300);margin-top:4px">상세 요구사항은 [SFR-000] 검색 기능 고도화 문서 참조</p><button class="btn-primary mt-16" onclick="setState({searchOpen:true})" style="display:inline-flex">${SVG.search} 검색 열기</button></div>`;
}

function renderModals(){
  let h='';
  if(state.searchOpen){
    h+=`<div class="modal-overlay top" onclick="setState({searchOpen:false})"><div class="modal-backdrop"></div><div class="modal-content lg" onclick="event.stopPropagation()">
    <div class="search-input-row">${SVG.search}<input class="search-input" id="searchInput" placeholder="성취기준 코드, 키워드로 검색..." oninput="updateSearch(this.value)" autofocus><kbd style="font-size:10px;color:var(--gray-300);border:1px solid var(--gray-200);border-radius:3px;padding:1px 5px">ESC</kbd></div>
    <div id="searchBody"><div class="search-tags"><div class="search-tags-label">최근 검색어</div><div class="search-tags-list">${["분수","일차함수","6수01-06","AI 교육"].map(k=>`<button class="tag-btn" onclick="document.getElementById('searchInput').value='${k}';updateSearch('${k}')">${k}</button>`).join('')}</div>
    <div class="search-tags-label mt-16">인기 검색어</div><div class="search-tags-list">${["수학","디지털 리터러시","학습공동체","평가"].map(k=>`<button class="tag-btn" onclick="document.getElementById('searchInput').value='${k}';updateSearch('${k}')">${k}</button>`).join('')}</div></div></div></div></div>`;
  }
  if(state.statModal){
    h+=`<div class="modal-overlay" onclick="setState({statModal:null})"><div class="modal-backdrop"></div><div class="modal-content md" onclick="event.stopPropagation()">
    <div class="modal-header"><h3>${state.statModal} 상세 분석</h3><button class="modal-close" onclick="setState({statModal:null})">${SVG.x}</button></div>
    <div class="modal-body"><div class="flex-row gap-8 mb-16">${["7일","30일","90일"].map(p=>`<button class="period-btn">${p}</button>`).join('')}</div>
    <div style="height:140px">${drawLineChart(genLineData(14),480,140,'#3b82f6')}</div>
    <div class="stat-modal-grid"><div class="stat-modal-cell" style="background:var(--blue-50)"><div class="stat-modal-cell-val" style="color:var(--blue-600)">1,245</div><div class="stat-modal-cell-label">총 ${state.statModal}</div></div><div class="stat-modal-cell" style="background:var(--emerald-50)"><div class="stat-modal-cell-val" style="color:var(--emerald-600)">+12%</div><div class="stat-modal-cell-label">전월 대비</div></div><div class="stat-modal-cell" style="background:var(--purple-50)"><div class="stat-modal-cell-val" style="color:var(--purple-600)">영상</div><div class="stat-modal-cell-label">최다 유형</div></div></div></div></div></div>`;
  }
  if(state.rejectModal){
    const it=state.rejectModal;
    h+=`<div class="modal-overlay" onclick="setState({rejectModal:null})"><div class="modal-backdrop"></div><div class="modal-content sm" onclick="event.stopPropagation()">
    <div class="modal-header"><h3 style="color:var(--red-600)">반려 사유</h3><button class="modal-close" onclick="setState({rejectModal:null})">${SVG.x}</button></div>
    <div class="modal-body"><p class="text-sm text-bold">${it.title}</p><div class="reject-reason-box"><div class="reject-reason-text">저작권 관련 확인이 필요합니다. 이미지 출처를 명시해 주세요.</div><div class="reject-reason-date">반려일: 2026.02.09</div></div>
    <div class="modal-actions"><button class="btn-primary">수정 후 재신청</button><button class="btn-secondary" onclick="setState({rejectModal:null})">닫기</button></div></div></div></div>`;
  }
  return h;
}

function updateSearch(q){
  const body=document.getElementById('searchBody'); if(!body)return;
  if(!q){body.innerHTML=`<div class="search-tags"><div class="search-tags-label">최근 검색어</div><div class="search-tags-list">${["분수","일차함수","6수01-06","AI 교육"].map(k=>`<button class="tag-btn" onclick="document.getElementById('searchInput').value='${k}';updateSearch('${k}')">${k}</button>`).join('')}</div><div class="search-tags-label mt-16">인기 검색어</div><div class="search-tags-list">${["수학","디지털 리터러시","학습공동체","평가"].map(k=>`<button class="tag-btn" onclick="document.getElementById('searchInput').value='${k}';updateSearch('${k}')">${k}</button>`).join('')}</div></div>`;return;}
  const all=[...MY_CONTENTS,...PUBLIC_CONTENTS,...SAVED_CONTENTS];
  const res=all.filter(c=>c.title.includes(q)||c.tags?.some(t=>t.includes(q)));
  if(!res.length){body.innerHTML=`<div style="padding:32px;text-align:center;color:var(--gray-400);font-size:13px">검색 결과가 없습니다.</div>`;return;}
  body.innerHTML=`<div class="search-results">${res.map(r=>`<button class="search-result-item" onclick="setState({searchOpen:false})">${typeBadge(r.type)}<div class="flex-1" style="min-width:0"><div class="text-sm text-bold truncate">${r.title}</div><div class="text-xs text-gray">${r.author} · 조회 ${r.views}</div></div></button>`).join('')}</div>`;
}

function render(){
  let pc='';
  switch(state.page){
    case'dashboard':pc=renderDashboard();break;case'mydata':pc=renderMyData('mydata');break;case'saved':pc=renderMyData('saved');break;
    case'subscriptions':pc=renderSubscriptions();break;case'mychannel':pc=renderMyChannel();break;
    case'public':pc=renderPublic();break;case'recommend':pc=renderRecommend();break;case'channel':pc=renderChannel();break;case'search-std':pc=renderSearchStd();break;
  }
  document.getElementById('app').innerHTML=renderHeader()+`<main class="main">${pc}</main>`+renderModals();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')setState({searchOpen:false,statModal:null,rejectModal:null});if(e.key==='k'&&(e.metaKey||e.ctrlKey)){e.preventDefault();setState({searchOpen:true});}});
render();
</script>
</body>
</html>
