<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다채움 LRS 학습분석 대시보드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Pretendard',sans-serif; background:#f0f2f5; color:#1f2937; }
.lrs-wrapper { display:flex; height:100vh; overflow:hidden; }
body.gnb-has-header .lrs-wrapper { height:calc(100vh - var(--gnb-header-height)); }
body.gnb-has-sub .lrs-wrapper { height:calc(100vh - var(--gnb-header-height) - var(--gnb-sub-height)); }
body.gnb-has-sub-multi .lrs-wrapper { height:calc(100vh - var(--gnb-total-height)); }

/* ── 좌측 1차 메뉴 사이드바 ── */
.sidebar { width:64px; background:#1e293b; display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; z-index:100; flex-shrink:0; }
.sidebar .logo { color:#fff; font-size:11px; font-weight:700; margin-bottom:12px; text-align:center; line-height:1.3; }
.sidebar .logo span { display:block; font-size:9px; color:#94a3b8; font-weight:400; }
.nav-item { width:56px; padding:8px 4px; border-radius:8px; text-align:center; cursor:pointer; transition:all .2s; color:#94a3b8; }
.nav-item:hover { background:#334155; color:#e2e8f0; }
.nav-item.active { background:#2563eb; color:#fff; }
.nav-item .icon { font-size:18px; display:block; margin-bottom:2px; }
.nav-item .label { font-size:9px; font-weight:500; line-height:1.2; }
.nav-spacer { flex:1; }

/* ── 2차 메뉴 패널 ── */
.sub-menu { width:200px; background:#fff; border-right:1px solid #e5e7eb; padding:16px 0; overflow-y:auto; flex-shrink:0; }
.sub-menu-title { padding:8px 16px; font-size:13px; font-weight:700; color:#1e293b; border-bottom:1px solid #f3f4f6; margin-bottom:4px; }
.sub-menu-group { padding:4px 0; }
.sub-menu-group-title { padding:6px 16px; font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.5px; }
.sub-menu-item { padding:8px 16px 8px 28px; font-size:12px; color:#4b5563; cursor:pointer; transition:all .15s; border-left:3px solid transparent; }
.sub-menu-item:hover { background:#f9fafb; color:#1e293b; }
.sub-menu-item.active { background:#eff6ff; color:#2563eb; font-weight:600; border-left-color:#2563eb; }

/* ── 메인 콘텐츠 ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.top-bar { height:48px; background:#fff; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; padding:0 24px; justify-content:space-between; flex-shrink:0; }
.breadcrumb { font-size:12px; color:#6b7280; }
.breadcrumb span { color:#2563eb; font-weight:600; }
.top-right { display:flex; align-items:center; gap:12px; font-size:12px; color:#6b7280; }
.content { flex:1; overflow-y:auto; padding:20px 24px; }

/* ── 필터 영역 ── */
.filter-bar { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:16px 20px; margin-bottom:16px; }
.filter-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
.filter-row:last-child { margin-bottom:0; }
.filter-label { font-size:12px; font-weight:600; color:#374151; min-width:60px; }
.filter-select { padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:12px; font-family:inherit; background:#fff; min-width:120px; }
.filter-input { padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:12px; font-family:inherit; width:130px; }
.filter-radio { display:flex; gap:4px; }
.filter-radio label { padding:5px 12px; border:1px solid #d1d5db; border-radius:6px; font-size:11px; cursor:pointer; transition:all .15s; background:#fff; }
.filter-radio label:hover { border-color:#93c5fd; }
.filter-radio input { display:none; }
.filter-radio input:checked + span { background:#2563eb; color:#fff; border-color:#2563eb; }
.filter-radio label.active { background:#2563eb; color:#fff; border-color:#2563eb; }
.filter-check { display:flex; align-items:center; gap:4px; font-size:12px; }
.btn-search { padding:7px 24px; background:#2563eb; color:#fff; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-search:hover { background:#1d4ed8; }
.btn-reset { padding:7px 16px; background:#fff; color:#6b7280; border:1px solid #d1d5db; border-radius:6px; font-size:12px; cursor:pointer; font-family:inherit; }
.output-type { display:flex; gap:4px; margin-left:auto; }
.output-type label { padding:5px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:11px; cursor:pointer; }
.output-type label.active { background:#1e293b; color:#fff; border-color:#1e293b; }

/* ── 화면설명 및 산출식 ── */
.formula-bar { background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:10px 16px; margin-bottom:16px; font-size:11px; color:#92400e; cursor:pointer; display:flex; align-items:center; gap:8px; }
.formula-bar .toggle { font-size:14px; }

/* ── 차트 + 표 영역 ── */
.chart-section { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:20px; margin-bottom:16px; }
.chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.chart-title { font-size:13px; font-weight:700; color:#1e293b; }
.chart-title::before { content:'▸ '; color:#2563eb; }
.chart-toggle { display:flex; gap:4px; }
.chart-toggle label { padding:4px 10px; border:1px solid #d1d5db; border-radius:5px; font-size:11px; cursor:pointer; }
.chart-toggle label.active { background:#2563eb; color:#fff; border-color:#2563eb; }
.chart-container { position:relative; height:320px; }

.table-section { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:20px; margin-bottom:16px; }
.table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.table-title { font-size:13px; font-weight:700; color:#1e293b; }
.table-title::before { content:'▸ '; color:#2563eb; }
.table-count { font-size:12px; color:#6b7280; margin-left:8px; }
.btn-excel { padding:5px 14px; background:#16a34a; color:#fff; border:none; border-radius:5px; font-size:11px; cursor:pointer; font-family:inherit; }
.btn-excel::before { content:'📊 '; }
.data-table { width:100%; border-collapse:collapse; font-size:12px; }
.data-table thead th { background:#f8fafc; padding:8px 10px; text-align:center; font-weight:600; color:#374151; border-bottom:2px solid #e5e7eb; white-space:nowrap; }
.data-table tbody td { padding:7px 10px; text-align:center; border-bottom:1px solid #f3f4f6; }
.data-table tbody tr:hover { background:#f9fafb; }
.data-table .num { text-align:right; font-variant-numeric:tabular-nums; }

/* ── 홈 대시보드 ── */
.home-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
.home-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:20px; }
.home-card .card-label { font-size:11px; color:#6b7280; font-weight:500; margin-bottom:8px; }
.home-card .card-value { font-size:28px; font-weight:700; color:#1e293b; }
.home-card .card-sub { font-size:11px; margin-top:4px; }
.home-card .card-sub.up { color:#16a34a; }
.home-card .card-sub.down { color:#dc2626; }
.home-card .card-sub.flat { color:#6b7280; }

.notice-section { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:16px 20px; margin-bottom:16px; }
.notice-title { font-size:13px; font-weight:700; margin-bottom:12px; }
.notice-title::before { content:'● '; color:#2563eb; }
.notice-list { list-style:none; }
.notice-list li { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #f3f4f6; font-size:12px; }
.notice-list li:last-child { border:none; }
.notice-list .date { color:#9ca3af; }

/* ── 교과 체크박스 필터 ── */
.subj-filter-bar { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:14px 20px; margin-bottom:16px; }
.subj-filter-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
.subj-filter-row:last-child { margin-bottom:0; }
.subj-check-group { display:flex; gap:6px; flex-wrap:wrap; }
.subj-check-group label { display:flex; align-items:center; gap:4px; padding:5px 12px; border:1px solid #d1d5db; border-radius:6px; font-size:12px; cursor:pointer; transition:all .15s; background:#fff; user-select:none; }
.subj-check-group label:hover { border-color:#93c5fd; background:#f0f7ff; }
.subj-check-group label.checked { background:#2563eb; color:#fff; border-color:#2563eb; }
.subj-check-group input[type=checkbox] { display:none; }

/* ── 페이지 숨기기 ── */
.page { display:none; }
.page.active { display:block; }

/* ── 스크롤바 ── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
</style>
</head>
<body data-gnb-page="lrsDashboard" data-gnb-base="../">

<div class="lrs-wrapper">
<!-- ===== 1차 메뉴 사이드바 ===== -->
<nav class="sidebar">
  <div class="logo">LRS<span>학습분석</span></div>
  <div class="nav-item active" data-menu="home"><span class="icon">🏠</span><span class="label">홈</span></div>

<aside class="sub-menu" id="subMenu">

</aside>

<!-- ===== 메인 콘텐츠 ===== -->
<div class="main">
  <div class="top-bar">
    <div class="breadcrumb" id="breadcrumb">홈</div>
    <div class="top-right">
      <span>집계일자 2025-03-11</span>
    </div>
  </div>

  </div>
</div>

<script>
// ============================================================
// 메뉴 구조 정의
// ============================================================
const MENUS = {
  home: { title:'홈', items:[] },
  usage: {
    title:'학습현황',
    items:[
      { group:'활용빈도', children:[
        { id:'usage-rate', name:'활용률' },
        { id:'usage-freq', name:'활용빈도' },
        { id:'usage-freq-subj', name:'과목별 활용빈도' },
        { id:'usage-freq-school', name:'학교급별 활용빈도' }
      ]},
      { group:'활용시간', children:[
        { id:'usage-time', name:'학습활동 시간' },
        { id:'usage-time-subj', name:'과목별 학습활동 시간' },
        { id:'usage-time-school', name:'학교급별 학습활동 시간' }
      ]}
    ]
  },
  achieve: {
    title:'학업성취',
    items:[
      { group:'성취수준', children:[
        { id:'achieve-status', name:'성취수준 현황' },
        { id:'achieve-dist', name:'성취수준 분포' }
      ]}
    ]
  },
  perform: {
    title:'학습수행',
    items:[
      { group:'학습콘텐츠 활용도', children:[
        { id:'perform-content-freq', name:'콘텐츠 유형별 활용빈도' },
        { id:'perform-content-time', name:'콘텐츠 유형별 활용시간' }
      ]},
      { group:'문항풀이 활용도', children:[
        { id:'perform-quiz-freq', name:'평가문항풀이 빈도·시간' },
        { id:'perform-quiz-subj', name:'과목별 평가문항풀이 빈도·시간' },
        { id:'perform-quiz-school', name:'학교급별 평가문항풀이 빈도·시간' }
      ]},
      { group:'과제 수행도', children:[
        { id:'perform-hw-assign', name:'과제 출제 빈도' },
        { id:'perform-hw-submit', name:'과제 제출 빈도' },
        { id:'perform-hw-rate', name:'과제 수행률' }
      ]}
    ]
  },
  custom: {
    title:'맞춤학습',
    items:[
      { group:'AI 맞춤학습 활용도', children:[
        { id:'custom-ai-freq', name:'AI 맞춤학습 활용빈도' },
        { id:'custom-ai-recommend', name:'AI 맞춤학습 추천 콘텐츠 활용도' }
      ]},
      { group:'학생 주도 평가', children:[
        { id:'custom-student-eval', name:'학생 주도 평가 참여빈도' },
        { id:'custom-student-reeval', name:'학생 주도 재평가 참여빈도' },
        { id:'custom-student-retry', name:'오답 재도전 참여율' }
      ]},
      { group:'교사 콘텐츠 재구성', children:[
        { id:'custom-teacher-reorg', name:'교육자료 재구성 빈도' }
      ]},
      { group:'교사 피드백 빈도', children:[
        { id:'custom-teacher-feedback', name:'교사 피드백 활동' }
      ]}
    ]
  },
  teacher: {
    title:'교사활용지수',
    items:[
      { group:'활용빈도', children:[
        { id:'teacher-rate', name:'교사 활용률' },
        { id:'teacher-freq', name:'교사 활용빈도' },
        { id:'teacher-subj', name:'과목별 교사 활용빈도' },
        { id:'teacher-school', name:'학교급별 교사 활용빈도' }
      ]}
    ]
  },
  daily: {
    title:'일일현황',
    items:[
      { group:'운영 현황', children:[
        { id:'daily-access', name:'접속 현황' },
        { id:'daily-usage', name:'활용 현황' }
      ]}
    ]
  }
};

// ============================================================
// 더미 데이터 생성
// ============================================================
const WEEKS = [];
const startDate = new Date(2025, 2, 3);
for(let i=0; i<52; i++){
  const s = new Date(startDate); s.setDate(s.getDate()+i*7);
  const e = new Date(s); e.setDate(e.getDate()+6);
  const fmt = d => `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  const mon = s.getMonth()+1;
  const weekInMonth = Math.ceil(s.getDate()/7);
  WEEKS.push({ label:`${mon}월${weekInMonth}주`, range:`(${fmt(s)}~${fmt(e)})` });
}

function genData(base, variance, len=52){
  const arr = [];
  for(let i=0; i<len; i++){
    let v = base + Math.sin(i*0.3)*variance + (Math.random()-0.5)*variance*0.5;
    if(i>=26 && i<=34) v *= 0.15; // 방학
    arr.push(Math.max(0, Math.round(v)));
  }
  return arr;
}

const DATA = {
  totalFreq: genData(12000, 5000),
  totalRate: genData(180, 120).map(v=>Math.min(536, v)),
  subjMath: genData(7000, 3000),
  subjEng: genData(4000, 1500),
  subjInfo: genData(2000, 1000),
  schoolElem: genData(9000, 4000),
  schoolMid: genData(3500, 1500),
  schoolHigh: genData(1200, 600),
  totalTime: genData(1500, 700).map(v=>+(v*0.1).toFixed(1)),
  contentVideo: genData(3000, 1500),
  contentText: genData(2000, 800),
  contentAudio: genData(500, 300),
  contentPractice: genData(800, 400),
  contentImage: genData(300, 200),
  contentOther: genData(200, 100),
  quizFreq: genData(5000, 2500),
  hwAssign: genData(800, 400),
  hwSubmit: genData(600, 350),
  aiTutor: genData(300, 200),
  studentEval: genData(2000, 1000),
  studentReeval: genData(500, 300),
  retryRate: genData(35, 15).map(v=>Math.min(80, Math.max(5, v))),
  teacherReorg: genData(200, 100),
  teacherFeedback: genData(400, 200),
  teacherRate: genData(120, 80).map(v=>Math.min(400, v)),
  teacherFreq: genData(8000, 3000),
};

// 학교급별 교과 데이터
const SUBJ_BY_SCHOOL = {
  '초등학교': ['국어','수학','사회','과학','영어','음악','미술','체육','실과'],
  '중학교':   ['국어','수학','사회','과학','영어','음악','미술','체육','기술가정','정보'],
  '고등학교': ['국어','수학','사회','과학','영어','음악','미술','체육','정보','기술가정']
};
const SUBJ_COLORS = {
  '국어':'#2563eb','수학':'#16a34a','사회':'#f59e0b','과학':'#8b5cf6','영어':'#ef4444',
  '음악':'#ec4899','미술':'#06b6d4','체육':'#f97316','실과':'#84cc16','기술가정':'#64748b','정보':'#1e293b'
};
// 교과별 더미 데이터 (학교급별)
const SUBJ_DATA = {};
Object.keys(SUBJ_BY_SCHOOL).forEach(school=>{
  SUBJ_DATA[school] = {};
  SUBJ_BY_SCHOOL[school].forEach(subj=>{
    SUBJ_DATA[school][subj] = genData(1500+Math.random()*3000, 800+Math.random()*1000);
  });
});

// ============================================================
// 차트 인스턴스 관리
// ============================================================
let activeCharts = [];
function destroyCharts(){
  activeCharts.forEach(c=>c.destroy());
  activeCharts = [];
}

function createLineChart(canvasId, labels, datasets, yLabel='건수'){
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  const chart = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display: datasets.length > 1, position:'top', labels:{ font:{size:11,family:'Pretendard'}, usePointStyle:true, pointStyle:'circle' }}},
      scales:{
        x:{ ticks:{ font:{size:10}, maxRotation:45 }},
        y:{ beginAtZero:true, title:{ display:true, text:`[ ${yLabel} ]`, font:{size:11} }, ticks:{ font:{size:10}, callback:v=>v.toLocaleString() }}
      },
      interaction:{ mode:'index', intersect:false }
    }
  });
  activeCharts.push(chart);
}

function createBarChart(canvasId, labels, datasets, yLabel='건수', stacked=false){
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  const chart = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'top', labels:{ font:{size:11,family:'Pretendard'}, usePointStyle:true }}},
      scales:{
        x:{ stacked, ticks:{ font:{size:10} }},
        y:{ stacked, beginAtZero:true, title:{ display:true, text:`[ ${yLabel} ]`, font:{size:11} }, ticks:{ font:{size:10}, callback:v=>v.toLocaleString() }}
      }
    }
  });
  activeCharts.push(chart);
}

// ============================================================
// 필터 HTML 생성 헬퍼
// ============================================================
function filterStandard(opts={}){
  const showCalc = opts.calc !== false;
  const showSubj = opts.subj === true;
  const showSchool = opts.school === true;
  const showHours = opts.hours === true;
  return `
  <div class="filter-bar">
    <div class="filter-row">
      <span class="filter-label">학교</span>

function tableHTML(headers, rows, count){

  let r = rows.map(row=>`<tr>${row.map((c,i)=>`<td class="${i>=2?'num':''}">${typeof c==='number'?c.toLocaleString():c}</td>`).join('')}</tr>`).join('');

    <table class="data-table"><thead><tr>${h}</tr></thead><tbody>${r}</tbody></table>
    </div>
  </div>`;
}

function renderLineChartPage(title, dataKey, yLabel, filterOpts){

  const schoolDataMap = {
    total: { label:'전체', data:d, borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,0.08)', tension:0.3, pointRadius:2, fill:true },
    elem:  { label:'초등학교', data:DATA.schoolElem.map((v,i)=>Math.round(v*d[i]/DATA.totalFreq[i]||0)), borderColor:'#16a34a', backgroundColor:'transparent', tension:0.3, pointRadius:2, fill:false },

  };
  return {
    html: `
    ${filterStandard(filterOpts||{})}
    <div class="formula-bar"><span class="toggle">▸</span> 화면설명 및 산출식</div>
    <div class="chart-section">

        <div class="subj-check-group" id="lineSchoolCheck">

          <label><input type="checkbox" value="elem">초등학교</label>
          <label><input type="checkbox" value="mid">중학교</label>
          <label><input type="checkbox" value="high">고등학교</label>
        </div>
      </div>
      <div class="chart-container"><canvas id="mainChart"></canvas></div>
    </div>
    ${tableHTML(['순번','기간',yLabel], genTableRows(dataKey, yLabel), d.length)}`,
    init:()=>{
      function refreshLine(){
        destroyCharts();
        const checked = [];
        document.querySelectorAll('#lineSchoolCheck input:checked').forEach(cb=>checked.push(cb.value));
        const ds = checked.map(k=>schoolDataMap[k]).filter(Boolean);
        if(ds.length) createLineChart('mainChart', labels, ds, yLabel);
      }
      document.querySelectorAll('#lineSchoolCheck label').forEach(label=>{
        label.addEventListener('click', function(e){
          if(e.target.tagName==='INPUT') return;
          const cb = this.querySelector('input');
          cb.checked = !cb.checked;
          this.classList.toggle('checked', cb.checked);
          refreshLine();
        });
        const cb = label.querySelector('input');
        if(cb) cb.addEventListener('change', function(){ label.classList.toggle('checked', this.checked); refreshLine(); });
      });
      refreshLine();
    }
  };
}

        <span class="filter-label" style="margin-left:8px">*교과</span><span style="font-size:10px;color:#9ca3af;margin-right:4px">(최대 ${MAX_SUBJ}개)</span>
        <div class="subj-check-group" id="subjCheckGroup">
          ${buildCheckboxes(defaultSchool, defaultSubjs)}
        </div>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn-reset" onclick="document.querySelectorAll('#subjCheckGroup label').forEach(l=>{l.classList.remove('checked');l.querySelector('input').checked=false})">↻ 초기화</button>
          <button class="btn-search" onclick="window.__refreshSubjChart()">조회</button>
        </div>
      </div>
    </div>
    <div class="formula-bar"><span class="toggle">▸</span> 화면설명 및 산출식</div>
    <div class="chart-section">
      <div class="chart-header"><span class="chart-title">${title}(그래프)-합계</span></div>
      <div class="chart-container"><canvas id="${id}"></canvas></div>
    </div>`,
    init:()=>{
      // 체크박스 토글 (최대 MAX_SUBJ개 제한)
      function bindCheckboxes(){
        document.querySelectorAll('#subjCheckGroup label').forEach(label=>{
          label.addEventListener('click', function(e){
            if(e.target.tagName==='INPUT') return;
            const cb = this.querySelector('input');
            if(!cb.checked){
              const cnt = document.querySelectorAll('#subjCheckGroup input:checked').length;
              if(cnt >= MAX_SUBJ){ alert('최대 '+MAX_SUBJ+'개까지 선택 가능합니다.'); return; }
            }
            cb.checked = !cb.checked;
            this.classList.toggle('checked', cb.checked);
          });
          const cb = label.querySelector('input');
          if(cb) cb.addEventListener('change', function(){
            if(this.checked){
              const cnt = document.querySelectorAll('#subjCheckGroup input:checked').length;
              if(cnt > MAX_SUBJ){ this.checked=false; label.classList.remove('checked'); alert('최대 '+MAX_SUBJ+'개까지 선택 가능합니다.'); return; }
            }
            label.classList.toggle('checked', this.checked);
          });
        });
      }
      bindCheckboxes();

      // 학교급 변경 시 체크박스 갱신
      const schoolSel = document.getElementById('schoolLevelSel');
      schoolSel.addEventListener('change', function(){
        const school = this.value;
        const group = document.getElementById('subjCheckGroup');
        const defaultSel = SUBJ_BY_SCHOOL[school].slice(0,MAX_SUBJ);
        group.innerHTML = SUBJ_BY_SCHOOL[school].map(s=>{
          const chk = defaultSel.includes(s) ? 'checked' : '';
          const cls = defaultSel.includes(s) ? ' checked' : '';
          return '<label class="'+cls+'"><input type="checkbox" value="'+s+'" '+chk+'>'+s+'</label>';
        }).join('');
        bindCheckboxes();
        window.__refreshSubjChart();
      });

      // 조회 버튼
      window.__refreshSubjChart = function(){
        const school = document.getElementById('schoolLevelSel').value;
        const checked = [];
        document.querySelectorAll('#subjCheckGroup input:checked').forEach(cb=>checked.push(cb.value));
        if(checked.length===0) return;
        buildChart(school, checked);
      };

      buildChart(defaultSchool, defaultSubjs);
    }
  };
}

function renderAchieveDist(){
  const id = 'achievePie_' + Math.random().toString(36).slice(2,8);
  const defaultSchool = '초등학교';
  const defaultSubj = '국어';
  const gradeColors = ['#2563eb','#16a34a','#f59e0b','#ef4444','#8b5cf6'];
  const gradeLabels = ['A (매우 잘함)','B (잘함)','C (보통)','D (노력 필요)','E (매우 노력 필요)'];

  function genPieData(school, subj){
    const seed = (school+subj).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const r = (n)=>{ const x=Math.sin(seed*n)*10000; return x-Math.floor(x); };
    const raw = [15+r(1)*20, 20+r(2)*15, 25+r(3)*10, 15+r(4)*15, 5+r(5)*10];
    const sum = raw.reduce((a,b)=>a+b,0);
    return raw.map(v=>Math.round(v/sum*100));
  }

  function buildSubjOptions(school, selected){
    return SUBJ_BY_SCHOOL[school].map(s=>`<option ${s===selected?'selected':''}>${s}</option>`).join('');
  }

  return {
    html: `
    <div class="subj-filter-bar">
      <div class="subj-filter-row">
        <span class="filter-label">*학년도</span>
        <select class="filter-select" style="min-width:80px"><option>2025</option></select>
        <span class="filter-label">*학교급</span>
        <select class="filter-select" id="achieveSchoolSel"><option selected>초등학교</option><option>중학교</option><option>고등학교</option></select>
        <span class="filter-label">*과목</span>
        <select class="filter-select" id="achieveSubjSel">${buildSubjOptions(defaultSchool, defaultSubj)}</select>
        <button class="btn-search" onclick="window.__refreshAchievePie()" style="margin-left:8px">조회</button>
      </div>
    </div>
    <div class="formula-bar"><span class="toggle">▸</span> 화면설명 및 산출식</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="chart-section">
        <div class="chart-header"><span class="chart-title">성취수준 분포</span></div>
        <div class="chart-container" style="max-height:350px"><canvas id="${id}"></canvas></div>
      </div>
      <div class="chart-section" id="achieveTable">
        <div class="chart-header"><span class="chart-title">성취수준별 비율</span></div>
        <table class="data-table" id="achieveDataTable">
          <thead><tr><th>성취수준</th><th>비율(%)</th><th>학생수(추정)</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>`,
    init:()=>{
      function refresh(){
        destroyCharts();
        const school = document.getElementById('achieveSchoolSel').value;
        const subj = document.getElementById('achieveSubjSel').value;
        const data = genPieData(school, subj);
        const ctx = document.getElementById(id);
        if(!ctx) return;
        const chart = new Chart(ctx, {
          type:'doughnut',
          data:{ labels:gradeLabels, datasets:[{ data, backgroundColor:gradeColors, borderWidth:2, borderColor:'#fff' }] },
          options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{
              legend:{ position:'bottom', labels:{ font:{size:11,family:'Pretendard'}, padding:12 }},
              tooltip:{ callbacks:{ label:ctx2=>ctx2.label+': '+ctx2.parsed+'%' }}
            }
          }
        });
        activeCharts.push(chart);
        // 테이블 갱신
        const tbody = document.querySelector('#achieveDataTable tbody');
        const total = 1200+Math.floor(Math.random()*300);
        tbody.innerHTML = gradeLabels.map((g,i)=>{
          const cnt = Math.round(total*data[i]/100);
          return '<tr><td>'+g+'</td><td class="num">'+data[i]+'%</td><td class="num">'+cnt.toLocaleString()+'명</td></tr>';
        }).join('');
      }
      document.getElementById('achieveSchoolSel').addEventListener('change', function(){
        const subSel = document.getElementById('achieveSubjSel');
        subSel.innerHTML = SUBJ_BY_SCHOOL[this.value].map(s=>'<option>'+s+'</option>').join('');
        refresh();
      });
      window.__refreshAchievePie = refresh;
      refresh();
    }
  };
}

function renderContentFreqPage(){
  const id = 'contentBar_' + Math.random().toString(36).slice(2,8);

  const defaultSchool = '초등학교';
  const defaultSubj = '전체';

  function genContentData(school, subj){
    const seed = (school+subj).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const r = (n)=>{ const x=Math.sin(seed*n)*10000; return x-Math.floor(x); };
    return WEEKS.slice(0,52).map((_,wi)=>{
      return types.map((t,ti)=>{
        let base = [3000,800,2000,500,1200,400][ti];

  function buildSubjOpts(school){

      </div>
    </div>
    <div class="formula-bar"><span class="toggle">▸</span> 화면설명 및 산출식</div>

      <div style="max-height:300px;overflow-y:auto">
        <table class="data-table" id="contentDataTable">
          <thead><tr><th>기간</th><th>영상</th><th>음원</th><th>텍스트</th><th>실습</th><th>이미지</th><th>기타</th><th>합계</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>`,
    init:()=>{
      function refresh(){
        destroyCharts();
        const school = document.getElementById('contentSchoolSel').value;
        const subj = document.getElementById('contentSubjSel').value;
        const weekData = genContentData(school, subj);
        const labels = WEEKS.slice(0,52).map(w=>w.label);
        // 스택드 바 차트
        const datasets = types.map((t,ti)=>({

        activeCharts.push(chart);
        // 테이블 갱신
        const tbody = document.querySelector('#contentDataTable tbody');

// 네비게이션
// ============================================================
let currentMenu = 'home';
let currentPage = 'home';

function renderSubMenu(menuKey){
  const menu = MENUS[menuKey];
  const el = document.getElementById('subMenu');
  if(menuKey === 'home'){
    el.innerHTML = '<div class="sub-menu-title">홈</div><div class="sub-menu-item active" data-page="home">대시보드</div>';
    return;
  }
  let html = `<div class="sub-menu-title">${menu.title}</div>`;
  menu.items.forEach(group=>{
    html += `<div class="sub-menu-group"><div class="sub-menu-group-title">▸ ${group.group}</div>`;
    group.children.forEach((item,i)=>{
      const isFirst = !currentPage || !menu.items.flatMap(g=>g.children).find(c=>c.id===currentPage);
      const active = currentPage === item.id || (isFirst && i===0 && group === menu.items[0]);
      html += `<div class="sub-menu-item${active?' active':''}" data-page="${item.id}">${item.name}</div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function navigateTo(menuKey, pageId){
  destroyCharts();
  currentMenu = menuKey;
  currentPage = pageId || (menuKey === 'home' ? 'home' : MENUS[menuKey].items[0].children[0].id);

  // 1차 메뉴 활성화
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active', n.dataset.menu === menuKey);
  });

  // 2차 메뉴 렌더링
  renderSubMenu(menuKey);

  // 2차 메뉴 항목 클릭 이벤트
  document.querySelectorAll('.sub-menu-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      document.querySelectorAll('.sub-menu-item').forEach(i=>i.classList.remove('active'));
      item.classList.add('active');
      currentPage = item.dataset.page;
      renderPage(currentPage);
    });
  });

  renderPage(currentPage);
}

function renderPage(pageId){
  destroyCharts();
  const content = getPageContent(pageId);
  document.getElementById('contentArea').innerHTML = content.html;

  // 브레드크럸 업데이트
  let bc = '';
  if(pageId === 'home'){ bc = '홈'; }
  else {
    for(const [key,menu] of Object.entries(MENUS)){
      for(const group of menu.items){
        const found = group.children.find(c=>c.id === pageId);
        if(found){ bc = `${menu.title} > ${group.group} > <span>${found.name}</span>`; break; }
      }
      if(bc) break;
    }
  }
  document.getElementById('breadcrumb').innerHTML = bc;

  // 차트 초기화
  requestAnimationFrame(()=>content.init());
}

// ============================================================
// 이벤트 바인딩
// ============================================================
document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click', ()=>{
    navigateTo(item.dataset.menu);
  });
});

// 초기 렌더링
navigateTo('home');
</script>
