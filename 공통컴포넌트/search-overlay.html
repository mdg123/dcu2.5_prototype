<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 검색 - 다채움</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../common-nav.css">
    <style>
        /* ===== 기본 리셋 및 공통 ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', system-ui, -apple-system, sans-serif;
            background: #F5F7FA;
            color: #1A1A2E;
            min-height: 100vh;
        }

        /* ===== 데모 페이지 ===== */
        .demo-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 108px);
            padding: 40px 24px;
            text-align: center;
        }

        .demo-page h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: 12px;
        }

        .demo-page p {
            font-size: 15px;
            color: #6B7280;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .demo-search-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            font-family: inherit;
        }

        .demo-search-btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .demo-search-btn:active {
            transform: translateY(0);
        }

        .demo-search-btn i {
            font-size: 18px;
        }

        .demo-shortcut {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 16px;
            font-size: 13px;
            color: #9CA3AF;
        }

        .demo-shortcut kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            padding: 0 6px;
            background: #F3F4F6;
            border: 1px solid #E5E7EB;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            color: #6B7280;
        }

        /* ===== 오버레이 배경 ===== */
        .search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 15vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }

        .search-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* ===== 검색 모달 ===== */
        .search-modal {
            background: #FFFFFF;
            width: 640px;
            max-width: calc(100vw - 32px);
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(-20px) scale(0.97);
            transition: transform 0.25s ease;
            position: absolute;
        }

        .search-overlay.active .search-modal {
            transform: translateY(0) scale(1);
        }

        /* ===== 드래그 핸들 ===== */
        .drag-handle {
            display: flex;
            justify-content: center;
            padding: 10px 0 4px;
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .drag-handle-bar {
            width: 40px;
            height: 4px;
            background: #D1D5DB;
            border-radius: 2px;
            transition: background 0.2s;
        }

        .drag-handle:hover .drag-handle-bar {
            background: #9CA3AF;
        }

        /* ===== 검색 헤더 ===== */
        .search-header {
            display: flex;
            align-items: center;
            padding: 8px 16px 12px;
            gap: 8px;
            flex-shrink: 0;
        }

        .search-icon {
            font-size: 18px;
            color: #9CA3AF;
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            font-family: inherit;
            color: #1A1A2E;
            background: transparent;
            padding: 8px 0;
        }

        .search-input::placeholder {
            color: #9CA3AF;
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            flex: 1;
            background: #F9FAFB;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            padding: 0 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input-wrapper:focus-within {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: #fff;
        }

        .search-submit-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .search-submit-btn:hover {
            background: #1d4ed8;
        }

        .search-close-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #9CA3AF;
            font-size: 18px;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .search-close-btn:hover {
            background: #F3F4F6;
            color: #4B5563;
        }

        .search-divider {
            height: 1px;
            background: #E5E7EB;
            margin: 0 16px;
            flex-shrink: 0;
        }

        /* ===== 검색 본문 ===== */
        .search-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            overscroll-behavior: contain;
        }

        .search-body::-webkit-scrollbar {
            width: 6px;
        }

        .search-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .search-body::-webkit-scrollbar-thumb {
            background: #D1D5DB;
            border-radius: 3px;
        }

        .search-body::-webkit-scrollbar-thumb:hover {
            background: #9CA3AF;
        }

        /* ===== 검색 전 화면: 최근/인기/추천 ===== */
        .search-section {
            margin-bottom: 20px;
        }

        .search-section:last-child {
            margin-bottom: 0;
        }

        .search-section-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #6B7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .search-section-title i {
            font-size: 12px;
        }

        /* 최근 검색어 칩 */
        .recent-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .recent-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #F3F4F6;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            color: #374151;
            cursor: pointer;
            transition: background 0.15s;
        }

        .recent-chip:hover {
            background: #E5E7EB;
        }

        .recent-chip-delete {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            background: none;
            border: none;
            border-radius: 50%;
            font-size: 10px;
            color: #9CA3AF;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            padding: 0;
            line-height: 1;
        }

        .recent-chip-delete:hover {
            background: #D1D5DB;
            color: #4B5563;
        }

        /* 인기 검색어 */
        .popular-list {
            list-style: none;
        }

        .popular-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .popular-item:hover {
            background: #F3F4F6;
        }

        .popular-rank {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .popular-rank.top3 {
            background: #2563EB;
            color: #fff;
        }

        .popular-rank.rest {
            background: #F3F4F6;
            color: #6B7280;
        }

        .popular-text {
            font-size: 14px;
            font-weight: 500;
            color: #1A1A2E;
        }

        /* 추천 검색어 칩 */
        .suggest-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggest-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            background: #EFF6FF;
            border: 1px solid #BFDBFE;
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            color: #2563EB;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .suggest-chip:hover {
            background: #DBEAFE;
            border-color: #93C5FD;
        }

        /* ===== 필터 탭 ===== */
        .filter-tabs {
            display: flex;
            gap: 4px;
            padding: 0 0 12px;
            border-bottom: 1px solid #E5E7EB;
            margin-bottom: 12px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .filter-tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: none;
            border: 1px solid #E5E7EB;
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            color: #6B7280;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .filter-tab:hover {
            background: #F3F4F6;
            color: #374151;
        }

        .filter-tab.active {
            background: #2563EB;
            border-color: #2563EB;
            color: #fff;
        }

        .filter-tab-count {
            font-size: 11px;
            font-weight: 600;
            min-width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            padding: 0 5px;
        }

        .filter-tab .filter-tab-count {
            background: #E5E7EB;
            color: #6B7280;
        }

        .filter-tab.active .filter-tab-count {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        /* ===== 검색 결과 카드 ===== */
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .result-card {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: background 0.15s, border-color 0.15s;
            position: relative;
        }

        .result-card:hover {
            background: #F9FAFB;
        }

        .result-card.focused {
            background: #EFF6FF;
            border-left: 4px solid #2563EB;
            padding-left: 8px;
        }

        .result-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 20px;
            flex-shrink: 0;
            background: #F3F4F6;
        }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: #1A1A2E;
            line-height: 1.4;
        }

        .result-title mark {
            background: #FEF3C7;
            color: #92400E;
            font-weight: 700;
            border-radius: 2px;
            padding: 0 1px;
        }

        .school-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .school-badge.elementary {
            background: #D1FAE5;
            color: #059669;
        }

        .school-badge.middle {
            background: #DBEAFE;
            color: #2563EB;
        }

        .school-badge.high {
            background: #EDE9FE;
            color: #7C3AED;
        }

        .result-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #9CA3AF;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .result-meta-sep {
            width: 3px;
            height: 3px;
            background: #D1D5DB;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .result-preview {
            font-size: 13px;
            color: #6B7280;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .result-preview mark {
            background: #FEF3C7;
            color: #92400E;
            font-weight: 600;
            border-radius: 2px;
            padding: 0 1px;
        }

        /* ===== 결과 건수 & 정렬 ===== */
        .result-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
            color: #6B7280;
        }

        .result-count strong {
            color: #2563EB;
            font-weight: 700;
        }

        /* ===== 고급 검색 옵션 ===== */
        .advanced-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
            background: none;
            border: none;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            color: #6B7280;
            cursor: pointer;
            transition: color 0.15s;
        }

        .advanced-toggle:hover {
            color: #2563EB;
        }

        .advanced-toggle i {
            font-size: 10px;
            transition: transform 0.2s;
        }

        .advanced-toggle.expanded i {
            transform: rotate(180deg);
        }

        .advanced-panel {
            display: none;
            background: #F9FAFB;
            border-radius: 10px;
            padding: 16px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .advanced-panel.show {
            display: block;
        }

        .advanced-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .advanced-row:last-child {
            margin-bottom: 0;
        }

        .advanced-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .advanced-field select,
        .advanced-field input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            color: #1A1A2E;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .advanced-field select:focus,
        .advanced-field input:focus {
            border-color: #2563EB;
        }

        .advanced-checkboxes {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .advanced-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
        }

        .advanced-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #2563EB;
            cursor: pointer;
        }

        /* ===== 빈 상태 ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            color: #D1D5DB;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 13px;
            color: #9CA3AF;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .empty-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .empty-suggestion-chip {
            padding: 6px 14px;
            background: #EFF6FF;
            border: 1px solid #BFDBFE;
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            color: #2563EB;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .empty-suggestion-chip:hover {
            background: #DBEAFE;
        }

        /* ===== 검색 푸터 ===== */
        .search-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-top: 1px solid #E5E7EB;
            background: #F9FAFB;
            border-radius: 0 0 16px 16px;
            flex-shrink: 0;
        }

        .search-footer-shortcuts {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: #9CA3AF;
        }

        .search-footer-shortcuts span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .search-footer-shortcuts kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 4px;
            background: #fff;
            border: 1px solid #E5E7EB;
            border-radius: 3px;
            font-family: inherit;
            font-size: 10px;
            font-weight: 600;
            color: #6B7280;
        }

        .search-footer-logo {
            font-size: 12px;
            color: #9CA3AF;
            font-weight: 500;
        }

        /* ===== 반응형 ===== */
        @media (max-width: 768px) {
            .search-overlay {
                padding-top: 0;
                align-items: stretch;
            }

            .search-modal {
                width: 100%;
                max-width: 100%;
                max-height: 100vh;
                height: 100vh;
                border-radius: 0;
                position: relative;
            }

            .search-overlay.active .search-modal {
                transform: none;
            }

            .drag-handle {
                display: none;
            }

            .search-header {
                padding: 12px 16px;
            }

            .advanced-row {
                grid-template-columns: 1fr;
            }

            .search-footer-shortcuts {
                display: none;
            }

            .filter-tabs {
                padding-bottom: 10px;
            }
        }

        @media (max-width: 480px) {
            .result-card {
                padding: 10px;
            }

            .result-icon {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .result-title {
                font-size: 13px;
            }
        }
    </style>
</head>
<body data-gnb-page="portal" data-gnb-base="../">

    <!-- ===== 데모 페이지 ===== -->
    <div class="demo-page">
        <h1>통합 검색 데모</h1>
        <p>
            다채움 포털의 통합 검색 오버레이를 체험해보세요.<br>
            수업, 콘텐츠, 과제, 평가, 게시물을 한 번에 검색할 수 있습니다.
        </p>
        <button class="demo-search-btn" id="openSearchBtn" aria-label="통합 검색 열기">
            <i class="fa-solid fa-magnifying-glass"></i>
            통합 검색
        </button>
        <div class="demo-shortcut">
            <kbd>Ctrl</kbd> + <kbd>K</kbd> 로도 열 수 있습니다
        </div>
    </div>

    <!-- ===== 검색 오버레이 ===== -->
    <div class="search-overlay" id="searchOverlay" role="dialog" aria-modal="true" aria-label="통합 검색">

        <div class="search-modal" id="searchModal">
            <!-- 드래그 핸들 -->
            <div class="drag-handle" id="dragHandle" title="드래그하여 이동">
                <div class="drag-handle-bar"></div>
            </div>

            <!-- 검색 헤더 -->
            <div class="search-header">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input
                        type="text"
                        class="search-input"
                        id="searchInput"
                        placeholder="수업, 콘텐츠, 과제, 평가 등을 검색하세요..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button class="search-submit-btn" id="searchSubmitBtn" aria-label="검색" title="검색">
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>

            <!-- 검색 본문 -->

                    <!-- 추천 검색어 -->

                                    <label class="advanced-checkbox">

                    <!-- 결과 요약 -->
                    <div class="result-summary" id="resultSummary"></div>

                    <!-- 결과 목록 -->

                    <!-- 빈 상태 -->
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <div class="empty-icon">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                        <div class="empty-title">검색 결과가 없습니다</div>
                        <div class="empty-desc">
                            다른 검색어로 시도하거나 아래 추천 검색어를 이용해보세요.

                        <div class="empty-suggestions" id="emptySuggestions"></div>

            <!-- 검색 푸터 -->
            <div class="search-footer">
                <div class="search-footer-shortcuts">
                    <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> 탐색</span>
                    <span><kbd>Enter</kbd> 선택</span>
                    <span><kbd>Esc</kbd> 닫기</span>

            </div>
        </div>
    </div>

    <script src="../common-nav.js"></script>
    <script>
    (function() {
        'use strict';

        // ===== 더미 데이터 =====
        const searchResults = [
            { id: 1, type: "lesson", icon: "\u{1F4DA}", title: "3-1 곱셈구구 기초 학습", schoolLevel: "초등", source: "채움클래스 > 수업", author: "김영희 선생님", preview: "곱셈구구 2단부터 9단까지 체계적으로 학습합니다.", date: "2026-03-04" },
            { id: 2, type: "content", icon: "\u{1F4DD}", title: "곱셈 응용문제 50선", schoolLevel: "초등", source: "채움콘텐츠 > 문서", author: "수학교육연구회", preview: "곱셈 응용 문제를 단계별로 풀어봅니다.", date: "2026-03-03" },
            { id: 3, type: "assessment", icon: "\u{1F3AF}", title: "곱셈구구 평가지", schoolLevel: "중등", source: "채움CBT > 평가지", author: "충북교육청", preview: "곱셈구구 이해도를 확인하는 평가지입니다.", date: "2026-03-02" },
            { id: 4, type: "lesson", icon: "\u{1F4DA}", title: "영어 회화 기초반 수업", schoolLevel: "중등", source: "채움클래스 > 수업", author: "박선생님", preview: "기초 영어 회화 패턴을 연습합니다.", date: "2026-03-04" },
            { id: 5, type: "content", icon: "\u{1F4DD}", title: "과학 실험 보고서 작성법", schoolLevel: "고등", source: "채움콘텐츠 > 문서", author: "과학교육연구회", preview: "실험 보고서의 구조와 작성 방법을 안내합니다.", date: "2026-03-01" },
            { id: 6, type: "homework", icon: "\u{270F}\u{FE0F}", title: "수학 3단원 과제", schoolLevel: "초등", source: "채움클래스 > 과제", author: "김영희 선생님", preview: "곱셈과 나눗셈 응용문제를 풀어보세요.", date: "2026-03-03" },
            { id: 7, type: "assessment", icon: "\u{1F3AF}", title: "중간고사 모의평가", schoolLevel: "고등", source: "채움CBT > 평가지", author: "충북교육청", preview: "2026학년도 1학기 중간고사 대비 모의평가입니다.", date: "2026-02-28" },
            { id: 8, type: "post", icon: "\u{1F4AC}", title: "코딩교육 자료 공유합니다", schoolLevel: "초등", source: "채움클래스 > 게시물", author: "이철수 선생님", preview: "스크래치와 엔트리 활용 수업자료를 공유합니다.", date: "2026-03-02" },
            { id: 9, type: "lesson", icon: "\u{1F4DA}", title: "AI 활용 수업 설계", schoolLevel: "중등", source: "채움클래스 > 수업", author: "정하윤 선생님", preview: "인공지능을 활용한 수업 설계 방법론을 다룹니다.", date: "2026-03-01" },
            { id: 10, type: "content", icon: "\u{1F4DD}", title: "독서록 작성 가이드", schoolLevel: "초등", source: "채움콘텐츠 > 문서", author: "국어교육연구회", preview: "효과적인 독서록 작성 방법과 예시를 제공합니다.", date: "2026-02-27" },
            { id: 11, type: "post", icon: "\u{1F4AC}", title: "실험보고서 양식 공유", schoolLevel: "중등", source: "채움클래스 > 게시물", author: "최수아 선생님", preview: "과학 실험보고서 양식을 공유합니다.", date: "2026-03-01" },
            { id: 12, type: "homework", icon: "\u{270F}\u{FE0F}", title: "영어 독해 과제 3주차", schoolLevel: "고등", source: "채움클래스 > 과제", author: "박지원 선생님", preview: "영어 지문 독해 연습 과제입니다.", date: "2026-03-02" }
        ];

        let recentSearches = ["곱셈구구", "과학실험", "영어 독해", "코딩교육", "독서록"];
        const popularSearches = ["AI 학습", "코딩교육", "수학익힘", "독서록", "실험보고서"];
        const suggestedSearches = ["3학년 수학", "과학 실험", "영어 회화"];

        const typeMap = {
            all: { label: "전체", icon: "" },
            lesson: { label: "수업", icon: "fa-chalkboard-user" },
            content: { label: "콘텐츠", icon: "fa-file-lines" },
            homework: { label: "과제", icon: "fa-pen-to-square" },
            assessment: { label: "평가", icon: "fa-bullseye" },
            post: { label: "게시물", icon: "fa-comments" }
        };

        // ===== DOM 참조 =====
        const overlay = document.getElementById('searchOverlay');
        const modal = document.getElementById('searchModal');
        const dragHandle = document.getElementById('dragHandle');
        const searchInput = document.getElementById('searchInput');
        const openBtn = document.getElementById('openSearchBtn');
        const closeBtn = document.getElementById('closeSearchBtn');
        const submitBtn = document.getElementById('searchSubmitBtn');
        const preSearchView = document.getElementById('preSearchView');
        const searchResultView = document.getElementById('searchResultView');
        const filterTabsEl = document.getElementById('filterTabs');
        const resultList = document.getElementById('resultList');
        const resultSummary = document.getElementById('resultSummary');
        const emptyState = document.getElementById('emptyState');
        const advancedToggle = document.getElementById('advancedToggle');
        const advancedPanel = document.getElementById('advancedPanel');
        const recentChipsEl = document.getElementById('recentChips');
        const popularListEl = document.getElementById('popularList');
        const suggestChipsEl = document.getElementById('suggestChips');
        const recentSection = document.getElementById('recentSection');
        const emptySuggestions = document.getElementById('emptySuggestions');
        const searchBody = document.getElementById('searchBody');

        let debounceTimer = null;
        let currentFilter = 'all';
        let focusedIndex = -1;
        let currentResults = [];
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let modalStartX = 0, modalStartY = 0;

        // ===== 오버레이 열기/닫기 =====
        function openSearch() {
            overlay.classList.add('active');
            // 초기 위치 설정 (화면 상단 1/4 지점 중앙)
            const isMobile = window.innerWidth <= 768;
            if (!isMobile) {
                modal.style.left = '50%';
                modal.style.top = '15vh';
                modal.style.transform = 'translate(-50%, 0)';
            } else {
                modal.style.left = '';
                modal.style.top = '';
                modal.style.transform = '';
            }
            setTimeout(() => {
                searchInput.focus();
            }, 100);
            document.body.style.overflow = 'hidden';
        }

        function closeSearch() {
            overlay.classList.remove('active');
            searchInput.value = '';
            currentFilter = 'all';
            focusedIndex = -1;
            showPreSearchView();
            document.body.style.overflow = '';
            // 위치 리셋
            modal.style.left = '';
            modal.style.top = '';
            modal.style.transform = '';
        }

        openBtn.addEventListener('click', openSearch);
        closeBtn.addEventListener('click', closeSearch);

        // 배경 클릭 닫기
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                closeSearch();
            }
        });

        // Ctrl+K 단축키
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                if (overlay.classList.contains('active')) {
                    closeSearch();
                } else {
                    openSearch();
                }
            }
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closeSearch();
            }
        });

        // ===== 드래그 이동 =====
        dragHandle.addEventListener('mousedown', function(e) {
            if (window.innerWidth <= 768) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            const rect = modal.getBoundingClientRect();
            modalStartX = rect.left;
            modalStartY = rect.top;
            modal.style.transition = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            modal.style.left = (modalStartX + dx) + 'px';
            modal.style.top = (modalStartY + dy) + 'px';
            modal.style.transform = 'none';
        });

        document.addEventListener('mouseup', function() {
            if (isDragging) {
                isDragging = false;
                modal.style.transition = '';
            }
        });

        // ===== 검색 전 화면 렌더링 =====
        function renderRecentSearches() {
            if (recentSearches.length === 0) {
                recentSection.style.display = 'none';
                return;
            }
            recentSection.style.display = '';
            recentChipsEl.innerHTML = recentSearches.map(function(term, idx) {
                return '<button class="recent-chip" data-term="' + escapeHTML(term) + '">' +
                    escapeHTML(term) +
                    '<span class="recent-chip-delete" data-idx="' + idx + '" title="삭제">&times;</span>' +
                '</button>';
            }).join('');
        }

        function renderPopularSearches() {
            popularListEl.innerHTML = popularSearches.map(function(term, idx) {
                return '<li class="popular-item" data-term="' + escapeHTML(term) + '">' +
                    '<span class="popular-rank ' + (idx < 3 ? 'top3' : 'rest') + '">' + (idx + 1) + '</span>' +
                    '<span class="popular-text">' + escapeHTML(term) + '</span>' +
                '</li>';
            }).join('');
        }

        function renderSuggestedSearches() {
            suggestChipsEl.innerHTML = suggestedSearches.map(function(term) {
                return '<button class="suggest-chip" data-term="' + escapeHTML(term) + '">' +
                    '<i class="fa-solid fa-magnifying-glass" style="font-size:11px;opacity:0.6"></i> ' +
                    escapeHTML(term) +
                '</button>';
            }).join('');
        }

        function renderEmptySuggestions() {
            emptySuggestions.innerHTML = suggestedSearches.map(function(term) {
                return '<button class="empty-suggestion-chip" data-term="' + escapeHTML(term) + '">' +
                    escapeHTML(term) +
                '</button>';
            }).join('');
        }

        function showPreSearchView() {
            preSearchView.style.display = '';
            searchResultView.style.display = 'none';
            renderRecentSearches();
            renderPopularSearches();
            renderSuggestedSearches();
        }

        function showSearchResultView() {
            preSearchView.style.display = 'none';
            searchResultView.style.display = '';
        }

        // 초기 렌더
        showPreSearchView();
        renderEmptySuggestions();

        // ===== 검색어 클릭 이벤트 위임 =====
        document.getElementById('searchBody').addEventListener('click', function(e) {
            // 최근 검색어 삭제
            var delBtn = e.target.closest('.recent-chip-delete');
            if (delBtn) {
                e.stopPropagation();
                var idx = parseInt(delBtn.getAttribute('data-idx'));
                recentSearches.splice(idx, 1);
                renderRecentSearches();
                return;
            }

            // 칩/인기/추천 검색어 클릭
            var chip = e.target.closest('[data-term]');
            if (chip) {
                var term = chip.getAttribute('data-term');
                searchInput.value = term;
                performSearch(term);
                return;
            }
        });

        // ===== 검색 실행 =====
        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            var val = searchInput.value.trim();
            if (val.length < 2) {
                showPreSearchView();
                focusedIndex = -1;
                return;
            }
            debounceTimer = setTimeout(function() {
                performSearch(val);
            }, 300);
        });

        submitBtn.addEventListener('click', function() {
            var val = searchInput.value.trim();
            if (val.length >= 2) {
                performSearch(val);
            }
        });

        function performSearch(query) {
            // 최근 검색어 추가
            addRecentSearch(query);

            // 필터 결과
            currentFilter = 'all';
            filterAndRender(query);
            showSearchResultView();
        }

        function addRecentSearch(term) {
            var idx = recentSearches.indexOf(term);
            if (idx > -1) recentSearches.splice(idx, 1);
            recentSearches.unshift(term);
            if (recentSearches.length > 8) recentSearches.pop();
        }

        function filterAndRender(query) {
            var q = query.toLowerCase();

            // 고급 검색 옵션
            var advChecks = advancedPanel.querySelectorAll('.advanced-checkbox input[type="checkbox"]');
            var allowedLevels = [];
            advChecks.forEach(function(cb) {
                if (cb.checked) allowedLevels.push(cb.value);
            });
            var advAuthor = document.getElementById('advAuthor').value.trim().toLowerCase();

            // 전체 검색 결과
            var allResults = searchResults.filter(function(item) {
                var matchQuery = item.title.toLowerCase().indexOf(q) > -1 ||
                                 item.preview.toLowerCase().indexOf(q) > -1 ||
                                 item.author.toLowerCase().indexOf(q) > -1 ||
                                 item.source.toLowerCase().indexOf(q) > -1;
                var matchLevel = allowedLevels.length === 0 || allowedLevels.indexOf(item.schoolLevel) > -1;
                var matchAuthor = !advAuthor || item.author.toLowerCase().indexOf(advAuthor) > -1;
                return matchQuery && matchLevel && matchAuthor;
            });

            // 유형별 건수
            var typeCounts = { all: allResults.length };
            Object.keys(typeMap).forEach(function(t) {
                if (t === 'all') return;
                typeCounts[t] = allResults.filter(function(r) { return r.type === t; }).length;
            });

            // 필터 탭 렌더
            renderFilterTabs(typeCounts, query);

            // 현재 필터 적용
            if (currentFilter === 'all') {
                currentResults = allResults;
            } else {
                currentResults = allResults.filter(function(r) { return r.type === currentFilter; });
            }

            focusedIndex = -1;
            renderResults(currentResults, query);
        }

        // ===== 필터 탭 =====
        function renderFilterTabs(counts, query) {
            var tabs = '';
            Object.keys(typeMap).forEach(function(type) {
                var info = typeMap[type];
                var isActive = currentFilter === type;
                var count = counts[type] || 0;
                tabs += '<button class="filter-tab' + (isActive ? ' active' : '') + '" data-type="' + type + '">';
                if (info.icon) {
                    tabs += '<i class="fa-solid ' + info.icon + '" style="font-size:12px"></i> ';
                }
                tabs += info.label;
                tabs += '<span class="filter-tab-count">' + count + '</span>';
                tabs += '</button>';
            });
            filterTabsEl.innerHTML = tabs;

            // 탭 클릭 이벤트
            filterTabsEl.querySelectorAll('.filter-tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    currentFilter = this.getAttribute('data-type');
                    filterAndRender(query);
                });
            });
        }

        // ===== 결과 렌더링 =====
        function renderResults(results, query) {
            if (results.length === 0) {
                resultList.style.display = 'none';
                resultSummary.style.display = 'none';
                emptyState.style.display = '';
                return;
            }

            emptyState.style.display = 'none';
            resultList.style.display = '';
            resultSummary.style.display = '';

            resultSummary.innerHTML =
                '<span class="result-count">총 <strong>' + results.length + '</strong>건의 검색 결과</span>';

            resultList.innerHTML = results.map(function(item, idx) {
                var schoolClass = '';
                if (item.schoolLevel === '초등') schoolClass = 'elementary';
                else if (item.schoolLevel === '중등') schoolClass = 'middle';
                else if (item.schoolLevel === '고등') schoolClass = 'high';

                return '<div class="result-card" data-idx="' + idx + '">' +
                    '<div class="result-icon">' + item.icon + '</div>' +
                    '<div class="result-info">' +
                        '<div class="result-title-row">' +
                            '<span class="result-title">' + highlightText(item.title, query) + '</span>' +
                            '<span class="school-badge ' + schoolClass + '">' + item.schoolLevel + '</span>' +
                        '</div>' +
                        '<div class="result-meta">' +
                            '<span>' + escapeHTML(item.source) + '</span>' +
                            '<span class="result-meta-sep"></span>' +
                            '<span>' + escapeHTML(item.author) + '</span>' +
                            '<span class="result-meta-sep"></span>' +
                            '<span>' + item.date + '</span>' +
                        '</div>' +
                        '<div class="result-preview">' + highlightText(item.preview, query) + '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function highlightText(text, query) {
            if (!query) return escapeHTML(text);
            var escaped = escapeHTML(text);
            var q = escapeHTML(query);
            var regex = new RegExp('(' + escapeRegex(q) + ')', 'gi');
            return escaped.replace(regex, '<mark>$1</mark>');
        }

        function escapeHTML(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // ===== 고급 검색 토글 =====
        advancedToggle.addEventListener('click', function() {
            advancedPanel.classList.toggle('show');
            advancedToggle.classList.toggle('expanded');
        });

        // 고급 검색 옵션 변경 시 재검색
        advancedPanel.addEventListener('change', function() {
            var val = searchInput.value.trim();
            if (val.length >= 2) {
                filterAndRender(val);
            }
        });

        // ===== 키보드 탐색 =====
        searchInput.addEventListener('keydown', function(e) {
            if (!overlay.classList.contains('active')) return;

            var cards = resultList.querySelectorAll('.result-card');
            if (cards.length === 0 && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                focusedIndex = Math.min(focusedIndex + 1, cards.length - 1);
                updateFocus(cards);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                focusedIndex = Math.max(focusedIndex - 1, -1);
                updateFocus(cards);
            } else if (e.key === 'Enter') {
                if (focusedIndex >= 0 && cards[focusedIndex]) {
                    e.preventDefault();
                    cards[focusedIndex].click();
                } else {
                    // 검색 실행
                    var val = searchInput.value.trim();
                    if (val.length >= 2) {
                        clearTimeout(debounceTimer);
                        performSearch(val);
                    }
                }
            } else if (e.key === 'Tab') {
                // 필터 탭 순환
                if (searchResultView.style.display !== 'none') {
                    e.preventDefault();
                    var types = Object.keys(typeMap);
                    var curIdx = types.indexOf(currentFilter);
                    var nextIdx = e.shiftKey
                        ? (curIdx - 1 + types.length) % types.length
                        : (curIdx + 1) % types.length;
                    currentFilter = types[nextIdx];
                    var val2 = searchInput.value.trim();
                    if (val2.length >= 2) {
                        filterAndRender(val2);
                    }
                }
            }
        });

        function updateFocus(cards) {
            cards.forEach(function(c, i) {
                c.classList.toggle('focused', i === focusedIndex);
            });
            if (focusedIndex >= 0 && cards[focusedIndex]) {
                cards[focusedIndex].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        // 결과 카드 클릭
        resultList.addEventListener('click', function(e) {
            var card = e.target.closest('.result-card');
            if (card) {
                var idx = parseInt(card.getAttribute('data-idx'));
                var item = currentResults[idx];
                if (item) {
                    alert('[데모] "' + item.title + '" 항목으로 이동합니다.\n출처: ' + item.source);
                }
            }
        });

        // 결과 카드 마우스 호버 시 포커스 처리
        resultList.addEventListener('mousemove', function(e) {
            var card = e.target.closest('.result-card');
            if (card) {
                var cards = resultList.querySelectorAll('.result-card');
                var idx = parseInt(card.getAttribute('data-idx'));
                focusedIndex = idx;
                updateFocus(cards);
            }
        });

        // ===== 빈 상태 추천 클릭 =====
        emptySuggestions.addEventListener('click', function(e) {
            var chip = e.target.closest('.empty-suggestion-chip');
            if (chip) {
                var term = chip.getAttribute('data-term');
                searchInput.value = term;
                performSearch(term);
            }
        });

    })();
    </script>
</body>
</html>
